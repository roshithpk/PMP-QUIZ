t what the project manager presented for approval. What should the project manager have done to prevent this from happening?","options":{"A":"Sent the meeting minutes to the stakeholders after the kick-off meeting","B":"Reviewed all the approvals immediately after the kick-off meeting was over","C":"Ran separate kick-off meetings for each culture and time zone","D":"Validated each stakeholder's understanding during the kick-off meeting"},"correct":["D"],"answer_display":"D","why_correct":"When international stakeholders approved a plan with different understandings, the PM should have validated each stakeholder's understanding during the kick-off meeting — confirming comprehension before the meeting ended.","why_wrong":{"A":"Meeting minutes sent after the kick-off don't prevent the misunderstanding from affecting approval.","B":"Reviewing approvals after the meeting is too late; the misunderstanding should have been caught during the meeting.","C":"Separate kick-off meetings per culture/time zone add overhead but don't address the validation of understanding."},"part":"Part 10","part_range":"Q451–Q499"},{"num":459,"type":"single","stem":"The rollout of a new finance system is in the execution phase. A number of issues have surfaced in the last month that are slowing the project down. A new project sponsor has recently started with the company but has not had time to meet the project manager. The project is at the point where the issues are significantly impacting delivery of the project. How should the project manager alert the new project sponsor about these concerns?","options":{"A":"Send an email invitation to the project sponsor to attend all of the project team's weekly meetings, and hope the sponsor will find time to attend","B":"Send an email to the project sponsor summarizing the project status and key concerns, and request an immediate face-to-face meeting to discuss them","C":"Continue emailing updated project status reports highlighting the key risks and issues, and wait for the project sponsor to request a meeting","D":"Complete a risk analysis outlining the delays and impacts, and email a copy of the risk register, urging the project sponsor to respond"},"correct":["B"],"answer_display":"B","why_correct":"When issues significantly impact delivery and the new sponsor hasn't met with the PM yet, the PM should send a summary email with key concerns and request an immediate meeting — providing context and urgency to prompt a timely response.","why_wrong":{"A":"Sending a meeting invitation and hoping the sponsor attends is passive and may not create the urgency needed.","C":"Waiting for the sponsor to request a meeting while risks escalate is too passive given the significant impact.","D":"Emailing a risk register and urging response is impersonal and may not convey the urgency of a face-to-face discussion."},"part":"Part 10","part_range":"Q451–Q499"},{"num":460,"type":"single","stem":"A project manager is acting as a scrum master in a hybrid project and is dealing with a conflict between team members. What strategy should be used to handle this conflict?","options":{"A":"Sort conflicts into two groups: positive and negative","B":"Place conflicts into categories: structural and interpersonal","C":"Place conflicts on a shared conflict list and ensure it is visible","D":"Review conflicts during daily Scrum so they are handled in a timely manner"},"correct":["B"],"answer_display":"B","why_correct":"For a scrum master handling conflict, categorizing conflicts into structural (process/role/system related) and interpersonal (people/relationship related) enables appropriate resolution strategies — structural conflicts need process solutions, interpersonal need relationship tools.","why_wrong":{"A":"Sorting into positive and negative conflicts is less actionable than structural vs. interpersonal categorization.","C":"A shared conflict list makes conflicts visible but doesn't determine how to resolve them.","D":"Daily Scrum is for synchronization, not conflict resolution — using it for conflicts disrupts its purpose."},"part":"Part 10","part_range":"Q451–Q499"},{"num":461,"type":"single","stem":"279 A new agile team is forming and the project manager notices that the team is struggling in many areas. The team is experiencing both the inability to meet iteration commitments and team member conflicts. What should the project manager do next?","options":{"A":"Raise the issues in the retrospective and propose solutions","B":"Inform management that commitments will not be met","C":"Involve management to help resolve the conflicts","D":"Coach the team both as a whole and individually"},"correct":["D"],"answer_display":"D","why_correct":"For a new agile team struggling with both commitment failures and conflicts, the PM should coach the team both as a whole and individually — the team needs system-level guidance on agile practices and individual coaching on specific challenges.","why_wrong":{"A":"Raising issues in the retrospective is appropriate but insufficient when the team is too new to agile to self-diagnose and fix their challenges.","B":"Informing management of missed commitments escalates before the PM has applied coaching.","C":"Involving management to resolve conflicts escalates team dynamics issues that the PM should address directly."},"part":"Part 10","part_range":"Q451–Q499"},{"num":462,"type":"single","stem":"The resource management plan is already done, and the team is located in different countries around the world. Team members are in multiple time zones, and they use different languages for communication. The project manager needs to keep the team organized and avoid misunderstandings and miscommunication that may produce a negative impact to the project. What should the project manager do to reduce negative impacts to the project?","options":{"A":"Modify the communications management plan to account for regional differences","B":"Conduct cultural awareness seminars","C":"Hold a virtual meeting to discuss the political environment","D":"Conduct a multigenerational management training session"},"correct":["A"],"answer_display":"A","why_correct":"When a global team has multiple time zones, languages, and communication challenges, the PM should modify the communications management plan to account for these regional differences — tailoring the plan to the actual team context.","why_wrong":{"B":"Cultural awareness seminars are useful long-term but don't immediately adjust the communications infrastructure to the team's needs.","C":"A virtual meeting on the political environment is unrelated to the communication management challenges described.","D":"Multigenerational management training addresses age-related differences, not time zone and language communication challenges."},"part":"Part 10","part_range":"Q451–Q499"},{"num":463,"type":"single","stem":"During the design phase, a project manager realizes that the project will benefit from using adaptive tools. The effectiveness of this approach has been proven in past projects inside the organization. What should the project manager do first?","options":{"A":"Update project documents to include adaptive tools and artifacts and plan the first iterative session","B":"Contact the project sponsor and request new team members who are familiar with adaptive projects","C":"Confirm team capabilities before introducing adaptive tools and artifacts to the project","D":"Freeze the design stage and look for an external resource to run iterative design at extra cost"},"correct":["C"],"answer_display":"C","why_correct":"Before introducing adaptive tools to a team currently using predictive methods, the PM must first confirm the team's capabilities and familiarity with adaptive approaches — ensuring readiness before changing the methodology.","why_wrong":{"A":"Updating project documents to include adaptive artifacts before confirming team capability puts the cart before the horse.","B":"Contacting the sponsor for new team members familiar with adaptive projects is premature before assessing existing team capabilities.","D":"Freezing the design stage and hiring external resources is expensive and disruptive when existing team capability assessment should come first."},"part":"Part 10","part_range":"Q451–Q499"},{"num":464,"type":"single","stem":"A project manager is leading a project which shows a trend to exceed the cost baseline. What should the project manager do first to manage the budget?","options":{"A":"Ask the project sponsor for assistance in getting the budget back on track","B":"Meet with the project team to analyze the actual cost to determine deviations","C":"Inform the stakeholders that the project will be finished over budget","D":"Issue a change request including the analysis to increase the budget"},"correct":["B"],"answer_display":"B","why_correct":"When costs are trending over budget, the PM must first meet with the project team to analyze the actual costs and understand what's causing the deviation — root cause analysis before any action.","why_wrong":{"A":"Asking the sponsor for assistance before identifying the cause provides them with an incomplete problem.","C":"Informing stakeholders of an overrun before analyzing the cause and developing corrective action is premature.","D":"Issuing a change request before understanding the deviation cause may request the wrong amount or the wrong solution."},"part":"Part 10","part_range":"Q451–Q499"},{"num":465,"type":"single","stem":"Two functional managers disagree on key features of one deliverable during the planning of a project. The project manager discovers that each manager included requirements that contradict each other. The functional managers do not want to meet with each other to find a solution. This situation has been escalated to the sponsor who requests a meeting with them. What strategy should the project manager use to resolve this conflict in the meeting?","options":{"A":"Explain to the managers that the contradicting requirements are being considered for implementation in the project","B":"Explain to the managers that only one of the two requirements can be implemented, and submit a change request","C":"Ensure that both managers understand the requirements and search for a solution that best satisfies this deliverable","D":"Request that the managers explain why each requirement must be implemented and decide by considering the cost and benefits"},"correct":["C"],"answer_display":"C","why_correct":"With two conflicting requirements and a mandatory sponsor meeting, the PM should ensure both managers fully understand the requirements and search for a solution that best satisfies the deliverable — seeking a collaborative resolution that serves the project outcome.","why_wrong":{"A":"Considering both conflicting requirements for implementation without resolution doesn't solve the conflict.","B":"Implementing only one requirement without joint agreement may not serve the best outcome and alienates the losing manager.","D":"Having the managers explain their reasons and deciding by cost-benefit is an analytical approach that may still leave one manager feeling unheard."},"part":"Part 10","part_range":"Q451–Q499"},{"num":466,"type":"single","stem":"282 A project manager is approaching the end of a project, and several tasks are now practically complete and ready for handover to the client. How should the project manager proceed?","options":{"A":"Update the quality management plan for the overall project","B":"Ask the client to verify and accept the tasks that have been completed","C":"Close out the project tasks that have been completed","D":"Update the communications management plan for the overall project"},"correct":["B"],"answer_display":"B","why_correct":"When tasks are complete near the end of the project, the PM should ask the client to verify and formally accept them — formal acceptance is required before tasks can be officially closed.","why_wrong":{"A":"Updating the quality management plan is a process improvement activity, not a project closure action.","C":"Closing tasks without client verification skips the formal acceptance that the PM needs for official closure.","D":"Updating the communications plan is a process activity; client acceptance is the priority action."},"part":"Part 10","part_range":"Q451–Q499"},{"num":467,"type":"single","stem":"During a documentation audit of an international company, it was identified that the last version of the project schedule was from one month ago even though the project manager knew it was recently updated. How should the project manager have handled documentation for the project?","options":{"A":"Updated the project management plan regularly and had it securely shared with all stakeholders","B":"Assigned a project team member to ensure all project documentation was updated","C":"Reviewed the risk register to identify a response plan for the audit","D":"Kept documentation in the project management information system (PMIS), and shared it with appropriate stakeholders"},"correct":["D"],"answer_display":"D","why_correct":"To prevent documentation audit failures in an international project, the PM should keep all documentation in the PMIS and share it with appropriate stakeholders — ensuring it's accessible, current, and appropriately controlled.","why_wrong":{"A":"Updating the PM plan and sharing with all stakeholders may over-expose sensitive information; the PMIS with appropriate access controls is more appropriate.","B":"Assigning a team member to maintain documentation helps but the PM should ensure the PMIS is the central, controlled repository.","C":"Reviewing the risk register to find an audit response plan addresses the symptom after the fact."},"part":"Part 10","part_range":"Q451–Q499"},{"num":468,"type":"single","stem":"A new regulation has been approved that will impact the deliverables in the fourth phase of the project. The delivery is following an iterative approach and is currently completing the second phase. What should the project manager do next?","options":{"A":"Consult with the project sponsor to discuss a cost increase","B":"Acquire approval for an exception to the implementation of the new regulation","C":"Get approval for the additional budget from the steering committee","D":"Meet with subject matter experts (SMEs) to access the impact to objectives"},"correct":["D"],"answer_display":"D","why_correct":"When a new regulation impacts a future delivery phase, the PM should first meet with SMEs to assess the impact on objectives — understanding the full consequences before deciding on budget, scope, or approval approaches.","why_wrong":{"A":"Consulting the sponsor about a cost increase is premature before the impact is assessed.","B":"Seeking an exception to regulatory implementation may not be ethical or legal; impact assessment comes first.","C":"Seeking budget approval from the steering committee is premature before the impact analysis determines what's needed."},"part":"Part 10","part_range":"Q451–Q499"},{"num":469,"type":"single","stem":"The tables show the requirements for an agile project with the anticipated return on investment (ROI) and identified project risks, along with the analysis details. What should be the priority order in the product backlog?","options":{"A":"Risk 3, Risk 1, Risk 2, Requirement 3, Requirement 1, Requirement 2","B":"Requirement 3, Risk 3, Requirement 1, Requirement 2, Risk 2","C":"Requirement 3, Requirement 1, Requirement 2","D":"Requirement 3, Requirement 1, Risk 3, Requirement 2, Risk 1, Risk 2"},"correct":["D"],"answer_display":"D","why_correct":"Backlog priority should balance high-value requirements (Req 3, Req 1) with risk mitigation (Risk 3 — highest risk), then continue with remaining requirements and risks ordered by their value-to-risk ratio. This maximizes value while managing the most critical risks early.","why_wrong":{"A":"Leading with all risks before any requirements ignores the primary purpose of delivering business value.","B":"This ordering lacks the highest-risk item early enough.","C":"Requirements-only ordering ignores the risk items that need early attention to de-risk the project."},"part":"Part 10","part_range":"Q451–Q499"},{"num":470,"type":"single","stem":"One of the main inputs required for a deliverable is missing due to a miscommunication between the vendor and project manager. Because of the missed deliverable, the critical path of the project is extended. What should the project manager do next?","options":{"A":"Start an audit of the vendor's processes and procedures","B":"Review lessons learned from previous projects with this vendor","C":"Make a detailed analysis on vendor issues during the project","D":"Execute a contingency plan to address the issue with the vendor"},"correct":["D"],"answer_display":"D","why_correct":"When a vendor's missed deliverable extends the critical path due to miscommunication, the PM should execute a contingency plan to address the immediate impact — taking the pre-planned response action rather than conducting retrospective analysis first.","why_wrong":{"A":"Auditing the vendor's processes is a long-term quality improvement action, not an immediate response to a critical path delay.","B":"Reviewing lessons learned from previous projects with this vendor is useful for future projects but doesn't address the current delay.","C":"A detailed analysis of vendor issues is documentation activity, not the immediate response needed."},"part":"Part 10","part_range":"Q451–Q499"},{"num":471,"type":"single","stem":"During the design phase of a project, the project manager notices that the schedule performance index (SPI) is 1,8 and the cost performance index (CPI) is 0,1. In a weekly meeting with top management, the project manager reports concerns about these indicators. However, the most concerned person was the project sponsor who said that if the trend continues, they will be forced to prematurely close the project. What should the project manager do?","options":{"A":"Monitor the project sponsor, but understand that it is normal to spend more money in the design phase of a project","B":"Stop crashing the schedule","C":"Manage the project sponsor closely and revise the project's resource management plan to improve indicators","D":"Use a resource-leveling technique"},"correct":["C"],"answer_display":"C","why_correct":"An SPI of 1.8 means ahead of schedule (possible schedule crashing effect) while a CPI of 0.1 means severely over budget — these indicators together suggest resources are being used inefficiently (crashing). The PM should manage the sponsor closely and revise the resource management plan to improve the indicators.","why_wrong":{"A":"An SPI of 1.8 could indicate crashing but a CPI of 0.1 is critically low, not normal for a design phase.","B":"Stopping schedule crashing should be evaluated, but managing the sponsor and resource plan is the correct combined response.","D":"Resource leveling reduces peaks but doesn't address the critically low CPI without a comprehensive resource management review."},"part":"Part 10","part_range":"Q451–Q499"},{"num":472,"type":"single","stem":"A new project manager is planning an information security project for a company that resides in different countries. What is the first step the project manager should take to gather customer requirements?","options":{"A":"Conduct a stakeholder analysis to identify how regional policies may influence needs","B":"Request relevant stakeholders to conduct an analysis and reach consensus independently","C":"Conduct a project scope review workshop with relevant stakeholders","D":"Conduct project planning meetings in one location with relevant stakeholders"},"correct":["A"],"answer_display":"A","why_correct":"For an international information security project, the first step to gather requirements is a stakeholder analysis to identify how regional policies, regulations, and cultural needs may influence security requirements — context before gathering.","why_wrong":{"B":"Having stakeholders independently reach consensus without PM facilitation may produce inconsistent results across regions.","C":"A scope review workshop is valuable but should follow the stakeholder analysis that identifies the regional influences on scope.","D":"A single-location planning meeting with international stakeholders may exclude those who cannot travel and misses the regional context."},"part":"Part 10","part_range":"Q451–Q499"},{"num":473,"type":"single","stem":"A company's project management office (PMO) has been trying to implement an adaptive approach in the project management framework and a project manager has been asked to use adaptive tools in their next project. This is not the first time the request has been made and the previous project failed when adaptive tools were implemented. What should the project manager do?","options":{"A":"Prepare a change request and seek approval from the steering committee regarding the new project framework","B":"Conduct individual interviews with key stakeholders in order to understand all concerns, then prepare a communications management plan","C":"Bring in a third party company to develop and implement a hybrid framework for this specific project","D":"Recommend to the PMO that it is not the right time to start implementing adaptive tools in projects"},"correct":["B"],"answer_display":"B","why_correct":"When adaptive tool implementation failed previously, the PM should conduct individual interviews with key stakeholders to understand all concerns, then prepare a communications management plan — understanding resistance before attempting implementation again.","why_wrong":{"A":"A change request to the steering committee formally proposes the change but doesn't address the concerns that caused previous failure.","C":"Bringing in a third-party company adds cost without understanding why the previous attempt failed.","D":"Recommending delay without investigating root causes of previous failure misses the opportunity to succeed this time."},"part":"Part 10","part_range":"Q451–Q499"},{"num":474,"type":"single","stem":"To estimate the costs of a new project that is similar to a project that was implemented last year, the project manager meets with a group of experts from the previous project. The group uses a three-point estimating technique. The project manager submits the estimated budget to the project sponsor for approval. The project sponsor, who is new to the company, is concerned because the budget exceeded their expectations. What should the project manager do?","options":{"A":"Review the organizational process assessment to determine if a contingency reserve was considered in the budget estimate","B":"Review the historical information and lessons learned from last year’s project to justify the new budget estimate","C":"Change the budgeting technique to a more accurate, bottom-up cost estimation","D":"Use soft skills to convince the project sponsor to approve the new budget estimate"},"correct":["B"],"answer_display":"B","why_correct":"When a new sponsor questions the budget estimate, the PM should review the historical information and lessons learned from the previous similar project — this provides the factual basis to justify the current estimate.","why_wrong":{"A":"Reviewing the organizational process assessment doesn't directly address the sponsor's concern about budget accuracy.","C":"Switching to bottom-up estimation implies the current estimate is wrong; first justify it with historical evidence.","D":"Using soft skills to convince the sponsor without substantive evidence is manipulation, not informed persuasion."},"part":"Part 10","part_range":"Q451–Q499"},{"num":475,"type":"single","stem":"The project manager is having difficulty obtaining approval of the project requirements because there is disagreement among the project stakeholders. This issue is putting the project schedule at risk. What should the project manager do first to facilitate the approval of project requirements?","options":{"A":"Review the project charter","B":"Perform a stakeholder analysis","C":"Identify the source of the disagreement","D":"Hold a team-building event"},"correct":["C"],"answer_display":"C","why_correct":"When stakeholder disagreement is blocking requirement approval, the PM must first identify the source of the disagreement — understanding the root cause enables the PM to facilitate targeted resolution rather than applying a generic approach.","why_wrong":{"A":"Reviewing the project charter provides context but doesn't identify what stakeholders are specifically disagreeing about.","B":"Performing a stakeholder analysis is useful but slower; identifying the source of disagreement directly is faster and more targeted.","D":"A team-building event improves relationships but doesn't address the specific disagreement about requirements."},"part":"Part 10","part_range":"Q451–Q499"},{"num":476,"type":"single","stem":"A project manager has been assigned to a project and receives the project charter from the project management office (PMO). The document is very clear about customer requests. During Project Scope Management some requirements seem to be different from the ones specified within the project charter. What should the project manager do?","options":{"A":"Modify the baseline of the project for minor impact changes to the project scope","B":"Use a focus group and brainstorming sessions to gather more details about the project scope","C":"Register the changes in the configuration management plan and send it to the change control board (CCB)","D":"Explain to the sponsor that these requests could endanger the schedule and cost of the project"},"correct":["C"],"answer_display":"C","why_correct":"When requirements during scope management differ from the project charter, the PM should register the changes in the configuration management plan and submit to the CCB — this is the formal process for managing requirement changes that differ from the baseline.","why_wrong":{"A":"Modifying the baseline for minor changes without CCB approval violates change control.","B":"Focus groups and brainstorming gather more requirements; the issue here is discrepancy management, not requirements gathering.","D":"Explaining risks to the sponsor before following the formal change process skips the established governance path."},"part":"Part 10","part_range":"Q451–Q499"},{"num":477,"type":"single","stem":"An agile project manager would like to convert the requirements document into epics, capabilities, features and stories. In how many iterations should the project manager estimate the story duration?","options":{"A":"Four iterations","B":"One iteration","C":"Two iterations","D":"Three iterations"},"correct":["B"],"answer_display":"B","why_correct":"In agile estimation, user stories should be estimated to be completable within one iteration — stories that span multiple iterations should be broken down into smaller stories. The PMI/agile principle is one iteration per story.","why_wrong":{"A":"Four iterations for a single story makes it too large to manage as a story; it should be an epic that gets broken down.","C":"Two iterations still makes a story too large for effective agile management.","D":"Three iterations similarly exceeds the one-iteration target for user stories."},"part":"Part 10","part_range":"Q451–Q499"},{"num":478,"type":"single","stem":"An agile project is running its fifth iteration out of eight. After the last iteration planning the team was informed that there is a new competitor in the market, and it is necessary to move faster to ensure market share is not missed. What should the project manager do?","options":{"A":"Add the competitor's functionalities to the product backlog to improve the product","B":"Ask the sponsor to add more people to the team","C":"Help the team to find a new approach to launch the product as soon as possible","D":"Ask the team to increase the velocity to launch the product as soon as possible"},"correct":["C"],"answer_display":"C","why_correct":"When a new competitor requires faster time-to-market in an agile project, the PM should help the team find a new approach to launch the product sooner — this may involve MVP definition, scope reduction, or release strategy changes.","why_wrong":{"A":"Adding competitor features without analysis increases scope when the need is to launch faster with current features.","B":"Adding more people at sprint 5 of 8 is too late to have significant impact and adds coordination overhead.","D":"Asking the team to increase velocity is not directly actionable; velocity reflects actual capacity and cannot simply be commanded upward."},"part":"Part 10","part_range":"Q451–Q499"},{"num":479,"type":"single","stem":"During the development of a product, the project manager observes conflicts between project stakeholders, resulting in deliverable and output approval delays. On which area should the project manager focus?","options":{"A":"Revisiting the project management plan to ensure deliverables are on time","B":"Increasing the frequency of project update meetings to keep stakeholders informed","C":"Revisiting the stakeholder engagement plan, focusing on specific overlooked stakeholders","D":"Reviewing the business case and identifying gaps within scope"},"correct":["C"],"answer_display":"C","why_correct":"When stakeholder conflicts cause approval delays, the PM should revisit the stakeholder engagement plan focusing on the specific overlooked stakeholders — understanding who is not being adequately engaged and what their specific concerns are.","why_wrong":{"A":"Revisiting the PM plan is process-level and doesn't address the stakeholder relationship root cause.","B":"More frequent status meetings increase communication but don't address why stakeholders are in conflict.","D":"Reviewing the business case and scope gaps is a requirements issue; the problem described is stakeholder engagement."},"part":"Part 10","part_range":"Q451–Q499"},{"num":480,"type":"single","stem":"During the execution of a project within an operations function, the project manager encounters scope changes and a delay in the delivery of critical tasks. How should the project manager address this situation?","options":{"A":"Communicate the concerns to the project management office (PMO) during the weekly project reports","B":"Call for a team meeting to decide if the changes should be included","C":"Initiate the change request to modify the scope and adjust the timelines","D":"Conduct an impact analysis and present the results to the steering committee for approval"},"correct":["D"],"answer_display":"D","why_correct":"When scope changes and schedule delays occur in an operations-embedded project, the PM should conduct an impact analysis and present results to the steering committee for approval — formal analysis and governance approval are required for changes in an operational context.","why_wrong":{"A":"Reporting to the PMO weekly is informational; approval authority likely rests with the steering committee.","B":"A team meeting to decide on changes is insufficient governance for scope changes in a project execution context.","C":"Initiating a change request without first conducting impact analysis provides incomplete information to the CCB."},"part":"Part 10","part_range":"Q451–Q499"},{"num":481,"type":"single","stem":"The project velocity has recently slipped, and a decision was made to skip testing to increase the momentum and bong the project back on track. What will the project manager need to focus on as a result of this decision?","options":{"A":"Increased bum rate","B":"Increased cost","C":"Increased technical debt","D":"Decreased efficiency"},"correct":["C"],"answer_display":"C","why_correct":"Skipping testing to increase velocity creates technical debt — the accumulated shortcuts that must be addressed later, often at greater cost. This is the primary consequence the PM needs to focus on.","why_wrong":{"A":"Increased burn rate is a financial metric that may or may not increase depending on how the freed-up resources are used.","B":"Increased cost is a potential eventual consequence of technical debt but not the immediate focus.","D":"Decreased efficiency may occur later when the team must address technical debt but technical debt is the direct consequence."},"part":"Part 10","part_range":"Q451–Q499"},{"num":482,"type":"single","stem":"During project execution, the project manager notices that the work performance reports have deteriorated drastically in less than two weeks. The project team in country A is complaining about delays resulting from holidays occurring in country B that have impacted their project team. How should the project manager handle this situation?","options":{"A":"Implement crashing to compress the schedule and improve the schedule performance index (SRI).","B":"Implement fast-tracking to compress the schedule and improve the SPI","C":"Perform conflict management using the project's resource management plan.","D":"Review the risk management plan to evaluate the probability and impact of these delays"},"correct":["D"],"answer_display":"D","why_correct":"When schedule performance deteriorates due to unplanned holidays in one country affecting another team, the PM should review the risk management plan to evaluate the probability and impact of these delays — assessing whether this was a known risk with a planned response.","why_wrong":{"A":"Crashing the schedule adds cost to address a situation that may have a less expensive planned response.","B":"Fast-tracking the schedule adds risk and may not be feasible for all activities.","C":"Conflict management addresses interpersonal issues; this is a schedule and resource planning issue."},"part":"Part 10","part_range":"Q451–Q499"},{"num":483,"type":"multi","stem":"During daily calls team members share task progress. One team member does not usually communicate many details and has critical tasks to be completed. All team members are located in different countries and critical work is about to start. Which two options will help the project manager in this situation? (Choose two.)","options":{"A":"Encourage all team members to use a virtual workspace","B":"Ask the team to send emails with detailed task progress","C":"Talk to the team member about their engagement and take appropriate action.","D":"Reassign the work to a resource who participates in the daily calls","E":"Report the team member’s poor performance to the functional manager ,E"},"correct":["A","C"],"answer_display":"A,C","why_correct":"Encouraging all team members to use a virtual workspace (A) increases transparency of task progress; talking directly to the uncommunicative team member about their engagement (C) addresses the specific behavior and potential underlying issues.","why_wrong":{"B":"Sending emails with detailed progress is a push method that changes the format but doesn't address the engagement issue.","D":"Reassigning work before understanding why the team member isn't communicating is premature.","E":"Reporting poor performance to the functional manager before direct engagement escalates prematurely."},"part":"Part 10","part_range":"Q451–Q499"},{"num":484,"type":"single","stem":"A project manager is implementing a new software system. Some department staff members are questioning the necessity of the change and feel the new system will impede their current processes. What should the project manager have done at the start of the project to prevent this resistance?","options":{"A":"Created a communications management plan that outlined the method of communicating to stakeholders","B":"Ensured that the company culture encourages changes before accepting the project","C":"Encouraged leadership to discuss the change with departments that are typically resistant to change","D":"Involved stakeholders from all levels of the company so everyone understands the change"},"correct":["D"],"answer_display":"D","why_correct":"To prevent resistance to a new system implementation, the PM should have involved stakeholders from all levels so everyone understands the change — broad participation builds ownership and reduces surprise-driven resistance.","why_wrong":{"A":"A communications plan is important but receiving communications about a change is different from being involved in understanding it.","B":"Ensuring company culture encourages change before accepting the project is not within the PM's control.","C":"Having leadership discuss change with resistant departments helps but doesn't replace direct stakeholder involvement."},"part":"Part 10","part_range":"Q451–Q499"},{"num":485,"type":"single","stem":"One of a project manager’s team members is continuously improving. This team member has been a role model and mentor to others in the organization. How should the project manager acknowledge this team member’s commitment?","options":{"A":"Send this person to a meeting to negotiate the scope with the client","B":"Appreciate this team member’s performance throughout the project life cycle","C":"Promote this team member to a coaching role after this project is completed","D":"Document it in the team member’s end of year performance review"},"correct":["B"],"answer_display":"B","why_correct":"PMI professional responsibility: the PM should appreciate the team member's performance throughout the project life cycle — timely recognition is more meaningful than waiting for an annual review or future promotion.","why_wrong":{"A":"Sending the high-performer to negotiate scope is a task assignment, not recognition.","C":"Promising a coaching role after the project is future-oriented and doesn't acknowledge the current exemplary behavior.","D":"Documenting in the annual review is formal acknowledgment but not immediate recognition — the PM should appreciate them now."},"part":"Part 10","part_range":"Q451–Q499"},{"num":486,"type":"single","stem":"During the planning stage of a project the project manager realizes that a standard stakeholder engagement approach will not suffice. One of the client representatives, who is not a key decision maker, is extremely opinionated. This client representative could become a roadblock to progress due to their perceived level of authority during meetings. How should the project manager handle this moving forward?","options":{"A":"Ask that only key decision makers attend the project meetings.","B":"Update the project schedule to cater to this particular stakeholder.","C":"Allocate time to gain buy-in from the stakeholder prior to key decision meetings.","D":"Update the risk register to consider the possible project impacts."},"correct":["C"],"answer_display":"C","why_correct":"When a non-key-decision-maker stakeholder could become a roadblock, the PM should allocate time to gain their buy-in before key decision meetings — proactive stakeholder engagement converts potential blockers into supporters.","why_wrong":{"A":"Excluding non-decision-makers from meetings may increase their resistance and create perception of exclusion.","B":"Updating the schedule to cater to this stakeholder is over-accommodation that doesn't address the influence problem.","D":"Updating the risk register notes the threat but doesn't mitigate it; proactive engagement does."},"part":"Part 10","part_range":"Q451–Q499"},{"num":487,"type":"multi","stem":"The city has decided to build a new tram station. The project will include various approaches. The construction and infrastructure work will be accomplished using a predictive life cycle while software will be developed using an iterative life cycle. Some neighbors are resisting the project have been asking the mayor to stop the project, and are threatening legal action. What two actions should the project manager take? (Choose two.)","options":{"A":"Discuss with the construction team alternatives on moving the new train station to another location","B":"Publish information on the city’s website about the benefits that the new tram station will bring","C":"Have a meeting with the mayor and explain the importance of the new train station to the city","D":"Conduct regular meetings with the neighbors to get their buy-in for the project","E":"Register this situation as a risk and develop a mitigation plan ,D"},"correct":["D","E"],"answer_display":"D,E","why_correct":"Conducting regular meetings with neighbors to build buy-in (D) addresses the resistance proactively; registering the legal threat as a risk with a mitigation plan (E) formally manages the project risk of community opposition.","why_wrong":{"A":"Moving the station to another location is a major scope change that requires formal change control and may not be feasible.","B":"Website information publication is a push communication that doesn't build the interactive engagement needed to convert resistant neighbors.","C":"Meeting with the mayor doesn't address the neighbors who have standing to take legal action."},"part":"Part 10","part_range":"Q451–Q499"},{"num":488,"type":"multi","stem":"Which two actions should a project manager consider while launching a new virtual team? (Choose two.)","options":{"A":"Recruit the best resources within the organization to be part of the virtual team","B":"Evaluate the project manager’s own strengths and weaknesses as a virtual team leader to identify avoidable pitfalls","C":"Identify the types and quantities of resources required for each work package or activity","D":"Establish in the beginning, how progress will be monitored and the best means for communicating progress","E":"Verify if team members are on more than one team and cannot devote enough time to this team ,E"},"correct":["B","D"],"answer_display":"B,D","why_correct":"For launching a virtual team, the PM should evaluate their own strengths and weaknesses as a virtual team leader (B) to identify pitfalls; and establish from the beginning how progress will be monitored and communicated (D) to build team accountability.","why_wrong":{"A":"Recruiting the best organizational resources may not be possible; team composition constraints are common.","C":"Identifying resource quantities per work package is project planning, not virtual team launch-specific.","E":"Verifying team members' time commitments is important but less foundational than the PM's self-assessment and progress monitoring."},"part":"Part 10","part_range":"Q451–Q499"},{"num":489,"type":"single","stem":"Important projects in the portfolio backlog need to be delivered. Budget estimates are needed to prioritize the projects. How should the project budgets be estimated?","options":{"A":"The project is decomposed into features and based on the feature value and the velocity of the team, the team provides the estimate","B":"Budget estimates are provided based on the experience of the sponsor, product owner and team facilitator","C":"The team facilitator uses historical data and arrives at an estimate based on the nature of the project.","D":"The product owner obtains all project details and based on the team's experience and velocity provides a budget estimate"},"correct":["A"],"answer_display":"A","why_correct":"For portfolio backlog projects, budget estimates should come from decomposing into features and using team velocity to estimate — this is the agile approach that provides data-driven estimates based on actual team capacity.","why_wrong":{"B":"Estimates based on experience of the sponsor and product owner are subjective and not grounded in team velocity data.","C":"Historical data from the team facilitator alone doesn't incorporate the product owner's feature understanding or the team's current capacity.","D":"The product owner obtaining all details and estimating based on team experience is closer but misses the feature decomposition and velocity-based rigor of option A."},"part":"Part 10","part_range":"Q451–Q499"},{"num":490,"type":"single","stem":"At the end of a project with multiple suppliers, the project manager is reviewing the closing process and finds that an unexpected financial balance is remaining. What will help the project manager understand why this has occurred?","options":{"A":"Project audit","B":"Lessons learned","C":"Organizational process assets (OPAs)","D":"Procurement audit"},"correct":["D"],"answer_display":"D","why_correct":"When an unexpected financial balance remains at project close with multiple suppliers, a procurement audit will provide detailed review of supplier contracts, invoices, and payments — identifying why the balance exists through formal procurement process review.","why_wrong":{"A":"A general project audit reviews project performance broadly; a procurement audit specifically examines the supplier financial transactions.","B":"Lessons learned captures what happened but doesn't provide the detailed financial investigation a procurement audit does.","C":"OPAs provide organizational context and templates but don't explain the specific financial discrepancy."},"part":"Part 10","part_range":"Q451–Q499"},{"num":491,"type":"single","stem":"A new project manager is assigned to a project midway through its implementation. During the first risk review meeting, the project manager notices that the version of the risk register used by the project team members is different from the one the project manager is using. What should the project manager have done to avoid this issue?","options":{"A":"Referred to the communications management plan","B":"Validated the issue log","C":"Validated the project artifacts","D":"Performed expert judgment"},"correct":["C"],"answer_display":"C","why_correct":"When different versions of the risk register are in use, the PM should have validated the project artifacts — ensuring all team members are using the current, approved versions of project documents.","why_wrong":{"A":"The communications management plan describes how information is shared; artifact validation ensures the correct version is shared.","B":"Validating the issue log confirms active issues, not document version consistency.","D":"Expert judgment is a technique for analysis; artifact validation is the administrative process for version control."},"part":"Part 10","part_range":"Q451–Q499"},{"num":492,"type":"single","stem":"During project execution, the project manager discovered that a key deliverable was missing from the scope of work. After investigation, the project manager and the team discovered that the missing deliverable will impact the critical path. What should the project manager do to avoid future delays?","options":{"A":"Submit a change request.","B":"Add additional resources to the project","C":"Update the scope of work","D":"Review the risk management plan"},"correct":["A"],"answer_display":"A","why_correct":"When a missing deliverable is discovered during execution and it affects the critical path, the PM must submit a change request — formally adding the deliverable to the scope baseline requires change control approval.","why_wrong":{"B":"Adding resources addresses schedule compression but doesn't formally address the missing scope.","C":"Updating the scope of work without change request approval bypasses formal change control.","D":"Reviewing the risk management plan is useful context but the immediate action is a formal change request for the missing scope."},"part":"Part 10","part_range":"Q451–Q499"},{"num":493,"type":"single","stem":"During the last sprint review, the mam stakeholder complained that the product was missing many features they had been expecting The project team argued that every increment met the acceptance criteria and was approved by the mam stakeholder The cost performance index (CPI) of the project is 1 15 and the schedule performance index (SPI) is 1.43 What should the project manager do?","options":{"A":"Ask the project team to perform the modifications since the project budget and schedule can support them.","B":"Ask the stakeholder to submit a change request to increase the budget and time for the modifications requested.","C":"Explain to the stakeholder that since the acceptance criteria for every increment were met the project can be closed.","D":"Analyze the reason for the gap in understanding with both sides and negotiate a solution."},"correct":["D"],"answer_display":"D","why_correct":"When stakeholders claim missing features but all acceptance criteria were met, there is a gap between what was formally accepted and what was actually expected. The PM should analyze the root cause of this misunderstanding and negotiate a solution with both sides.","why_wrong":{"A":"Making modifications because budget and schedule can support them doesn't address the root cause of the acceptance criteria gap.","B":"Asking the stakeholder to submit a change request is valid but should come after understanding what went wrong.","C":"Closing the project because criteria were technically met ignores the stakeholder's legitimate unmet expectations and creates relationship damage."},"part":"Part 10","part_range":"Q451–Q499"},{"num":494,"type":"single","stem":"299 Some members of a project team are frustrated by a new team member who previously worked in a Scrum setting. This new team member approaches members of the project team on a daily basis in what appears to be an attempt to engage in individual standup meetings. What should the project manager do?","options":{"A":"Schedule a meeting for the project team to review the communications management plan.","B":"Tell the rest of the project team to continue discussions with the new team member.","C":"Send an email to the project team outlining the communications strategy.","D":"Mentor the new team member on the methodology the project team is using."},"correct":["D"],"answer_display":"D","why_correct":"When a new team member uses processes from a different methodology (Scrum standups), the PM should mentor them on the methodology the current project team is using — integrating them effectively into the existing approach.","why_wrong":{"A":"A team meeting to review the communications plan is a group exercise that doesn't specifically address the new member's behavior.","B":"Telling the team to continue discussions with the new member without addressing the methodology confusion perpetuates the problem.","C":"An email outlining the communications strategy is passive; direct mentoring is more effective for methodology adoption."},"part":"Part 10","part_range":"Q451–Q499"},{"num":495,"type":"single","stem":"An organization is transitioning to agile and a project has been chosen as a pilot. The assigned project manager only has experience using predictive approaches, but the project manager is now required to use agile approaches with the help of an agile coach. During the retrospective of the fifth sprint, the project team complains that many obstacles exist with the organization that are creating project delays and rework. What should the project manager do in this situation?","options":{"A":"Include impediment resolutions during daily standup meetings","B":"Perform a root cause analysis during the standup meetings","C":"Create a dedicated sprint to solve the obstacles with the team","D":"Promote collaboration to help remove the obstacles for the team"},"correct":["D"],"answer_display":"D","why_correct":"When organizational obstacles are creating delays and rework for an agile team, the PM's servant leader role is to promote collaboration to help remove those obstacles — working across organizational boundaries to clear the path for the team.","why_wrong":{"A":"Including impediment resolutions in standups is useful but the obstacles are organizational-level, requiring PM-level action.","B":"Root cause analysis during standups changes the standup's purpose and doesn't remove organizational obstacles.","C":"Creating a dedicated sprint to solve obstacles takes the team off product work unnecessarily."},"part":"Part 10","part_range":"Q451–Q499"},{"num":496,"type":"single","stem":"An organization has historically executed most projects using a predictive approach. The organization now wants to change over to an agile approach. Which strategy will be useful to effectively help prepare the organization for this change?","options":{"A":"Create a task force of executives who will monitor agile projects on a daily basis.","B":"Add multiple layers of managers who will be accountable for the agile execution.","C":"Improve organizational readiness by addressing impediments to agile in the organization.","D":"Take a big bang approach of moving the whole organization to agile at once."},"correct":["C"],"answer_display":"C","why_correct":"Preparing the organization for agile requires improving organizational readiness by addressing structural impediments to agile adoption — governance, culture, processes, and incentive structures that are incompatible with agile.","why_wrong":{"A":"Executive task forces monitoring agile projects daily creates micromanagement that contradicts agile principles.","B":"Adding management layers is bureaucratic overhead that slows agile delivery.","D":"A big bang whole-organization shift to agile simultaneously creates massive disruption and a high failure rate."},"part":"Part 10","part_range":"Q451–Q499"},{"num":497,"type":"single","stem":"An integrated project involves the interaction of both hardware and software and the sponsor has approved the schedule management plan. The project team evaluated the product's feasibility of functionality and accelerated testing. What should the project manager do as a servant leader?","options":{"A":"Support the team as necessary to find the minimum viable product (MVP).","B":"Amend the project budget to include MVP testing.","C":"Submit a change request to the project sponsor for accelerated testing.","D":"Develop the product as per the schedule to perform integration and testing."},"correct":["A"],"answer_display":"A","why_correct":"As a servant leader for an integrated hardware/software project where the team is exploring accelerated testing and MVP approaches, the PM should support the team as necessary to find the MVP — enabling their initiative rather than directing or constraining it.","why_wrong":{"B":"Amending the budget for MVP testing requires change control; the immediate servant leadership action is supporting the team's initiative.","C":"Submitting a change request for accelerated testing imposes process overhead on an initiative the team has already assessed as feasible.","D":"Developing the product as per the original schedule ignores the team's initiative to improve delivery through MVP and accelerated testing."},"part":"Part 10","part_range":"Q451–Q499"},{"num":498,"type":"single","stem":"The project charter was just approved and the project sponsor has given permission to proceed with the project. The program manager has confirmed that one of the requested key resources is also needed on another project at the same time. This will affect project delivery. What should the project manager do?","options":{"A":"Pay overtime to key resource to get the work done outside of working hours","B":"Have a meeting with project manager of the other project to find a resource optimization solution that works for both projects","C":"Speak with the client to see if the project delivery deadline can be delayed due to resource availability","D":"Talk to the program manager and about prioritizing this project over other projects so the key resources are available"},"correct":["B"],"answer_display":"B","why_correct":"When a key resource is needed on two projects simultaneously, the PM should meet with the other project's PM to find a resource optimization solution — peer-level collaboration to resolve a shared resource conflict is the appropriate first step.","why_wrong":{"A":"Overtime for a resource conflict cre // Group into parts
const PARTS_CONFIG = [
  {label:"Part 1",  start:1,   end:50},
  {label:"Part 2",  start:51,  end:100},
  {label:"Part 3",  start:101, end:150},
  {label:"Part 4",  start:151, end:200},
  {label:"Part 5",  start:201, end:250},
  {label:"Part 6",  start:251, end:300},
  {label:"Part 7",  start:301, end:350},
  {label:"Part 8",  start:351, end:400},
  {label:"Part 9",  start:401, end:450},
  {label:"Part 10", start:451, end:499}
];

// Build part question arrays
const PART_QUESTIONS = PARTS_CONFIG.map(p =>
  ALL_QUESTIONS.filter(q => q.num >= p.start && q.num <= p.end)
);

// ── PERSISTENT PROGRESS (localStorage) ──
function loadProgress(partIdx) {
  try {
    const raw = localStorage.getItem('pmp_p' + partIdx);
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}
function saveProgress(partIdx, results) {
  try { localStorage.setItem('pmp_p' + partIdx, JSON.stringify(results)); } catch(e) {}
}
function clearProgress(partIdx) {
  try { localStorage.removeItem('pmp_p' + partIdx); } catch(e) {}
}

// ── STATE ──
let activePart = -1;
let partQs = [];
let cur = 0;
let selected = [];
let results = [];
let submitted = false;

// ── HOME ──
function buildHome() {
  const grid = document.getElementById('partsGrid');
  grid.innerHTML = '';
  PARTS_CONFIG.forEach((p, i) => {
    const qs = PART_QUESTIONS[i];
    const prev = loadProgress(i);
    const answered = prev ? prev.filter(r => r !== null).length : 0;
    const correct = prev ? prev.filter(r => r === 'correct').length : 0;
    const pct = answered > 0 ? Math.round(answered / qs.length * 100) : 0;

    const card = document.createElement('div');
    card.className = 'part-card' + (answered === qs.length ? ' done' : '');
    card.innerHTML = `
      <div class="part-label">${p.label}</div>
      <div class="part-range">Q${p.start} &ndash; Q${p.end}</div>
      <div class="part-count">${qs.length} questions${answered > 0 ? ` &bull; ${answered} answered` : ''}</div>
      <div class="part-progress-bar">
        <div class="part-progress-fill" style="width:${pct}%"></div>
      </div>
      <div class="part-score-row">
        <span class="part-score-label">${answered > 0 ? `${correct} correct / ${answered} answered` : 'Not started'}</span>
        <span class="part-score-val">${answered > 0 ? Math.round(correct/(answered - (prev?prev.filter(r=>r==='skip').length:0)||1)*100) + '%' : ''}</span>
      </div>`;
    card.onclick = () => startPart(i);
    grid.appendChild(card);
  });
}

function goHome() {
  document.getElementById('partSelect').style.display = 'flex';
  document.getElementById('quizScreen').style.display = 'none';
  buildHome();
}

// ── START PART ──
function startPart(partIdx) {
  activePart = partIdx;
  partQs = PART_QUESTIONS[partIdx];
  const prev = loadProgress(partIdx);
  results = prev ? [...prev] : new Array(partQs.length).fill(null);
  cur = 0;

  // Jump to first unanswered
  const firstUnanswered = results.findIndex(r => r === null);
  cur = firstUnanswered >= 0 ? firstUnanswered : 0;

  submitted = false;
  selected = [];

  document.getElementById('partSelect').style.display = 'none';
  const qs = document.getElementById('quizScreen');
  qs.style.display = 'flex';
  qs.style.flexDirection = 'column';

  document.getElementById('topbarTitle').textContent = PARTS_CONFIG[partIdx].label + ' — Q' + PARTS_CONFIG[partIdx].start + '–Q' + PARTS_CONFIG[partIdx].end;

  buildPartTabs();
  buildDots();
  showQuestion(cur);
}

// ── QUESTION DISPLAY ──
function showQuestion(i) {
  const q = partQs[i];
  submitted = false;
  selected = [];

  document.getElementById('quizBody').style.display = 'block';
  document.getElementById('finalScreen').style.display = 'none';
  document.getElementById('navPanel').style.display = 'block';

  document.getElementById('qBadgeNum').textContent = 'Q' + q.num;
  document.getElementById('qBadgePart').textContent = q.part;
  const typeMap = {single:'Single', multi:'Multi-Select', drag:'Drag & Drop', text:'Fill in Blank'};
  document.getElementById('qBadgeType').textContent = typeMap[q.type] || 'Single';
  if (q.type === 'multi') document.getElementById('qBadgeType').className = 'badge badge-multi';
  else document.getElementById('qBadgeType').className = 'badge badge-type';

  document.getElementById('qStem').textContent = q.stem;
  document.getElementById('multiHint').style.display = q.type === 'multi' ? 'block' : 'none';
  document.getElementById('explanationDiv').style.display = 'none';
  document.getElementById('btnSubmit').style.display = 'inline-flex';
  document.getElementById('btnNext').style.display = 'none';
  document.getElementById('btnSkip').style.display = 'inline-flex';
  document.getElementById('btnSubmit').disabled = false;
  document.getElementById('topbarRight').textContent = (i+1) + ' / ' + partQs.length;

  const od = document.getElementById('optionsDiv');
  od.innerHTML = '';

  if (q.type === 'drag' || q.type === 'text') {
    od.innerHTML = '<div style="padding:16px;border:1px dashed #2A3A60;border-radius:8px;color:#4A6080;font-size:13px;text-align:center">' +
      (q.type === 'drag' ? '🔀 Drag &amp; Drop — answer shown in explanation below' : '✏️ Fill in the blank — answer shown in explanation below') +
      '</div>';
  } else {
    Object.entries(q.options).forEach(([letter, text]) => {
      const d = document.createElement('div');
      d.className = 'opt';
      d.id = 'opt_' + letter;
      d.innerHTML = `<div class="opt-letter">${letter}</div><div class="opt-text">${escHtml(text)}</div>`;
      d.onclick = () => selectOpt(letter, q.type === 'multi');
      od.appendChild(d);
    });
  }

  // If already answered, restore
  if (results[i] !== null) {
    submitted = true;
    selected = q.correct; // show what was correct
    document.getElementById('btnSubmit').style.display = 'none';
    document.getElementById('btnNext').style.display = 'inline-flex';
    highlightOpts(q, q.correct);
    showExplanation(q);
  }

  updateStats();
  updateDots();
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function selectOpt(letter, isMulti) {
  if (submitted) return;
  if (isMulti) {
    const idx = selected.indexOf(letter);
    if (idx >= 0) { selected.splice(idx, 1); document.getElementById('opt_'+letter).classList.remove('selected'); }
    else { selected.push(letter); document.getElementById('opt_'+letter).classList.add('selected'); }
  } else {
    selected.forEach(l => { const el = document.getElementById('opt_'+l); if(el) el.classList.remove('selected'); });
    selected = [letter];
    document.getElementById('opt_'+letter).classList.add('selected');
  }
}

function submitAnswer() {
  const q = partQs[cur];
  if (q.type === 'drag' || q.type === 'text') {
    submitted = true;
    results[cur] = 'correct';
    showExplanation(q);
    swapToNext();
    updateStats();
    updateDots();
    saveProgress(activePart, results);
    return;
  }
  if (selected.length === 0) return;
  submitted = true;
  const isCorrect = selected.length === q.correct.length && q.correct.every(c => selected.includes(c));
  results[cur] = isCorrect ? 'correct' : 'wrong';
  highlightOpts(q, selected);
  showExplanation(q);
  swapToNext();
  updateStats();
  updateDots();
  saveProgress(activePart, results);
}

function highlightOpts(q, userSelected) {
  const correctSet = new Set(q.correct);
  Object.keys(q.options).forEach(letter => {
    const el = document.getElementById('opt_'+letter);
    if (!el) return;
    el.classList.add('disabled');
    if (correctSet.has(letter)) el.classList.add('show-correct');
    else if (userSelected.includes(letter)) el.classList.add('wrong-ans');
  });
}

function showExplanation(q) {
  const r = results[cur];
  let chipHtml = r === 'correct'
    ? '<span class="result-chip chip-correct">&#10003; Correct!</span>'
    : r === 'skip'
    ? '<span class="result-chip chip-skip">&#8594; Skipped</span>'
    : '<span class="result-chip chip-wrong">&#10007; Incorrect</span>';

  let wrongHtml = '';
  if (q.why_wrong && Object.keys(q.why_wrong).length > 0) {
    wrongHtml = `<div class="exp-wrong"><div class="exp-wrong-label">&#10006; Why Other Options Are Wrong</div>` +
      Object.entries(q.why_wrong).map(([l,txt]) =>
        `<div class="exp-wrong-item"><b>${l}:</b> ${escHtml(txt)}</div>`
      ).join('') + '</div>';
  }

  const div = document.getElementById('explanationDiv');
  div.innerHTML = `<div class="explanation">
    <div class="result-row">${chipHtml}</div>
    <div class="exp-correct">
      <div class="exp-correct-label">&#10003; Answer: ${q.answer_display} &mdash; PMI Mindset</div>
      <div class="exp-correct-text">${escHtml(q.why_correct)}</div>
    </div>
    ${wrongHtml}
  </div>`;
  div.style.display = 'block';
}

function swapToNext() {
  document.getElementById('btnSubmit').style.display = 'none';
  document.getElementById('btnNext').style.display = 'inline-flex';
}

function skipQuestion() {
  if (!submitted) {
    results[cur] = 'skip';
    submitted = true;
    const q = partQs[cur];
    showExplanation(q);
    swapToNext();
    updateStats();
    updateDots();
    saveProgress(activePart, results);
  } else {
    nextQuestion();
  }
}

function nextQuestion() {
  if (cur < partQs.length - 1) {
    cur++;
    showQuestion(cur);
  } else {
    showFinal();
  }
}

function updateStats() {
  const answered = results.filter(r => r !== null).length;
  const correct = results.filter(r => r === 'correct').length;
  const wrong = results.filter(r => r === 'wrong').length;
  const skip = results.filter(r => r === 'skip').length;
  const left = partQs.length - answered;
  const pct = partQs.length > 0 ? (answered / partQs.length * 100) : 0;

  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('sScore').textContent = correct + '/' + (correct + wrong);
  document.getElementById('sCorrect').textContent = correct;
  document.getElementById('sWrong').textContent = wrong;
  document.getElementById('sSkip').textContent = skip;
  document.getElementById('sLeft').textContent = left;
}

// ── DOTS ──
function buildDots() {
  const wrap = document.getElementById('dotsWrap');
  wrap.innerHTML = '';
  partQs.forEach((q, i) => {
    const d = document.createElement('div');
    d.className = 'dot';
    d.id = 'dot' + i;
    d.textContent = q.num;
    d.title = 'Q' + q.num;
    d.onclick = () => { cur = i; showQuestion(i); };
    wrap.appendChild(d);
  });
}

function updateDots() {
  partQs.forEach((_, i) => {
    const d = document.getElementById('dot' + i);
    if (!d) return;
    d.className = 'dot';
    if (i === cur) d.classList.add('active');
    else if (results[i] === 'correct') d.classList.add('ans-c');
    else if (results[i] === 'wrong') d.classList.add('ans-w');
    else if (results[i] === 'skip') d.classList.add('ans-s');
  });
}

function buildPartTabs() {
  const tabs = document.getElementById('partTabs');
  tabs.innerHTML = '';
  PARTS_CONFIG.forEach((p, i) => {
    const t = document.createElement('div');
    t.className = 'part-tab' + (i === activePart ? ' active-tab' : '');
    t.id = 'ptab' + i;
    t.textContent = p.label;
    t.onclick = () => startPart(i);
    tabs.appendChild(t);
  });
}

// ── FINAL ──
function showFinal() {
  document.getElementById('quizBody').style.display = 'none';
  document.getElementById('navPanel').style.display = 'none';

  const correct = results.filter(r => r === 'correct').length;
  const wrong = results.filter(r => r === 'wrong').length;
  const skip = results.filter(r => r === 'skip').length;
  const attempted = correct + wrong;
  const acc = attempted > 0 ? Math.round(correct / attempted * 100) : 0;
  const pct = Math.round(correct / partQs.length * 100);

  document.getElementById('fPct').textContent = acc + '%';
  document.getElementById('fLabel').textContent = PARTS_CONFIG[activePart].label + ' — ' + partQs.length + ' questions';
  document.getElementById('fC').textContent = correct;
  document.getElementById('fW').textContent = wrong;
  document.getElementById('fS').textContent = skip;
  document.getElementById('fAcc').textContent = acc + '%';

  // Missed questions
  const missedDiv = document.getElementById('missedSection');
  const wrongQs = partQs.filter((_, i) => results[i] === 'wrong');
  if (wrongQs.length > 0) {
    missedDiv.innerHTML = `<div class="missed-title">&#10007; ${wrongQs.length} Incorrect — Review These</div>` +
      wrongQs.map(q => `<div class="missed-item">
        <div class="missed-item-num">Q${q.num} — ${q.part}</div>
        <div>${escHtml(q.stem.substring(0, 160))}${q.stem.length > 160 ? '...' : ''}</div>
        <div class="missed-item-ans">Correct answer: ${q.answer_display}</div>
      </div>`).join('');
  } else {
    missedDiv.innerHTML = '<div style="color:#66BB6A;font-size:14px;margin-top:16px">&#127775; Perfect — no incorrect answers!</div>';
  }

  document.getElementById('finalScreen').style.display = 'block';
}

function restartPart() {
  clearProgress(activePart);
  startPart(activePart);
}

// ── INIT ──
buildHome();
</script>
</body>
