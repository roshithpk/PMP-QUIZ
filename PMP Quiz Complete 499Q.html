 a profit. However, the company has many innovative projects in development. Most of the project time lines have slipped, and the staff is overwhelmed. What should the project manager do to help the company meet their financial objectives?","options":{"A":"Prioritize the projects, giving higher priority to projects that will increase profit","B":"Ensure that all of the projects are of high quality and are delivered on time","C":"Request that upper management hire additional staff to support the projects","D":"Make sure the project is fast tracked so that slipped time lines are recovered"},"correct":["A"],"answer_display":"A","why_correct":"When a company has insufficient profit and too many projects, the PM should help prioritize projects that will increase profit — focusing limited resources on the highest financial return to meet the company's stated financial objectives.","why_wrong":{"B":"Ensuring all projects are high quality and on time doesn't address the fundamental prioritization problem with too many projects.","C":"Requesting additional staff adds cost to a company already not making profit.","D":"Fast-tracking all slipped projects adds risk and quality pressure without addressing portfolio prioritization."},"part":"Part 4","part_range":"Q151–Q200"},{"num":167,"type":"single","stem":"A project manager is assigned to a building construction project. The project manager has taken an agile course and wants to use agile practices in the project. What should the project manager do?","options":{"A":"Choose the agile practices that can be implemented in this type of construction project and apply them","B":"Hire a consultant to provide a second opinion about whether agile can be applied to a construction project","C":"Review the stages of the project to allocate additional budget for agile resources","D":"Assign a scrum master to the project to implement agile practices in the project"},"correct":["A"],"answer_display":"A","why_correct":"Agile practices are not all-or-nothing — the PM should evaluate which specific agile practices (daily standups, retrospectives, visual boards) can be meaningfully applied in construction and implement them selectively.","why_wrong":{"B":"Hiring a consultant for a second opinion adds cost when the PM can assess applicability themselves.","C":"Allocating budget for agile resources before selecting applicable practices puts the cart before the horse.","D":"Assigning a scrum master assumes full Scrum is appropriate before evaluating which practices actually fit construction."},"part":"Part 4","part_range":"Q151–Q200"},{"num":168,"type":"single","stem":"During project execution, a global project team was using a video conferencing tool to support the daily meetings. However, during these meetings, only a few team members were actively participating. As a result, lots of misunderstandings occurred. What should the project manager do to address this issue?","options":{"A":"Check the ground rules of the meeting to review the initial agreement with the team members","B":"Use round-robin check-ins to facilitate the meeting, so all participants have the opportunity to speak","C":"Book one-on-one meetings with the team members who are not speaking up during the daily meetings to get their updates","D":"Identify one team representative to speak up during the daily meeting and share the team updates"},"correct":["B"],"answer_display":"B","why_correct":"Round-robin check-ins ensure every participant contributes during virtual meetings — directly addressing the low participation problem by structurally giving each person a speaking turn.","why_wrong":{"A":"Reviewing ground rules addresses agreed behavior but doesn't structurally ensure participation in each meeting.","C":"One-on-one meetings for updates is time-consuming, defeats the daily meeting purpose, and doesn't solve the group meeting participation issue.","D":"One team representative speaking for the whole team reduces individual participation and misses the purpose of the daily meeting."},"part":"Part 4","part_range":"Q151–Q200"},{"num":169,"type":"single","stem":"A company has a transformation project in progress. During a planning session, several stakeholders are in constant disagreement and often use personal arguments to support their position. Team members are getting frustrated with the situation. What should the project manager have done to avoid this situation?","options":{"A":"Established ground rules before the discussion had started","B":"Reinforced that higher-level management has the decision power","C":"Invited a high-level sponsor to the meeting to reduce the level of disagreement","D":"Asked stakeholders not to voice their opinions during the meeting"},"correct":["A"],"answer_display":"A","why_correct":"Establishing ground rules before collaborative sessions is the PMI-standard prevention for stakeholder disagreements that become personal — ground rules define acceptable behavior and discussion norms upfront.","why_wrong":{"B":"Reinforcing management authority creates fear-based suppression of legitimate disagreements rather than productive discussion.","C":"Inviting a high-level sponsor may intimidate participants and reduces authentic engagement.","D":"Asking stakeholders not to voice opinions defeats the purpose of a collaborative planning session."},"part":"Part 4","part_range":"Q151–Q200"},{"num":170,"type":"single","stem":"While monitoring a project at a work site, the project manager notices that the site team's work breaks have increased by a few minutes every week. How should the project manager approach this?","options":{"A":"Dismiss some of the workers for failing to adhere to the break policy","B":"Issue a formal written warning to all hourly workers for their break tardiness","C":"Have a meeting with the team to discuss the issue and propose solutions","D":"Reduce payment to the workers due to their extended breaks"},"correct":["C"],"answer_display":"C","why_correct":"When a team's breaks gradually extend, the PM should address it as a team issue — holding a meeting to discuss the pattern, understand why it's happening, and collaboratively propose solutions rather than imposing punitive measures.","why_wrong":{"A":"Dismissing workers for minor tardiness is disproportionate and damages morale.","B":"Formal written warnings escalate before attempting direct communication and problem-solving.","D":"Reducing payment without notice may violate employment agreements and is punitive without addressing the root cause."},"part":"Part 4","part_range":"Q151–Q200"},{"num":171,"type":"single","stem":"A project manager is working on a construction project. The company owner asks the project manager to provide cost estimates for the new decoration project within 4 hours. How will the project manager be able to complete this task?","options":{"A":"Call a meeting with the project team to identify the most appropriate approach","B":"Tell the owner that a rough order of magnitude will be provided","C":"Contact a subject matter expert (SME) for advice and consultation","D":"Tell the owner that the task requires more time and expertise"},"correct":["B"],"answer_display":"B","why_correct":"When given 4 hours for a cost estimate, the PM should be transparent about what's achievable — a rough order of magnitude (ROM) estimate can be produced quickly and sets accurate expectations about the estimate's precision.","why_wrong":{"A":"A team meeting to find the best approach uses up the limited 4 hours in process rather than producing the estimate.","C":"Contacting an SME for advice takes time that could be used to produce the ROM estimate directly.","D":"Saying the task requires more time is dismissive and unhelpful when a ROM estimate is actually feasible in 4 hours."},"part":"Part 4","part_range":"Q151–Q200"},{"num":172,"type":"drag","stem":"DRAG DROP A company has created a cross-functional team to drive the digital transformation project for the business. The team is expected to deliver the minimum viable product (MVP) that addresses market need in the shortest possible time. Match the roles for the team on the left to their corresponding responsibilities on the right. Answer: 104 PMI PMP Exam","options":{},"correct":["A"],"answer_display":"A","why_correct":"For an MVP-focused cross-functional digital team, the product owner defines and prioritizes what to build, the scrum master facilitates the process and removes impediments, and the development team builds the product.","why_wrong":{"B":"Roles in an agile cross-functional team are defined by their functions, not exchangeable.","C":"Confusing scrum master and product owner responsibilities leads to accountability gaps.","D":"Assigning the product owner role to a technical team member misaligns accountability for business value decisions."},"part":"Part 4","part_range":"Q151–Q200"},{"num":173,"type":"single","stem":"A project is approaching successful completion, and all stakeholders are really proud of the achieved results. The project management office (PMO) recommends the project manager to lead the next similar project. What should the project manager do next?","options":{"A":"Engage key stakeholders to complete and deliver lessons learned.","B":"Select the same stakeholders for the next project to avoid doing knowledge transfer.","C":"Present the project achievements and delegate knowledge transfer to the steering committee.","D":"Request the PMO to manage the lessons learned repository."},"correct":["A"],"answer_display":"A","why_correct":"At project completion, the PM's immediate priority is to engage key stakeholders to complete and capture lessons learned — this is a required closing activity that preserves organizational knowledge for future projects.","why_wrong":{"B":"Using the same stakeholders for the next project without knowledge transfer defeats the purpose of lessons learned.","C":"Delegating knowledge transfer to the steering committee is inappropriate — it is the PM's responsibility.","D":"Asking the PMO to manage the repository is fine, but capturing the lessons learned is the PM's responsibility first."},"part":"Part 4","part_range":"Q151–Q200"},{"num":174,"type":"single","stem":"In order to increase a project's profit margin, the project manager and subject matter experts (SMEs) agreed to select the oldest model of a specific machine available in the market. When the machine reached its destination country, it was blocked by customs authorities who restricted the import of this machine model. What should the project manager have done to prevent this from happening?","options":{"A":"Ensured that the SMEs correctly defined the project scope and the machine model.","B":"Ensured the project sponsor provided enough funding to purchase the latest version of the machine.","C":"Ensured that regulatory compliance was considered in the quality management plan.","D":"Ensured that the technical team researched and selected the latest model of the machine."},"correct":["C"],"answer_display":"C","why_correct":"The root cause is regulatory non-compliance — the machine model was restricted by customs. Regulatory compliance should have been considered in the quality management plan to prevent using non-compliant equipment.","why_wrong":{"A":"Correct scope and machine model definition is part of scope management, not the quality compliance check.","B":"The latest machine model may still have been compliant; the issue is regulatory compliance, not model version.","D":"The latest model may or may not be compliant; regulatory research is the missing step, not model selection."},"part":"Part 4","part_range":"Q151–Q200"},{"num":175,"type":"single","stem":"A project is behind schedule because of a delayed equipment installation. This is affecting many other activities. The manager responsible for the equipment delivery notified the project manager that there is a capacity issue for the team doing the installation. What should the project manager have done to prevent this situation from happening?","options":{"A":"Defined the skill requirements more clearly in the scope statement.","B":"Asked the manager to follow the agreed-upon resource management plan.","C":"Conducted periodic reviews with the manager on resource availability.","D":"Consulted with the installation team on a regular basis to check for conflicts."},"correct":["C"],"answer_display":"C","why_correct":"Periodic reviews with the resource manager on resource availability would have surfaced the capacity issue before it became a delay — proactive monitoring of resource commitments is the right prevention.","why_wrong":{"A":"Skill requirements in the scope statement describe what is needed, not whether it's available.","B":"Asking the manager to follow the resource plan assumes the plan was correct; the issue is availability that wasn't monitored.","D":"Consulting the installation team on conflicts is the right direction but less authoritative than reviewing with the responsible manager."},"part":"Part 4","part_range":"Q151–Q200"},{"num":176,"type":"single","stem":"The scope of a project is to replace the street signs within a 10-km radius. The client does not want to sign the project closure report if the radius is not extended by 1 km, to be aligned with the council's development plan. What should the project manager do?","options":{"A":"Delay the approval and ask the project sponsor for additional funding.","B":"Contact the council and ask for their approval to extend the scope of the project.","C":"Initiate a new project and discuss the request because it came in too late.","D":"Obtain formal acceptance for the completed work and submit a change request."},"correct":["D"],"answer_display":"D","why_correct":"PMI principle: formally accept and close what was completed against the agreed scope, then submit a change request for the additional 1km scope. This separates completion from new scope in the correct sequence.","why_wrong":{"A":"Delaying approval and asking the sponsor for more funding skips formal acceptance of the completed work.","B":"Contacting the council without first obtaining formal acceptance of completed work confuses scope conversations.","C":"Initiating a new project for scope that came in late may be excessive; a change request to the existing project is more efficient."},"part":"Part 4","part_range":"Q151–Q200"},{"num":177,"type":"single","stem":"A company has started developing a new product. During execution the project team notices that another competitor has launched a product with very similar functionalities and a cheaper market price. What should have been done differently to avoid this scenario?","options":{"A":"A minimum viable product (MVP) should have been released to get feedback from the market.","B":"More backlog refinement meetings should have been scheduled.","C":"The Kanban method should have been utilized to optimize the work in progress (WIP).","D":"An iterative life cycle approach should have been adopted."},"correct":["A"],"answer_display":"A","why_correct":"Releasing an MVP earlier would have tested market response and surfaced the competitive threat earlier, enabling the team to pivot before investing full development effort in a product that was undercut.","why_wrong":{"B":"More backlog refinement improves requirements clarity but doesn't detect competitive market threats.","C":"Kanban optimizes flow but doesn't provide market intelligence about competitors.","D":"Iterative delivery improves quality and feedback loops but an MVP strategy specifically addresses market viability faster."},"part":"Part 4","part_range":"Q151–Q200"},{"num":178,"type":"single","stem":"An organization is about to start a multiphased project. Due to strict regulations, some of the phases must be completely planned in advance. However, other phases allow for more flexibility and experimentation on scope and schedule. The sponsor wants to pursue the project objectives as planned, but also wants to accommodate new information and changes as the project progresses. Which project management approach should the project manager select for this project?","options":{"A":"Hybrid","B":"Incremental","C":"Agile","D":"Phased"},"correct":["A"],"answer_display":"A","why_correct":"When some phases require complete upfront planning (predictive) and others allow flexibility and change (agile/iterative), the hybrid approach is the correct choice — it combines both methodologies appropriately.","why_wrong":{"B":"Incremental delivery is a subset concept; it doesn't capture the regulatory fixed-phase requirement.","C":"Pure agile doesn't accommodate the phases that must be completely planned in advance.","D":"A phased approach is implied in hybrid but doesn't specifically address the combination of predictive and adaptive needs."},"part":"Part 4","part_range":"Q151–Q200"},{"num":179,"type":"single","stem":"A project manager is leading an innovation project that is facing a lot of risks due to a high level of uncertainty. What strategy should the project manager use to manage these risks using an agile approach?","options":{"A":"Develop an agile risk matrix to track, assess, and evaluate the uncertainty of the project.","B":"Implement a scrum risk retrospective to analyze the risks at the end of the project.","C":"Assign an agile risk manager to better understand and track the project risks.","D":"Evaluate the risks constantly and reprioritize work as the project progresses."},"correct":["D"],"answer_display":"D","why_correct":"Agile risk management is continuous and adaptive — risks should be evaluated and the backlog reprioritized after every iteration to account for what has been learned and what has changed in the project environment.","why_wrong":{"A":"An agile risk matrix is a tool, not a strategy; continuously evaluating and reprioritizing is the strategy.","B":"A risk retrospective only at the end of the project is too late for high-uncertainty agile projects.","C":"Assigning an agile risk manager creates a separate risk function, contradicting agile's principle of shared team ownership."},"part":"Part 4","part_range":"Q151–Q200"},{"num":180,"type":"single","stem":"A laboratory is launching a new product, defined to be executed in eight iterations with a fixed release date. At the beginning of the second iteration, the project manager realizes that a significant regulatory feature is missing in the project backlog. What should the project manager do?","options":{"A":"Ask the product owner to add the missing feature in the backlog.","B":"Invite stakeholders to discuss the impact of adding the regulatory feature.","C":"Estimate the related cost and ask for a project extension.","D":"Increase the capacity of the team to include the missed feature."},"correct":["A"],"answer_display":"A","why_correct":"A missing regulatory feature must be added to the product backlog through the product owner — who is responsible for backlog content and prioritization. The PM should ask the product owner to add and prioritize it.","why_wrong":{"B":"Inviting stakeholders to discuss impact is a broader step; the immediate action is getting the item into the backlog.","C":"Estimating cost and asking for extension is premature before impact analysis is done through the product owner.","D":"Increasing team capacity to include a missed feature addresses the how, not the what — the backlog must be updated first."},"part":"Part 4","part_range":"Q151–Q200"},{"num":181,"type":"single","stem":"A senior vice president requested the creation of more agile teams to run projects of varying lengths and complexities in parallel with each other. This will impact the amount of time the project managers will be able to dedicate to each project. The project managers typically dedicate 50% of their time to projects regardless of their complexity. What should the project manager do as a servant leader to help achieve this transformation?","options":{"A":"Review the organizational process assets (OPAs) to evaluate mitigation plans for similar risks.","B":"Create a risk entry regarding the project manager's capacity and develop a mitigation plan.","C":"Empower the team to develop the necessary skills to move the project forward independently.","D":"Issue a change request to hire additional project managers based on the increased workload."},"correct":["C"],"answer_display":"C","why_correct":"When PMs must work across more projects with less time per project, servant leadership means empowering teams to develop skills and move independently — reducing PM dependency is the sustainable solution.","why_wrong":{"A":"Reviewing OPAs for mitigation plans is passive documentation review, not active transformation leadership.","B":"Creating a risk entry about PM capacity is documentation of the problem, not addressing it.","D":"Hiring additional PMs requires budget approval and doesn't address the immediate need for team empowerment."},"part":"Part 4","part_range":"Q151–Q200"},{"num":182,"type":"single","stem":"A project manager is in a cross-functional agile team. The project manager has been assigned a software project with multiple features that will take the team about a year to complete. The CEO is insisting that the solution needs to meet business goals for the year end, which is due in 6 months. What should the project manager do to align stakeholders’ needs and expectations?","options":{"A":"Work with the stakeholders to create a prioritized backlog and release a roadmap.","B":"Modify the requirements to those that can be completed in 6 months.","C":"Implement fast-tracking and crashing activities to complete the project in 6 months.","D":"Include all stakeholders in daily scrum meetings to keep them informed."},"correct":["A"],"answer_display":"A","why_correct":"When stakeholder expectations and project capacity are misaligned, the PM should work with stakeholders to create a prioritized backlog and release roadmap — this transparently shows what can be delivered by year-end and what follows.","why_wrong":{"B":"Modifying requirements to fit 6 months without stakeholder input may cut high-value features.","C":"Fast-tracking and crashing are schedule compression tools, not solutions for a fundamental scope-versus-time misalignment.","D":"Including all stakeholders in daily standups is excessive engagement and doesn't resolve the timeline misalignment."},"part":"Part 4","part_range":"Q151–Q200"},{"num":183,"type":"single","stem":"A project manager is managing a project to deploy new software to 200 end users. During the implementation, there is a missed process that caused some of the users to lose their computer data. What should the project manager do first?","options":{"A":"Meet with the team to discuss the root cause and encourage the team to take note of it and continue to focus on the deployment.","B":"Record this case until the final lessons learned session is complete to prevent impacting the team's morale during implementation.","C":"Meet with the team members and request they conduct a review of the case by providing feedback as lessons learned.","D":"Invite a consultant to review the process in order not to repeat the same issue and share the results with the team."},"correct":["C"],"answer_display":"C","why_correct":"When a process failure causes data loss during implementation, the PM should immediately facilitate a team review to capture the failure as lessons learned and prevent recurrence — while the issue is fresh and implementation continues.","why_wrong":{"A":"Noting it and continuing without capturing lessons learned risks repeating the same mistake for remaining 199 users.","B":"Waiting until the final lessons learned session at project end means the mistake may be repeated for all remaining deployments.","D":"A consultant review takes time that doesn't prevent the same issue from happening to the remaining users during active deployment."},"part":"Part 4","part_range":"Q151–Q200"},{"num":184,"type":"single","stem":"111 A project manager is assigned to a major construction project. The project is critical to the city's population, and especially to the local government official who committed to delivering the project on time as an election promise. A new project sponsor has been assigned and wants to include aspects that the previous project sponsor did not support. What should the project manager do next?","options":{"A":"Meet with the new project sponsor to review the current project scope and the requested changes.","B":"Rebaseline the project as there is now a new project sponsor, which is presenting an opportunity to review and recalibrate the project objectives.","C":"Invite the project sponsor to a briefing with the project team to demonstrate progress and seek further support to meet project-committed deliverables.","D":"Inform the new project sponsor that the new aspects will not be included in this project."},"correct":["A"],"answer_display":"A","why_correct":"When a new project sponsor wants to include items the previous sponsor rejected, the PM must first meet with them to review the current scope and the requested changes — understanding the new requirements before making any commitments.","why_wrong":{"B":"Rebaselining the project because of a new sponsor is premature without understanding what specific changes they want.","C":"Demonstrating progress and seeking support is good but doesn't address the new sponsor's specific change requests.","D":"Categorically refusing new aspects before reviewing them damages the new sponsor relationship and may reject legitimate requirements."},"part":"Part 4","part_range":"Q151–Q200"},{"num":185,"type":"single","stem":"In an agile team, some of the team members are coming forward to ask for more autonomy on the project. What should the project manager do in this situation?","options":{"A":"Encourage the team lead to make decisions.","B":"Encourage the team members to make decisions.","C":"Discourage them as conflicts may be created.","D":"Discourage this request, as it is for the management team."},"correct":["B"],"answer_display":"B","why_correct":"Agile principle: team members requesting more autonomy should be encouraged to make decisions — this is the essence of self-organization that agile promotes. The PM should support their empowerment.","why_wrong":{"A":"Encouraging only the team lead to decide keeps decision-making centralized rather than distributed across the team.","C":"Discouraging autonomy because of potential conflicts contradicts agile's self-organization principles.","D":"Reserving decisions only for management directly contradicts agile servant leadership and self-organization."},"part":"Part 4","part_range":"Q151–Q200"},{"num":186,"type":"single","stem":"A project had scheduling delays, which necessitated the team to work overtime to meet critical milestones. This led to some misunderstandings among team members. The project sponsor has allocated a monetary award. How should the project manager utilize the award?","options":{"A":"Meet with the team members and ask them how to spend the reward.","B":"Arrange a luncheon for all team members and include team-building sessions.","C":"Draft a points system to allocate a portion of the money for each resource.","D":"Allocate the reward to the team leaders to spend on the team as they see fit."},"correct":["A"],"answer_display":"A","why_correct":"PMI motivational principle: team members know best what would be meaningful to them. Meeting with them to decide how to use the reward ensures it genuinely motivates and shows respect for their preferences.","why_wrong":{"B":"A luncheon and team-building may be what the team wants — but this should be decided by asking them, not assumed.","C":"A points system imposes a mathematical allocation that may not match individual preferences.","D":"Delegating spending to team leaders without team input reduces individual ownership of the reward."},"part":"Part 4","part_range":"Q151–Q200"},{"num":187,"type":"single","stem":"A company is conducting a digital transformation project that has a hard deadline. The marketing team wants to combine this implementation with a new product, and the newly assigned project manager is not aware of all the dependencies. Using a hybrid approach, what should the project manager do to ensure the dependencies are taken into consideration?","options":{"A":"Implement a project newsletter so the different team members can be informed about the progress of each project.","B":"Make sure that each individual project schedule is aligned with the common deadlines.","C":"Combine all of the small projects into one big project so the team can collaborate better as one big team.","D":"Facilitate communication promoting a Scrum of Scrums so the different teams are aware of the dependencies and progress."},"correct":["D"],"answer_display":"D","why_correct":"In a hybrid multi-project environment with dependencies, Scrum of Scrums facilitates cross-team coordination — ensuring different teams are aware of each other's progress and dependencies through regular cross-team sync.","why_wrong":{"A":"A newsletter is a push communication tool that doesn't facilitate the interactive dependency discussion needed.","B":"Aligning individual schedules to common deadlines is scheduling coordination, not dependency management.","C":"Combining all small projects into one big project creates organizational and management complexity that outweighs the coordination benefit."},"part":"Part 4","part_range":"Q151–Q200"},{"num":188,"type":"single","stem":"During an agile project, a project manager lost one of the resources, and at the same time, uncovered new requirements, which were added to the backlog. What should the project manager do next?","options":{"A":"Reevaluate the backlog priority with the product owner since the velocity has been impacted.","B":"Reevaluate the scope of the current iteration to keep the same velocity and timeline.","C":"Reevaluate the velocity as the iteration duration will be impacted by new requirements.","D":"Reevaluate the project schedule as the velocity will be impacted by the loss of resources."},"correct":["A"],"answer_display":"A","why_correct":"When a resource is lost and new requirements are added simultaneously, both affect velocity. The PM must reevaluate the backlog priority with the product owner to decide what's most important given the new capacity constraints.","why_wrong":{"B":"Reevaluating the current iteration scope addresses the immediate sprint but not the full backlog impact of the changes.","C":"Velocity is impacted by the resource loss, not by requirement additions; iteration duration doesn't change with new requirements.","D":"Reevaluating only the schedule misses the product owner's role in prioritizing what gets built with reduced capacity."},"part":"Part 4","part_range":"Q151–Q200"},{"num":189,"type":"single","stem":"An agile project will be delivered to a client based on a fixed price in cryptocurrency. Due to the volatility of cryptocurrency, both parties have agreed to adjust the scope to the value of the cryptocurrency at the end of every iteration and halt the project when the agreed price is reached. Which approach should be used in this situation?","options":{"A":"A flow-based approach starting with the smallest stories.","B":"An iterative approach starting with the highest value epic.","C":"A predictive approach with short phases.","D":"An incremental approach with a minimum viable product (MVP)."},"correct":["D"],"answer_display":"D","why_correct":"With volatile cryptocurrency pricing and agreed scope adjustments per iteration value, incremental delivery starting with an MVP ensures the highest-value items are delivered first before the funding ceiling is potentially reached.","why_wrong":{"A":"Flow-based approaches prioritize story-by-story but don't explicitly start with the highest-value items to maximize value before funding runs out.","B":"Iterative approaches refine the same features repeatedly; incremental delivers working pieces, which suits this value-and-halt model.","C":"Predictive with short phases doesn't adapt to the volatile cryptocurrency valuation and halt mechanism."},"part":"Part 4","part_range":"Q151–Q200"},{"num":190,"type":"single","stem":"A project is about to start. The project manager has found that the client does not have an appropriate knowledge management system and does not have a requirement for it. What should the project manager do?","options":{"A":"Provide just-in-time knowledge to the client, upon request.","B":"Utilize the cloud wiki to collect the necessary knowledge.","C":"Ask the team to collect the knowledge locally and share it at the end of the project.","D":"Coordinate with the team and the project stakeholders to collect the knowledge."},"correct":["D"],"answer_display":"D","why_correct":"Knowledge management requires coordinating with both the team and project stakeholders to systematically collect and organize knowledge — it's a collaborative activity, not a unilateral or individual one.","why_wrong":{"A":"Just-in-time knowledge provision is reactive; the PM should proactively set up a knowledge collection system.","B":"Using a cloud wiki is a tool choice; the approach of coordinating team and stakeholder knowledge collection is the correct action.","C":"Collecting locally and sharing at the end delays knowledge availability and risks losing information if team members leave."},"part":"Part 4","part_range":"Q151–Q200"},{"num":191,"type":"single","stem":"A team has individual daily start times for each team member. Sometimes the overlap between team member working hours is short. During those times, the interactions and work as a team are reduced and ineffective. What should the project manager do?","options":{"A":"Inform the team members who are joining late to join early and work together.","B":"Allocate the overlap time for each team member and ask them to adhere to the schedule.","C":"Ask the team to define a team charter and agree on core working hours.","D":"Ask the team to start at the same time to obtain the maximum number of team working hours."},"correct":["C"],"answer_display":"C","why_correct":"When team members have different start times and minimal overlap, the team should define a team charter that includes agreed core working hours — this is a collaborative self-organization solution that respects individual schedules while ensuring coverage.","why_wrong":{"A":"Telling late members to join early is directive without understanding their constraints.","B":"Allocating overlap times without team discussion imposes a solution rather than building agreement.","D":"Requiring all team members to start at the same time may ignore legitimate personal constraints."},"part":"Part 4","part_range":"Q151–Q200"},{"num":192,"type":"single","stem":"A project team consisting of various professionals of different nationalities is struggling to achieve their project deliverables. What should the project manager do?","options":{"A":"Provide the team with support to solve their own problems.","B":"Inform the project sponsor and train the entire team.","C":"Ask the human resources (HR) department to conduct performance training.","D":"Ask the functional department manager to replace the team members."},"correct":["A"],"answer_display":"A","why_correct":"Servant leadership: when a diverse team is struggling to deliver, the PM should provide support to help them solve their own problems — empowering them rather than replacing them or imposing external training.","why_wrong":{"B":"Informing the sponsor and training the entire team escalates before attempting direct team support.","C":"HR-led performance training is a formal escalation before the PM has tried to directly support the team.","D":"Requesting replacements is a drastic action before providing support to the existing team."},"part":"Part 4","part_range":"Q151–Q200"},{"num":193,"type":"single","stem":"An organization is struggling to start an important project. The project manager has identified that the scope definition is the main item preventing the project from starting. Although most of the scope items are defined and agreed upon among the stakeholders, there are a few items that are hard to grasp and very complex to define at this stage. What should the project manager do?","options":{"A":"Propose that the well-defined scope items be delivered using a predictive approach and use an agile approach to deal with the complex items.","B":"Maintain stakeholder momentum in working on the scope definition until a full detailed scope is achieved prior to starting the project.","C":"Recommend splitting the project into two smaller projects in order to work exclusively in an agile environment without interference from a predictive approach.","D":"Update the risk register and escalate the issue to the project management office (PMO), requesting more resources be added to help define the project scope."},"correct":["A"],"answer_display":"A","why_correct":"When most scope is clear but some items are complex and undefined, a hybrid approach is ideal — deliver the well-defined scope predictively while handling the complex, uncertain items with agile iterations.","why_wrong":{"B":"Waiting for full scope definition before starting delays the project unnecessarily for the well-defined portions.","C":"Splitting into two separate projects adds governance overhead when a hybrid approach handles both in one project.","D":"Escalating to the PMO and adding resources treats the unclear requirements as a resource problem rather than a methodological one."},"part":"Part 4","part_range":"Q151–Q200"},{"num":194,"type":"single","stem":"A project is ending its fifth out of six iterations. During the iteration review, a customer adds a new regulatory feature that exceeds the capacity of the remaining iteration. What should the project lead do?","options":{"A":"Register an issue and escalate it to the project sponsor.","B":"Invite the stakeholders to discuss a new prioritization.","C":"Estimate the impact and consult with the product owner.","D":"Increase the team capacity to finish the project on time."},"correct":["C"],"answer_display":"C","why_correct":"When a new regulatory feature exceeds sprint capacity in the penultimate iteration, the PM should estimate the impact and consult with the product owner — who has authority to adjust priorities, including potentially extending the project.","why_wrong":{"A":"Registering as an issue and escalating to the sponsor skips the product owner who has direct backlog authority.","B":"Inviting all stakeholders to discuss prioritization is a broader step; the product owner consultation comes first.","D":"Increasing team capacity unilaterally is a resource decision that requires approval and may not be possible."},"part":"Part 4","part_range":"Q151–Q200"},{"num":195,"type":"multi","stem":"A project manager at a large corporation has been assigned to oversee a customer experience project. Within the project, customer satisfaction is a big issue and there are many unresolved customer queries on a daily basis. The project manager has been informed that the customer service team is overwhelmed with these unresolved queries. Which two actions should the project manager take to correct this problem? (Choose two.)","options":{"A":"Contact the customers in batches and inform them that the issues are being worked on currently.","B":"Confirm the issues truly exist by conducting a survey and other analyses that may detect the real issue.","C":"Deploy solutions that will track, prioritize, and resolve queries as soon as possible.","D":"Ask senior management to replace the customer service manager with a more qualified one.","E":"Request that the customer service team prioritizes work on queries that are received this week. ,C"},"correct":["B","C"],"answer_display":"B,C","why_correct":"First confirm the issues truly exist through data analysis (B), then deploy solutions that track, prioritize, and resolve queries (C). Analysis before action ensures the right problem is being solved; systematic resolution addresses the workload.","why_wrong":{"A":"Batch customer communication acknowledges the problem but doesn't diagnose or fix it.","D":"Replacing the manager is a personnel action that assumes management failure before root cause is understood.","E":"Prioritizing only this week's queries abandons the existing backlog without addressing the systemic overload."},"part":"Part 4","part_range":"Q151–Q200"},{"num":196,"type":"single","stem":"During the execution phase of a project, a new department has been created in the company. The manager of this department has requested to be involved in the regular project communications and reporting cycles. What should the project manager do?","options":{"A":"Ask the project team members to include the manager in all of their communications regarding this project.","B":"Inform the manager that only stakeholders identified in the communications management plan should be involved.","C":"Perform a stakeholder analysis and update the communications management plan to reflect the new situation.","D":"Suggest the manager contact the steering committee and project management office (PMO) to be included."},"correct":["C"],"answer_display":"C","why_correct":"When a new legitimate stakeholder emerges, the PM should perform a stakeholder analysis and update the communications management plan — the correct PMI process for incorporating a new stakeholder mid-project.","why_wrong":{"A":"Including the manager in all team communications is excessive and may overwhelm them with irrelevant detail.","B":"Restricting to existing stakeholders only ignores a new legitimate organizational stakeholder.","D":"Directing the manager to the steering committee or PMO is an unnecessary bureaucratic redirect."},"part":"Part 4","part_range":"Q151–Q200"},{"num":197,"type":"single","stem":"Close to the end of a project, a customer claims that some deliverables have not been met and starts initiating change requests. What should the project manager do next?","options":{"A":"Refer to the requirements traceability matrix.","B":"Escalate the change request to the project sponsor.","C":"Revise the project scope baseline.","D":"Review the approved project charter."},"correct":["A"],"answer_display":"A","why_correct":"When a customer claims deliverables weren't met near project end, the PM should refer to the requirements traceability matrix — the objective record of what was required versus what was delivered — to assess the claim.","why_wrong":{"B":"Escalating the change request to the sponsor before verifying the claim against the RTM is premature.","C":"Revising the scope baseline without first verifying the claim accepts the customer's assertion without evidence.","D":"Reviewing the project charter provides high-level objectives; the RTM provides the detailed requirements tracking needed."},"part":"Part 4","part_range":"Q151–Q200"},{"num":198,"type":"single","stem":"A project has met the agreed-upon product requirements and is closing. There is time remaining in the schedule and excess budget. The resources are not yet scheduled to move to other projects. Several product champions want to continue adding functionality to the product. What should the project manager do?","options":{"A":"Use the remaining time and resources to add additional scope to the project without spending the project budget.","B":"Ensure product quality by spending the remaining resources and time on additional quality checks for the product.","C":"Acknowledge the project closure criteria has been met and release the remaining budget and resources.","D":"Obtain approval from the sponsor to add additional functionality to the project deliverables with the leftover budget."},"correct":["C"],"answer_display":"C","why_correct":"When project closure criteria have been met, the PM should acknowledge completion and release remaining budget and resources — holding resources and budget beyond the agreed scope without approval is not authorized.","why_wrong":{"A":"Using time and resources to add scope without approval violates scope management regardless of remaining budget.","B":"Spending budget on additional quality checks for a product already meeting requirements wastes organizational resources.","D":"Getting sponsor approval to add scope is the right process — but the question asks what the PM should do first, which is acknowledge closure and release resources."},"part":"Part 4","part_range":"Q151–Q200"},{"num":199,"type":"single","stem":"120 A company wants to be a pioneer in its industry and has announced the launch date of a new innovative product. After the first sprint planning, the team realizes that it is not possible to deliver all the features in the required time. What should the project manager do to ensure success?","options":{"A":"Ask the customer to reduce the backlog to meet the launch date.","B":"Increase the capacity of the team to deliver the completed backlog on time.","C":"Assist the team in defining a minimum viable product (MVP) by the launch date.","D":"Schedule a meeting with the stakeholders to review the contingency plan."},"correct":["C"],"answer_display":"C","why_correct":"When all features can't be delivered by a fixed launch date, the PM should assist the team in defining an MVP — the minimum set of features that delivers enough value for the launch date, with remaining features to follow.","why_wrong":{"A":"Asking the customer to reduce the backlog is the right outcome but is the customer's decision; the PM should facilitate the MVP definition process.","B":"Increasing team capacity is costly and may not be feasible; MVP definition is the agile-first approach.","D":"A contingency plan meeting doesn't directly address how to deliver value by the launch date."},"part":"Part 4","part_range":"Q151–Q200"},{"num":200,"type":"single","stem":"An agile project is running its third iteration with a duration of 2 weeks. A new operations director, who only has a predictive background, started working at the company. In the first meeting with the project manager, the director demands a weekly project status report. What should the project manager do?","options":{"A":"Invite the director to attend the daily standup meetings.","B":"Share this with the team and ask them to develop reports for the director.","C":"Introduce the agile aspect to the director and agree on a solution.","D":"Explain to the director that agile projects have live reports."},"correct":["C"],"answer_display":"C","why_correct":"When a new director from a predictive background requests weekly reports from an agile project, the PM should educate them about agile and collaboratively agree on a solution that meets their information needs within the agile framework.","why_wrong":{"A":"Inviting to daily standups is too much involvement and not the right format for executive status reporting.","B":"Asking the team to develop reports for the director adds overhead without resolving the underlying methodology misunderstanding.","D":"Explaining that agile projects have live reports is technically true but dismissive of the director's legitimate information need."},"part":"Part 4","part_range":"Q151–Q200"},{"num":201,"type":"single","stem":"Several components of an expensive manufacturing project have been returned by the customer. The customer is complaining that the quality of the components is poor and is concerned that, as a result, their products will be returned due to quality issues. The project manager is certain that quality has been maintained. How should the project manager communicate with the customer to help assure them that the project has produced quality products?","options":{"A":"Show the customer the tolerance and control limits.","B":"Show the customer sample results from the current batch.","C":"Show the customer a sample history of quality.","D":"Show the customer the quality control measurements."},"correct":["D"],"answer_display":"D","why_correct":"To assure a customer about quality, the PM should show the quality control measurements — the objective data showing actual measurements against specifications. This is the most rigorous and credible evidence of quality compliance.","why_wrong":{"A":"Tolerance and control limits show the parameters but not the actual measurement results proving compliance.","B":"Sample results from the current batch only show recent data; the full QC measurements provide comprehensive proof.","C":"Historical quality samples show past performance but not that the current batch specifically meets specifications."},"part":"Part 5","part_range":"Q201–Q250"},{"num":202,"type":"single","stem":"A company is working on a project to develop an integration of their existing systems. There are known issues in production. What should the project manager do?","options":{"A":"Identify and remove impediments and mitigate the risks.","B":"Ensure the product owner reviews requirements with the team.","C":"Include acceptance criteria in the definition of done (DoD).","D":"Review the quality control processes and procedures."},"correct":["C"],"answer_display":"C","why_correct":"When known production issues exist in an integration project, including acceptance criteria in the definition of done (DoD) ensures every increment is explicitly tested against known failure modes before being accepted.","why_wrong":{"A":"Identifying and removing impediments is always good but doesn't specifically address the known production quality issues.","B":"Product owner reviewing requirements improves clarity but doesn't control quality at the delivery point.","D":"Reviewing QC processes is retrospective; embedding acceptance criteria in the DoD is preventive."},"part":"Part 5","part_range":"Q201–Q250"},{"num":203,"type":"single","stem":"A company changed the product owner on an existing project. The new product owner has less knowledge of the product than everybody else on the team. Due to the product owner's lack of knowledge, the team does not consider the opinions of the product owner seriously and mostly relies on the project manager's opinion. What should the project manager do?","options":{"A":"Work with the project management office (PMO) manager to generate an onboarding plan for the new product owner.","B":"Schedule time to share insights with the new product owner about the product and project information.","C":"Assume the role of the product owner while the product owner gets familiar with the product.","D":"Organize a team-building activity and ask the team to respect the opinions of the new product owner."},"correct":["B"],"answer_display":"B","why_correct":"The PM should schedule time to personally share product and project insights with the new product owner — accelerating their understanding so they can fulfill their role effectively as quickly as possible.","why_wrong":{"A":"Working with the PMO on an onboarding plan is a slower, more formal path than directly sharing insights.","C":"Assuming the product owner role creates confusion about accountability and prevents the PO from developing their own knowledge.","D":"Organizing team-building and asking the team to respect the PO's opinions doesn't give them the product knowledge they need."},"part":"Part 5","part_range":"Q201–Q250"},{"num":204,"type":"single","stem":"A mid-size capital project has shared resources from the company's contract department. During the execution phase, the project team observed a delay in contracting. After communicating with the contract department, the project manager found the contract team is prioritizing other contracting jobs because they are not part of the project team. What should the project manager do first in this situation?","options":{"A":"Report the issue to higher management and seek their direct involvement to complete the job from the contract department.","B":"Arrange a meeting with the contract department to build trust and commitment by recognizing their critical support to the project.","C":"Arrange several meetings with the contract department and ask them to contract the project as it is critical for project success.","D":"Communicate with the contract manager to commit a budget for the resources required for project execution."},"correct":["B"],"answer_display":"B","why_correct":"When a shared resource team is deprioritizing project work, the PM should arrange a meeting to build trust and recognize the contract team's contribution — creating relationship and commitment through appreciation, not pressure.","why_wrong":{"A":"Reporting to higher management before attempting direct engagement is premature escalation.","C":"Multiple pressure meetings demanding priority is adversarial and likely to entrench resistance.","D":"Committing budget for resources is a financial decision that requires approval and doesn't address the relationship issue."},"part":"Part 5","part_range":"Q201–Q250"},{"num":205,"type":"single","stem":"A team shared a complaint regarding the scrum master during the last sprint review. The team expressed that they were delayed because the scrum master did not remove impediments, such as scheduling some meetings with external teams and obtaining a room to work collaboratively, among other critical blockers. What should the project manager do?","options":{"A":"Request an additional resource to assist in solving all of the impediments listed by the team.","B":"Determine and agree when a situation becomes an impediment to be solved by the scrum master.","C":"Request the team review and prioritize the open impediments to resolve all of them as soon as possible.","D":"Push back, explaining that a self-organized team should address all of the problems to get the work done."},"correct":["B"],"answer_display":"B","why_correct":"When the team and scrum master disagree on what constitutes an impediment the scrum master should resolve, the PM should facilitate agreement on the criteria for what qualifies as a scrum master impediment — preventing future confusion.","why_wrong":{"A":"Adding a resource to solve impediments doesn't clarify the scrum master's role and scope of responsibility.","C":"Asking the team to prioritize impediments themselves undermines the scrum master's role.","D":"Telling a self-organized team to solve all problems contradicts the scrum master's explicit impediment-removal responsibility."},"part":"Part 5","part_range":"Q201–Q250"},{"num":206,"type":"single","stem":"A project manager is leading a global project with resources spread out in different locations. The stakeholders have different interpretations of the requirements. The project manager is concerned about scope creep. Which action should the project manager take to control the scope?","options":{"A":"Ensure that all key stakeholders agree to the project deliverables and there will be no need for changes.","B":"Accept only those changes to requirements that provide additional value to the project.","C":"Reject all changes that will increase the budget or increase the time line of the project.","D":"Accept only those changes that are approved by the change control board (CCB) prior to being implemented."},"correct":["D"],"answer_display":"D","why_correct":"PMI scope control principle: only changes approved through the change control board should be implemented. All changes — regardless of perceived value — must go through formal change control before implementation.","why_wrong":{"A":"Getting all stakeholders to agree there will be no changes is unrealistic; what matters is controlling them when they occur.","B":"Accepting only 'value-adding' changes is subjective; the CCB process provides objective, formal evaluation.","C":"Rejecting all budget/time-impacting changes without evaluation misuses the PM's authority and may block legitimate improvements."},"part":"Part 5","part_range":"Q201–Q250"},{"num":207,"type":"single","stem":"During a kick-off meeting, the project manager notices that one of the stakeholders responsible for providing key information to the team has a low level of participation. This stakeholder believes that there will be no benefit from implementing the project. The project manager realizes that this could be a high risk for the project. Which action should the project manager take?","options":{"A":"Facilitate a supportive level of engagement for this stakeholder.","B":"Ask the project sponsor for advice as it might be possible to work with another stakeholder.","C":"Perform a qualitative risk analysis using a probability and impact matrix.","D":"Ensure the key information is accurate and monitor the situation as the project progresses."},"correct":["A"],"answer_display":"A","why_correct":"A stakeholder who believes the project has no benefit is at risk of becoming resistant or obstructive. The PM should facilitate increasing their engagement level from resistant/neutral to supportive — a stakeholder engagement management action.","why_wrong":{"B":"Asking the sponsor to find another stakeholder avoids addressing the engagement issue with the current one.","C":"A qualitative risk analysis documents the concern but doesn't actively address the stakeholder's engagement level.","D":"Monitoring without action allows the resistant stakeholder to potentially block or undermine the project."},"part":"Part 5","part_range":"Q201–Q250"},{"num":208,"type":"single","stem":"A project manager is working on an agile project that is within the scope of a recently announced corporate audit. The project manager was appointed to attend the first meeting with the auditors scheduled for the following week. What should the project manager do to prepare for the audit?","options":{"A":"Reserve story points for the next iteration if needed.","B":"Review the project information.","C":"Ask the development team to provide compliance information.","D":"Ask for a waiver during the audit."},"correct":["B"],"answer_display":"B","why_correct":"When preparing for an audit, the PM should first review all project information — understanding the current state of documentation, decisions, and processes before meeting with auditors.","why_wrong":{"A":"Reserving story points for future audit follow-up is premature before even meeting with the auditors.","C":"Asking the development team for compliance information is a subsequent step after the PM has reviewed the project information themselves.","D":"Asking for a waiver is inappropriate and signals non-compliance before the audit has even begun."},"part":"Part 5","part_range":"Q201–Q250"},{"num":209,"type":"single","stem":"A development team is struggling to find design documentation for the upcoming sprint. Prior to leaving for vacation, the product owner communicated that the documentation had been uploaded to the project file repository. What should the project manager do to address this issue?","options":{"A":"Assign a team member to manage project artifacts.","B":"Audit the effectiveness of the management of project artifacts.","C":"Improve email communication protocols to manage project artifacts.","D":"Investigate new software tools used to manage project artifacts."},"correct":["B"],"answer_display":"B","why_correct":"When documentation uploaded to a repository can't be found, the PM should audit the effectiveness of project artifact management — assessing whether the system, processes, or naming conventions are causing the access problem.","why_wrong":{"A":"Assigning a team member to manage artifacts is a solution before the audit determines what the actual problem is.","C":"Improving email protocols doesn't address the repository-based artifact management failure.","D":"Investigating new software tools is premature before understanding what's wrong with the current repository."},"part":"Part 5","part_range":"Q201–Q250"},{"num":210,"type":"single","stem":"At a project meeting, a business analyst requires input from a marketing consultant to continue working on a task. The business analyst has tried to contact the consultant but has been told that the consultant does not have the time to discuss the project. What should the project manager do to move the project forward?","options":{"A":"Escalate the issues about the consultant to the functional manager so the consultant dedicates the necessary time to the project.","B":"Include a new project risk into the risk register and allocate the consultant as the risk owner as it is their responsibility to provide input.","C":"Discuss the request with the consultant and set up time with the business analyst and consultant to discuss the project requirements.","D":"Urge the business analyst to continue contacting the consultant to discuss the project since this is the responsibility of the business analyst."},"correct":["C"],"answer_display":"C","why_correct":"When a consultant is unresponsive, the PM should directly discuss the request with them and arrange a specific meeting time with the business analyst — taking ownership of removing the impediment rather than delegating it.","why_wrong":{"A":"Escalating to the functional manager before attempting direct scheduling is premature.","B":"Adding the consultant as a risk owner in the risk register makes the consultant responsible for a risk they may not acknowledge.","D":"Telling the business analyst to keep trying leaves them to solve a PM-level impediment without support."},"part":"Part 5","part_range":"Q201–Q250"},{"num":211,"type":"single","stem":"A company is starting a critical project with a strict deadline. During the first planning meeting, the team realizes that the list of requirements has too many items to allow on-time delivery. What should the project manager do first?","options":{"A":"Update the risk register and present a contingency plan to meet the deadline.","B":"Suggest to the customer to reduce the backlog to meet the date.","C":"Increase the capacity of the team to finish the project on time.","D":"Ask the team to propose a minimum viable product (MVP) to meet the date."},"correct":["D"],"answer_display":"D","why_correct":"When requirements exceed delivery capacity for a fixed deadline, the PM should ask the team to define an MVP — identifying the minimum set of features that delivers meaningful value by the deadline.","why_wrong":{"A":"Updating the risk register with a contingency plan doesn't reduce the scope to fit the deadline.","B":"Suggesting the customer reduce the backlog is the right outcome but the PM should first develop the MVP recommendation with the team.","C":"Increasing team capacity is costly and may not be feasible; MVP definition is the agile-first response."},"part":"Part 5","part_range":"Q201–Q250"},{"num":212,"type":"single","stem":"A project manager is working on a complex project with a high degree of change. What strategy should the project manager use to ensure a successful project completion?","options":{"A":"Update the project management plan to reduce the possibility of scope creep.","B":"Schedule a regular risk review with the project management team.","C":"Increase the active engagement and participation of key stakeholders.","D":"Create a project change roadmap to keep track of all unforeseen changes."},"correct":["C"],"answer_display":"C","why_correct":"For a complex, high-change project, increasing active stakeholder engagement and participation is the most effective strategy — stakeholders who are engaged provide timely input, approve changes faster, and prevent surprises.","why_wrong":{"A":"Updating the project management plan is documentation management, not a proactive strategy for a change-heavy complex project.","B":"Regular risk reviews are valuable but address risks after they're identified; stakeholder engagement prevents many risks from materializing.","D":"A change roadmap tracks changes but doesn't actively prevent or manage the high-change environment."},"part":"Part 5","part_range":"Q201–Q250"},{"num":213,"type":"single","stem":"A project manager is leading a hybrid project funded by a time and materials (T&M) agreement. The project was completed, and the client accepted the delivery of the product. One week later, the client asked the project manager to fix two defects they found in the product. The project manager responded with an estimate of time and money and asked the client to confirm this. The client disagreed and insisted that the work should be done for free because it is a defect in the product. What should the project manager have done to prevent this?","options":{"A":"Trained client engineers to support the product after its delivery.","B":"Reviewed the project quality control plan with the client.","C":"Suggested a fixed-cost basis and included free bug fixes for 1 month.","D":"Planned how the delivered product will be supported after its delivery."},"correct":["D"],"answer_display":"D","why_correct":"The root cause is that post-delivery support expectations were not defined. The PM should have planned how the delivered product would be supported after delivery — defining the support model and cost structure before project closure.","why_wrong":{"A":"Training client engineers addresses knowledge transfer but not the contractual support terms for defect fixing.","B":"Reviewing the quality plan with the client discusses standards but not post-delivery defect responsibility.","C":"Suggesting fixed-cost with free bug fixes would have been a financial concession, not a planning best practice."},"part":"Part 5","part_range":"Q201–Q250"},{"num":214,"type":"single","stem":"129 A project team has established contracts for purchasing vehicles and construction services. In the middle of project execution, the team learns that the vehicle supplier cannot deliver the vehicles. There is not enough time to find a new supplier without delaying the project. Which action should the project manager take to procure the vehicles?","options":{"A":"Ask the technical team to revise the requirements, even if it requires extra budget.","B":"Arrange a meeting with the client to request additional time to find a new supplier.","C":"Review the existing service contracts to find an option to help procure the vehicles.","D":"Procure the vehicles from another supplier and report the change to the change control board (CCB) later."},"correct":["C"],"answer_display":"C","why_correct":"When a supplier fails, the PM should review existing service contracts to find options within the current contractual framework — the construction service contracts may include provisions for vehicle procurement or have relationships with alternative suppliers.","why_wrong":{"A":"Asking the technical team to revise requirements changes the project scope without authorization.","B":"Requesting additional time from the client is premature before exploring internal contractual options.","D":"Procuring from another supplier without going through the CCB violates change control for a procurement decision."},"part":"Part 5","part_range":"Q201–Q250"},{"num":215,"type":"single","stem":"When a project is in its final stage, the project manager will request from the team to prepare a delivery acceptance document. What is the importance of this document to the project manager?","options":{"A":"Needed to close the work breakdown structure (WBS).","B":"Needed to share it with the stakeholders.","C":"Needed to close out the project or a phase.","D":"Needed to release the team at the end of the project."},"correct":["C"],"answer_display":"C","why_correct":"The delivery acceptance document is needed to formally close out the project or a phase — it is the formal record that the customer has accepted the deliverables, enabling the PM to proceed with closure activities.","why_wrong":{"A":"Closing the WBS is an internal administrative activity; acceptance documents from the customer enable project closure.","B":"Sharing with stakeholders is a purpose but the primary importance is enabling formal project or phase closure.","D":"Releasing the team is a consequence of closure; the acceptance document enables closure, which then allows resource release."},"part":"Part 5","part_range":"Q201–Q250"},{"num":216,"type":"single","stem":"A project manager is leading a project that has a dependency on the client's vendor management system for critical requirements. The vendor management team will not derive any benefits from the project. However, the project requires support from the vendor management head. What should the project manager do next?","options":{"A":"Get support from the sponsor to hire a subject matter expert (SME) from the vendor management team to work on the project.","B":"Review the terms of reference of the steering committee to include the vendor management head.","C":"Work with the sponsor on a communications management plan to obtain support from the vendor management head.","D":"Obtain help from the sponsor to highlight any nonfinancial benefits for the vendor management team."},"correct":["D"],"answer_display":"D","why_correct":"When a team has no benefit stake in the project, the PM and sponsor should identify and highlight the non-financial benefits the team will receive from supporting the project — creating a motivation for their cooperation.","why_wrong":{"A":"Hiring an SME from their team without addressing the head's motivation doesn't resolve the support gap.","B":"Changing steering committee terms of reference is a governance action that doesn't address the motivation problem.","C":"A communications plan without addressing the non-financial benefits won't secure support from someone who sees no benefit."},"part":"Part 5","part_range":"Q201–Q250"},{"num":217,"type":"single","stem":"A subject matter expert (SME) external to the project team provides a suggestion that will save the project delivery time. This SME has available time to support the project, but was not planned to be involved in the current agile iteration. What should the project manager do?","options":{"A":"Bring the SME on board immediately and discuss the implications later.","B":"Ask the existing team members to collaborate with the SME and complete the activity.","C":"Ask the SME to complete all of the necessary changes, which will save time.","D":"Direct the team member to ignore the SME's changes as they were not planned."},"correct":["B"],"answer_display":"B","why_correct":"When an SME with available time can save delivery time, the PM should ask existing team members to collaborate with the SME and complete the activity — bringing in the expertise without disrupting the iteration structure.","why_wrong":{"A":"Bringing the SME on board immediately without process creates scope and accountability confusion.","C":"Having the SME make all the changes without team oversight risks quality and knowledge transfer.","D":"Ignoring planned improvements because they weren't in the original iteration plan is rigid and misses value."},"part":"Part 5","part_range":"Q201–Q250"},{"num":218,"type":"single","stem":"During a project, the project manager finds an opportunity to reduce the project cost by completing a deliverable ahead of schedule with a minimal impact on project resources. However, the client has only been focused on the next milestone. How should the project manager approach this situation?","options":{"A":"Apply additional resources to realize the early deliverable and ensure the next milestone is achieved.","B":"Focus on the deliverable of the next project milestone as per the client's strict instructions.","C":"Review the change management plan to discuss early benefits realization with the client.","D":"Evaluate whether the client's request will add extra features to the project deliverable."},"correct":["C"],"answer_display":"C","why_correct":"When an opportunity exists to deliver a benefit early but the client hasn't been informed, the PM should review the change management plan and then discuss early benefits realization with the client — engaging them on an opportunity they may not have considered.","why_wrong":{"A":"Applying resources to realize early delivery without discussing with the client first changes the delivery approach unilaterally.","B":"Ignoring the opportunity because the client is focused on the next milestone misses a genuine value improvement.","D":"Evaluating whether client requests add features is irrelevant — the PM has identified an opportunity, not received a request."},"part":"Part 5","part_range":"Q201–Q250"},{"num":219,"type":"single","stem":"A healthcare company is in the process of deploying an innovative healthcare solution globally. The project team has completed a limited release. The stakeholders have raised concerns about global healthcare guidelines and risks. What should the project manager do next?","options":{"A":"Evaluate lessons learned from similar projects prior to deployment.","B":"Perform a qualitative risk analysis on the identified project risks.","C":"Review compliance and regulatory requirements with stakeholders.","D":"Conduct a feasibility analysis of deploying the solution globally."},"correct":["C"],"answer_display":"C","why_correct":"When stakeholders raise concerns about global healthcare guidelines and risks during a limited release, the PM should review compliance and regulatory requirements with stakeholders — ensuring global deployment meets all regulatory obligations before proceeding.","why_wrong":{"A":"Lessons learned from similar projects is valuable input but doesn't address the specific regulatory concerns raised.","B":"Qualitative risk analysis assesses probability and impact but doesn't resolve the compliance question stakeholders raised.","D":"A feasibility analysis of global deployment is too broad; the specific concern is regulatory compliance."},"part":"Part 5","part_range":"Q201–Q250"},{"num":220,"type":"single","stem":"A project team is working on the design of a solution for a complex project. Due to a lack of clarity of the customer's requirements, daily meetings were agreed upon between the team and the customer. There are a few external contractors in the project who do not agree with this idea as they feel it is a waste of time. What should the project manager do?","options":{"A":"Welcome and involve the contractors as part of the project team.","B":"Ask the contractors to meet with the customer independently.","C":"Ask the customer to develop a document with the requirements.","D":"Warn and penalize the contractors who do not attend the meeting."},"correct":["A"],"answer_display":"A","why_correct":"External contractors who object to daily meetings should be welcomed and included as part of the project team — integrating them into the team's processes rather than excluding them or letting them opt out.","why_wrong":{"B":"Having contractors meet the customer independently creates multiple inconsistent customer communication channels.","C":"Asking the customer to write requirements documentation replaces the collaborative daily meetings with a more rigid process.","D":"Warning and penalizing contractors for not attending is punitive and destroys collaboration."},"part":"Part 5","part_range":"Q201–Q250"},{"num":221,"type":"single","stem":"A project is ready to start, and resources are allocated. The development manager then informs the project manager that a critical resource is no longer available due to a family emergency. The development manager indicates that all other developers have been assigned to other projects, and there is no capacity for any developer to take on additional work. What should the project manager do next to fulfill this resource need?","options":{"A":"Determine resource allocation options based on project priority.","B":"Apply changes to the existing resource allocations and inform the development manager.","C":"Meet with the sponsor to determine how to rebaseline the schedule.","D":"Inform the sponsor of the situation and request an extension of the target completion date."},"correct":["A"],"answer_display":"A","why_correct":"When a critical resource becomes unavailable and all developers are assigned, the PM should first determine resource allocation options based on project priority — this may reveal flexibility in other projects' timelines or resources.","why_wrong":{"B":"Applying changes to resource allocations without authorization from the relevant managers violates organizational governance.","C":"Meeting with the sponsor to rebaseline the schedule is premature before resource options have been explored.","D":"Requesting a deadline extension from the sponsor is premature before exploring all resource allocation options."},"part":"Part 5","part_range":"Q201–Q250"},{"num":222,"type":"single","stem":"During the sprint planning of a project, the team members have a disagreement about the comparative size of the backlog items and if they would fit into the next sprint. Considering a hybrid approach, what should the project manager do?","options":{"A":"Ask an external technical leader to provide input and plan the sprint.","B":"Remove the items from the product backlog since the size couldn't be estimated.","C":"Facilitate the discussion so that the team members can reach a consensus.","D":"Make the decision about the backlog items based on what makes more sense."},"correct":["C"],"answer_display":"C","why_correct":"When team members disagree during sprint planning, the PM's role is to facilitate the discussion to reach consensus — not to decide, override, or remove items. Facilitation is the core agile leadership skill here.","why_wrong":{"A":"Bringing in an external technical leader to plan the sprint undermines the team's self-organization.","B":"Removing items because estimates are difficult deprives the product owner of potentially valuable features.","D":"The PM making the backlog decision violates the product owner's authority and the team's self-organization."},"part":"Part 5","part_range":"Q201–Q250"},{"num":223,"type":"single","stem":"An agile project manager notices that one of the team members is developing extensive knowledge in a specific matter. Other team members are likely to require this knowledge in the future. What should the agile project manager do?","options":{"A":"Ask the team member to develop more expertise and become a subject matter expert (SME).","B":"Ask the team member to provide a training session for the rest of the team.","C":"Ask the team member to produce a lessons learned document and share it with the team.","D":"Ask the team member to record highlights the team may want to know."},"correct":["B"],"answer_display":"B","why_correct":"When a team member develops deep expertise that others will need, the most direct knowledge transfer approach is having them provide a training session — immediate, interactive, and creates shared team capability.","why_wrong":{"A":"Encouraging the member to become a deeper SME develops one person but doesn't transfer knowledge to the team.","C":"A lessons learned document is a passive artifact; interactive training is more effective for knowledge transfer.","D":"Recording highlights is a passive reference tool; a training session provides interactive learning and Q&A."},"part":"Part 5","part_range":"Q201–Q250"},{"num":224,"type":"single","stem":"During daily team standup meetings, team members constantly ask about which tasks they should focus on first. How should the project manager ensure the team is fully productive?","options":{"A":"Review the project backlog during the team's standup meeting.","B":"Encourage project team members to prioritize the product backlog.","C":"Ensure team members are working according to the project plan.","D":"Work with the product owner to ensure the project backlog is priorit
