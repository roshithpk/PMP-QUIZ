techniques can be used to achieve this goal?","options":{"A":"Scrum master reviews and the quality Kanban method.","B":"Daily Scrum and product owner quality assessments.","C":"Paired work and the customer role method.","D":"Time-boxed iterations and standup review meetings."},"correct":["D"],"answer_display":"D","why_correct":"For a hybrid research project with high uncertainty, using time-boxed iterations (for structured increments) combined with standup review meetings (for continuous quality assessment) provides both the structure and flexibility needed to measure deliverable quality.","why_wrong":{"A":"Scrum master reviews and quality Kanban method is not a standard hybrid quality technique.","B":"Daily Scrum and product owner quality assessments is too narrow — the product owner's assessment alone isn't a comprehensive quality measurement technique.","C":"Paired work and customer role method are development and collaboration techniques, not quality measurement techniques."},"part":"Part 8","part_range":"Q351–Q400"},{"num":401,"type":"single","stem":"The project team follows a hybrid framework for its delivery. During the execution of a project, the team learns of a new compliance requirement that has to be delivered before any other requirements. How should the project manager address this situation?","options":{"A":"Collaborate with the compliance team member to review and prioritize the requirement's delivery.","B":"Add the new compliance requirement to the backlog as the technical team does not have any capacity.","C":"Include the compliance lead in the stakeholders list and wait for the next status meeting.","D":"Ask the team to include the compliance requirement in the current sprint and deliver it."},"correct":["A"],"answer_display":"A","why_correct":"When a new compliance requirement must be delivered before others, the PM should collaborate with the compliance team member to review and prioritize it — working together ensures the requirement is understood and scheduled properly.","why_wrong":{"B":"Adding to the backlog without prioritization treats a mandatory compliance requirement the same as optional features.","C":"Including the compliance lead on the stakeholder list and waiting for a status meeting is too slow for a requirement that must be delivered first.","D":"Asking the team to include it in the current sprint without review may not be feasible and risks quality."},"part":"Part 9","part_range":"Q401–Q450"},{"num":402,"type":"single","stem":"A new project manager learns the work assigned to the team has already been decomposed to its lowest level. The project manager reviews the work and feels some additional, useful information is missing. What should the project manager review?","options":{"A":"The WBS dictionary","B":"The requirements traceability matrix","C":"The project charter and scope statement","D":"The business requirement documents (BRD)"},"correct":["A"],"answer_display":"A","why_correct":"When the WBS is fully decomposed but information seems missing, the WBS dictionary contains detailed descriptions of each work package — providing the additional context and attributes that are missing from the WBS diagram alone.","why_wrong":{"B":"The requirements traceability matrix maps requirements to deliverables; it doesn't describe the work package details.","C":"The project charter and scope statement provide high-level scope; the WBS dictionary provides work package details.","D":"Business requirement documents contain stakeholder requirements; the WBS dictionary describes the work packages created from them."},"part":"Part 9","part_range":"Q401–Q450"},{"num":403,"type":"single","stem":"The programming activities of a project were planned to last 35 days per module, but the programming of the first module has taken 45 days. What should the project manager do?","options":{"A":"Evaluate the situation and identify ways to compress the schedule without impacting baselines.","B":"Ask the team to work overtime to complete the deliverable on time.","C":"Submit a change request to the project sponsor to change the schedule.","D":"Check the scope to verify if there is scope creep and get the project on schedule."},"correct":["A"],"answer_display":"A","why_correct":"When the first module takes 45 days vs. the planned 35 days, the PM should evaluate the situation and identify schedule compression options without impacting baselines — first assessing what can be done before escalating or accepting the overrun.","why_wrong":{"B":"Overtime without root cause analysis may not solve the problem and adds cost.","C":"A change request to the sponsor before evaluating options is premature.","D":"Checking for scope creep may be one part of the evaluation but the overall action is the full evaluation and schedule compression analysis."},"part":"Part 9","part_range":"Q401–Q450"},{"num":404,"type":"single","stem":"The marketing team is transitioning to using hybrid approaches for their projects. The marketing director is not knowledgeable about hybrid methodologies, and the project manager needs the director's support as the marketing director is a key stakeholder. What should the project manager do to obtain the support?","options":{"A":"Train the marketing team and keep the director informed.","B":"Mentor the marketing director on hybrid approaches.","C":"Ask the marketing team members to coach the director.","D":"Ask the marketing director to participate in daily meetings."},"correct":["B"],"answer_display":"B","why_correct":"The PM needs the marketing director's support as a key stakeholder. The PM should directly mentor the director on hybrid approaches — building their understanding so they can make informed decisions and provide meaningful support.","why_wrong":{"A":"Training the team and keeping the director informed doesn't give the director the hybrid knowledge they need to actively support the project.","C":"Having team members coach the director is less effective than the PM doing it directly, given the relationship importance.","D":"Participating in daily meetings would overwhelm the director without first building their basic hybrid understanding."},"part":"Part 9","part_range":"Q401–Q450"},{"num":405,"type":"single","stem":"A project manager is appointed to simultaneously deploy a new solution to branches located in different countries. Deployment teams in each country will integrate and deploy the solution. The project manager discovers that the deployment teams each encounter similar issues. However, each team addresses the issues separately. What should the project manager do to help ensure more collaboration between the teams?","options":{"A":"Ask the project sponsor to appoint new managers for the deployment teams.","B":"Propose that some of the teams delay deployments in their countries.","C":"Ask each deployment team to provide a very detailed schedule and action plan.","D":"Organize regular meetings with all of the deployment teams to share issues and solutions."},"correct":["D"],"answer_display":"D","why_correct":"When parallel deployment teams are solving similar issues independently, the PM should organize regular cross-team meetings to share issues and solutions — enabling knowledge transfer and collaborative problem-solving across all locations.","why_wrong":{"A":"Replacing team managers is a personnel action that doesn't solve the collaboration gap.","B":"Delaying deployments in some countries reduces value delivery without resolving the coordination problem.","C":"Requesting detailed schedules is administrative and doesn't enable real-time issue sharing."},"part":"Part 9","part_range":"Q401–Q450"},{"num":406,"type":"single","stem":"A company has a lot of experience with predictive projects. The project management office (PMO) has been trying to implement iterative tools within the project management framework, and the project manager has been asked to use these tools in their current project. After the successful implementation of the iterative tools, the PMO asks the project manager to determine the benefits these tools brought to the project. What should the project manager do?","options":{"A":"Determine the data to be monitored during the project as well as the expected performance and targets.","B":"Update the communications management plan to consider performance review meetings with the project stakeholders.","C":"Prepare and submit a status report to the steering committee to update performance monitoring.","D":"Conduct reviews with stakeholders to discuss the potential benefits the approach may have to the project."},"correct":["A"],"answer_display":"A","why_correct":"To determine the benefits of iterative tools, the PM must first determine what data to monitor and what performance targets to measure against — establishing the measurement baseline for the benefits evaluation.","why_wrong":{"B":"Updating the communications plan to include performance reviews is a process step that follows defining what to measure.","C":"Preparing a steering committee status report assumes benefits are already known; they need to be measured first.","D":"Conducting stakeholder reviews about potential benefits is theoretical; the PM needs to define the actual measurement approach."},"part":"Part 9","part_range":"Q401–Q450"},{"num":407,"type":"single","stem":"A project manager receives a voicemail from a business analyst on the project team. The business analyst indicates that an internal stakeholder is upset that they were not included before the project began. The stakeholder is asking for an addition to the requirements traceability matrix. What should the project manager do to improve the stakeholder relationship?","options":{"A":"Update the stakeholder engagement plan to ensure the stakeholder is included in the project stakeholder list.","B":"Consult the project scope document to make sure the addition is in scope.","C":"Engage the stakeholder to solicit more information before responding to the request.","D":"Initiate a project change request so the change control board (CCB) can decide if it is in scope."},"correct":["C"],"answer_display":"C","why_correct":"When a stakeholder who was excluded wants to add to the RTM, the PM should first engage the stakeholder to understand their needs before deciding how to respond — this builds the relationship and gathers the information needed for an informed response.","why_wrong":{"A":"Updating the stakeholder engagement plan is appropriate but after first understanding what the stakeholder actually needs.","B":"Consulting the scope document to check scope is a subsequent step after understanding the stakeholder's request.","D":"Immediately initiating a change request is premature before understanding what the stakeholder actually wants to add."},"part":"Part 9","part_range":"Q401–Q450"},{"num":408,"type":"single","stem":"Development team members are located in three different time zones. It is difficult to find a suitable time to hold the daily standup for all team members. What should the project manager do?","options":{"A":"Give up the daily standup and replace it with a daily report.","B":"Let the team members decide themselves if they want to join the meeting.","C":"Encourage frequent, small team meetings with two or three team members.","D":"Require all team members to join the daily standup regardless of the meeting time."},"correct":["C"],"answer_display":"C","why_correct":"When no single time works for all global team members, the PM should encourage frequent small meetings between two or three team members in compatible time zones — enabling agile collaboration within the constraints of the distributed team.","why_wrong":{"A":"Replacing standups with daily reports loses the real-time interaction and impediment visibility that standups provide.","B":"Optional attendance for team members defeats the purpose of the standup as a team synchronization event.","D":"Requiring all members regardless of meeting time creates hardship for team members in distant time zones and may be impractical."},"part":"Part 9","part_range":"Q401–Q450"},{"num":409,"type":"single","stem":"During the course of a project, a junior team member approaches the project manager for some direction and advice on risk mitigation. How should the project manager respond?","options":{"A":"Offer guidance and follow up with some developmental activity for the junior team member.","B":"Refer the junior team member to the senior team member who develops the risk mitigation strategy.","C":"Inform the junior team member that risk mitigation is not part of their work.","D":"Tell the junior team member that the information is available in lessons learned."},"correct":["A"],"answer_display":"A","why_correct":"When a junior team member asks for guidance on risk mitigation, the PM should offer guidance and follow up with a developmental activity — this is servant leadership combined with mentoring that builds the junior member's risk management capability.","why_wrong":{"B":"Referring to the senior team member is a handoff that misses the PM's mentoring opportunity.","C":"Informing the junior that risk mitigation isn't their job may be incorrect — all team members participate in risk management in agile.","D":"Pointing to lessons learned is passive and doesn't provide the active guidance the junior member needs."},"part":"Part 9","part_range":"Q401–Q450"},{"num":410,"type":"single","stem":"A company is implementing a new system. The project manager has identified that it is best to complete this project using a mix of Scrum and Kanban methodologies. The product owner is confused as to how to start delivering the functionalities required. How should the project manager assist the product owner?","options":{"A":"Coach the product owner on how to create a product backlog.","B":"Discuss the product owner's responsibilities within the project team.","C":"Encourage the team to subdivide the project tasks.","D":"Create a work breakdown structure (WBS) and explain the deliverables to the product owner."},"correct":["A"],"answer_display":"A","why_correct":"When the product owner is confused about where to start with a Scrum/Kanban (Scrumban) mix, the PM should coach them on how to create a product backlog — this is the foundational artifact from which all sprint and kanban work flows.","why_wrong":{"B":"Discussing the product owner's responsibilities is useful context but doesn't give them the practical tool they need to start.","C":"Encouraging the team to subdivide tasks is a team activity; the product owner needs help with the backlog first.","D":"Creating a WBS is a predictive tool; in Scrumban the product backlog serves this purpose."},"part":"Part 9","part_range":"Q401–Q450"},{"num":411,"type":"multi","stem":"An agile project is in its eighth iteration out of 16. After the last iteration review, the team members receive feedback from the security department about regulations with which the project must comply. Which two actions should the project manager take? (Choose two.)","options":{"A":"Ask the product owner to include the requirements in the product backlog.","B":"Ask the security department for details about regulations.","C":"Ask the stakeholders about the priority of this regulation.","D":"Ask the team members to include the requirements in the next iteration.","E":"Ask the team members to analyze the impact of including this regulation. ,E"},"correct":["A","E"],"answer_display":"A,E","why_correct":"Adding the regulatory requirements to the product backlog through the product owner (A) ensures formal tracking; analyzing the impact of including them (E) informs the prioritization and sprint planning decisions needed.","why_wrong":{"B":"Getting security department details is informational; the regulatory requirements and their impact are the action items.","C":"Asking stakeholders about priority is the product owner's job, not a direct PM action.","D":"Including in the next iteration without impact analysis is premature."},"part":"Part 9","part_range":"Q401–Q450"},{"num":412,"type":"single","stem":"A project manager for a strategic initiative realizes a new stakeholder is interested in the project and wants to ensure the stakeholder is fully aware of the goals, objectives, benefits, and risks of the project. What should the project manager do to enhance the success of the project?","options":{"A":"Schedule a meeting with the new stakeholder.","B":"Share the project status reports with the new stakeholder.","C":"Update the stakeholder engagement plan.","D":"Add the new stakeholder to the communications management plan."},"correct":["A"],"answer_display":"A","why_correct":"When a new stakeholder is interested and needs to be briefed on goals, objectives, benefits, and risks, the most direct and effective first action is to schedule a meeting with them — establishing the relationship and providing comprehensive orientation.","why_wrong":{"B":"Sharing status reports provides ongoing information but not the comprehensive onboarding a new stakeholder needs.","C":"Updating the stakeholder engagement plan is important but should follow the initial meeting where the PM understands their engagement needs.","D":"Adding to the communications management plan is also important but the meeting must happen first."},"part":"Part 9","part_range":"Q401–Q450"},{"num":413,"type":"single","stem":"During the course of the project, several obstacles are identified that are preventing the project from moving forward. What should the project manager do to remove the obstacles?","options":{"A":"Have the project team work on other activities","B":"Implement plans to remove the obstacles","C":"Escalate to the project steering committee","D":"Prioritize the obstacles for resolution"},"correct":["B"],"answer_display":"B","why_correct":"When obstacles are preventing project progress, the PM should implement plans to remove the obstacles — this is the servant leadership principle of actively removing impediments rather than documenting or delegating.","why_wrong":{"A":"Having the team work on other activities while obstacles remain is avoidance, not resolution.","C":"Escalating to the steering committee is appropriate only for obstacles the PM cannot resolve at their level.","D":"Prioritizing obstacles for resolution is useful planning but the action needed is implementation of removal plans."},"part":"Part 9","part_range":"Q401–Q450"},{"num":414,"type":"multi","stem":"The project is delayed due to the high amount of major changes requested by different stakeholders at different stages of the project. If the project continues on the same path, it will consume twice the time and budget planned. What two actions can the project manager take to be more cost effective? (Choose two.)","options":{"A":"Conduct a stakeholder analysis","B":"Reinforce team communication.","C":"Update the project management plan with the new timeline","D":"Adopt an incremental approach","E":"Leverage work between team members ,D"},"correct":["A","D"],"answer_display":"A,D","why_correct":"Conducting a stakeholder analysis (A) identifies which stakeholders are driving excessive changes; adopting an incremental approach (D) structures change into manageable iterations, reducing uncontrolled late-stage change requests.","why_wrong":{"B":"Reinforcing team communication helps internally but doesn't reduce stakeholder-driven change requests.","C":"Updating the PM plan with new timeline accepts the overrun without addressing the root cause.","E":"Leveraging work between team members addresses capacity, not the change request volume."},"part":"Part 9","part_range":"Q401–Q450"},{"num":415,"type":"single","stem":"A project manager is working with a Scrum team that is continually missing deadlines. The steering committee is concerned about the project as it is not clear that it will deliver the expected value. After some analysis, the project manager discovers there is a mismatch of competencies in one of the teams. What should the project manager do?","options":{"A":"Emphasize to the teams the importance of meeting the agreed deadlines","B":"Provide appropriate training to compensate for the mismatch","C":"Update the project schedule to reflect the delay","D":"Accept the risk of the project missing deadlines due to the mismatch"},"correct":["B"],"answer_display":"B","why_correct":"When a competency mismatch is causing missed deadlines in a Scrum team, the PM should provide appropriate training to fill the specific skill gaps — addressing the root cause directly.","why_wrong":{"A":"Emphasizing deadline importance doesn't address the competency gap causing the failures.","C":"Updating the schedule accepts the delay without addressing the skill gap that will continue to cause problems.","D":"Accepting the risk of missing deadlines is passive and doesn't serve the project or the team's development."},"part":"Part 9","part_range":"Q401–Q450"},{"num":416,"type":"single","stem":"The steering committee has asked a project manager experienced in agile to provide an indication of the time remaining on a medium-sized project. What tools can be used to provide this information?","options":{"A":"A release burndown chart","B":"Analysis of the business requirements document","C":"Story points for the remaining user stories","D":"Surrogate measurements"},"correct":["A"],"answer_display":"A","why_correct":"A release burndown chart shows remaining work across all remaining sprints/releases — it provides the steering committee with a visual forecast of when the project will be complete based on current velocity.","why_wrong":{"B":"Business requirements documents describe what to build; they don't provide time remaining forecasts.","C":"Story points for remaining stories provides a quantity but not a time estimate without velocity context.","D":"Surrogate measurements are proxy metrics for something that can't be directly measured; time remaining can be calculated from the burndown chart."},"part":"Part 9","part_range":"Q401–Q450"},{"num":417,"type":"single","stem":"A team is ready to start working on a project with a customer who was very difficult to work with in the past because the customer was unable to describe exactly what they wanted. What approach should the project manager take to remove this impediment?","options":{"A":"Follow a predictive approach in order to obtain formal acceptance of each deliverable","B":"Work with the product owner to define the minimum viable product(s)","C":"Reinforce the negotiation and soft skills of the team through training","D":"Develop and monitor a plan with due dates to reduce the time of completing the product"},"correct":["B"],"answer_display":"B","why_correct":"When a customer historically cannot describe what they want, working with the product owner to define the MVP focuses the collaboration on the minimum essential value — making requirements concrete and achievable rather than open-ended.","why_wrong":{"A":"A predictive approach with formal acceptance requires the customer to articulate all requirements upfront — exactly the problem they have.","C":"Training the team on negotiation skills doesn't help the customer articulate their needs.","D":"A plan with due dates doesn't resolve the customer's inability to describe what they want."},"part":"Part 9","part_range":"Q401–Q450"},{"num":418,"type":"single","stem":"A vendor supplying a piece of specialized equipment for a project has reported the potential for a delivery delay due to a technical issue with the sub-supplier. To stay on schedule, the vendor proposed replacing the sub-supplier's component with a similar part that is different from the one that is stipulated in the project specifications. What should the project manager do next?","options":{"A":"Accept the proposed replacement in order to keep procurement activities on track","B":"Insist on using the component per the project specifications and air freight the equipment to mitigate the delay","C":"Instruct the vendor to use the part that is compliant with the project specifications and update the schedule","D":"Consult with a subject matter expert (SME) to see if the proposed change is acceptable"},"correct":["D"],"answer_display":"D","why_correct":"When a vendor proposes using a different component than specified, the PM should consult an SME to evaluate whether the proposed alternative meets the technical requirements — expert judgment is needed before accepting or rejecting the proposed change.","why_wrong":{"A":"Accepting the replacement without expert evaluation risks technical incompatibility with the project specifications.","B":"Insisting on the original component with air freight adds cost without evaluating whether the alternative is acceptable.","C":"Instructing the vendor to use compliant components without evaluating the alternative misses the opportunity for a legitimate change."},"part":"Part 9","part_range":"Q401–Q450"},{"num":419,"type":"single","stem":"At the end of a meeting, a functional manager takes the project manager aside to raise some concerns on behalf of a project team member who is unclear about their role and responsibilities for the project. What should the project manager do in this situation?","options":{"A":"Develop a work plan for the project team member with the help of the resource manager","B":"Advise the functional manager and the project team member to review the resource management plan","C":"Tell the functional manager and the project team member to review the project charter","D":"Ask the functional manager to create a specific responsible, accountable, consult, and inform (RACI) chart for the team member"},"correct":["B"],"answer_display":"B","why_correct":"When a team member is unclear about roles and responsibilities, the PM should advise both the functional manager and the team member to review the resource management plan — this is the document that defines roles and responsibilities for project team members.","why_wrong":{"A":"Developing a work plan with the resource manager is an additional step that should follow the resource management plan review.","C":"The project charter defines high-level roles and project authority but not the detailed responsibilities the team member needs.","D":"Asking the functional manager to create a RACI chart for one person is redundant if the resource management plan already defines this."},"part":"Part 9","part_range":"Q401–Q450"},{"num":420,"type":"single","stem":"A project manager is struggling to figure out the performance of the project teams in an agile environment. For the same scope of work, team A has calculated 100 story points and team B has calculated 125 story points. Which team is performing better?","options":{"A":"Team A as they have calculated fewer story points than team B","B":"Team B as they have calculated more story points than team A","C":"The team that completes the most stones selected from the sprint backlog","D":"The team with the least amount of defects in their deliverables"},"correct":["C"],"answer_display":"C","why_correct":"Story point comparisons between teams are meaningless — teams calibrate story points differently. The team that completes the most stories selected from the sprint backlog is performing better, as this measures actual delivery.","why_wrong":{"A":"Team A's fewer story points doesn't indicate better performance; teams size stories differently.","B":"Team B's more story points similarly doesn't indicate better performance.","D":"Fewest defects is a quality metric but not the primary performance measure; completing sprint commitments is."},"part":"Part 9","part_range":"Q401–Q450"},{"num":421,"type":"single","stem":"During the implementation stage of a project, a newly appointed team leader approaches the project manager to verify the team's tasks and schedule. The work did not go as planned due to the team leader’s lack of management experience. This could cause delays for the project. What should the project manager do?","options":{"A":"Ask the human resources (HR) director to appoint a senior team leader","B":"Inform the project sponsor about the possible delay","C":"Directly manage the project team to avoid project delays","D":"Provide mentoring to the newly appointed team leader"},"correct":["D"],"answer_display":"D","why_correct":"When a newly appointed team leader lacks management experience and this is causing delays, the PM should provide mentoring — developing the team leader's skills addresses the root cause of the performance gap.","why_wrong":{"A":"Asking HR to appoint a senior team leader replaces the developing leader prematurely.","B":"Informing the sponsor about possible delays before attempting to resolve the root cause is premature escalation.","C":"Directly managing the project team bypasses the team leader and prevents their development."},"part":"Part 9","part_range":"Q401–Q450"},{"num":422,"type":"single","stem":"A project for Company A was successfully delivered within scope, schedule, and budget by the end of the last iteration. However, during the project celebration ceremony, one of the business stakeholders says they perceive the project as a failure as it did not add any business value. What should the project manager have done to avoid this perception?","options":{"A":"Involved the business stakeholders in the sprint review","B":"Defined product backlog priorities with the sponsor and key stakeholders to deliver business benefits","C":"Implemented a closing survey for key stakeholders","D":"Confirmed that there is a communications management plan in place to make business stakeholders aware of the success"},"correct":["B"],"answer_display":"B","why_correct":"When a business stakeholder perceives a project as a failure despite on-time/budget delivery, the PM should have defined product backlog priorities with the sponsor and key stakeholders to ensure business benefits were delivered — stakeholder-defined value must drive the backlog.","why_wrong":{"A":"Involving business stakeholders in sprint reviews helps them see progress but doesn't ensure the backlog delivers their business value.","C":"A closing survey measures satisfaction but doesn't prevent the value gap from occurring.","D":"A communications plan ensures information sharing but not that the right business value was built into the product."},"part":"Part 9","part_range":"Q401–Q450"},{"num":423,"type":"single","stem":"A project manager meets with external stakeholders to explain the objectives and outline expectations for a new project. A key stakeholder appears to support the project, with the condition that other unrelated projects will receive financial support. Due to cultural sensitivities, the project manager is reluctant to be direct with the key stakeholder on this matter. The project cannot proceed without the support of this stakeholder. What should the project manager do?","options":{"A":"Proceed with the project without allowing scope creep to occur","B":"Use the contingency funds to provide support for the requested projects","C":"Cancel the project since the stakeholder's request is out of scope","D":"Inform the sponsor and document the request in the stakeholder engagement plan"},"correct":["D"],"answer_display":"D","why_correct":"When a key stakeholder makes a conditional request that appears inappropriate (funding other projects), the PM should inform the sponsor and document the request in the stakeholder engagement plan — escalating an ethical concern while maintaining transparency.","why_wrong":{"A":"Proceeding without allowing scope creep is ambiguous; the conditional support request may need formal resolution.","B":"Using contingency funds for other projects' support is a misuse of project funds.","C":"Cancelling the project before escalating to the sponsor removes the stakeholder problem without exhausting resolution options."},"part":"Part 9","part_range":"Q401–Q450"},{"num":424,"type":"single","stem":"A key stakeholder for a construction project has been spending a lot of time at the site and interrupting the team's efforts. What should the project manager do in this situation?","options":{"A":"Work to understand the key stakeholder's concerns and provide feedback in regular project status reports","B":"Arrange an ad hoc meeting to address the key stakeholder’s concerns with team members","C":"Reinforce with the key stakeholder that the project is performing on schedule","D":"Escalate the situation to the project sponsor because the key stakeholder's behavior is impacting progress"},"correct":["A"],"answer_display":"A","why_correct":"When a key stakeholder is spending too much time on site and interrupting the team, the PM should work to understand their underlying concerns and address them through regular project status reports — proactive engagement satisfies the stakeholder's information need.","why_wrong":{"B":"An ad hoc meeting with team members present may not address the root concern and involves the team unnecessarily.","C":"Assuring the stakeholder the project is on schedule doesn't address why they feel the need to be physically present.","D":"Escalating to the sponsor before attempting to understand and address the stakeholder's concerns is premature."},"part":"Part 9","part_range":"Q401–Q450"},{"num":425,"type":"single","stem":"A stakeholder on a project has a reputation for being easily angered and unreasonably difficult on projects. The project manager would like to minimize the impact of the stakeholder’s behavior on the development team. What training should the project manager choose for their team to help with this situation?","options":{"A":"Communication training","B":"Negotiation training","C":"Emotional intelligence training","D":"Agile training"},"correct":["C"],"answer_display":"C","why_correct":"When a stakeholder is predictably difficult and the PM wants to protect the team's response, emotional intelligence training prepares team members to manage their own reactions, understand the stakeholder's perspective, and respond constructively.","why_wrong":{"A":"Communication training improves information exchange but doesn't equip team members for emotionally challenging interactions.","B":"Negotiation training helps reach agreements but doesn't address the emotional management needed for a difficult stakeholder.","D":"Agile training addresses methodology, not interpersonal dynamics with difficult stakeholders."},"part":"Part 9","part_range":"Q401–Q450"},{"num":426,"type":"single","stem":"A company is using a predictive approach for the development of a particular component as defined in the scope management plan. Due to regularly changing regulatory requirements, the development team has requested to utilize agile approaches. What should the project manager do about the development team's request?","options":{"A":"Escalate the request for additional financial resources","B":"Forward the request to the project management office (PMO) to amend the organizational process assets (OPAs)","C":"Ask the project sponsor to obtain approval for implementation of the new approach","D":"Analyze the requirements that will need to be addressed under the requested method"},"correct":["D"],"answer_display":"D","why_correct":"Before responding to the development team's request to use agile for changing regulatory requirements, the PM should analyze the requirements that would be addressed under the requested method — understanding the scope of the potential change before making any decisions.","why_wrong":{"A":"Escalating for financial resources is premature before analyzing whether the approach change is justified.","B":"Forwarding to the PMO to amend OPAs is premature before assessing the merit of the change.","C":"Asking the sponsor for approval is premature before analyzing the requirements under the new approach."},"part":"Part 9","part_range":"Q401–Q450"},{"num":427,"type":"single","stem":"During a daily standup meeting, a roadblock was raised that is preventing one of the team members from proceeding with work. The project manager figures out that it is due to a technical issue. What should the project manager do to prioritize this critical impediment?","options":{"A":"Solve the issue for the team member.","B":"Perform a brainstorming session to address the issue and add the solution to the sprint.","C":"Escalate the issue to the software vendor for technical resolution.","D":"Coach the team to come up with their own solution and add it to the next sprint."},"correct":["B"],"answer_display":"B","why_correct":"When a technical impediment is identified in the standup, the PM should facilitate a brainstorming session with the team to analyze the issue and develop a solution — and if a workaround can be done within the sprint, add it.","why_wrong":{"A":"Solving the issue for the team removes their ownership and learning opportunity.","C":"Immediately escalating to the software vendor may be premature if the team can brainstorm a solution.","D":"Coaching the team to find their own solution and adding it to the next sprint delays resolution unnecessarily if the team can solve it now."},"part":"Part 9","part_range":"Q401–Q450"},{"num":428,"type":"single","stem":"259 A project is being executed. The project's life cycle is defined as predictive; however, a major deliverable will be handed over incrementally to the customer. The assigned resources are experienced and reliable and are willing to make decisions that the project manager used to make after each incremental delivery on other projects. What should the project manager do?","options":{"A":"Schedule a steering committee meeting and obtain their approval on the request","B":"Support the decisions of the team and transfer the decision making responsibility to them","C":"Inform the team that although this is a hybrid environment, the project manager must still be responsible for making decisions","D":"Consult the product owner about letting the resources make decisions"},"correct":["B"],"answer_display":"B","why_correct":"When experienced resources in an incremental project want to make decisions the PM previously made, the servant leader PM should support and transfer decision-making responsibility to them — this is appropriate empowerment for capable resources.","why_wrong":{"A":"Obtaining steering committee approval for a team empowerment decision is excessive governance.","C":"Insisting the PM retains all decisions contradicts servant leadership and hybrid/agile empowerment principles.","D":"Consulting only the product owner misses the broader team that wants decision-making responsibility."},"part":"Part 9","part_range":"Q401–Q450"},{"num":429,"type":"single","stem":"After reviewing the project management plan with key stakeholders, the project manager was told that an 18-month release plan was unacceptable and the product should launch in six months. Based on the new timeline, what should the project manager do?","options":{"A":"Plan for overtime, apply crashing and fast tracking, and share the risk of failure with project stakeholders","B":"Review the project backlog looking for high-priority items and come up with a minimum viable product (MVP) that fits the expected timeline","C":"Seek approval with the sponsor to triple the project budget, hiring more people to compensate for the compressed schedule","D":"Go over the critical path with stakeholders, explaining why it is not possible to deliver all the scope in the expected timeline"},"correct":["B"],"answer_display":"B","why_correct":"When an 18-month plan must fit in 6 months, the PM should review the backlog for high-priority items and define an MVP that fits the timeline — this is the agile approach to constraints: deliver maximum value in the available time.","why_wrong":{"A":"Overtime, crashing, and fast-tracking with shared risk creates burnout and quality issues for a 12-month compression.","C":"Tripling the budget may not be feasible and doesn't guarantee 12-month compression quality.","D":"Explaining why the full scope can't be delivered in 6 months is truthful but doesn't offer the solution the stakeholders need."},"part":"Part 9","part_range":"Q401–Q450"},{"num":430,"type":"single","stem":"A research and development department is planning to develop a product that will introduce a new line of business for the organization. What should the project manager do to increase the project's chances of success?","options":{"A":"Plan a working session focusing on the scope, vision, and mission of the initiative","B":"Start developing the project management plan based on a previous project template from the project management office (PMO)","C":"Conduct benchmarking to determine the business viability of the initiative","D":"Conduct an impact analysis of the new initiative to determine how the project should be rolled out"},"correct":["A"],"answer_display":"A","why_correct":"For a new line-of-business project, the PM should plan a working session focusing on scope, vision, and mission — establishing the strategic foundation from which all planning flows.","why_wrong":{"B":"Using a previous project template assumes similarity that may not exist for a new line of business.","C":"Benchmarking validates business viability but should follow the vision and scope alignment.","D":"An impact analysis of rollout comes after the scope and vision are established."},"part":"Part 9","part_range":"Q401–Q450"},{"num":431,"type":"single","stem":"The product owner decides to launch a product after a couple of releases, knowing that the minimum viable product (MVP) lacks some features. One of the key stakeholders, the marketing vice president, is not happy with the results and questioned the release decision. What should the project manager do?","options":{"A":"Support the product owner’s decision and seek better alignment with this stakeholder in order to avoid this type of issue in the future","B":"Coach the team on the decision-making process, assuming a risk-averse strategy towards product releasing","C":"Assume the responsibility for product releases, making the final call on when something is ready for customer launch","D":"Escalate the issue to the sponsor, questioning the authority of the key stakeholder regarding the product launch decision"},"correct":["A"],"answer_display":"A","why_correct":"The product owner has the authority to decide when a product is ready for launch — this is their role. The PM should support the product owner's decision and then work to improve stakeholder alignment to prevent this type of disagreement in future.","why_wrong":{"B":"Coaching the team on risk-averse product release decisions undermines the product owner's authority.","C":"Assuming responsibility for product releases contradicts the product owner's role.","D":"Escalating to the sponsor to question the marketing VP's authority creates organizational conflict over a product owner decision that was within their authority."},"part":"Part 9","part_range":"Q401–Q450"},{"num":432,"type":"single","stem":"In the beginning of project execution, the project manager finds out that a key resource will be unavailable for two weeks, which could cause a delay to the schedule. What should the project manager do first?","options":{"A":"Assign the tasks to another resource, and ask the resource to work double shifts","B":"Update the schedule to reflect the project’s changes in duration","C":"Ask human resources (HR) for a replacement, and update the risk register","D":"Update the resource management plan and resource allocation chart accordingly"},"correct":["D"],"answer_display":"D","why_correct":"When a key resource becomes unavailable at the start of execution, the PM should update the resource management plan and resource allocation chart first — the formal first step in managing the resource change.","why_wrong":{"A":"Asking the resource to work double shifts is inappropriate and ignores proper resource management.","B":"Updating the schedule without first assessing resource options is premature.","C":"Going to HR for a replacement before updating the resource management plan skips the planning step."},"part":"Part 9","part_range":"Q401–Q450"},{"num":433,"type":"single","stem":"The change control board (CCB) rejects a change request submitted by a subject matter expert (SME). The SME refuses to accept this rejection and does not want to continue the project without the change. What should the project manager have done to avoid this situation?","options":{"A":"Requested that the sponsor approved the change request first","B":"Assessed the change's overall impact to the project before submission","C":"Ensured that the change request was aligned with the project scope","D":"Submitted the change request directly to the CCB"},"correct":["B"],"answer_display":"B","why_correct":"When a CCB rejects a change request and the SME refuses to accept the rejection, the PM should have assessed the change's overall impact before submission — proper pre-submission analysis builds a stronger business case and helps the SME understand the trade-offs.","why_wrong":{"A":"Sponsor pre-approval doesn't replace the CCB's authority but may have influenced the SME's acceptance.","C":"Alignment with project scope is necessary but not sufficient; a thorough impact assessment is what builds the case for approval.","D":"Submitting directly to the CCB is the correct process; the issue was inadequate pre-submission impact assessment."},"part":"Part 9","part_range":"Q401–Q450"},{"num":434,"type":"single","stem":"A food company is developing a new product using a predictive approach, and the product is currently in the testing phase. Given the nature of the feedback of the tests, the project manager has decided to use an iterative approach. At the end of one of the iterations, a new regulation related to the product is enacted. What should the project manager do next?","options":{"A":"Make a change request regarding the project’s scope to ensure compliance","B":"Include an assessment to verify compliance in the next iteration","C":"Conduct an iteration review to address the new regulation","D":"Start the tests over, adapting the trials to the new regulation"},"correct":["B"],"answer_display":"B","why_correct":"When a new regulation is enacted during an iterative project, the PM should include a compliance assessment in the next iteration — adapting the project through the iterative process rather than stopping and restarting.","why_wrong":{"A":"A change request for scope to ensure compliance is appropriate but the assessment should happen in the next iteration through the agile process.","C":"An iteration review happens at the end of a sprint; the compliance assessment needs to happen in the next active iteration.","D":"Starting tests over adapts the testing plan but the iterative approach means incorporating compliance into the ongoing process, not restarting."},"part":"Part 9","part_range":"Q401–Q450"},{"num":435,"type":"single","stem":"A project manager is managing an innovation project for a big corporation. The project manager is planning to use email as the main communication channel; however, the product owner prefers to use another approved communication tool instead of email. What should the project manager do?","options":{"A":"Contact the sponsor to request direction regarding the communication tool to be used by the project team","B":"Update the communications management plan based on the product owner’s preferences and distribute to the team","C":"Suggest to the team to start using the communication tool suggested by the product owner","D":"Request the product owner to use email because using another tool will increase the workload"},"correct":["C"],"answer_display":"C","why_correct":"When the product owner prefers a different approved communication tool, the PM should suggest the team start using it — the product owner's communication preference is valid and using their preferred approved tool improves collaboration.","why_wrong":{"A":"Contacting the sponsor for direction on a tool choice within approved options is unnecessary escalation.","B":"Updating the communications plan based on the product owner's preference is the right eventual outcome but the immediate action is adopting the tool.","D":"Insisting the product owner use email over their preferred tool reduces collaboration effectiveness."},"part":"Part 9","part_range":"Q401–Q450"},{"num":436,"type":"single","stem":"The customer's project manager changes during the final stage of a project. How can the project manager avoid a project closure delay?","options":{"A":"Update the stakeholder engagement plan","B":"Review the latest project status report and update the stakeholders","C":"Escalate the case to the customer's management team","D":"Issue the project payment invoice to the customer in advance"},"correct":["A"],"answer_display":"A","why_correct":"When the customer's PM changes at the final project stage, the PM should update the stakeholder engagement plan — ensuring the new PM's needs, communication preferences, and engagement requirements are captured to prevent closure delays.","why_wrong":{"B":"Reviewing the status report and updating stakeholders is informational; the engagement plan update addresses the structural relationship change.","C":"Escalating to the customer's management team is premature before trying to adapt the engagement approach.","D":"Issuing the payment invoice in advance uses financial leverage inappropriately for a relationship/process issue."},"part":"Part 9","part_range":"Q401–Q450"},{"num":437,"type":"single","stem":"In an industrial plant, the owner has decided to add more capacity to the plant by installing a new machine and updating the software used in production. This capacity enlargement will occur while the plant is still functioning and producing. The software update will be accomplished using an agile approach in order to minimize risk. The machine procurement, installation, and integration will be accomplished using predictive approaches. What types of communications will the project manager have to design into the schedule management plan to ensure the project will be on schedule?","options":{"A":"Weekly colocated meetings with the relevant stakeholders","B":"Biweekly conference calls with the relevant stakeholders","C":"Weekly one-on-one meetings with each of the relevant stakeholders","D":"Biweekly written status reports from the relevant stakeholders"},"correct":["A"],"answer_display":"A","why_correct":"For a hybrid project running agile software updates alongside predictive machine installation simultaneously in an operating plant, weekly colocated meetings with relevant stakeholders provide the synchronization needed between the two parallel workstreams.","why_wrong":{"B":"Biweekly conference calls are less frequent than needed for parallel critical workstreams in an operating environment.","C":"Weekly one-on-one meetings are time-consuming and don't facilitate cross-workstream coordination.","D":"Biweekly written status reports are passive and too infrequent for tight dependency management between parallel tracks."},"part":"Part 9","part_range":"Q401–Q450"},{"num":438,"type":"single","stem":"265 During the review of a project's list of deliverables, one of the stakeholders expressed concern that one of the requirements will not be addressed. What should the project manager do?","options":{"A":"Check the approved list of requirements to see if there are any missing items","B":"Work with the stakeholder to improve the requirements' acceptance criteria","C":"Review the requirements traceability matrix with the concerned stakeholder","D":"Discuss with the stakeholder which additional requirements should be added"},"correct":["C"],"answer_display":"C","why_correct":"When a stakeholder has a concern about a requirement not being addressed, the PM should review the requirements traceability matrix with the concerned stakeholder — objectively showing how requirements were captured and mapped to deliverables.","why_wrong":{"A":"Checking the approved requirements list alone doesn't engage the stakeholder or address their specific concern.","B":"Improving acceptance criteria with the stakeholder is a subsequent step if the RTM review confirms the gap.","D":"Discussing additional requirements to add jumps to scope expansion before verifying whether the original requirements were actually addressed."},"part":"Part 9","part_range":"Q401–Q450"},{"num":439,"type":"single","stem":"During project execution, a conflict occurs between the project manager and one of the team members at every project team meeting. The ongoing conflict is preventing tasks and deliverables from being completed. The project manager contemplates changing their leadership style. What should the project manager do?","options":{"A":"Review the set of responsibilities with the team member","B":"Avoid the team member to prevent further conflicts","C":"Escalate the situation to the project sponsor","D":"Review the personnel skill documents"},"correct":["A"],"answer_display":"A","why_correct":"When every team meeting generates conflict between the PM and one team member, the PM should review roles and responsibilities with the team member — clarifying boundaries and mutual expectations to address the structural source of the conflict.","why_wrong":{"B":"Avoiding the team member is unprofessional and allows the conflict to continue affecting other team members.","C":"Escalating to the sponsor before attempting direct resolution is premature.","D":"Reviewing personnel skill documents addresses capability, not the interpersonal conflict source."},"part":"Part 9","part_range":"Q401–Q450"},{"num":440,"type":"single","stem":"A newly formed team has become accustomed to agile practices. The project lead has noticed that while they are performing according to expectations, there is boredom with daily team practices among many of the team members. What should the project lead do in this situation?","options":{"A":"Challenge the team to find new ways to achieve higher levels of performance to improve the situation","B":"Speak with individual team members to determine what they would like to do to improve the situation in the team","C":"Have the team inform senior management of the situation and ask for recommendations","D":"Allow the team to self-organize and have them analyze the situation in their retrospective session and self correct"},"correct":["D"],"answer_display":"D","why_correct":"For a team that's performing well but bored with daily practices, the PM should allow the team to self-organize and analyze the situation in their retrospective — empowering them to discover and implement their own improvements.","why_wrong":{"A":"Challenging the team to achieve higher performance may add pressure to what is effectively a motivation/engagement issue.","B":"Individual conversations are useful but the retrospective allows the team to collectively own the solution.","C":"Involving senior management in a team engagement issue escalates what the team can resolve themselves."},"part":"Part 9","part_range":"Q401–Q450"},{"num":441,"type":"single","stem":"A company starts implementing Scrum. About halfway through the first sprint, communication issues develop. Some project team members are not in sync with other team members. What is the cause for this communication gap?","options":{"A":"The project sprint board has not been updated","B":"Daily standup meetings were not held or enforced","C":"The project status dashboard has not been updated","D":"The communications management plan has not been developed"},"correct":["B"],"answer_display":"B","why_correct":"When team members are not in sync early in a Scrum implementation, the most likely cause is that daily standup meetings weren't held or enforced — these are the synchronization mechanism that prevents communication gaps.","why_wrong":{"A":"An out-of-date sprint board indicates a process compliance issue but is a symptom, not the primary cause of mid-sprint communication gaps.","C":"An out-of-date dashboard is a reporting issue; the root cause of team sync failure is the standup.","D":"A communications management plan not being developed is possible but standups are the primary agile synchronization tool whose absence most directly causes this issue."},"part":"Part 9","part_range":"Q401–Q450"},{"num":442,"type":"single","stem":"During the course of a project, the project manager's immediate director is communicating directly with the client to approve changes without the project manager's knowledge. This is causing confusion in the project team where the scope is changing in the background, but only being mentioned in project meetings. How should the project manager handle this?","options":{"A":"Communicate directly with the director and inform them of the communications management plan","B":"Communicate directly with the client stating that any scope changes must go through the project manager","C":"Review the stakeholder engagement plan and put in place any existing actions accordingly","D":"Discuss the issues with the project team and let them know that the project manager will handle scope changes"},"correct":["A"],"answer_display":"A","why_correct":"When the PM's director is communicating directly with the client and approving changes without the PM's knowledge, the PM should communicate directly with the director and inform them of the communications management plan — clarifying proper channels.","why_wrong":{"B":"Communicating directly with the client to assert authority may confuse the client and damage the client-director relationship.","C":"Reviewing the stakeholder engagement plan is internal documentation; the PM needs to directly address the director's behavior.","D":"Informing the project team about the scope change process doesn't address the director's bypassing of the PM."},"part":"Part 9","part_range":"Q401–Q450"},{"num":443,"type":"multi","stem":"268 A project sponsor commonly asks the project manager to skip project retrospectives due to time constraints. However, the project manager persists in running this critical ceremony by reducing the time for preparation and for discussion. What are two issues that these actions by the project manager could cause? (Choose two.)","options":{"A":"A lot of discussions that yield no results or possibly too many results","B":"A lack of direction and motivation for the team in the workshop","C":"Lessons learned from other teams to not be considered","D":"Time management plan for the retrospective workshop to not be updated","E":"A focus on the negative and a disinterest in further improvements ,C"},"correct":["A","E"],"answer_display":"A,E","why_correct":"Rushed retrospectives with insufficient preparation time lead to discussions that are either superficial and produce no results, or chaotic and produce too many (A); and focusing on negatives without adequate time creates disinterest in further improvements (E).","why_wrong":{"B":"Lack of direction and motivation is a general leadership concern, not a specific result of shortened retrospectives.","C":"Not considering other teams' lessons learned is a separate issue from retrospective time compression.","D":"The time management plan for the retrospective not being updated is an administrative concern, not a quality issue caused by rushing."},"part":"Part 9","part_range":"Q401–Q450"},{"num":444,"type":"single","stem":"A client is structured as a matrix organization for an agile project. The project manager is working on-site with key stakeholders from different parts of the organization. How should the project manager handle the different stakeholders?","options":{"A":"All stakeholders are important, so the project manager should follow directions provided by management and key stakeholders","B":"Because there are different perspectives, perform a stakeholder analysis and act based on the outcome","C":"The project manager is working on the client's premises, so follow the directions of all the key stakeholders","D":"This is an agile project, so listen only to the directions of the project manager's supervisor and the functional managers of the organization"},"correct":["B"],"answer_display":"B","why_correct":"In a matrix organization with multiple stakeholders having different perspectives, the PM should perform a stakeholder analysis and act based on its outcome — using an objective framework to determine appropriate engagement levels and communication strategies.","why_wrong":{"A":"Following directions from all management and key stakeholders without analysis may create conflicting obligations.","C":"Following all key stakeholders' directions on-site creates conflicting obligations in a matrix environment.","D":"Only following the PM's supervisor and functional managers ignores the legitimate perspectives of other key stakeholders."},"part":"Part 9","part_range":"Q401–Q450"},{"num":445,"type":"single","stem":"A project manager is leading an in-house company project in its very early stages. This current project is similar to another project that ended a year ago. What should the project manager do to analyze the involved stakeholders?","options":{"A":"Lower the priority of stakeholder engagement as the stakeholders already have knowledge of this kind of project","B":"Use lessons learned from the previous project as a guide for the current project's stakeholder register","C":"Refer to the stakeholder register from the previous project as it was similar to the current project","D":"Document in the risk register that the current project may have different stakeholders than the previous project"},"correct":["B"],"answer_display":"B","why_correct":"For a similar project with likely overlapping stakeholders, the PM should use lessons learned from the previous project as a guide for the current stakeholder register — leveraging institutional knowledge while acknowledging that circumstances may have changed.","why_wrong":{"A":"Lowering stakeholder engagement priority because they know the project type ignores that stakeholder needs evolve with each project.","C":"Directly reusing the previous stakeholder register assumes the stakeholder list is identical, which may be incorrect.","D":"Documenting potential stakeholder differences in the risk register is reactive; using lessons learned as a guide is proactive."},"part":"Part 9","part_range":"Q401–Q450"},{"num":446,"type":"single","stem":"A product owner presented the backlog to the team, and the team raised concerns over implementing some of the features due to various impediments. What should the project manager suggest that the product owner do next?","options":{"A":"Ensure that the impediments are captured and prioritized based upon the highest valued features","B":"Estimate the financial impact of the impediments and request additional funding","C":"Begin to remove the impediments, starting with the easiest ones first, to foster team accomplishment","D":"Capture the impediments and inform management that their assistance is needed in resolving the impediments"},"correct":["A"],"answer_display":"A","why_correct":"When a team raises impediments for backlog features, the PM should ensure impediments are captured and prioritized based on the highest-valued features — addressing impediments in the order that unblocks the most business value.","why_wrong":{"B":"Estimating financial impact of impediments and requesting funds treats process impediments as budget items.","C":"Starting with the easiest impediments first optimizes for team accomplishment over business value.","D":"Capturing impediments and immediately informing management delegates what the PM and product owner should first attempt to address."},"part":"Part 9","part_range":"Q401–Q450"},{"num":447,"type":"single","stem":"A company was awarded a project in a dangerous location that poses several high-level risks for employees. Help is needed to tram the employees on major safety and health factors. The project is ongoing and uses a hybrid approach. The project will be conducted in multiple sites, with several development iterations running in parallel. How should the project manager handle this situation?","options":{"A":"Allocate and use part of the project's contingency reserves for training purposes","B":"Negotiate a contract and form a partnership with a local authority for medical and security support services","C":"Perform a retrospective and update the risk register and resource management plan regarding the necessary budget for training","D":"Hire only local resources who are aware of the territory's hazards, providing employment to the local community"},"correct":["B"],"answer_display":"B","why_correct":"For a dangerous location project requiring safety and health support across multiple parallel iterative sites, the PM should negotiate a contract with a local authority for medical and security support — providing systematic, professional safety infrastructure.","why_wrong":{"A":"Using project contingency for training assumes this is an optional addition; safety in dangerous locations is mandatory and should be planned.","C":"A retrospective and risk register update is documentation; active safety support infrastructure is needed.","D":"Only hiring local resources ignores the need for professional medical and security support regardless of who is hired."},"part":"Part 9","part_range":"Q401–Q450"},{"num":448,"type":"single","stem":"A vendor informed the project manager that a critical resource will be on a long leave of absence. The project team reviewed the pending vendor deliverables and identified an alternative solution, but the solution will incur an additional cost. The project is currently on schedule and slightly under budget. What should the project manager do next?","options":{"A":"Request a replacement resource","B":"Perform a cost-benefit analysis","C":"Implement risk responses","D":"Perform Integrated Change Control"},"correct":["D"],"answer_display":"D","why_correct":"When a vendor resource is unavailable and an alternative solution with additional cost is identified while the project is under budget, the PM should perform Integrated Change Control — the additional cost requires formal change approval even if budget exists.","why_wrong":{"A":"Requesting a replacement resource is one option but without impact analysis and change control, it may not be the right solution.","B":"A cost-benefit analysis is useful input but the formal process required is Integrated Change Control.","C":"Implementing risk responses is appropriate if this scenario was pre-planned; the formal change process is still needed for the additional cost."},"part":"Part 9","part_range":"Q401–Q450"},{"num":449,"type":"single","stem":"A project manager just started managing agile projects. The project manager realizes that due to the lack of a clear definition of project objectives and definition of done (DoD), their colleague's projects have had many difficulties. Sponsors keep asking for more features and the projects have yet to be completed. What should the project manager do to avoid these issues?","options":{"A":"Arrange meetings to ensure every necessary task to complete the project is included in the project management plan","B":"Convince the project sponsor to incorporate quality experts so the product can be tested and accepted as completed","C":"Convince the product owner to approach the team and look for options to find a solution to the problem","D":"Schedule meetings with key stakeholders to build the agile project charter and set clear expectations for the project"},"correct":["D"],"answer_display":"D","why_correct":"To avoid unclear project objectives and an ever-expanding scope, the PM should schedule meetings with key stakeholders to build an agile project charter and set clear expectations — establishing shared understanding of what the project will and won't deliver.","why_wrong":{"A":"Ensuring every task is in the PM plan is a predictive approach that doesn't address agile scope clarity.","B":"Quality experts help with acceptance but don't address the root cause of unclear objectives and definition of done.","C":"Asking the product owner to find solutions is vague; the PM should facilitate the charter-building process."},"part":"Part 9","part_range":"Q401–Q450"},{"num":450,"type":"single","stem":"A member of the board of directors is the sponsor of a project that is important to the organization. This stakeholder has many other priorities and is not currently engaged in the project activities. How should the stakeholder be engaged in the project?","options":{"A":"Keep the stakeholder informed and consult with them based on their needs","B":"Involve the stakeholder in governance and decision making","C":"Consult with the stakeholder and increase their level of interest","D":"The stakeholder needs to be made aware of the project progress"},"correct":["B"],"answer_display":"B","why_correct":"A board member sponsor with many competing priorities should be engaged through governance and decision-making — they are best utilized for strategic decisions and escalations, not day-to-day project activities.","why_wrong":{"A":"Keeping the sponsor informed based on their needs describes a lower-level stakeholder engagement; a board sponsor should participate in governance.","C":"Consulting and increasing interest is appropriate for lower-influence stakeholders; a board sponsor needs meaningful participation.","D":"Making the sponsor merely aware of project progress undersells their role and leaves critical governance decisions without executive engagement."},"part":"Part 9","part_range":"Q401–Q450"},{"num":451,"type":"single","stem":"273 A marketing team is planning for a multiyear initiative that will include a lot of cross-functional stakeholders. The project manager has been assigned and is now in the project planning phase. What item(s) should the project manager develop first?","options":{"A":"A product backlog and identification of the features to be delivered","B":"A business case and scope document","C":"A communications management plan that addresses the team's needs","D":"A risk management plan to incorporate known risks"},"correct":["C"],"answer_display":"C","why_correct":"For a multi-year initiative with many cross-functional stakeholders in the planning phase, the PM should first develop a communications management plan that addresses the team's communication needs — establishing how this large, complex stakeholder group will be effectively engaged.","why_wrong":{"A":"A product backlog and feature list is a later planning artifact for agile delivery planning.","B":"A business case and scope document should have preceded the planning phase; the PM is already assigned.","D":"A risk management plan is important but communications with cross-functional stakeholders is the more immediate priority."},"part":"Part 10","part_range":"Q451–Q499"},{"num":452,"type":"single","stem":"A key project stakeholder showed interest in the beginning of a complex agile project, but has become less involved as the sprint has progressed due to additional responsibilities. A few sprints later, the key stakeholder rejected a feature deliverable. The team is reworking the rejected deliverable for the next sprint. What should the project manager have done to avoid this situation?","options":{"A":"Involved the key stakeholders in the decision-making process","B":"Customized stakeholder communications based on the stakeholders’ needs","C":"Analyzed the changes in stakeholder attributes","D":"Documented the project vision and objectives"},"correct":["C"],"answer_display":"C","why_correct":"When a key stakeholder becomes less involved and then rejects a deliverable, the PM should have analyzed the changes in stakeholder attributes — recognizing that their level of interest and availability was declining and proactively adapting the engagement strategy.","why_wrong":{"A":"Involving the stakeholder in decision-making is part of engagement but doesn't address the changing attributes that caused reduced involvement.","B":"Customizing communications is appropriate but doesn't prevent the engagement drop without monitoring attribute changes.","D":"Documenting vision and objectives is important for alignment but doesn't address the root cause of declining stakeholder engagement."},"part":"Part 10","part_range":"Q451–Q499"},{"num":453,"type":"single","stem":"As a member of an organizational change management team, a project manager must pass on any changes to the project team. The project manager needs to avoid any misunderstandings or resistance to help ensure that the project team will support any organizational change. What should the project manager do?","options":{"A":"Conduct meetings with resistant members to facilitate smooth project implementation","B":"Meet with the team on a regular basis to ensure they are aware of changes","C":"Influence the team to communicate any changes","D":"Check with the team members on their willingness to change"},"correct":["B"],"answer_display":"B","why_correct":"For organizational change management, the PM should meet with the team regularly to ensure they are aware of changes — consistent, ongoing communication builds awareness and reduces surprise-driven resistance.","why_wrong":{"A":"Meetings with resistant members address resistance after it surfaces; regular team communication prevents it.","C":"Influencing the team to communicate changes to each other is bottom-up communication that may be inconsistent.","D":"Checking willingness to change identifies current attitudes but doesn't actively build awareness and support."},"part":"Part 10","part_range":"Q451–Q499"},{"num":454,"type":"single","stem":"A project manager is working on a software development project. A team member complains that since the project tasks are very simple, there is no reason to perform quality control. The project manager understands that removing the quality management plan from the project will also help to save money, which is important to the customer. What should the project manager do?","options":{"A":"Register starting the project without a quality management plan as a risk, and allocate the budget savings to the management reserve","B":"Develop the quality management plan, as quality is as equally important as cost and schedule management","C":"Get confirmation from management that the team member has enough experience to build software without quality control","D":"Ask the customer to order an external quality audit after accepting the project deliverable, and decrease the budget of the project"},"correct":["B"],"answer_display":"B","why_correct":"Quality is as fundamental as cost and schedule — removing the quality management plan creates technical debt, defects, and rework that often costs more than the quality investment. The PM should develop the plan.","why_wrong":{"A":"Registering the quality plan removal as a risk and reallocating the budget validates skipping quality management.","C":"Confirming the team member's experience is not a basis for eliminating formal quality management processes.","D":"External quality audits after acceptance are too late to prevent defects; quality management must be built into the process."},"part":"Part 10","part_range":"Q451–Q499"},{"num":455,"type":"single","stem":"A marketing team is developing ideas in order to revamp an existing product. The marketing executive reaches out to the project manager to make sure that necessary measures are in place for a successful launch. On what should the project manager focus?","options":{"A":"Ensuring that the team is also focused on the overall change management plan","B":"Determining and aligning performance indicators that will help in assessing successful delivery","C":"Planning for regular project updates to cover the status of critical deliverables","D":"Ensuring that the scope management plan is in place to cover all related objectives"},"correct":["B"],"answer_display":"B","why_correct":"For a product revamp launch, the PM should focus on determining and aligning performance indicators that will assess successful delivery — ensuring the team and stakeholders share a definition of success before work begins.","why_wrong":{"A":"Focusing on change management is important but secondary to establishing what successful delivery looks like.","C":"Regular project updates on critical deliverables are a communications activity that follows defining what success means.","D":"The scope management plan ensures scope is defined but doesn't address the performance indicators that define whether the launch succeeds."},"part":"Part 10","part_range":"Q451–Q499"},{"num":456,"type":"single","stem":"276 During the closing process, the project manager learns that one deliverable is not meeting customer expectations. How should the project manager proceed?","options":{"A":"Ask the customer to issue a change request with the information to analyze and provide a solution","B":"Review the deliverable requirements, check the customer approval criteria, and proceed accordingly","C":"Meet with the customer to reach agreement on the scope of the deliverable that will satisfy both parties","D":"Contact the project sponsor and ask for help in negotiating the closing of the project with the customer"},"correct":["B"],"answer_display":"B","why_correct":"During closing when a deliverable isn't meeting expectations, the PM should review the requirements, check the approval criteria, and proceed accordingly — the objective record determines whether the gap is real and what the correct resolution is.","why_wrong":{"A":"Asking the customer to issue a change request before verifying the gap against acceptance criteria puts the burden on the customer prematurely.","C":"Meeting to negotiate scope is appropriate if the requirements review confirms a legitimate gap; it shouldn't be the first action.","D":"Asking the sponsor to negotiate closing before reviewing the requirements is premature escalation."},"part":"Part 10","part_range":"Q451–Q499"},{"num":457,"type":"single","stem":"A product company is transforming the way it develops and releases products in the market. Executives believe that this is a high-risk initiative, and this initiative must be successful. What should the project manager do in this scenario?","options":{"A":"Develop a business case with assumptions for the new model","B":"Develop a communications management plan to inform the employees about the new business model","C":"Adopt an iterative rollout approach that delivers the highest business value earlier","D":"Develop a detailed sprint plan with clear deliverables"},"correct":["C"],"answer_display":"C","why_correct":"For a high-risk product transformation that must succeed, adopting an iterative rollout that delivers the highest business value earlier reduces risk — early value delivery builds stakeholder confidence and enables course correction before full commitment.","why_wrong":{"A":"A business case with assumptions is a planning document, not an execution strategy for risk management.","B":"A communications plan for the new model is important but not the primary risk mitigation for a high-stakes transformation.","D":"A detailed sprint plan with deliverables is execution planning but doesn't address the iterative value delivery strategy."},"part":"Part 10","part_range":"Q451–Q499"},{"num":458,"type":"single","stem":"Two weeks after the approval of the project management plan for a global project, the project manager noticed that it was approved based on a different level of understanding by international stakeholders and is no
