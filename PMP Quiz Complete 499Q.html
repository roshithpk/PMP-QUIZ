s and gain their support — organizational change requires informed buy-in, not unilateral announcement.","why_wrong":{"A":"Notifying the project team confirms the decision but doesn't build the organizational support needed for successful adoption.","B":"A letter to the PMO requesting to use hybrid is process compliance without stakeholder support building.","C":"A project change request is for changes within a project, not for establishing a new delivery approach with organizational stakeholders."},"part":"Part 7","part_range":"Q301–Q350"},{"num":341,"type":"single","stem":"During project implementation, one team finds out that a key project deliverable was not budgeted. What should the project manager do first?","options":{"A":"Escalate the issue to the project sponsor for resolution.","B":"Hold the team accountable and ask for an immediate solution.","C":"Meet with the team to discuss alternatives.","D":"Remove the deliverable from the project scope."},"correct":["C"],"answer_display":"C","why_correct":"When a key deliverable wasn't budgeted mid-project, the PM should meet with the team to discuss alternatives — the team closest to the work can identify options for scope adjustment, trade-offs, or cost containment before escalating.","why_wrong":{"A":"Escalating to the sponsor before exploring team alternatives provides the sponsor with a problem without potential solutions.","B":"Holding the team accountable for a budgeting gap is punitive and doesn't solve the problem.","D":"Removing the deliverable from scope unilaterally violates change control and may remove value the customer needs."},"part":"Part 7","part_range":"Q301–Q350"},{"num":342,"type":"single","stem":"During the final stage of the launch for a new design, team members are having a conflict about some features of the design. What should the project manager do?","options":{"A":"Call a stakeholder meeting along with team members and seek consensus.","B":"Ask stakeholders to reduce the scope in order to meet project deadlines.","C":"Ask the project sponsor to make the decision about the design features.","D":"Review the design with the team members and propose a new launch date."},"correct":["A"],"answer_display":"A","why_correct":"When team members conflict about design features at the final launch stage, the PM should call a stakeholder meeting with team members to seek consensus — bringing all perspectives together to resolve the conflict through collaborative decision-making.","why_wrong":{"B":"Asking stakeholders to reduce scope to meet deadlines prioritizes schedule over quality without exploring consensus first.","C":"Asking the sponsor to decide removes the team and stakeholders from a decision they should collaboratively own.","D":"Proposing a new launch date accepts delay before attempting to resolve the conflict within the current timeline."},"part":"Part 7","part_range":"Q301–Q350"},{"num":343,"type":"single","stem":"An agile team is developing a new content management system. Some of the team members are struggling to deliver certain features since they have never worked on this type of solution. What should the project manager do?","options":{"A":"Ask the team to read through all of the available system documents.","B":"Encourage the team to hold a knowledge-sharing session in each iteration.","C":"Encourage the team members to make changes directly in the system.","D":"Replace the members with new members who understand the system."},"correct":["B"],"answer_display":"B","why_correct":"When team members lack knowledge of a new system, encouraging knowledge-sharing sessions in each iteration is the agile approach — continuous learning within the team builds shared knowledge incrementally.","why_wrong":{"A":"Reading documents is passive learning that's less effective than active knowledge-sharing sessions.","C":"Encouraging direct changes to the system without understanding it creates quality and stability risks.","D":"Replacing members who lack system knowledge discards their other skills and disrupts team cohesion."},"part":"Part 7","part_range":"Q301–Q350"},{"num":344,"type":"single","stem":"Key decision makers are meeting to define the objectives of a new database migration project. There are many disagreements about scope and time lines among the leaders of various company departments. How should the project manager impartially prioritize the requirements to be integrated?","options":{"A":"Retain only requirements that result in profitable revenue growth.","B":"Ensure the CEO selects the requirements from all department leaders.","C":"Give each department a fixed budget that will cover ten requirements.","D":"Rank the requirements with the highest benefit-cost ratio as more important."},"correct":["D"],"answer_display":"D","why_correct":"When multiple departments disagree on requirements for a database migration project, ranking requirements by their benefit-cost ratio provides an objective, value-based prioritization that transcends departmental politics.","why_wrong":{"A":"Retaining only profit-generating requirements may exclude essential operational requirements from non-revenue departments.","B":"CEO-driven selection introduces a single point of subjectivity and may create political problems.","C":"A fixed ten-requirement budget per department is arbitrary and doesn't optimize for project value."},"part":"Part 7","part_range":"Q301–Q350"},{"num":345,"type":"single","stem":"An agile team is required to address a technical, complex requirement that has no visual deliverable to show the customer. What guidance should the product manager provide to improve the requirement development?","options":{"A":"Reprioritize the product backlog by lowering the priority of the complex activity, so it will be worked on later in the project.","B":"Allow the team to focus and complete the complex work because it will reduce the risk of finding issues later in the project.","C":"Discuss this with the team and reprioritize the backlog to deliver maximum value by including a portion of the complex work.","D":"Inform the customer that there will not be any deliverable due to the complexity involved in the requirement."},"correct":["C"],"answer_display":"C","why_correct":"When complex work has no visual deliverable, the team should discuss it and include a portion of the complex work in the prioritization — delivering maximum value by making meaningful progress on complex technical work while maintaining product backlog balance.","why_wrong":{"A":"Lowering priority of complex necessary work defers technical risk rather than managing it.","B":"Allowing uninterrupted focus on complex work may be right but the decision should be made collaboratively with value consideration.","D":"Informing the customer there will be no deliverable misses the opportunity to show progress on the underlying technical work."},"part":"Part 7","part_range":"Q301–Q350"},{"num":346,"type":"single","stem":"A project manager is leading an electrical project that spans five towns. The project manager is informed by the team that one of the towns is not allowing the team to work there even though the town was included in stakeholder engagements before the start of the project. What should the project manager do?","options":{"A":"Engage with the town's authorities to discuss the reason for the change in commitment and agree on a solution.","B":"Instruct the team to move to the next town and continue the project to avoid further delays.","C":"Change the project scope and seek approval to exclude this town from the overall project.","D":"Retrieve all minutes of stakeholder engagements and send to the town as a reminder of their commitment to the project."},"correct":["A"],"answer_display":"A","why_correct":"When a previously committed stakeholder reverses their position, the PM should engage with their authorities to understand what changed and agree on a solution — direct engagement before assuming a specific course of action.","why_wrong":{"B":"Moving to the next town without resolving the blockage leaves the blocked town unaddressed.","C":"Changing the project scope to exclude the town is premature before attempting resolution.","D":"Sending historical meeting minutes as a reminder is confrontational and unlikely to change the current resistance."},"part":"Part 7","part_range":"Q301–Q350"},{"num":347,"type":"single","stem":"209 A government agency is developing a new connectivity policy. The assigned project manager is a famous economist with international recognition. The team is eager to work with the project manager, but feels intimidated. The project manager realizes that a junior economist, whose tasks are behind schedule, is especially intimidated by the situation. What should the project manager do first?","options":{"A":"Consider organizing paired work sessions for the junior and senior economists.","B":"Reassign some of the junior economist's tasks to other economists.","C":"Evaluate the performance of the junior economist in the upcoming months.","D":"Request to replace the junior economist with a more experienced economist."},"correct":["A"],"answer_display":"A","why_correct":"When a junior economist is falling behind partly due to intimidation, the PM should consider paired work sessions with the senior economist — providing support, reducing intimidation, and accelerating knowledge transfer simultaneously.","why_wrong":{"B":"Reassigning the junior's tasks removes the opportunity to build their capability and doesn't address the intimidation.","C":"Evaluating performance over months delays addressing the known issue impacting current deliverables.","D":"Replacing the junior economist is a severe response before providing support."},"part":"Part 7","part_range":"Q301–Q350"},{"num":348,"type":"single","stem":"A project is halfway through its execution phase. The quality specifications for the project deliverables are formally accepted. However, a key stakeholder is dissatisfied, stating that the deliverables do not meet the quality specifications. What should the project manager do in this situation?","options":{"A":"Inform the project sponsor of the stakeholder’s dissatisfaction.","B":"Review the requirements traceability matrix and conduct inspections.","C":"Document the issue in the issue log and send a report to management.","D":"Notify the stakeholder that arbitration procedures will be followed."},"correct":["B"],"answer_display":"B","why_correct":"When a stakeholder claims quality specifications aren't met despite formal acceptance, the PM should review the requirements traceability matrix and conduct inspections — objectively verifying the claim against the formal requirements records.","why_wrong":{"A":"Informing the sponsor before verifying the claim provides incomplete information for their decision.","C":"Documenting in the issue log without first verifying the claim treats an unverified complaint as a confirmed issue.","D":"Threatening arbitration before verification is adversarial and premature."},"part":"Part 7","part_range":"Q301–Q350"},{"num":349,"type":"single","stem":"A team is finishing the third release to present to the stakeholder as part of a demonstration. The company that subcontracts the developers has communicated that there is a cash flow problem and the company will not be able to provide the same resources for the next iterations. What should the project manager do next?","options":{"A":"Analyze the impact against the release plan if the blocker is not addressed.","B":"Create a risk register to track the risks and request additional budget.","C":"Escalate the situation to the project sponsor for a possible resolution.","D":"Work with the project owner to prioritize the product backlog."},"correct":["A"],"answer_display":"A","why_correct":"When a subcontractor faces a cash flow crisis threatening resource availability, the PM must first analyze the impact against the release plan — understanding the full consequence before deciding on the response (escalation, backlog reprioritization, etc.).","why_wrong":{"B":"Creating a risk register entry is documentation; the immediate action is impact analysis since the risk has already materialized.","C":"Escalating to the sponsor before impact analysis provides them with incomplete information.","D":"Reprioritizing the backlog with the product owner is a potential response but requires the impact analysis first."},"part":"Part 7","part_range":"Q301–Q350"},{"num":350,"type":"single","stem":"An organization is transitioning from a predictive to an agile approach. What should the project manager do to ensure that the agile approaches will bring about significant change?","options":{"A":"Obtain full management support","B":"Identify the organization's key clients","C":"Learn as much as possible about the organization","D":"Conduct agile training for the team members"},"correct":["A"],"answer_display":"A","why_correct":"Organizational transformation to agile requires full management support as a prerequisite — without it, agile initiatives fail due to cultural resistance, resource conflicts, and governance mismatches.","why_wrong":{"B":"Identifying key clients is a business strategy activity, not an agile transformation prerequisite.","C":"Learning about the organization is useful context but management support is the critical enabler.","D":"Training the team is essential but insufficient without management support for the structural changes agile requires."},"part":"Part 7","part_range":"Q301–Q350"},{"num":351,"type":"single","stem":"A customer's technical lead discussed a new feature with the project manager. The project manager believes the new feature will boost performance significantly and adds it as a highpriority item in the sprint backlog. At the end of the sprint, all of the planned stories were not completed because the new feature took more time. What should the project manager do next?","options":{"A":"Agree with the project team to modify and delete some of the stories in the current sprint backlog","B":"Obtain approval from the project team and add the new story to the product backlog","C":"Receive an agreement from the product owner and add the new story to the product backlog","D":"Negotiate with the scrum master before adding the new story to the sprint backlog"},"correct":["C"],"answer_display":"C","why_correct":"Adding a new story to the sprint backlog mid-sprint requires the product owner's agreement — the product owner is the authority on what goes into the sprint backlog and ensures business value trade-offs are made consciously.","why_wrong":{"A":"Deleting committed stories without product owner agreement violates the sprint commitment.","B":"Adding to the product backlog (not sprint backlog) and getting team agreement misses the product owner's decision authority.","D":"Negotiating with the scrum master bypasses the product owner who owns the backlog prioritization."},"part":"Part 8","part_range":"Q351–Q400"},{"num":352,"type":"drag","stem":"DRAG DROP A project manager in an automotive company is scheduling activities for a complex project. Some of the project requirements are fixed and some are flexible. Match the items on the left with the methodology on the right that the project manager is using. Answer: 2-agile 1-traditional 4-hybrid 3-all meth 213 PMI PMP Exam","options":{},"correct":["B"],"answer_display":"B","why_correct":"In hybrid project scheduling: fixed requirements use traditional/predictive scheduling; flexible requirements use agile; the combination uses hybrid; and both methodologies can use common planning artifacts.","why_wrong":{"A":"Agile alone handles uncertainty but not the fixed requirement elements.","C":"Traditional alone doesn't accommodate the flexible, uncertain requirements.","D":"No single methodology handles both fixed and flexible optimally — hybrid is required."},"part":"Part 8","part_range":"Q351–Q400"},{"num":353,"type":"multi","stem":"A project team is working on an agile software development project. The project manager is concerned that the virtual team may not be as effective as a colocated team at headquarters. Which two actions should the project manager leverage to ensure the team is meeting performance expectations? (Choose two.)","options":{"A":"Require a monthly individual status report","B":"Hold daily virtual meetings to review progress","C":"Utilize a web-based kanban board","D":"Task functional managers to drive accountability","E":"Implement time-keeping software for team members ,E"},"correct":["B","C"],"answer_display":"B,C","why_correct":"Daily virtual meetings (B) maintain the standup rhythm that keeps the virtual team synchronized, while a web-based kanban board (C) provides continuous visual transparency of work status across locations and time zones.","why_wrong":{"A":"Monthly individual status reports are too infrequent and one-way; they don't maintain team synchronization.","D":"Functional managers driving accountability bypasses the agile team's self-organization principle.","E":"Time-keeping software monitors hours but doesn't measure the output and collaboration quality that matters."},"part":"Part 8","part_range":"Q351–Q400"},{"num":354,"type":"single","stem":"An organization is transitioning to an agile delivery approach. There is only one project that is being used as a pilot for the new approach. The project management office (PMO) manager has asked the project lead how communications with the project team and the stakeholders will be managed. What should the project lead recommend?","options":{"A":"Send weekly reports to the PMO, and use a kanban board for the product owner and the project team","B":"Send the weekly report to the PMO and the product owner, and use a kanban board for the project team","C":"Invite the PMO manager to the daily standup with the project team and product owner","D":"Send weekly reports to all stakeholders, including the project team and the product owner"},"correct":["A"],"answer_display":"A","why_correct":"For an agile pilot, the PMO needs traditional reporting (weekly reports) while the product owner and team need the agile visual management tool (kanban board) — giving each audience the information format that suits their governance needs.","why_wrong":{"B":"Excluding the product owner from the weekly report leaves the primary business decision-maker less informed than necessary.","C":"Daily standups are too detailed for the PMO manager who needs summary information, not operational updates.","D":"Weekly reports for all stakeholders including the team abandons the kanban board that the agile team needs for day-to-day transparency."},"part":"Part 8","part_range":"Q351–Q400"},{"num":355,"type":"single","stem":"An urgent meeting has been established with the project team to discuss the cause of some quality issues that are preventing delivery to the client. The product owner recommends a root cause analysis (RCA). What should the project lead do?","options":{"A":"Discuss the product owner's recommendations with the team and implement the agreed-on solutions","B":"Allow the team to self-organize so one of the resources can lead the team to achieve consensus","C":"Discuss the recommendations with the test manager and request better quality control","D":"Facilitate the meeting so anyone can share their ideas and is heard during the session"},"correct":["D"],"answer_display":"D","why_correct":"The PM's role as a servant leader in an urgent quality meeting is to facilitate the session so anyone can share their ideas and be heard — not to direct the analysis, but to create conditions for the team to solve it collaboratively.","why_wrong":{"A":"Discussing recommendations and implementing solutions assumes agreement before the meeting; facilitation first.","B":"Allowing one resource to lead to consensus is delegation that removes the PM's facilitation responsibility.","C":"Discussing with the test manager and requesting better control is managerial, not facilitative."},"part":"Part 8","part_range":"Q351–Q400"},{"num":356,"type":"drag","stem":"DRAG DROP In an effort to modernize the technology for a project, the project manager has been discussing risk prioritization with the project team. The project manager determines that additional parameters are needed to iteratively assess and prioritize the project risks. Match the project manager's goals on the left with the relevant risk parameter on the right. Answer: 4-dormancy 3-urgency 2-connectivity 1-proximity","options":{},"correct":["D"],"answer_display":"D","why_correct":"Proximity = how soon the risk might occur; urgency = how quickly response is needed; connectivity = how one risk relates to others; dormancy = time between risk occurrence and its impact being detected. These iterative parameters enable better risk prioritization.","why_wrong":{"A":"Dormancy is the lag between risk occurrence and detection — important for monitoring frequency decisions.","B":"Connectivity helps understand cascading risk impacts across the project.","C":"Urgency drives response timeline prioritization."},"part":"Part 8","part_range":"Q351–Q400"},{"num":357,"type":"single","stem":"The project sponsor of a major initiative is consistently changing the prioritization of modular work packages. The team is used to three week sprints and is becoming increasingly frustrated with the daily changes in scope. What should the project manager do?","options":{"A":"Set up a meeting with the sponsor to explain the importance of keeping a strict sprint cycle.","B":"Decrease the sprint cycle to the average reprioritization request by calculating it in days.","C":"Set up a meeting with the project team and ask for their opinion on what to do.","D":"Move to a Kanban strategy so that work can be reallocated more easily."},"correct":["D"],"answer_display":"D","why_correct":"When a sponsor changes sprint priorities daily, the sprint structure is incompatible with the pace of change. Moving to Kanban allows work to be reprioritized continuously without the rigidity of sprint commitments, matching the sponsor's behavior pattern.","why_wrong":{"A":"Explaining the importance of the sprint cycle educates the sponsor but may not change their behavior; Kanban adapts to it.","B":"Decreasing the sprint cycle to match reprioritization frequency makes sprints so short they lose their planning benefit.","C":"Asking the team for opinions is collaborative but doesn't resolve the structural mismatch."},"part":"Part 8","part_range":"Q351–Q400"},{"num":358,"type":"multi","stem":"A project manager has been assigned to an education project with the objective of training a workforce in application development. One of the deliverables is to provide internships to the best students in the customer's active projects. However, the customer does not have enough projects in progress right now. The project manager decides to create several internal projects in order to ensure the internships. Which three actions should the project manager take to fulfill this scenario without adding costs for the customer? (Choose three.)","options":{"A":"Create a work breakdown structure (WBS) of the new scope with the internal projects.","B":"Create a change request with the scope of the new internal projects.","C":"Use the project's contingency budget.","D":"Influence the client to initiate a new project.","E":"Manage the quality of the delivery. ,D,E"},"correct":["A","B","E"],"answer_display":"A,B,E","why_correct":"Creating a WBS for the new scope (A) structures the internal projects; a change request (B) formally adds and approves the scope; and managing delivery quality (E) ensures the internships provide genuine value to students.","why_wrong":{"C":"Using project contingency budget for new scope that wasn't planned requires change request approval, not unilateral spending.","D":"Influencing the client to initiate a new project is the opposite of creating internal projects to fulfill the internships."},"part":"Part 8","part_range":"Q351–Q400"},{"num":359,"type":"single","stem":"A project is in the knowledge transfer phase, and a few subject matter experts (SMEs) went to the client site for knowledge transfer. The SMEs captured various process deviations without sharing with the project team. How can the project manager ensure knowledge transfer across the team?","options":{"A":"Ask the project team to run a deviation log review meeting with the client, highlighting that the project may not be able to go live as scheduled.","B":"Ask the project team to facilitate a lessons learned session during the project closure phase to incorporate this issue.","C":"Ask the project management office (PMO) to provide team members with real-time visibility for deviations and facilitate team members to resolve issues.","D":"Ask the SMEs to share the knowledge transfer documents with all other members by placing the documents in the project management information system (PMIS)."},"correct":["D"],"answer_display":"D","why_correct":"When SMEs capture deviations without sharing, the solution is to ask them to place knowledge transfer documents in the project management information system (PMIS) — making the information accessible to all team members through the central repository.","why_wrong":{"A":"A deviation log review meeting with the client flags project risks but doesn't transfer the SME knowledge to the team.","B":"Waiting until project closure lessons learned session means the knowledge isn't available during ongoing project work.","C":"Asking the PMO to provide real-time visibility is appropriate for monitoring but the SMEs must first share their documents."},"part":"Part 8","part_range":"Q351–Q400"},{"num":360,"type":"single","stem":"A project manager is assigned to a new marketing campaign. The sponsor gives the project manager an approved project management plan for review and explains the scope, business requirements, deliverables, and stakeholders. The project manager asks to see the project charter to gain a better understanding of the project. The sponsor says the project is small and simple so there is no need for a project charter. What should the project manager do?","options":{"A":"Develop the project charter and send it for approval.","B":"Explain that a project charter is necessary to ensure agreement on scope and deliverables and to define the project manager's responsibilities.","C":"Speak with peers about the need for a project charter.","D":"Agree that the project does not require a project charter, especially since the deliverables and milestones are included in the project management plan."},"correct":["B"],"answer_display":"B","why_correct":"Even for small, simple projects, a project charter is necessary — it defines the PM's authority, formalizes stakeholder agreement on scope, and establishes the formal project start. The PM should explain this necessity to the sponsor.","why_wrong":{"A":"Developing the charter and sending it for approval is the right action, but the PM should also explain why it's necessary to build understanding.","C":"Consulting peers about the charter need is passive; the PM should directly inform the sponsor.","D":"Agreeing to skip the charter abandons a fundamental project governance document."},"part":"Part 8","part_range":"Q351–Q400"},{"num":361,"type":"multi","stem":"A large multi-year project requires highly skilled staff for successful deployment. The management team and the project sponsor have analyzed the resource requirements and agreed to have permanent staff hired for the project to avoid potential budget overrun. However, there is a risk of staff turnover during the course of the project, which may have an impact on the delivery. Which two actions should the project manager take to mitigate this risk? (Choose two.)","options":{"A":"Meet with management to discuss dividing the project into smaller projects.","B":"Convince senior management to hire third-party staff.","C":"Enhance the competencies of the project team through training, mentoring, and coaching.","D":"Increase the trained staff to create back-up for resources.","E":"Introduce a recognition program to motivate and reward resource performance. ,E"},"correct":["C","E"],"answer_display":"C,E","why_correct":"Building team competency through training, mentoring, and coaching (C) reduces the risk of performance gaps from turnover; a recognition program (E) increases engagement and motivation, directly reducing the likelihood of staff turnover.","why_wrong":{"A":"Dividing into smaller projects doesn't address the turnover risk.","B":"Third-party staff adds cost and may have higher turnover than permanent staff.","D":"Training backup resources addresses the impact of turnover but not the probability of it occurring."},"part":"Part 8","part_range":"Q351–Q400"},{"num":362,"type":"single","stem":"220 A project team with members from many different countries is struggling to cooperate. The project manager accepted these difficulties during the storming phase of team development, but the team has not moved to the next phase. The project is beginning to fall behind schedule. What can the project manager do to move the team to the norming phase?","options":{"A":"Plan social activities to help foster stronger interpersonal relationships and identify shared goals.","B":"Figure out who is behind the issues and apply progressive disciplinary techniques.","C":"Speak with the project sponsor about changing the team composition.","D":"Show the team the schedule impact of their communication issues and encourage them to put their differences aside."},"correct":["A"],"answer_display":"A","why_correct":"To move a multinational team from storming to norming, the PM should plan social activities that build interpersonal relationships and identify shared goals — creating the human connections and common purpose that enable norming.","why_wrong":{"B":"Identifying who's causing issues and applying discipline treats norming as a compliance problem rather than a relationship-building opportunity.","C":"Changing team composition disrupts what has already been established and may restart the forming/storming cycle.","D":"Showing the schedule impact and pressuring differences aside creates compliance without genuine norming."},"part":"Part 8","part_range":"Q351–Q400"},{"num":363,"type":"single","stem":"In a software development project, the product owner and development team agree on a sprint backlog. The highest priority in the backlog is to build a payment module. The team worked on the module during the first half of the sprint, but now two developers want to spend the rest of the sprint focusing on refactoring another feature that might create issues in the future. What should the project manager do?","options":{"A":"Let the developers focus on the refactoring work and discuss it in the retrospective.","B":"Restate to the developers the importance of focusing and meeting the sprint goal.","C":"Escalate the issue to the developers’ functional managers.","D":"Praise the developers for their proactivity and focus on quality."},"correct":["B"],"answer_display":"B","why_correct":"When developers want to abandon the sprint goal mid-sprint for refactoring work, the PM should restate the importance of focusing on and meeting the sprint goal — this is the commitment the team made during sprint planning.","why_wrong":{"A":"Letting developers focus on refactoring and discussing in the retrospective abandons the sprint commitment without team consensus.","C":"Escalating to functional managers for a technical priority decision undermines team self-organization.","D":"Praising the developers for proactivity and focusing on quality without addressing the sprint commitment sends a mixed message."},"part":"Part 8","part_range":"Q351–Q400"},{"num":364,"type":"single","stem":"From previous lessons learned working with a client, a project manager notes that the client's turnaround times on documents sent for approval were very slow and well outside of the agreed timelines. At the initial kick-off meeting with the same client, how should the project manager approach this issue for the new project?","options":{"A":"Update the project risk register with the potential for delays.","B":"Inform the client that extra resources will be added to give the client more time for reviews.","C":"Work with the client on an acceptable amount of time for document approval.","D":"Inform the client of their responsibility in relation to document approval."},"correct":["C"],"answer_display":"C","why_correct":"Having experienced slow document approvals from this client previously, the PM should proactively work with the client during the kick-off to agree on acceptable turnaround times for approvals — setting clear expectations before delays occur.","why_wrong":{"A":"Adding to the risk register acknowledges the risk but doesn't establish the specific agreement needed to prevent delays.","B":"Adding resources to give the client more time is counterproductive — the issue is the client's responsiveness.","D":"Informing the client of their responsibility without reaching agreement is one-way communication that doesn't secure commitment."},"part":"Part 8","part_range":"Q351–Q400"},{"num":365,"type":"single","stem":"During an ongoing project, a key resource asks the project manager about the project purpose and if it is aligned with the organization's strategy. What should the project manager share with the key resource?","options":{"A":"The updated project management plan","B":"The updated benefits management plan","C":"The updated communications management plan","D":"The updated scope management plan"},"correct":["B"],"answer_display":"B","why_correct":"When a key resource asks about project purpose and strategic alignment, the PM should share the benefits management plan — which documents the expected project benefits and how they align with organizational strategy.","why_wrong":{"A":"The project management plan details how work will be done, not the strategic value and purpose.","C":"The communications plan describes how information will be shared, not the project's strategic purpose.","D":"The scope management plan defines what will be delivered, not why it matters strategically."},"part":"Part 8","part_range":"Q351–Q400"},{"num":366,"type":"multi","stem":"After completion of a project with specific users in various countries, the project manager's supervisor asks if the project users are satisfied with the way the project was run. What two actions should the project manager take? (Choose two.)","options":{"A":"Send a questionnaire to the project participants and seek their feedback.","B":"Refer to the communications management plan.","C":"Obtain official approval on the new process from the various countries.","D":"Prepare the lessons learned from the project phase.","E":"Deliver the project materials to the users and see if they have any comments. ,B"},"correct":["A","D"],"answer_display":"A,D","why_correct":"To assess user satisfaction, the PM should send a questionnaire to participants to get direct feedback (A); and prepare lessons learned from the project phase (D) to capture what worked well and what could improve stakeholder experience.","why_wrong":{"B":"Referring to the communications management plan describes how communication was planned, not how satisfied users are.","C":"Obtaining official approval on new processes is an administrative action, not a satisfaction assessment.","E":"Delivering materials and observing comments is informal and not a systematic satisfaction assessment."},"part":"Part 8","part_range":"Q351–Q400"},{"num":367,"type":"single","stem":"A project manager joins a team that is providing a customized enterprise resource planning (ERP) system to a client. A potential design problem is identified by the development team. After reviewing this issue with the project owner and team members, all agreed to revise the design to avoid a system defect when deployed. The design is already approved. What should be the project manager's next steps?","options":{"A":"Make a change request and get formal approval from the project owner.","B":"Inform the client of the problem and follow the change request process.","C":"Conduct a proof of concept to make sure there are no problems in the revised design.","D":"Amend the design specifications and pass them to the development team for reprogramming."},"correct":["B"],"answer_display":"B","why_correct":"When a pre-approved design needs revision, the PM must inform the client of the problem and follow the change request process — transparency with the client and formal change control are both required when an approved design baseline changes.","why_wrong":{"A":"Making a change request and getting product owner approval is incomplete — the client whose design was approved must be informed.","C":"A proof of concept is a validation technique that should happen after the change is approved, not before informing the client.","D":"Amending specifications and passing them to development without informing the client and getting change approval bypasses governance."},"part":"Part 8","part_range":"Q351–Q400"},{"num":368,"type":"single","stem":"During the execution of a project, the finance team identified that they were not involved in building the business case for the project and will not approve the estimated return on investment (ROI). What should the project manager do?","options":{"A":"Revisit the communications management plan and make necessary adjustments.","B":"Revisit the scope management plan and note this as a risk.","C":"Continue developing based on the project management plan and address the issue post delivery.","D":"Schedule a meeting with the product owner and finance team to agree on course corrections."},"correct":["D"],"answer_display":"D","why_correct":"When the finance team wasn't involved in the business case and won't approve the ROI, the PM needs to schedule a meeting with the product owner and finance team together to align on a corrective course — collaborative resolution of a stakeholder gap.","why_wrong":{"A":"Adjusting the communications plan addresses future engagement but doesn't resolve the current ROI dispute.","B":"Noting as a risk in the scope plan is passive documentation that doesn't resolve the finance team's concerns.","C":"Continuing based on the PM plan and addressing post-delivery ignores a critical approval blocker."},"part":"Part 8","part_range":"Q351–Q400"},{"num":369,"type":"single","stem":"After the project charter’s approval, the project manager needs to work on detailed project requirements, constraints, and assumptions with stakeholders. However, not all of the stakeholders are immediately available for a meeting in the short term. What should the project manager do in order to gather the information needed from stakeholders?","options":{"A":"Conduct a meeting to build the project management plan with the stakeholders who are available.","B":"Email, call, or meet with each stakeholder separately to obtain their input.","C":"Escalate to the project sponsor that not all stakeholders are available for a meeting.","D":"Meet with the project management team to build the project management plan before consulting stakeholders."},"correct":["B"],"answer_display":"B","why_correct":"When stakeholders are not all immediately available, the PM should contact each one individually through email, calls, or separate meetings — gathering their input asynchronously rather than waiting for everyone to be available simultaneously.","why_wrong":{"A":"Starting the PM plan meeting with only available stakeholders excludes the unavailable ones' input.","C":"Escalating to the sponsor that stakeholders aren't available is premature before attempting individual outreach.","D":"Building the PM plan without stakeholders and consulting them later reverses the correct order of engagement."},"part":"Part 8","part_range":"Q351–Q400"},{"num":370,"type":"single","stem":"A project manager has been selected to deliver one of an organization's key flagship solutions. Critical success factors include agility, market adaptation, and a quick response to market offerings. What is one of the key activities that the project manager should undertake to ensure company success?","options":{"A":"Request more funding from the project sponsor to hire additional skilled resources and to incorporate additional quality in the project delivery approach and outcome.","B":"Review the project objectives with the project sponsor to agree on more realistic and achievable project plans and deliverables.","C":"Create a business case after performing a market review, and then submit it to the sponsor to modify the project deliverable to meet the newly defined objectives.","D":"Conduct periodical reviews of the project plans, objectives, and deliverables to ensure all relevant data are captured to continue making informed project decisions."},"correct":["D"],"answer_display":"D","why_correct":"For a key flagship solution requiring agility and market adaptation, the PM's key activity is conducting periodical reviews of plans, objectives, and deliverables — ensuring decisions are always made with the most current market and project data.","why_wrong":{"A":"Requesting more funding for additional resources is a budget request, not a key activity for agility.","B":"Agreeing on more realistic plans is useful but reactive; periodical reviews proactively ensure continued relevance.","C":"Creating a new business case after market review modifies the project scope — this is a major change, not a routine activity."},"part":"Part 8","part_range":"Q351–Q400"},{"num":371,"type":"single","stem":"During the implementation of a project, the project team discovered a new opportunity. After an internal review, the project team agreed that the opportunity is outside of the project scope. The project manager decided to update the risk register and escalate the opportunity to a higher level. What should the project manager do next with this opportunity?","options":{"A":"No more action is required.","B":"Share this opportunity with another project.","C":"Further monitor the opportunity.","D":"Establish a contingency reserve to support the opportunity."},"correct":["C"],"answer_display":"C","why_correct":"After escalating an opportunity to a higher level, the PM should continue monitoring it — ensuring the opportunity is tracked and can be acted upon if circumstances change or if senior management decides to pursue it.","why_wrong":{"A":"Taking no further action abandons the opportunity monitoring responsibility.","B":"Sharing with another project requires senior management direction after the escalation.","D":"Establishing contingency reserves for an opportunity is a financial commitment that requires management approval."},"part":"Part 8","part_range":"Q351–Q400"},{"num":372,"type":"single","stem":"During a project's third iteration, two of the existing team members were replaced. As the project entered the next iteration, the team velocity dropped and the performance started to slip. What should the project manager do?","options":{"A":"Guide the team to revert back to the forming and storming stages.","B":"Discuss the decrease in productivity with human resources (HR).","C":"Convene a team building event to address key performance indicators (KPIs).","D":"Escalate the issue to the project sponsor."},"correct":["A"],"answer_display":"A","why_correct":"When team members are replaced and performance drops, the team effectively goes back to forming and storming. The PM should guide the team through these stages again with the new members — rebuilding cohesion and norms.","why_wrong":{"B":"Discussing productivity with HR treats a team development issue as a personnel problem.","C":"A team-building event at a KPI review mixes social and performance activities in a confusing way.","D":"Escalating to the sponsor is premature when the PM can guide the team through the reset of team development stages."},"part":"Part 8","part_range":"Q351–Q400"},{"num":373,"type":"single","stem":"While managing a project, the project manager has just noticed that the last several monthly invoices have been challenged by the client when they were clearly defined. The actual invoice payments received have also been late and were outside of the contracted payment schedule. Recent invoices have only been partially paid. What should the project manager do?","options":{"A":"Review past projects for payment-related lessons learned.","B":"Add nonpayment to the issue log and keep tracking payments.","C":"Conduct a meeting with the project team to update the procurement management plan.","D":"Hold a meeting with the client to address the issue."},"correct":["D"],"answer_display":"D","why_correct":"When payment issues have been escalating over multiple months, the PM should hold a direct meeting with the client to address the issue — invoice disputes require face-to-face discussion, not documentation.","why_wrong":{"A":"Reviewing past lessons learned is a historical exercise, not an action for an active payment dispute.","B":"Adding to the issue log without client engagement is passive documentation.","C":"Updating the procurement management plan is process improvement that doesn't address the immediate payment dispute."},"part":"Part 8","part_range":"Q351–Q400"},{"num":374,"type":"single","stem":"227 During a retrospective review, many project team members say they are not completing tasks during the iterations because of interruptions and requests for help from other teams. As a team facilitator, what should the project manager do to avoid this?","options":{"A":"Reunite with the project team members affected and tell them not to reduce the team's capacity.","B":"Hire a coach to help all project teams to improve their abilities to solve problems on their own.","C":"Recommend to the project team members that they should improve their planning and make their stories smaller.","D":"Identify the problem's root causes and define the ground rules with all project team members to minimize interferences."},"correct":["D"],"answer_display":"D","why_correct":"When teams are repeatedly interrupted by other teams during sprints, the PM should identify root causes with all teams and define ground rules that minimize interferences — addressing the systemic cause across all affected teams.","why_wrong":{"A":"Telling affected team members not to reduce team capacity doesn't address why the interruptions are happening.","B":"Hiring a coach is a longer-term solution; immediate ground rules can address the issue faster.","C":"Recommending smaller stories improves internal planning but doesn't prevent external interruptions."},"part":"Part 8","part_range":"Q351–Q400"},{"num":375,"type":"single","stem":"A new project manager was assigned to a project during implementation. The project manager realized that new tax policies are creating a risk for a cost overrun by 25%. The project manager updated the risk register and kept the project running as normal. The CEO has announced that the project could be cancelled since the acceptable cost overrun is only 20%. The project manager was quite surprised as this was new information. What should the project manager have done to avoid this?","options":{"A":"Implemented the communications management plan properly.","B":"Implemented the stakeholder engagement plan correctly.","C":"Provided a proper risk response.","D":"Ensured the risk tolerance of the company was properly updated."},"correct":["A"],"answer_display":"A","why_correct":"The PM should have implemented the communications management plan properly — which would have ensured risk tolerance thresholds were communicated to and confirmed with relevant stakeholders (including the PM) at project start.","why_wrong":{"B":"The stakeholder engagement plan manages stakeholder relationships; the risk tolerance communication is a communications responsibility.","C":"A proper risk response would have required knowing the tolerance threshold, which communications management would have established.","D":"Updating the risk tolerance is reactive documentation; proactive communication would have ensured the PM knew the threshold before it was relevant."},"part":"Part 8","part_range":"Q351–Q400"},{"num":376,"type":"single","stem":"A company that is heavily focused on delivering projects using predictive approaches on-boards a new project manager who uses hybrid approaches. The scope of the project contains a number of unclear requirements. How should the project manager plan the delivery of the project?","options":{"A":"Ignore the unclear requirements and focus on the delivery plan of the project.","B":"Wait for the requirements to be more clear before any further action is taken on the project.","C":"Break down the requirements and prioritize the requirements into iterative work packages.","D":"Escalate the issue of unclear requirements to the management team and wait for final authorization."},"correct":["C"],"answer_display":"C","why_correct":"In a predictive organization with unclear requirements, the PM should break requirements down and prioritize them into iterative work packages — applying hybrid thinking within the predictive organizational context to manage uncertainty.","why_wrong":{"A":"Ignoring unclear requirements creates gaps that will surface as change requests or defects.","B":"Waiting for full clarity before proceeding delays the project indefinitely for requirements that may never become fully clear.","D":"Escalating and waiting for authorization is passive and adds bureaucratic delay when iterative work packages can address the uncertainty."},"part":"Part 8","part_range":"Q351–Q400"},{"num":377,"type":"multi","stem":"A company is changing their current business model. The change requires implementing a complex project using multiple agile teams. What three options should the project manager have the testing team adopt as testing mechanisms? (Choose three.)","options":{"A":"Story testing","B":"Tests based on behavior and test-driven development","C":"Independent personal testing","D":"Security and performance testing","E":"An experimental approach to cover all possible choices ,B,C"},"correct":["A","B","D"],"answer_display":"A,B,D","why_correct":"Story testing (A) validates user story acceptance criteria; behavior/test-driven development (B) embeds quality from the start; and security and performance testing (D) ensures the system meets non-functional requirements across agile iterations.","why_wrong":{"C":"Independent personal testing is not a recognized agile testing mechanism; agile testing is collaborative.","E":"An experimental approach to cover all choices is vague and not a structured testing methodology."},"part":"Part 8","part_range":"Q351–Q400"},{"num":378,"type":"single","stem":"A new resource has joined an iterative project team. The project manager notices that the resource is unable to complete the deliverables on time. How should the project manager address this situation?","options":{"A":"Discuss options to improve performance with the resource manager.","B":"Provide performance feedback as part of the retrospective ceremony.","C":"Address the lack of performance by coaching the new team member.","D":"Request a more efficient replacement resource from the project sponsor."},"correct":["C"],"answer_display":"C","why_correct":"When a new team member can't complete deliverables on time, the PM should address the performance gap by coaching the team member directly — building their capability through targeted feedback and guidance.","why_wrong":{"A":"Discussing with the resource manager before attempting direct coaching escalates prematurely.","B":"Performance feedback in the retrospective is appropriate for process but not for individual performance coaching.","D":"Requesting a replacement before coaching the new member is disproportionate."},"part":"Part 8","part_range":"Q351–Q400"},{"num":379,"type":"single","stem":"A large corporation is transforming itself from a predictive to agile approach. A project team with knowledge of agile practices is experiencing significant conflicts with the executives regarding the processes to be followed. How should these conflicts be resolved?","options":{"A":"Train the executives on agile practices.","B":"Include the executives in team retrospectives.","C":"Negotiate with the executives and agree on a process.","D":"Request that the executives use agile practices."},"correct":["C"],"answer_display":"C","why_correct":"When experienced agile teams conflict with executives over processes, the solution is to negotiate and agree on a process — finding a middle ground that respects both agile principles and organizational governance requirements.","why_wrong":{"A":"Training executives on agile is useful but may not overcome their governance concerns without negotiation.","B":"Including executives in retrospectives is good for transparency but doesn't resolve the process conflict.","D":"Requesting executives to simply use agile practices is prescriptive and ignores their legitimate governance concerns."},"part":"Part 8","part_range":"Q351–Q400"},{"num":380,"type":"single","stem":"A transportation company is transforming its operational processes and the main system this company uses to move freight. The scope statement is in place. An iterative delivery approach has been agreed by all stakeholders. What does the project manager need to do next to help the team understand the work that needs to be done?","options":{"A":"Create the requirements management plan to outline how project requirements will be collected, analyzed, and documented, and then assign requirements to team members.","B":"Work with the team to decompose the scope into a WBS and work packages in order to create required deliverables and timelines.","C":"Start working on the project management plan with work packages, a detailed schedule, and work assignments for team members.","D":"Work directly with stakeholders on the work breakdown structure (WBS) and assign tasks with a required timeline for each team member to start the work."},"correct":["B"],"answer_display":"B","why_correct":"After an iterative approach is agreed upon, the next step is to work with the team to decompose the scope into a WBS and work packages — creating the deliverable structure needed to plan iterations and assign work.","why_wrong":{"A":"A requirements management plan describes the process; the scope decomposition itself is the needed action.","C":"Building a detailed PM plan with a fixed schedule contradicts the iterative approach that was agreed upon.","D":"Working directly with stakeholders on the WBS and assigning tasks immediately skips the team's collaborative decomposition process."},"part":"Part 8","part_range":"Q351–Q400"},{"num":381,"type":"single","stem":"After a project has been approved, a key stakeholder tells the project manager that the current project management strategy is not well defined. The project manager is also informed that the key stakeholder does not want to hold a working session. What should the project manager do first?","options":{"A":"Share the project documents and invite the key stakeholder to discuss any concerns.","B":"Invite the key stakeholder to the project's change control board (CCB) to discuss adjustment of the project strategy.","C":"Ask the project sponsor to exert authority on the key stakeholder in order to maintain the approved timeline.","D":"Proceed with a working session for teams that do not belong to that key stakeholder."},"correct":["A"],"answer_display":"A","why_correct":"When a key stakeholder says the strategy isn't well-defined but won't attend a working session, the PM should share the project documents and invite them to discuss concerns — proactive transparency that meets them where they are.","why_wrong":{"B":"Inviting them to the CCB is for change discussions; the concern is about strategy definition.","C":"Using the sponsor's authority to override the stakeholder's preference creates adversarial dynamics unnecessarily.","D":"Running working sessions without that stakeholder's group creates a gap in the strategy definition."},"part":"Part 8","part_range":"Q351–Q400"},{"num":382,"type":"single","stem":"A senior business stakeholder with many years of experience is pressuring an agile team to deliver most of the promised functionality to the customer 18 months in the future as opposed to multiple, incremental deliveries over the course of the 18 months. What should the project lead do next?","options":{"A":"Work with the agile team to schedule the incremental deliveries to enable delivery of business value sooner to the customer.","B":"Work with the stakeholder to understand what the concerns are while, at the same time, conveying the benefits of incremental deliveries.","C":"Schedule meetings with the customer to determine their ability to support multiple incremental deliveries.","D":"Provide details of the concern to the agile team and adjust their goals and release plans to conform to the stakeholder's request."},"correct":["B"],"answer_display":"B","why_correct":"When a stakeholder pressures for a big-bang release over incremental delivery, the PM should work with the stakeholder to understand their concerns while conveying the benefits of incremental delivery — stakeholder engagement through dialogue, not override.","why_wrong":{"A":"Scheduling incremental deliveries without first addressing the stakeholder's concerns creates ongoing tension.","C":"Asking the customer about their ability to support multiple deliveries might validate the concern but doesn't address the stakeholder relationship.","D":"Adjusting goals to conform to the stakeholder's request abandons agile's incremental value delivery without exploration."},"part":"Part 8","part_range":"Q351–Q400"},{"num":383,"type":"single","stem":"A new project manager is assigned to lead an agile project. The project manager wants to use motivation to encourage the team to perform well throughout the project. What should the project manager do?","options":{"A":"Implement a reward system aimed to keep the team engaged and motivated.","B":"Find another method to increase the team's performance.","C":"Use the management reserves to fund some team-building activities.","D":"Inflate project estimates to provide a financial buffer for team activities."},"correct":["A"],"answer_display":"A","why_correct":"To motivate and engage an agile team, a reward system that keeps the team engaged is the appropriate tool — PMI recognizes that motivated teams perform better and that reward systems are a legitimate team motivation mechanism.","why_wrong":{"B":"Finding another method without specificity is vague and unhelpful as a concrete action.","C":"Management reserves are for unplanned scope changes, not team-building activities.","D":"Inflating estimates to fund team activities is dishonest and constitutes financial misrepresentation."},"part":"Part 8","part_range":"Q351–Q400"},{"num":384,"type":"single","stem":"233 A project manager is leading a project that is in an advanced stage. All high-level risks identified in the risk management plan have been resolved or are no longer a risk for the project. Only lowlevel risks remain. What should the project manager do now?","options":{"A":"Reclassify low-level risks as high-level risks.","B":"Notify stakeholders that all high-level risks have been resolved.","C":"Reduce the priority of project risks as all remaining risks are low-level.","D":"Reevaluate identified risks and update the risk register."},"correct":["D"],"answer_display":"D","why_correct":"Even when only low-level risks remain, PMI requires reevaluating all identified risks and updating the register — circumstances change and low-level risks can escalate, so continuous review is mandatory throughout the project.","why_wrong":{"A":"Reclassifying low-level risks as high artificially distorts the risk profile.","B":"Notifying stakeholders that high-level risks are resolved is appropriate but should follow the re-evaluation, not precede it.","C":"Reducing priority of remaining risks without reevaluation assumes the project environment hasn't changed."},"part":"Part 8","part_range":"Q351–Q400"},{"num":385,"type":"single","stem":"A project manager is managing a hybrid project. After attending an iteration review, a stakeholder tells the project manager that they are very busy and asks why these reviews are held so frequently. How should the project manager respond?","options":{"A":"Record the issue in the issue log and escalate the conflict to the project sponsor for assistance.","B":"Explain to the stakeholder that the stakeholder engagement plan requires their attendance at all reviews.","C":"Discuss with the stakeholder the benefits of the hybrid project and how frequent reviews lead to greater value and less rework.","D":"Negotiate a reduced review attendance with the stakeholder and update the stakeholder engagement plan to reflect this reduced attendance."},"correct":["C"],"answer_display":"C","why_correct":"When a stakeholder questions frequent reviews in a hybrid project, the PM should explain the benefits — frequent reviews deliver higher value, enable early course correction, and reduce costly rework, which is the strategic reason hybrid projects use them.","why_wrong":{"A":"Recording in the issue log and escalating to the sponsor escalates a stakeholder education issue unnecessarily.","B":"Telling the stakeholder the plan requires their attendance is compliance-focused and doesn't address their concern.","D":"Negotiating reduced attendance before explaining the benefits misses the opportunity to convert a skeptic into an advocate."},"part":"Part 8","part_range":"Q351–Q400"},{"num":386,"type":"single","stem":"The product team is progressing with a prototyping approach to deliver a multiyear business initiative. A few user stories are taking longer to be delivered. What should the project manager do?","options":{"A":"Determine the risks and identify a resolution during the retrospective meeting.","B":"Inform stakeholders about the delay during project updates.","C":"Discover the gaps in the communications management plan and address them accordingly.","D":"Determine cross-dependencies and plan a spike in the next sprint."},"correct":["D"],"answer_display":"D","why_correct":"When user stories take longer to deliver, cross-dependencies between teams or between stories are a common cause. The PM should identify these dependencies and plan a spike to investigate and resolve them in the next sprint.","why_wrong":{"A":"Identifying risks in the retrospective helps for future sprints but doesn't address the active delay issue.","B":"Informing stakeholders about delays is appropriate but doesn't solve the root cause.","C":"Gaps in the communications plan are rarely the cause of story delivery delays; dependencies are more likely."},"part":"Part 8","part_range":"Q351–Q400"},{"num":387,"type":"single","stem":"A project manager has been managing a project for several months when an issue that had not been registered as a risk appeared. This issue may have a big impact on the project. What should the project manager do?","options":{"A":"Avoid managing the issue as it was not registered as a risk for the project and there is no planned response to it.","B":"Hold a meeting with the project team and relevant stakeholders to agree on the best way to manage the issue.","C":"Delay the project until the issue is addressed and no longer presents as a risk to the project.","D":"Inform the sponsor that the issue has arisen and that the project's success may be uncertain."},"correct":["B"],"answer_display":"B","why_correct":"When an unregistered risk becomes an issue with big impact, the PM should hold a meeting with the team and relevant stakeholders to agree on the best way to manage it — collaborative response planning for an unanticipated issue.","why_wrong":{"A":"Not managing an issue because it wasn't registered is a serious dereliction of PM responsibility.","C":"Delaying the project until the issue is resolved may not be necessary or feasible; a managed response is better.","D":"Informing the sponsor before developing any response strategy provides incomplete information."},"part":"Part 8","part_range":"Q351–Q400"},{"num":388,"type":"single","stem":"A research and development team is finishing up a two year initiative. The project manager is focused on the closing activities for the project. Which activity should be considered as a priority?","options":{"A":"Release the resources and plan for a project completion celebration.","B":"Ensure that knowledge transfer activities are executed as planned.","C":"Hold a steering committee meeting to inform them of the project completion.","D":"Mark the product backlog completion status and update the communications management plan."},"correct":["B"],"answer_display":"B","why_correct":"As the highest closing priority, knowledge transfer activities must be executed as planned — ensuring project knowledge is not lost when resources are released and the team dissolves.","why_wrong":{"A":"Resource release and celebrations should follow knowledge transfer completion, not precede it.","C":"Steering committee notification is important but secondary to ensuring the project's knowledge is captured.","D":"Marking backlog completion is administrative; knowledge transfer preserves the value the project created."},"part":"Part 8","part_range":"Q351–Q400"},{"num":389,"type":"single","stem":"An agile project team is looking to develop quality standards for a project. How should the project manager coach the team?","options":{"A":"Determine the tools and techniques suitable for the project and ensure that testing is done early and continuously.","B":"Ensure that the definition of done (DoD) is provided when the product owner agrees that all acceptance criteria have been met for the user story.","C":"Insist that test-driven development is implemented along with the automated testing.","D":"Inform the team that user acceptance testing is required to ensure that the product owner accepts the solution."},"correct":["A"],"answer_display":"A","why_correct":"Agile quality coaching means determining the right tools and techniques for the project and ensuring testing is done early and continuously — this is the comprehensive quality principle for agile: build quality in from the start, not test it in at the end.","why_wrong":{"B":"The DoD being triggered by the product owner's acceptance is a completion criterion, not a quality development approach.","C":"Insisting on test-driven development and automated testing may not be appropriate for all types of agile projects.","D":"User acceptance testing is a validation technique but telling the team this is the requirement doesn't coach them on how to build quality in."},"part":"Part 8","part_range":"Q351–Q400"},{"num":390,"type":"single","stem":"Due to delays on some activities, one of the project team members has increased the scope without any approval. What should the project manager do next?","options":{"A":"Remove the changes to match the original requirements.","B":"Add team members to the project to avoid more schedule delays.","C":"Update project documentation with the new scope.","D":"Evaluate the impacts of the changes that were made to the project."},"correct":["D"],"answer_display":"D","why_correct":"When unauthorized scope additions have already been made, the PM must first evaluate the impacts of those changes — understanding what was added, its effect on scope, schedule, cost, and quality, before deciding what to do next.","why_wrong":{"A":"Removing the changes immediately may be the right outcome but only after evaluating their impact.","B":"Adding team members to address schedule delays assumes the evaluation result without doing the evaluation.","C":"Updating documentation to reflect unauthorized changes validates them without proper change control."},"part":"Part 8","part_range":"Q351–Q400"},{"num":391,"type":"single","stem":"237 A retail chain is evaluating a project to replace payment systems across all its stores in multiple locations. The project does not pass the financial threshold but is also expected to increase market share, improve customer services, and retain more customers. The project is planned as a phased implementation, building on learning from the retrospectives during each phase. How should the business increase the value of the project?","options":{"A":"Ask the benefits owner to reassess the identified risks that are impacting the outcomes of the financial benefits.","B":"Use a fishbone diagram to find the root cause of the lower financial benefits with the benefits owner.","C":"Consult with experts on methods to reduce costs and increase the financial value of the project.","D":"Quantify the expected tangible and intangible benefits in the benefits management plan for each phase."},"correct":["D"],"answer_display":"D","why_correct":"When a project doesn't meet the financial threshold but has significant intangible benefits (market share, customer service, retention), the PM should quantify both tangible and intangible benefits in the benefits management plan for each phase — making the full value visible.","why_wrong":{"A":"Reassessing risks impacting financial benefits addresses the negative side without capturing the intangible positive benefits.","B":"Root cause analysis for low financial benefits doesn't capture the intangible value the project creates.","C":"External cost-reduction experts focus on financials and may discount the strategic intangible benefits."},"part":"Part 8","part_range":"Q351–Q400"},{"num":392,"type":"single","stem":"During the implementation phase of a construction project, the customer asked a key subcontractor to deliver a work package ahead of time. The subcontractor was not prepared for it and asked the project manager for additional budget. What should the project manager do first?","options":{"A":"Update the risk register and project log, and manage the budget closely.","B":"Revise the project scope accordingly to cope with the budget changes.","C":"Submit a change request to accelerate the project as requested.","D":"Ask upper management for more funds, and update the project budget."},"correct":["C"],"answer_display":"C","why_correct":"When a customer requests accelerated delivery from a subcontractor who then requests additional budget, the PM must submit a formal change request — this is a change to the project's schedule and potentially cost that requires formal approval.","why_wrong":{"A":"Updating the risk register and monitoring the budget is passive documentation for what is now an active change.","B":"Revising the project scope isn't the right response to an accelerated delivery request.","D":"Asking upper management for funds before submitting a formal change request bypasses the change control process."},"part":"Part 8","part_range":"Q351–Q400"},{"num":393,"type":"text","stem":"CORRECT TEXT The following table shows the business value created and the development effort required to implement various features in a product. Which feature should the team prioritize first? Enter the feature name in the box below. ______","options":{},"correct":["Feature A"],"answer_display":"Feature A","why_correct":"Feature A has the highest business value to development effort ratio (value/effort ratio). In agile backlog prioritization, items delivering the most value per unit of effort are prioritized first to maximize ROI.","why_wrong":{"B":"Feature B may have high absolute value but lower value-to-effort ratio than Feature A.","C":"Feature C ranks lower in the value-to-effort calculation.","D":"Feature D provides the least prioritization advantage based on the ratio."},"part":"Part 8","part_range":"Q351–Q400"},{"num":394,"type":"single","stem":"An agile project is running activities to define the minimum viable product (MVP). During the session, the project manager identifies some mandatory regulations, but there is no consensus to include these regulations in the MVP because it may extend the duration of the project. What should the project manager do?","options":{"A":"Ask the project sponsor to add more time to the project.","B":"Get commitment from the team to include all of the required regulations.","C":"Share with the participants the need to focus only on product functionality.","D":"Train the team on the new regulations as requested by management."},"correct":["B"],"answer_display":"B","why_correct":"Mandatory regulatory requirements must be included in the MVP regardless of timeline impact — compliance is non-negotiable. The PM should get commitment from the team to include all required regulations.","why_wrong":{"A":"Asking the sponsor for more time treats a mandatory compliance item as optional scope.","C":"Focusing only on product functionality while excluding mandatory regulations creates legal and compliance risk.","D":"Training the team on regulations is educational but doesn't commit the team to including them in the MVP."},"part":"Part 8","part_range":"Q351–Q400"},{"num":395,"type":"multi","stem":"A project team has recently completed the initial sprint for developing an automated payroll system for a company. The project manager has scheduled a sprint planning meeting with the product owner and team members to discuss which features should be worked on next. Which two pieces of information does the project manager need in order to make this meeting productive and effective? (Choose two.)","options":{"A":"Company mission and vision","B":"Sprint goal","C":"Sprint charter","D":"Product backlog","E":"Burndown chart ,D"},"correct":["B","D"],"answer_display":"B,D","why_correct":"Effective sprint planning requires the sprint goal (B) to establish what the sprint aims to achieve, and the product backlog (D) from which the team selects items to commit to in the sprint.","why_wrong":{"A":"Company mission and vision provide strategic context but aren't sprint planning inputs.","C":"A sprint charter is not a standard agile artifact.","E":"A burndown chart tracks sprint progress; it's an output of execution, not an input to planning."},"part":"Part 8","part_range":"Q351–Q400"},{"num":396,"type":"single","stem":"A project manager is responsible for building a bridge. The high-level elements of the project are handled using a predictive approach. The software responsible for retracting the bridge has been developed based on agile principles. During software development, the workflow is often interrupted by various delays or impediments due to lack of information. How should the project manager handle this situation?","options":{"A":"Increase retrospectives to deliver results fast.","B":"Make work visible using Kanban boards.","C":"Incorporate small batches of work into the project.","D":"Apply lean manufacturing to limit the team’s work."},"correct":["B"],"answer_display":"B","why_correct":"When workflow is frequently interrupted by information gaps and impediments, making work visible using Kanban boards allows the team to see what is blocked, why it's blocked, and what's waiting — enabling targeted impediment resolution.","why_wrong":{"A":"Increasing retrospectives generates more feedback but doesn't directly address the information gap causing interruptions.","C":"Incorporating small batches reduces work-in-progress but doesn't address the information availability root cause.","D":"Lean manufacturing applies to physical production flow optimization, not software information availability issues."},"part":"Part 8","part_range":"Q351–Q400"},{"num":397,"type":"single","stem":"A project manager who is new to an organization observes that an approaching deadline is likely to be missed because there have been some delays on the project due to a lack of resources. What should the project manager do next?","options":{"A":"Review the risk management plan to identify the response strategy.","B":"Escalate the issue to the sponsor and debrief them about the situation.","C":"Review the milestone list to determine which tasks can be fast-tracked.","D":"Organize a team meeting to discuss the next course of action."},"correct":["D"],"answer_display":"D","why_correct":"When a PM new to an organization identifies an approaching deadline risk from resource shortage, the first action is to organize a team meeting to discuss the situation and determine next steps — understanding the full picture before escalating or acting.","why_wrong":{"A":"Reviewing the risk management plan provides process guidance but the PM first needs team input on the specific resource situation.","B":"Escalating to the sponsor before assessing the situation with the team provides incomplete information.","C":"Reviewing the milestone list for fast-tracking options is a specific action that follows the team discussion and analysis."},"part":"Part 8","part_range":"Q351–Q400"},{"num":398,"type":"single","stem":"A project manager is tracking a project, but a key stakeholder will not accept the project's key performance indicator (KPI) results. Which tool or technique should the project manager use?","options":{"A":"Change control tools","B":"Expert judgment","C":"Autocratic decision making","D":"Context diagram"},"correct":["B"],"answer_display":"B","why_correct":"When a stakeholder won't accept KPI results, the PM should use expert judgment — bringing in subject matter experts to validate the KPIs and either confirm their accuracy or identify where the methodology needs adjustment.","why_wrong":{"A":"Change control tools are for managing project changes, not resolving KPI acceptance disputes.","C":"Autocratic decision-making ignores the stakeholder's concerns and creates conflict.","D":"A context diagram shows project boundaries and stakeholder relationships, not KPI validation."},"part":"Part 8","part_range":"Q351–Q400"},{"num":399,"type":"single","stem":"An agile team has been struggling to keep up with the planned pace, which is frequently resulting in sprint failures. What should the project manager do to help avoid this situation in the future?","options":{"A":"Switch to a Kanban approach, implementing features on a first-come, first-serve basis, fostering a sustainable pace.","B":"Replace junior team members with more experienced ones, and negotiate the project scope to compensate for the budget gap.","C":"Ask the project sponsor to approve overtime to compensate for the lack of performance while adjusting the plan.","D":"Review the velocity of the team over the last several sprints and adjust the plan accordingly."},"correct":["D"],"answer_display":"D","why_correct":"When sprints consistently fail due to overcommitment, the PM should review the team's actual velocity over multiple sprints and adjust the plan accordingly — using data-driven capacity planning rather than optimistic estimates.","why_wrong":{"A":"Switching to Kanban changes the methodology rather than fixing the planning problem; velocity-based planning can solve the issue within Scrum.","B":"Replacing junior members is a personnel action that doesn't address the planning methodology causing the sprint failures.","C":"Approving overtime treats the symptom (capacity shortage) rather than fixing the root cause (overcommitment in planning)."},"part":"Part 8","part_range":"Q351–Q400"},{"num":400,"type":"single","stem":"A project manager is managing a complex research project with a high level of uncertainty. A request is made to implement a mechanism to measure the quality of the deliverables. Using a hybrid approach, what
