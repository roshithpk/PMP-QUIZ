ect stakeholder rejects the features completed from the most recent user stories. According to the stakeholder, the product does not meet the quality standards required by regulations. What should the project manager have done to avoid this?","options":{"A":"Ensured that the project sponsor understood the scope of the project to avoid any future complaints","B":"Ensured the stakeholder concerns were properly addressed in the iteration to avoid future setbacks","C":"Reviewed with the product owner that all acceptance criteria were met for the stories worked on in the iteration","D":"Reviewed with the product owner that all the stories worked on in the iteration were in the project backlog"},"correct":["C"],"answer_display":"C","why_correct":"When a stakeholder rejects deliverables for not meeting regulatory quality standards, the PM should have ensured the product owner verified all acceptance criteria — including regulatory requirements — were met before the demo.","why_wrong":{"A":"Ensuring the sponsor understands scope does not address quality standard verification at the story level.","B":"Addressing stakeholder concerns after the fact is reactive; the focus should be on pre-demo acceptance verification.","D":"Confirming stories are in the backlog ensures they were planned, not that they were implemented to quality standard."},"part":"Part 1","part_range":"Q1–Q50"},{"num":48,"type":"single","stem":"A project is 70% complete when the project sponsor requests an additional deliverable. What should the project manager do first?","options":{"A":"Negotiate with the project sponsor on the possible alternatives","B":"Determine the possible impact of this change on all aspects of the project","C":"Reject the request as being too late and leading to major scope creep","D":"Submit the request to the change control board (CCB) for a decision"},"correct":["B"],"answer_display":"B","why_correct":"PMI change management: before any decision is made on a change request, the PM must first determine the impact on scope, schedule, cost, quality, and risk. This analysis informs all subsequent actions.","why_wrong":{"A":"Negotiating alternatives before understanding the impact lacks the data needed for an informed negotiation.","C":"Rejecting without analysis violates change management process and ignores potential legitimate value.","D":"Submitting to the CCB before conducting impact analysis sends an incomplete change request."},"part":"Part 1","part_range":"Q1–Q50"},{"num":49,"type":"single","stem":"A company initiated a departmental transformation project improving the processes for the organization using a predictive approach. This is a critical project for the organization and, in the middle of the project, the project manager noticed that one of the deliverables cannot be produced due to a missing technical skill. What should the project manager have done to avoid this?","options":{"A":"Asked the sponsor to identify all required skills during the planning of the project","B":"Identified all required skills after the kick-off of the project","C":"Planned all required training for the team during the onboarding process","D":"Identified all required skills during the planning of the project"},"correct":["D"],"answer_display":"D","why_correct":"Identifying all required skills is a planning activity. PMI requires the PM — not the sponsor — to identify resource requirements including skills during project planning as part of resource management.","why_wrong":{"A":"The sponsor's role is not to identify technical skills; that is the PM's responsibility during planning.","B":"Identifying skills after kickoff means planning is incomplete and risks capability gaps during execution.","C":"Planning training is a subset of skill identification; you cannot plan training before identifying what skills are needed."},"part":"Part 1","part_range":"Q1–Q50"},{"num":50,"type":"single","stem":"A project manager is beginning a new project with very diverse team members. The project manager chose to use consensus building so the team can agree on and be engaged in how the project will be executed. How should the project manager proceed?","options":{"A":"Create an environment where the agreement is reached by a majority vote","B":"Create an environment where the agreement is reached through discussion","C":"Establish recurring brainstorming sessions to discuss project issues","D":"Allow team members to contribute ideas in a stream-of-consciousness mode"},"correct":["B"],"answer_display":"B","why_correct":"Consensus in PMI context means reaching agreement through open discussion where all voices are heard and the group arrives at a shared decision — not majority voting or imposed direction.","why_wrong":{"A":"Majority vote is voting, not consensus — it can leave minority voices unheard.","C":"Brainstorming sessions generate ideas but are a technique, not the mechanism for reaching consensus itself.","D":"Stream-of-consciousness contribution is an input technique but does not constitute reaching agreement."},"part":"Part 1","part_range":"Q1–Q50"},{"num":51,"type":"single","stem":"A project manager for a software technology project works in a matrixed organization with virtual teams. Unfortunately, the functional manager informs the project manager that there may not be any resources available to test the software. What should the project manager do next?","options":{"A":"Request a teleconference meeting with the sponsor to submit a change request to allow the development team to conduct testing","B":"Engage with the functional manager to discuss details to obtain the required support","C":"Discuss testing requirements at the weekly project meeting to negotiate the best approach to test software","D":"Send an email to the procurement specialist to negotiate with a company that specializes in software testing"},"correct":["B"],"answer_display":"B","why_correct":"In a matrix organization, resource conflicts are resolved through direct engagement between the PM and the functional manager. The PM should engage the functional manager to negotiate and secure testing resources.","why_wrong":{"A":"Going to the sponsor to submit a change request is escalating over the functional manager unnecessarily.","C":"Discussing at a weekly meeting is too informal and slow for a resource availability issue.","D":"Contacting procurement before exhausting internal resource options is premature."},"part":"Part 2","part_range":"Q51–Q100"},{"num":52,"type":"single","stem":"A project manager is leading a team of diverse individuals of all ages. The working hours for the project were set at the beginning of the project, and all team members agreed to the hours. However, later in the project, one of the team members informed the project manager that the previously agreed upon hours no longer work due to the team member’s personal commitments. What should the project manager do?","options":{"A":"Discuss the lack of dedication with the team member and their functional manager","B":"Allow the most senior team members to decide the time that works for the team","C":"Remove the team member from the project team to be fair to the other members","D":"Reassess the team's hours collaboratively so that the team is not impeded by the issue"},"correct":["D"],"answer_display":"D","why_correct":"PMI servant leadership: when a team member's circumstances change, the PM should reassess hours collaboratively with the full team to find a workable solution that removes the impediment without penalizing anyone.","why_wrong":{"A":"Involving the functional manager before attempting a team-level solution escalates prematurely.","B":"Allowing only senior members to decide the schedule excludes other team members from a decision that affects them all.","C":"Removing the team member for a scheduling conflict is disproportionate and may constitute a fairness issue."},"part":"Part 2","part_range":"Q51–Q100"},{"num":53,"type":"single","stem":"A company is implementing a growth strategy by constructing a new production facility, which will soon move into the operation phase. Although a governance policy was already in place, the company must comply with new financial regulations that have been recently implemented. Compliance with the regulations will cause a major change in project scope. How should the project manager respond to this requirement?","options":{"A":"Perform an analysis to assess the Impact on the project.","B":"Proceed with the existing company governance policy.","C":"Escalate the issue to upper management and let them decide.","D":"Directly comply with the financial regulations."},"correct":["A"],"answer_display":"A","why_correct":"When new regulations impose a major scope change, the first action is to perform an impact analysis — this assesses the full effect on scope, cost, schedule, and risk before deciding on next steps.","why_wrong":{"B":"Proceeding with existing governance when a new regulatory obligation applies creates legal risk.","C":"Escalating to upper management without first performing your own analysis adds no value to their decision.","D":"Directly complying without understanding the impact may overlook planning, cost, and resource implications."},"part":"Part 2","part_range":"Q51–Q100"},{"num":54,"type":"single","stem":"A project manager has been assigned to an emergency project that must be completed within the next few weeks. The project manager realizes this will have an impact on the local community. As the work is near a school, the project manager has engaged with them to understand their needs. How should the project manager ensure the work continues smoothly?","options":{"A":"Postpone the required work on the project until school holidays begin","B":"Continue the work as planned and inform the school when the project team arrives on-site","C":"Advise the school to close for the duration of the project work","D":"Liaise with the school to include nonworking project hours during school start and finish times"},"correct":["D"],"answer_display":"D","why_correct":"PMI stakeholder engagement principle: the PM should work collaboratively with the affected community (school) to minimize disruption — scheduling non-working project hours during school start/finish times respects all parties.","why_wrong":{"A":"Postponing work until school holidays may not be feasible within the emergency project timeline.","B":"Informing the school without adjusting the schedule ignores their legitimate concerns.","C":"Advising the school to close is unreasonable and outside the PM's authority."},"part":"Part 2","part_range":"Q51–Q100"},{"num":55,"type":"single","stem":"It is late at night on a weekend when a team member calls the project manager on the telephone. The team member is crying about the pressures of an upcoming deadline. What should the project manager do?","options":{"A":"Review the organization's human resources (HR) policy.","B":"Empathize with the team member and discuss next steps.","C":"Ask the team member to send their concerns in writing.","D":"Schedule a meeting with the team member for the next work day."},"correct":["B"],"answer_display":"B","why_correct":"PMI emotional intelligence principle: when a team member is distressed, the first response is to empathize and listen. This builds trust and allows the PM to understand the actual issue before deciding on next steps.","why_wrong":{"A":"Reviewing HR policy before addressing the human need is impersonal and misses the immediate situation.","C":"Asking for written concerns creates distance and feels bureaucratic when someone is emotionally distressed.","D":"Scheduling for the next day leaves the distressed team member without support tonight."},"part":"Part 2","part_range":"Q51–Q100"},{"num":56,"type":"single","stem":"A team is having a hard time completing work due to unclear requirements. They have not been able to complete an iteration successfully in several months. In order to help the team, what should the project leader do?","options":{"A":"Recommend that the team reviews the length of the iteration with the stakeholders.","B":"Recommend that the product owner reviews the backlog refinement processes.","C":"Recommend limiting the work in progress to improve the team’s focus.","D":"Recommend a review of the team members' individual performances."},"correct":["B"],"answer_display":"B","why_correct":"Unclear requirements that prevent iteration completion point to a backlog refinement problem. The product owner is responsible for ensuring stories are clear, well-defined, and ready for the team before each iteration.","why_wrong":{"A":"Changing iteration length does not address the root cause of unclear requirements.","C":"Limiting WIP helps with focus but doesn't resolve the underlying requirements clarity issue.","D":"Reviewing individual performance blames people for a process problem."},"part":"Part 2","part_range":"Q51–Q100"},{"num":57,"type":"multi","stem":"A project manager for an agile project is concerned that the team has been losing momentum over the last iterations. Which two tools should the project manager use to analyze team performance? (Choose two.)","options":{"A":"Burndown chart","B":"Product backlog burnup chart","C":"Cumulative flow diagram of completed features","D":"Work breakdown structure (WBS)","E":"Project schedule ,B"},"correct":["A","C"],"answer_display":"A,C","why_correct":"A burndown chart shows sprint-level progress against remaining work, while a cumulative flow diagram of completed features shows throughput trends over time. Together they provide a comprehensive view of team performance momentum.","why_wrong":{"B":"A burnup chart shows total scope completion but is less useful for analyzing sprint-level momentum issues.","D":"WBS is a scope decomposition tool, not a performance analysis tool.","E":"A project schedule shows planned dates, not actual team performance trends."},"part":"Part 2","part_range":"Q51–Q100"},{"num":58,"type":"single","stem":"A project manager is working with the team to deliver a project in a company that uses different delivery methods. The project manager is concerned about the communication channels currently suggested by the project management office (PMO) because some information is taking too much time to reach the team members, causing negative consequences for delivery. How should the project manager avoid this situation in the future?","options":{"A":"Agree with the project team on a suitable collaboration and make sure information is shared at all times.","B":"Use the same methods until the end of the current delivery and suggest new ones during the retrospective.","C":"Refer to the policies and frameworks used at the company enterprise level and inform the project team members.","D":"Tell the sponsor that the project manager will use their own communication model to ensure ontime delivery."},"correct":["A"],"answer_display":"A","why_correct":"PMI communication principle: the PM should work with the team to agree on the most effective collaboration methods for their specific context, ensuring information reaches team members in a timely way.","why_wrong":{"B":"Waiting until retrospective to fix a known communication failure causes ongoing delivery damage.","C":"Following company-level frameworks regardless of their effectiveness prioritizes compliance over results.","D":"Unilaterally adopting a different communication model without alignment creates confusion."},"part":"Part 2","part_range":"Q51–Q100"},{"num":59,"type":"single","stem":"A company must implement a new regulation. The government has specified the date when the regulation will be enforced but has only provided high-level information on the regulation's requirements. Therefore, changes in definitions are to be expected due to uncertainty. Which life cycle should the project manager use for this project?","options":{"A":"A predictive execution strategy","B":"An iterative execution strategy","C":"An agile execution strategy","D":"A hybrid execution strategy"},"correct":["D"],"answer_display":"D","why_correct":"When a project has a fixed regulatory deadline (predictive constraint) but high requirement uncertainty due to evolving government guidance (agile flexibility needed), hybrid is the right lifecycle choice.","why_wrong":{"A":"Purely predictive cannot adapt to the expected requirement changes from unclear government definitions.","B":"Iterative addresses changes but may not adequately manage the fixed compliance deadline constraint.","C":"Pure agile deprioritizes the fixed deadline constraint that regulatory compliance imposes."},"part":"Part 2","part_range":"Q51–Q100"},{"num":60,"type":"single","stem":"A project manager is managing a project that has a new sponsor who is cutting the budget. As a servant leader, how should the project manager handle the budget cuts with the team?","options":{"A":"Notify the project sponsor that the budget reduction will require a schedule slip and scope reduction.","B":"Collaborate with the team to assess the impact of the change on the project and recommend an updated project plan.","C":"Inform each team member that they must release a portion of their budget but must remain on schedule with no change to the scope.","D":"Meet with the schedule coordinator and financial analyst to tell them which budget lines to reduce and where to release slack."},"correct":["B"],"answer_display":"B","why_correct":"As a servant leader, the PM should collaborate with the team to assess the full impact of budget cuts and jointly develop a revised plan — not make unilateral decisions or absorb cuts without transparency.","why_wrong":{"A":"Notifying the sponsor of impacts before team assessment skips the collaborative impact analysis step.","C":"Ordering team members to maintain scope with less budget without discussion is dictatorial, not servant leadership.","D":"Directing the financial analyst on which lines to cut without team input bypasses collaborative decision-making."},"part":"Part 2","part_range":"Q51–Q100"},{"num":61,"type":"single","stem":"A project manager has completed an assessment of the project team's performance. Some team members have performed poorly on their assigned tasks. What should the project manager do?","options":{"A":"Create a new standard performance measure based on project requirements","B":"Develop different approaches based on team members' motivation and ability","C":"Develop a standard approach to provide feedback to all team members","D":"Provide intensive oversight to the team members who performed poorly"},"correct":["B"],"answer_display":"B","why_correct":"PMI recognizes that team members have different motivations and abilities. Effective performance management requires tailoring the approach to each individual's specific situation and development needs.","why_wrong":{"A":"Creating a new performance measure without addressing actual performance gaps is administrative rather than developmental.","C":"A one-size-fits-all feedback approach ignores the individual differences that caused the performance variations.","D":"Intensive oversight of poor performers is micromanagement and does not address the root cause."},"part":"Part 2","part_range":"Q51–Q100"},{"num":62,"type":"single","stem":"An agile team has released the second version of its product, but the feedback is that the software has many bugs that compromise the user experience. What should the project manager do?","options":{"A":"Hire an external consultancy firm to focus on testing and quality control to avoid the issue in the future","B":"Propose an internal program that offers incentives for the team members who find and fix bugs","C":"Closely evaluate the skill set of the team, looking for technical gaps that need to be filed in order to improve quality","D":"Facilitate the next retrospective meeting, focusing the team on analyzing root causes and proposing solutions"},"correct":["D"],"answer_display":"D","why_correct":"Quality problems in agile are best addressed through the team's retrospective — the purpose-built mechanism for the team to inspect their process, identify root causes, and implement improvements collaboratively.","why_wrong":{"A":"Hiring external consultancy for testing adds cost and creates dependency without building internal quality capability.","B":"Bug-fixing incentives treat symptoms rather than addressing the underlying quality process problem.","C":"Evaluating skill gaps may be one outcome of the retrospective, but the retrospective itself is the right starting point."},"part":"Part 2","part_range":"Q51–Q100"},{"num":63,"type":"multi","stem":"A key project stakeholder has started to escalate all issues and main requirements to the project sponsor. The project manager is concerned about the team not receiving direct communications from this stakeholder. Which two actions should the project manager take to improve the relationship with the stakeholder? (Choose two.)","options":{"A":"Provide training to the team on emotional intelligence and status reporting techniques","B":"Promote an adaptive and transparent environment where the team can easily communicate with the stakeholders","C":"Share weekly status reports with detailed information about the project and team performance","D":"Submit performance reports and task assignments to keep the stakeholder informed","E":"Schedule regular meetings with the key stakeholder to provide updates and receive feedback ,E"},"correct":["B","E"],"answer_display":"B,E","why_correct":"Building a transparent environment where the team communicates directly with stakeholders, combined with regular PM-stakeholder meetings, addresses both the relationship gap and the bypassing behavior.","why_wrong":{"A":"Training on emotional intelligence is useful long-term but doesn't resolve the immediate bypass pattern.","C":"Weekly status reports are passive information sharing that don't rebuild the stakeholder relationship.","D":"Submitting reports and assignments is task management, not stakeholder relationship repair."},"part":"Part 2","part_range":"Q51–Q100"},{"num":64,"type":"multi","stem":"A project manager is leading a multiyear project that involves internal and external stakeholders. As the project manager begins to gather requirements, additional business stakeholders express interest in being involved. Which three actions should the project manager take to ensure proper stakeholder involvement? (Choose three.)","options":{"A":"Prioritize stakeholders based on the project phase and need","B":"Perform a stakeholder assessment to align with the project objectives","C":"Classify and rank stakeholders based on their positions in the organization","D":"Include all stakeholders in the stakeholder engagement plan and provide the same level of communication","E":"Develop a stakeholder impact/influence matrix to determine the level of engagement ,B,E"},"correct":["A","B","E"],"answer_display":"A,B,E","why_correct":"Prioritizing stakeholders by project phase ensures the right people are engaged at the right time; stakeholder assessment aligns involvement with project objectives; and an influence/impact matrix determines appropriate engagement levels for each stakeholder.","why_wrong":{"C":"Ranking by organizational position creates a hierarchy-based approach that may miss high-impact stakeholders with lower titles.","D":"Providing identical communication to all stakeholders regardless of their needs wastes resources and may not meet individual needs."},"part":"Part 2","part_range":"Q51–Q100"},{"num":65,"type":"single","stem":"In the initiating phase of a project, the project manager and team members are prioritizing the product backlog along with the product owner. What should the project manager do next?","options":{"A":"Produce a value-added product for the customer in each phase of the project.","B":"Produce a value-added product for the customer as continuously as possible.","C":"Produce a value-added product for the customer in the beginning of the project.","D":"Produce a value-added product along with the supporting documentation."},"correct":["B"],"answer_display":"B","why_correct":"PMI agile value principle: deliver value continuously and as frequently as possible — not in phases, not at the beginning, and not bundled with documentation. Continuous value delivery is the core purpose of iterative development.","why_wrong":{"A":"Delivering value per phase is an incremental, not agile, approach.","C":"Delivering value only at the beginning misses the iterative feedback benefit.","D":"Tying value delivery to supporting documentation delays delivery and adds unnecessary constraints."},"part":"Part 2","part_range":"Q51–Q100"},{"num":66,"type":"multi","stem":"A project manager is overseeing a project as part of a program geared toward a major technology disruption. The team is comprised of brilliant young professionals who have worked on different projects for the organization in the past. However, the team complained that they previously experienced a lack of direction during project execution and are afraid of the same issue in this project. Which two actions should the project manager take to ensure that this issue does not occur in this project? (Choose two.)","options":{"A":"Organize a team-bonding activity and invite an external manager to speak to the team.","B":"Set a clear vision for the project and ensure it is visible to all stakeholders.","C":"Focus on the resource management plan and track project progress.","D":"Encourage the team to do a brainstorming session and provide a mitigation plan.","E":"Keep the team engaged and focused on the project's direction. ,E"},"correct":["B","E"],"answer_display":"B,E","why_correct":"A clear, visible project vision aligns the team's direction, while keeping them actively engaged maintains focus and prevents the drift that caused previous projects to lose direction during execution.","why_wrong":{"A":"External speakers at team-bonding events do not substitute for structural direction and sustained engagement.","C":"Tracking the resource management plan addresses logistics, not direction clarity.","D":"A brainstorming session and mitigation plan are reactive responses to a problem, not proactive direction-setting."},"part":"Part 2","part_range":"Q51–Q100"},{"num":67,"type":"single","stem":"Due to organizational changes, several key stakeholders are replaced by new ones in the middle of a project. As a result, numerous new requirements are raised. What should the project manager do to ensure success of the project?","options":{"A":"Review and prioritize new requirements with stakeholders to determine which change requests are needed.","B":"Seek immediate approval to amend the project timeline and budget in order to deliver all new requirements.","C":"Escalate the issue to the project sponsor and seek support to keep the original requirements.","D":"Emphasize to the new stakeholders that new requirements are not allowed at this stage of the project."},"correct":["A"],"answer_display":"A","why_correct":"When stakeholders are replaced and new requirements emerge, the PM must engage with the new stakeholders to review and prioritize requirements, determine which ones warrant change requests, and manage scope formally.","why_wrong":{"B":"Seeking immediate approval for all new requirements commits to scope expansion before impact analysis.","C":"Escalating to protect original requirements over new legitimate stakeholder needs is adversarial.","D":"Refusing new requirements from legitimate new stakeholders is inflexible and may undermine project support."},"part":"Part 2","part_range":"Q51–Q100"},{"num":68,"type":"single","stem":"One phase of a project took much longer than initially anticipated. The key stakeholders expressed their concern regarding a potential project delay. What should the project manager do?","options":{"A":"Request additional contingency from the sponsor","B":"Add more float to the overall project schedule","C":"Expedite the next phase to reduce slippage","D":"Organize a root cause analysis (RCA) workshop"},"correct":["D"],"answer_display":"D","why_correct":"A phase delay requires root cause analysis first — understanding why the phase overran enables informed decisions about corrective actions, resource adjustments, or schedule changes for subsequent phases.","why_wrong":{"A":"Requesting contingency before understanding the root cause may not address the actual problem.","B":"Adding float to future phases delays delivery without solving the underlying issue.","C":"Expediting the next phase without understanding why the previous phase slipped creates quality and resource risks."},"part":"Part 2","part_range":"Q51–Q100"},{"num":69,"type":"single","stem":"An agile team is working on a project that will be launched in six countries. Each country has specific requirements in addition to the base offering. The estimates indicate it will take six months to develop the base offering and an additional month to finalize each country's unique requirements. The expected revenue for the product is the same for each country. Which release strategy should the project manager recommend?","options":{"A":"An iterative-based strategy to maximize value by releasing the product to each country as it is finalized and ready for release in that country","B":"A financial-based strategy to reduce the roll-out effort and costs by planning a single, bundled release to all countries at the same time","C":"A risk-based strategy to maximize the perceived value of the product by launching it to the countries with the lowest technical complexity","D":"A quality-based strategy to maximize post-market adoption by releasing the product to the countries with the lowest probability of reporting field issues"},"correct":["A"],"answer_display":"A","why_correct":"Releasing each country's product as it is finalized maximizes value by delivering earlier to markets that are ready, rather than holding all countries hostage to a synchronized release that delays early revenue.","why_wrong":{"B":"A bundled release delays revenue for countries that are ready earlier just to synchronize with slower ones.","C":"A risk-based strategy based on technical complexity does not align with the equal-revenue context.","D":"Launching to countries with low field-issue probability is risk-averse but doesn't maximize value delivery speed."},"part":"Part 2","part_range":"Q51–Q100"},{"num":70,"type":"single","stem":"A primary stakeholder is unable to join the project status meetings consistently. The project manager has been communicating with this stakeholder informally and regularly to ensure that the stakeholder is up to date on the project. However, the project manager has recently resigned and will not be meeting with the new project manager prior to departure. How should the project manager ensure that the new project manager continues to update this particular stakeholder?","options":{"A":"Ensure that the project team has been provided guidance on the specific needs of this stakeholder","B":"Update the stakeholder engagement plan with the specific communication needs for the stakeholder","C":"Ensure that the project documents contain specific instructions regarding the stakeholder","D":"Update the communications management plan with specific information on stakeholder engagement"},"correct":["B"],"answer_display":"B","why_correct":"Stakeholder-specific communication needs must be captured in the stakeholder engagement plan so the next PM inherits actionable, documented guidance on how to manage this particular stakeholder's informal communication preference.","why_wrong":{"A":"Verbal guidance to the team is informal and may not survive the PM transition accurately.","C":"Specific instructions scattered in general project documents may not be found by the new PM.","D":"The communications management plan covers communication strategy broadly; stakeholder-specific engagement needs belong in the stakeholder engagement plan."},"part":"Part 2","part_range":"Q51–Q100"},{"num":71,"type":"single","stem":"A project team is implementing an enterprise notification tool with a vendor. The project manager noticed that this vendor’s developer has been reporting the same status for several weeks in a row. A few days later, the vendor communicates that the deliverable will not be completed on time due to resource constraints within their company. What should the project manager do next?","options":{"A":"Update the risk register to reflect the delay, communicate the impact to the schedule, and escalate to management for assistance","B":"Conduct a project review with the project sponsor to explain the delay and add a developer to work with the vendor","C":"Add the delay to the issue log and work with the vendor for a resolution that will bring the schedule back on track","D":"Review the contract with the vendor to go over the financial penalty that is applicable to this situation"},"correct":["C"],"answer_display":"C","why_correct":"When a vendor's deliverable is delayed, the PM should add the delay to the issue log and work collaboratively with the vendor to develop a recovery plan — issue management is the right process, not escalation or legal action as a first step.","why_wrong":{"A":"Updating the risk register is appropriate if this were a potential risk, but it has already become an issue.","B":"Conducting a review with the sponsor and adding a developer without first working with the vendor skips collaborative problem-solving.","D":"Reviewing financial penalties is a last resort after resolution attempts have failed."},"part":"Part 2","part_range":"Q51–Q100"},{"num":72,"type":"single","stem":"A project manager for a software development company faces a number of financial risks in their project. The project manager needs to frequently check the strength and efficiency of the risk management process. What should the project manager use to accomplish this?","options":{"A":"Brainstorming session","B":"Stakeholder register","C":"Assumption log","D":"Audit meeting"},"correct":["D"],"answer_display":"D","why_correct":"To frequently check the strength and efficiency of the risk management process, audits are the appropriate tool — they provide an independent, structured assessment of whether risk processes are effective.","why_wrong":{"A":"Brainstorming is a risk identification technique, not a process effectiveness evaluation tool.","B":"The stakeholder register tracks stakeholders, not risk management process quality.","C":"The assumption log tracks assumptions, not risk management process efficiency."},"part":"Part 2","part_range":"Q51–Q100"},{"num":73,"type":"single","stem":"Atypically high-performing team member has started to demonstrate a performance drop as well as some aggressive behaviors toward other team members in meetings. The project manager has worked with this individual for many months on this project and has not seen this type of behavior before. What should the project manager do?","options":{"A":"Discuss the individual's behavior with the other team members to determine if they have noticed and know what is going on","B":"Attend more team meetings to observe the team more closely to determine the root cause","C":"Discuss the project manager's observations with the individual to determine why they are behaving this way","D":"Discuss their performance with the team member's functional manager as well as human resources (HR) and discuss next steps"},"correct":["C"],"answer_display":"C","why_correct":"PMI emotional intelligence and servant leadership: when a previously high-performing team member shows a sudden behavior change, the first step is a direct, private conversation to understand what is causing the change — not observation or escalation.","why_wrong":{"A":"Discussing the behavior with other team members before speaking to the individual creates gossip and violates trust.","B":"Attending more meetings to observe is passive when direct conversation would surface the issue faster.","D":"Going directly to HR and the functional manager without first speaking to the individual skips the direct resolution step."},"part":"Part 2","part_range":"Q51–Q100"},{"num":74,"type":"single","stem":"In a newly formed project team, one experienced team member is overwhelmed by the complexity of the tasks and is not happy with the project team. What should the project manager do?","options":{"A":"Explain that the tasks are unavoidable and ask the team member to find a solution to overcome the challenges","B":"Set up team-building activities with the project team members to reduce tension","C":"Ask the team member to enter this potential schedule delay in the risk register","D":"Actively listen to the team member and identify ways to support their needs in completing the tasks"},"correct":["D"],"answer_display":"D","why_correct":"Servant leadership requires actively listening to team members when they are overwhelmed. The PM should listen, understand their concerns, and identify concrete ways to support them in completing the work.","why_wrong":{"A":"Telling the team member the tasks are unavoidable without offering support is dismissive and demoralizing.","B":"Team-building events address group dynamics but don't solve an individual's task complexity problem.","C":"Asking the team member to log a schedule risk treats them as a reporting resource rather than a person who needs support."},"part":"Part 2","part_range":"Q51–Q100"},{"num":75,"type":"single","stem":"A project is being delayed due to a large amount of rework caused by a quality problem that is impacting the critical path. What should the project manager do?","options":{"A":"Report the delay with rectifying actions to the project management office (PMO).","B":"Rebaseline the project schedule to absorb the delay.","C":"Notify the project steering committee about the cause of the delay.","D":"Report the delay with rectifying actions to the change control board (CCB) for review."},"correct":["A"],"answer_display":"A","why_correct":"Quality-related rework causing critical path delay is a significant issue requiring formal reporting to the PMO with a clear rectifying action plan — not self-resolution without escalation or arbitrary rebaselining.","why_wrong":{"B":"Rebaselining absorbs the delay without addressing the quality root cause.","C":"Notifying the steering committee is appropriate for strategic decisions, not operational quality issues.","D":"The CCB reviews scope and change requests; a quality-driven delay is reported to the PMO with corrective actions."},"part":"Part 2","part_range":"Q51–Q100"},{"num":76,"type":"single","stem":"An experienced project manager is managing a multi-million dollar agile project. The project manager communicates the ground rules to the team, but after 12 iterations, the project manager starts noticing that some team members are not following the ground rules. What should the project manager do first to ensure team adherence to the ground rules?","options":{"A":"Ask the functional manager to replace team members not following the ground rules.","B":"Schedule a meeting with the project team to reinforce the ground rules.","C":"Notify the project sponsor about this behavior and ask the sponsor to take disciplinary action.","D":"Contact human resources to request a written warning letter be sent to team members not following the ground rules."},"correct":["B"],"answer_display":"B","why_correct":"When team members stop following ground rules, the first step is to reinforce them through a team meeting — reminding the team of their agreed commitments and the reasons behind them.","why_wrong":{"A":"Requesting replacements is an extreme response to a behavior issue that hasn't been addressed directly.","C":"Involving the sponsor for disciplinary action skips the PM's own authority to address team behavior.","D":"HR warning letters are appropriate for serious misconduct, not for ground rule non-compliance."},"part":"Part 2","part_range":"Q51–Q100"},{"num":77,"type":"single","stem":"A project manager has been assigned a low-priority project that includes new team members with no previous formal project experience. The project team has requested deadline extensions for the first development increment twice already. What should the project manager do to support the team?","options":{"A":"Provide feedback to the team using project performance evaluations.","B":"Include buffer time in the schedule to absorb future delays.","C":"Escalate the impact on the schedule to the project sponsor.","D":"Create a change request to extend the project's duration and costs."},"correct":["A"],"answer_display":"A","why_correct":"For new team members missing deadlines, the PM should provide structured feedback through performance evaluations — helping them understand expectations, their current performance gaps, and how to improve.","why_wrong":{"B":"Adding buffer time is a scheduling accommodation that doesn't address the team's need for guidance and learning.","C":"Escalating to the sponsor for a low-priority project with new team members is disproportionate.","D":"A change request to extend duration is premature before providing coaching and performance feedback."},"part":"Part 2","part_range":"Q51–Q100"},{"num":78,"type":"single","stem":"A customer has provided excellent feedback on the project. However, a key project resource is leaving the company. Which measure should mitigate the impact of this key resource's departure?","options":{"A":"Establish a proactive knowledge-sharing plan","B":"Offer a new contract to the resource who is leaving","C":"Develop a contingency budget to replace the key resource","D":"Update the risk register and inform the customer"},"correct":["A"],"answer_display":"A","why_correct":"When a key resource is leaving, the PM should establish a proactive knowledge-sharing plan to capture and transfer their expertise before departure — preserving institutional knowledge for the project's continuation.","why_wrong":{"B":"Offering a new contract may not be feasible or appropriate, and it avoids addressing knowledge transfer.","C":"A contingency budget for replacement doesn't capture the unique knowledge the departing resource holds.","D":"Updating the risk register is necessary but insufficient — the risk must be actively mitigated through knowledge transfer."},"part":"Part 2","part_range":"Q51–Q100"},{"num":79,"type":"single","stem":"A project manager is working on an enterprise resource planning (ERP) initiative that contains stakeholders spanning numerous business lines. The project manager begins to identify, evaluate, and categorize the stakeholder relationships to the program. What is the purpose of this process?","options":{"A":"Identify all stakeholders who can positively affect the project","B":"Identify all stakeholders who can negatively affect the project.","C":"Incorporate the needs of all stakeholders into the communications management plan","D":"Incorporate only primary stakeholders into the communications management plan"},"correct":["C"],"answer_display":"C","why_correct":"Stakeholder analysis in PMI serves to incorporate the needs, expectations, and influence of all stakeholders into planning — particularly the communications management plan — to ensure appropriate engagement throughout the project.","why_wrong":{"A":"Stakeholder analysis identifies both positive and negative stakeholders, not only positive influencers.","B":"Similarly, the process is not limited to identifying negative influencers.","D":"All primary and secondary stakeholders are analyzed; limiting communications to primary stakeholders creates gaps."},"part":"Part 2","part_range":"Q51–Q100"},{"num":80,"type":"single","stem":"A company just started managing a project using an agile approach. Due to this change, the general manager is worried about the scope definition process for upcoming projects. What should the project manager do to ensure the project scope is completely defined?","options":{"A":"Meet with the general manager and convince them to return to using predictive approaches to avoid any risk","B":"Ask the general manager to review every requirement to ensure all projects will deliver the requested products","C":"Ask for a budget increase to implement a double-check process to ensure every business need is included in the requirements","D":"Help sponsors and stakeholders craft the product vision, and bring the team and product owner together to clarify expectations"},"correct":["D"],"answer_display":"D","why_correct":"In agile, product vision drives scope clarity. The PM should help sponsors and stakeholders craft the product vision and then facilitate product owner and team collaboration to turn that vision into clear, prioritized requirements.","why_wrong":{"A":"Returning to predictive approaches to satisfy the GM's concern avoids the real issue of vision clarity.","B":"Having the GM review every requirement is micromanagement and an unsustainable governance model.","C":"A double-check process adds cost and overhead without addressing the root cause of unclear requirements."},"part":"Part 2","part_range":"Q51–Q100"},{"num":81,"type":"single","stem":"A project manager is asked to develop maintenance planning software for a power plant. A similar project was executed by another department in the organization that was later closed due to low performance. The project manager is concerned about the project's performance and wants to take action in advance to ensure the project succeeds. What should the project manager do?","options":{"A":"Continue executing the project as planned and add more resources if they are required.","B":"Evaluate the project risk and add external experts to address the potential risks.","C":"Review the lessons learned on similar projects so that they do not fall back into the same pattern.","D":"Inform the project sponsor about the risk and try to convince them to withdraw from the project."},"correct":["C"],"answer_display":"C","why_correct":"PMI organizational process assets (OPAs) principle: reviewing lessons learned from similar failed projects allows the PM to identify and avoid the specific patterns that caused previous failure.","why_wrong":{"A":"Continuing without addressing known failure patterns is reactive and likely to repeat the same mistakes.","B":"Adding external experts without understanding why the previous project failed may not address the root cause.","D":"Advising the sponsor to withdraw from a project based on similar-project failure is a risk assessment overreaction."},"part":"Part 2","part_range":"Q51–Q100"},{"num":82,"type":"single","stem":"A newly formed project team includes team members who have been working in the company for a long time as well as team members who are new to the company. The project team members discovered that there is a gap in communication between these two groups, and they are finding it hard to collaborate with one another. What should the project manager do?","options":{"A":"Ask the experienced members to lead the junior members to facilitate skill transfer","B":"Organize networking sessions to allow the team members to get to know one another","C":"Encourage team members to focus on delivering results with their specialized skills","D":"Ask the team to self-organize and escalate any issues to the project manager"},"correct":["B"],"answer_display":"B","why_correct":"When communication and collaboration gaps exist between new and experienced team members, the PM should facilitate networking and team-building opportunities to help them establish relationships and mutual understanding.","why_wrong":{"A":"Having experienced members lead junior members creates hierarchy but doesn't resolve the collaboration gap.","C":"Encouraging individual focus on specialized skills reinforces silos rather than building cross-group collaboration.","D":"Asking the team to self-organize without first addressing the collaboration barrier will not resolve the cultural gap."},"part":"Part 2","part_range":"Q51–Q100"},{"num":83,"type":"single","stem":"A project manager is working for an organization in country A and has been tasked with opening the first brick-and-mortar store in country B. The sponsor has identified the city for the store and wants to minimize any potential issues with the local government. Which action should the project manager take to address the sponsor's request?","options":{"A":"","B":"The sponsor has identified the city for the store and wants to minimize any potential issues with the local government. Which action should the project manager take to address the sponsor's request? A. Work with the organization's legal department to identify local regulations to ensure project compliance B. Work with the organization's project management office (PMO) to build a project team of residents located in the city","C":"Work with the organization's real estate department and reach out to the local government to identify the best location for the store","D":"Work with the local government to build the profiles of employees that will be working in the store"},"correct":["A"],"answer_display":"A","why_correct":"To minimize issues with local government, the first step is to work with the legal department to understand local regulations and ensure compliance — this is the most direct way to address regulatory and governmental risk.","why_wrong":{"B":"Building a team of local residents addresses staffing diversity but not legal compliance with local government.","C":"Real estate and location optimization are operational concerns, not the primary driver of government compliance risk.","D":"Employee profiles are HR decisions made after legal compliance is established."},"part":"Part 2","part_range":"Q51–Q100"},{"num":84,"type":"single","stem":"An equipment vendor will implement a new production line for a client company. The year-long project will include 2- to 4-month long iterations; however, the client's project manager has no agile experience. How should the project manager ensure that the client is effectively represented in the daily meetings?","options":{"A":"Recommend agile training programs that best suit the client project manager’s schedule.","B":"Propose a session for essential agile knowledge transfer for the client team to align with the daily meeting goals.","C":"Realign the project to a predictive approach to ensure optimal collaboration between the teams.","D":"Provide the client project manager with agile best practice documents and web resources."},"correct":["B"],"answer_display":"B","why_correct":"An essential agile knowledge transfer session for the client team provides them with enough understanding to participate effectively in daily meetings — more efficient than full training programs and more targeted than documents.","why_wrong":{"A":"Full training programs are time-consuming and may not be scheduled to align with project timelines.","C":"Realigning to predictive removes the agile benefit and makes the client's participation problem irrelevant at the cost of delivery quality.","D":"Providing documents and web resources is passive learning that may not be sufficient for active daily meeting participation."},"part":"Part 2","part_range":"Q51–Q100"},{"num":85,"type":"single","stem":"A project manager is working in a company that has several global offices. During resource planning for a new project, the project manager realizes that the company requires projects to include team members from different continents. What should the project manager do to ensure a successful project execution?","options":{"A":"Plan for a meeting with the project sponsor to discuss the possibility of utilizing only local colleagues.","B":"Send emails with information about the project deliverables on the first day of the project.","C":"Connect with every location and check their preferred methods of communication.","D":"Invite all resources to the project manager's location to form a cohesive team until all deliverables are completed."},"correct":["C"],"answer_display":"C","why_correct":"Before executing a global project, the PM should connect with each location to understand their preferred communication methods — ensuring communication planning accounts for cultural and infrastructure differences.","why_wrong":{"A":"Requesting to use only local colleagues ignores the company's global structure requirement.","B":"Sending emails on day one assumes email works for everyone and skips understanding communication preferences.","D":"Requiring relocation is impractical, costly, and ignores the global team requirement."},"part":"Part 2","part_range":"Q51–Q100"},{"num":86,"type":"single","stem":"A business stakeholder for a project is reluctant to accept an agile approach due to a previous bad experience, and is pushing for a predictive approach. What strategy should the project manager use to persuade the stakeholder to use an agile approach?","options":{"A":"Agree on a predictive approach, but apply agile concepts under the project management umbrella.","B":"Ensure the stakeholder that an agile approach will deliver all of the expected results in a shorter period of time.","C":"Document the request and escalate to upper management to consider a modification of the project charter.","D":"Propose a phased project approach with multiple small interactions and build trust with the stakeholder through frequent value delivery."},"correct":["D"],"answer_display":"D","why_correct":"To overcome stakeholder resistance to agile, the PM should propose a phased approach with small, frequent value deliveries that build trust through demonstrated results — addressing the stakeholder's fear through evidence rather than argument.","why_wrong":{"A":"Applying agile concepts covertly under a predictive umbrella is deceptive and creates project governance confusion.","B":"Promising shorter delivery without evidence is an unsubstantiated claim that may further damage trust.","C":"Escalating to upper management before attempting direct persuasion bypasses stakeholder relationship management."},"part":"Part 2","part_range":"Q51–Q100"},{"num":87,"type":"single","stem":"A project engineer in country A is complaining about the sample received from the supplier in country B because the sample is not the correct length. During a telephone conference, the supplier checked the drawings and insisted that the measurement was accurate. What should the project manager do next?","options":{"A":"Hire a company in country B to perform a quality check before shipment","B":"Evaluate the procurement contract to determine the agreed-upon specifications","C":"Escalate the issue to the purchasing department for review","D":"Add an additional task to cut the received part according to the specifications"},"correct":["B"],"answer_display":"B","why_correct":"When there is a measurement dispute between supplier and project engineer, the PM should first review the procurement contract to verify the agreed specifications — this is the objective reference point for the dispute.","why_wrong":{"A":"Hiring a country B quality inspector is a costly solution before verifying what the contract actually specifies.","C":"Escalating to purchasing before checking the contract specification skips the most direct resolution step.","D":"Cutting the part to different specifications may violate the contract and create downstream quality issues."},"part":"Part 2","part_range":"Q51–Q100"},{"num":88,"type":"single","stem":"A project manager has team members around the world in many different time zones. Project work frequently stalls because people in one office need to wait until another office is awake to have questions answered. What should the project manager have done to avoid this?","options":{"A":"Ensured that the project would be the highest priority for all team members","B":"Planned and scheduled tasks and work packages to overcome geographical and time zone challenges","C":"Learned more about how each team member prefers to communicate before assigning project work","D":"Used communication tools, such as video conferencing, so different offices could communicate"},"correct":["B"],"answer_display":"B","why_correct":"Work stalls due to time zone differences are a planning failure. The PM should have planned and scheduled tasks and work packages to account for geographical constraints, minimizing cross-timezone dependencies during critical work.","why_wrong":{"A":"Making the project highest priority does not resolve the functional problem of time zone communication gaps.","C":"Understanding communication preferences is valuable but does not solve the structural time zone dependency problem.","D":"Video conferencing tools help synchronous communication but don't resolve asynchronous waiting caused by time zone overlap issues."},"part":"Part 2","part_range":"Q51–Q100"},{"num":89,"type":"single","stem":"The project manager is reviewing a project's progress and notices that one of the risks has become an issue. What should the project manager do to address the situation?","options":{"A":"Initiate a change request to obtain additional funds from the management reserve","B":"Meet with the project team and customer to brainstorm about potential solutions","C":"Schedule a high-priority meeting with the project stakeholders to discuss the issue","D":"Collaborate with the relevant stakeholders on implementing the risk response plan"},"correct":["D"],"answer_display":"D","why_correct":"When a risk becomes an issue, PMI's process is to implement the planned risk response. The PM should collaborate with relevant stakeholders to execute the pre-approved response plan rather than starting from scratch.","why_wrong":{"A":"Management reserves are for unplanned scope changes, not for risks that have planned responses.","B":"Brainstorming solutions with the team and customer is appropriate only if no risk response plan exists.","C":"A high-priority meeting with all stakeholders is a broader escalation than necessary if a response plan is available."},"part":"Part 2","part_range":"Q51–Q100"},{"num":90,"type":"single","stem":"A project manager has begun a complex oil refinery project. Although the project is in the initiation phase, the sponsor keeps asking for concrete dates for the most important project milestones. When will the project manager be able to provide the requested information?","options":{"A":"During the planning phase, when processes for scope definition and activity duration and sequencing will be performed","B":"Close to the end of the project, as the forecasts will be more accurate and most risks will already be mitigated","C":"In the initiation process, as it happens concurrently with the project contract and project charter creation","D":"As soon as possible, as project delays can be significantly avoided when a schedule is developed early"},"correct":["A"],"answer_display":"A","why_correct":"Reliable milestone dates can only be provided after scope is defined and activities are sequenced and estimated — this happens during the planning phase. Providing dates before planning produces unreliable commitments.","why_wrong":{"B":"Waiting until near project end to provide milestone dates is impractical for a complex oil refinery project.","C":"The initiation phase produces the charter and high-level scope, not detailed schedule information.","D":"Providing dates as soon as possible without proper planning creates false commitments that undermine trust."},"part":"Part 2","part_range":"Q51–Q100"},{"num":91,"type":"single","stem":"After conducting a performance assessment, the project manager identified that some gaps still exist. What should the project manager ensure?","options":{"A":"Awards are given to all team members for playing a role in the project and undertaking the assessment.","B":"Performance improvement programs are organized for all team members who were assessed.","C":"All team members rotate their job schedules immediately to make them versatile.","D":"Assessment results are kept private and not shared among team members."},"correct":["D"],"answer_display":"D","why_correct":"Performance assessment results must be kept confidential between the PM and individual team members. Sharing individual results with the team violates privacy and trust, which is a PMI professional responsibility principle.","why_wrong":{"A":"Awards for all team members regardless of performance are not grounded in merit and undermine the purpose of assessment.","B":"Improvement programs for all assessed members regardless of results is unnecessary and may be demoralizing to high performers.","C":"Immediately rotating all job schedules based on assessment results is disruptive and unjustified."},"part":"Part 2","part_range":"Q51–Q100"},{"num":92,"type":"single","stem":"A project is in the execution phase. The client was actively involved in the early stages but has been less engaged lately. A number of changes to the requirements have recently been requested. What should the project manager do next?","options":{"A":"Discuss the changes with the client and jointly make the decision on how to proceed.","B":"Reject the changes and stay the original course as initially agreed with the client.","C":"Review the risk register to see if mitigations have already been outlined for this scenario.","D":"Review the changes and make the decision based on the project team's recommendations."},"correct":["A"],"answer_display":"A","why_correct":"When a client who was engaged early becomes less active and then raises change requests, the PM should re-engage them directly — discuss the changes together and jointly determine how to proceed. Collaboration over unilateral decision-making.","why_wrong":{"B":"Rejecting client changes without analysis is inflexible and damages the client relationship.","C":"Reviewing the risk register is a good internal check but doesn't replace directly engaging the client.","D":"Making the decision based only on the team's recommendation excludes the client who has the final say."},"part":"Part 2","part_range":"Q51–Q100"},{"num":93,"type":"single","stem":"A technician is scheduled to install internet service at the homes of three remote call center agents who have different working schedules. Their functional managers arranged time off to allow time for installation and testing. The carrier sends an email to the project manager stating that one appointment is delayed for 2 days. What does the project manager need to do now?","options":{"A":"Inform the product owner","B":"Inform the project sponsor","C":"Inform the relevant stakeholders","D":"Inform the project team only"},"correct":["C"],"answer_display":"C","why_correct":"A 2-day appointment delay affects the team members whose installations are impacted, their functional managers who arranged time off, and potentially the operations timeline. All relevant stakeholders must be informed.","why_wrong":{"A":"The product owner manages product backlog; a carrier appointment delay is an operational project issue.","B":"The project sponsor does not need to be directly involved in a technician appointment scheduling issue.","D":"Informing only the project team omits the functional managers who arranged time off around the scheduled appointment."},"part":"Part 2","part_range":"Q51–Q100"},{"num":94,"type":"single","stem":"A team member in an agile project informs the project manager they might not be able to finish an assigned task on time, which could generate an obstacle for the rest of the team. What should the project manager do?","options":{"A":"Ask the team member to bring up the concern in the next daily meeting","B":"Send an email explaining the issue to all team members","C":"Reassign the task to another team member","D":"Move the task to the next sprint"},"correct":["A"],"answer_display":"A","why_correct":"Agile principle: impediments and task risks are raised and resolved by the team in the daily standup. The PM should ask the team member to surface the concern in the next standup so the team can collectively address it.","why_wrong":{"B":"Sending an email to all team members is a less effective method than the standup that exists specifically for this purpose.","C":"Reassigning the task without the team's involvement undermines self-organization.","D":"Moving to the next sprint delays resolution and affects the current sprint's commitments."},"part":"Part 2","part_range":"Q51–Q100"},{"num":95,"type":"single","stem":"A project manager has been assigned to manage multiple agile project teams. The project manager wants to empower the teams and make them self-organizing. What should the project manager do to create a positive environment?","options":{"A":"Help the teams in establishing and adhering to their ground rules and revisit after regular intervals","B":"Copy the ground rules established by another project and provide them to the teams","C":"Establish the team ground rules and share them with the team for strict adherence","D":"Extract the organization's policies and processes, customize them, and give them to the teams to adhere to"},"correct":["A"],"answer_display":"A","why_correct":"Servant leadership for self-organizing teams means helping them establish their own ground rules collaboratively and revisiting them periodically — the rules should come from the team, not be imposed.","why_wrong":{"B":"Copying ground rules from another project ignores this team's specific context and needs.","C":"Establishing rules and handing them down for strict adherence is top-down, not self-organizing.","D":"Extracting and customizing organizational policies is still an external imposition on team self-organization."},"part":"Part 2","part_range":"Q51–Q100"},{"num":96,"type":"single","stem":"An agile coach and technical writer for a globally distributed agile team are in a country with a 9hour time zone difference from the agile team. The agile coach and project lead disagree on the timing for the daily standup. The project lead thinks the standup should be at 10:00 am local time, but the agile coach and technical writer feel that is an inconvenient time for them. How does the project lead ensure adherence to agile practices?","options":{"A":"Inform the agile coach that the daily standup will be at 10:00 am local time and ensure all parties can attend","B":"Escalate to management that the agile process is not going to work and ask them to speak to the agile coach","C":"Have a discussion with the team on the approach and come to a decision on when the daily standups should be","D":"Have two separate daily standups, one for the agile coach and technical writer and one for the agile development team"},"correct":["C"],"answer_display":"C","why_correct":"Agile team decision-making is collaborative. When there is a disagreement about standup timing, the team should discuss and collectively decide on the time — not have it imposed by the project lead.","why_wrong":{"A":"Informing the agile coach that the time is fixed and ensuring attendance ignores their legitimate input.","B":"Escalating to management because of a scheduling disagreement is a massive overreaction.","D":"Two separate standups defeats the purpose of the daily standup as a whole-team synchronization event."},"part":"Part 2","part_range":"Q51–Q100"},{"num":97,"type":"single","stem":"A project manager receives a suggestion from a team member for improving the product attributes without impacting the schedule or cost. This will add value to the project and the customer. What should the project manager do?","options":{"A":"Reject the suggestion and ask the team member to focus on executing the plan","B":"Ask the team member to submit a formal change request","C":"Accept the suggestion as it has no impact on the project","D":"Ask another team member to validate the impacts of the suggestion"},"correct":["B"],"answer_display":"B","why_correct":"Even improvements with no apparent schedule or cost impact must go through formal change control. PMI requires all changes, regardless of size, to be submitted as change requests to maintain scope integrity and document the decision.","why_wrong":{"A":"Rejecting without evaluation violates the PM's obligation to consider beneficial changes.","C":"Accepting without a change request bypasses formal change control and sets a precedent for informal scope additions.","D":"Having another team member validate impacts is useful but does not replace the formal change request process."},"part":"Part 2","part_range":"Q51–Q100"},{"num":98,"type":"single","stem":"During the third iteration of a project, the main sponsor retired from the company, and a new sponsor was appointed. The new sponsor is not familiar with the agile approach for project delivery, which leads them to request more control over the project team. What should the project manager do?","options":{"A":"Schedule a meeting with the new sponsor in order to explain the agile approach and how teams are supposed to be self-organized","B":"Review the sponsor's request with the project team during the next daily review meeting in order to provide the requested control","C":"Schedule an emergency meeting with the project team so they fulfill every request that comes from the sponsor","D":"Review the sponsor's request with the project team during the next iteration review meeting in order to obtain a team decision"},"correct":["A"],"answer_display":"A","why_correct":"When a new sponsor unfamiliar with agile requests inappropriate control, the PM should proactively meet with them to explain agile principles — particularly team self-organization — to align expectations and prevent destructive micromanagement.","why_wrong":{"B":"Reviewing sponsor requests in the daily meeting is not the appropriate forum for sponsor-level education.","C":"Fulfilling every request from the sponsor regardless of agile principles undermines the methodology.","D":"Having the team vote on the sponsor's requests in an iteration review is inappropriate governance."},"part":"Part 2","part_range":"Q51–Q100"},{"num":99,"type":"single","stem":"A medium-sized company has been exploring new marketing tactics with regard to launching a new product. New product creation is no small task. In the end, it was too big of an expenditure for the company to undertake. What should the project manager do in the future when working on new product projects?","options":{"A":"Make use of kanban boards so all stakeholders have a clear view of the project and provide their help accordingly","B":"Train the team to first find the minimum viable product (MVP) that will deliver value to the customer","C":"Increase the contingency reserve and prepare the team for applying fast-failing techniques when the estimates veer from the initial plan","D":"Adopt a chain management approach, developing products based on the same platform and infrastructure"},"correct":["B"],"answer_display":"B","why_correct":"When a new product concept proves too expensive, the PMI agile lesson is to define the MVP first — the smallest version that delivers genuine customer value — before committing to full product development.","why_wrong":{"A":"Kanban boards improve workflow visibility but don't address the root cause of over-scoped, high-cost product development.","C":"Fast-failing techniques and larger contingency reserves are risk responses, not a structural solution to over-scoping.","D":"A chain management approach based on existing platforms is a product strategy, not a universal lesson for new product projects."},"part":"Part 2","part_range":"Q51–Q100"},{"num":100,"type":"single","stem":"61 A project manager is managing a few innovation projects with a high level of uncertainty. The project manager is experiencing challenges with the large number of change requests issued due to the nature of the project. What should the project manager do?","options":{"A":"Reduce the number of approvers required to implement a change request","B":"Request sponsor approval for all change requests to reduce the number of changes","C":"Initiate the number of iterations to reduce the number of change requests","D":"Add a fixed number of change requests allowed by the client on the project baseline"},"correct":["C"],"answer_display":"C","why_correct":"High change request volume due to project uncertainty is best addressed by using iterations — breaking the project into smaller, defined cycles reduces the scope per cycle and naturally limits the change surface area.","why_wrong":{"A":"Reducing approvers speeds up change processing but does not reduce the volume or impact of changes.","B":"Requiring sponsor approval for all changes adds bureaucratic overhead without reducing change drivers.","D":"Capping the number of allowed change requests artificially constrains legitimate requirements evolution."},"part":"Part 2","part_range":"Q51–Q100"},{"num":101,"type":"single","stem":"A project manager is starting a new project, and the project team is located in different countries. The team was going to use a specific tool to hold virtual meetings. However, that tool is not available in one team member's country. How should the project manager deal with this situation?","options":{"A":"Contact the project sponsor to have the team member removed from the project","B":"Ask the team member to move to another location where the tool is available","C":"Investigate alternative tools for virtual meetings that are available to all team members","D":"Start the project and use email to communicate with the team member until the tool is available"},"correct":["C"],"answer_display":"C","why_correct":"The PM should find a tool that works for everyone on the team — inclusion is a core principle. Investigating alternatives ensures no team member is excluded due to tool availability constraints.","why_wrong":{"A":"Removing a team member because of a tool limitation is disproportionate and loses project resources.","B":"Asking a team member to physically relocate for a tool issue is unreasonable.","D":"Starting the project with a two-tier communication system creates inequality and inefficiency from day one."},"part":"Part 3","part_range":"Q101–Q150"},{"num":102,"type":"single","stem":"Halfway through a project, the project sponsor is replaced by another peer who was not previously engaged in the project. The new project sponsor has rejected most of the project artifacts, and the team did not get the latest increment approved on the current iteration. Stakeholders are not feeling confident about the project outcome. What should the project manager have done to prevent this situation?","options":{"A":"Performed a stakeholder analysis when the sponsor joined the project","B":"Held a governance meeting to review the project increment","C":"Escalated the issue to ensure the increment would be approved","D":"Conducted a product iteration review with the new project sponsor"},"correct":["D"],"answer_display":"D","why_correct":"When a new sponsor joins mid-project, the PM should immediately conduct a product iteration review with them to get them up to speed on what has been built and gain their informed approval — preventing rejection from ignorance.","why_wrong":{"A":"Stakeholder analysis is valuable but the immediate need is to get the new sponsor familiar with the actual product work done.","B":"A governance meeting reviews process but doesn't show the sponsor the actual delivered increments.","C":"Escalating to force approval without first educating the new sponsor creates adversarial dynamics."},"part":"Part 3","part_range":"Q101–Q150"},{"num":103,"type":"single","stem":"A regulatory branch of an environmental government agency has recently placed a ban on the manufacturing of a specified thickness of plastic packaging products. This ban will take effect in 12 months. The project manager for a startup firm working in alternative packaging has been monitoring the progress of this law for a while and, as part of the risk management, has identified new products that can support a growing customer base. What should the project manager do next?","options":{"A":"Begin a marketing campaign to sell alternative packaging after the 12-month period ends","B":"Organize a meeting with all stakeholders and review the stakeholder engagement plan","C":"Continue production processes and plan to discuss changes at the next annual target review meeting","D":"Inform management of the new law as an opportunity to expand market share and share the proposed products"},"correct":["D"],"answer_display":"D","why_correct":"When a pre-identified regulatory risk becomes an opportunity, the PM should inform management immediately with the analysis and proposed products ready — enabling the organization to move proactively on the market opportunity.","why_wrong":{"A":"Launching a marketing campaign is a business decision, not the PM's role; management must decide first.","B":"Reviewing the stakeholder engagement plan does not exploit the identified opportunity.","C":"Waiting until the annual review misses a time-sensitive market opportunity window."},"part":"Part 3","part_range":"Q101–Q150"},{"num":104,"type":"single","stem":"A project manager is part of a balanced matrix project organization. The project manager will receive all work performance updates directly from the new sourcing department head who has no time to spare to give the project manager the information. What should the project manager do?","options":{"A":"Discuss the situation with the company project sponsor for advice","B":"Request information directly from the sourcing department team members","C":"Work out a resolution in consultation with the sourcing department head","D":"Present the situation to the manager of the sourcing department head"},"correct":["C"],"answer_display":"C","why_correct":"In a matrix organization, when a department head cannot provide information directly, the PM should work out a resolution collaboratively with the department head — not go around them or above them as a first move.","why_wrong":{"A":"Discussing with the sponsor before attempting resolution with the department head escalates prematurely.","B":"Requesting information directly from team members bypasses their manager and damages the PM-department relationship.","D":"Escalating to the department head's manager before attempting direct resolution is inappropriate."},"part":"Part 3","part_range":"Q101–Q150"},{"num":105,"type":"single","stem":"64 A project manager has just been hired by a company without a project management governance structure. During the kick-off meeting, a key stakeholder emphasizes the importance of the project meeting the company's strategy, investment, and compliance requirements. What should the project manager do?","options":{"A":"Put into place a project governance model in line with the requirements","B":"Replicate the organizational governance to the project governance","C":"Create an organizational project management governance","D":"Ask the organization to create a project portfolio governance"},"correct":["A"],"answer_display":"A","why_correct":"The PM should put a project-level governance model in place that aligns with the stakeholder's stated requirements — strategy, investment, and compliance. This is the PM's direct responsibility.","why_wrong":{"B":"Replicating organizational governance may not fit the specific project's needs for strategy, investment, and compliance.","C":"Creating an organizational PMO is beyond a single PM's scope and authority.","D":"Portfolio governance is above the project level; the immediate need is project-level governance."},"part":"Part 3","part_range"
