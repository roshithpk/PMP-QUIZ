:"Q101–Q150"},{"num":106,"type":"single","stem":"A third-party supplier demands payment for the services provided for a project. The agreement was that payment would be made after the organization receives payment from the client. The third-party supplier lacks the capital to meet their payroll and has informed the project manager that if they do not receive payment quickly, they will withdraw team members from the project. What should the project manager do?","options":{"A":"Explain the third-party supplier situation to the client and request payment.","B":"Inform the client that the project must be delayed until payment is received.","C":"Reassign resources from other projects to pay the third-party supplier.","D":"Process a bank loan to pay the payroll of the third-party supplier."},"correct":["A"],"answer_display":"A","why_correct":"The PM should transparently explain the supplier's payment situation to the client and request early payment — since the payment chain is the root cause of the problem, addressing it directly is the most effective solution.","why_wrong":{"B":"Announcing project delay before exploring payment solutions creates unnecessary conflict with the client.","C":"Reassigning resources from other projects would require approval and creates resource conflicts elsewhere.","D":"Processing a loan is outside the PM's authority and creates financial risk without addressing the root cause."},"part":"Part 3","part_range":"Q101–Q150"},{"num":107,"type":"single","stem":"A project manager is developing the stakeholder register and is having trouble understanding the motivation of some of the stakeholders. What should the project manager do to get this information?","options":{"A":"Identify each stakeholder's motivations from the business case.","B":"Request stakeholders articulate their motivations at the kick-off meeting.","C":"Email project objectives to all stakeholders and ask for endorsement.","D":"Organize a one-on-one conversation with each stakeholder."},"correct":["D"],"answer_display":"D","why_correct":"Understanding stakeholder motivations requires direct dialogue. One-on-one conversations allow the PM to ask open-ended questions and discover motivations that may never appear in formal documents.","why_wrong":{"A":"The business case documents project justification, not individual stakeholder motivations.","B":"A kick-off meeting is too formal and public for stakeholders to share candid motivations.","C":"Sending emails asking for endorsement captures agreement, not underlying motivations."},"part":"Part 3","part_range":"Q101–Q150"},{"num":108,"type":"single","stem":"During a project's initiation phase, a lessons learned sharing session was held with the team from another project. Low construction productivity was discussed as a potential delay to project completion. What should the project manager do next?","options":{"A":"Discuss this issue with the project sponsor to request additional funding to implement mitigation","B":"Prequalify contractors with proven track records to eliminate productivity concerns","C":"Add construction productivity to the risk register and develop a mitigation strategy for site execution","D":"Hire a construction management consultant to develop a comprehensive site execution plan"},"correct":["C"],"answer_display":"C","why_correct":"When a lessons learned session identifies a potential risk, the correct action is to formally add it to the risk register and develop a mitigation strategy — this is standard PMI risk management process.","why_wrong":{"A":"Requesting additional funding before analyzing the risk is premature.","B":"Pre-qualifying contractors addresses one potential response but is not the process-correct first step.","D":"Hiring a consultant is a specific mitigation option, not the first step in managing the identified risk."},"part":"Part 3","part_range":"Q101–Q150"},{"num":109,"type":"single","stem":"A project manager is managing a mobile application development project when one of the experienced team members starts missing deadlines. The delays will impact project implementation. What should the project manager do next?","options":{"A":"Assign an additional resource to help the team member with the tasks","B":"Ask the team member’s functional manager if there are any known issues","C":"Convene a team meeting to encourage and motivate the entire team","D":"Meet with the team member to understand their concerns and/or issues"},"correct":["D"],"answer_display":"D","why_correct":"When an experienced team member starts missing deadlines, the PM should meet directly with them to understand what's happening — the change in behavior signals an underlying issue that requires direct conversation.","why_wrong":{"A":"Assigning additional resources before understanding the root cause may be unnecessary or miss the real issue.","B":"Asking the functional manager implies a performance problem before the PM has investigated directly.","C":"A team meeting to motivate everyone addresses a group problem; this is an individual performance issue."},"part":"Part 3","part_range":"Q101–Q150"},{"num":110,"type":"single","stem":"A project manager is leading a hybrid project. The only available resources that have experience with agile are not at the project manager's location. The project has a strict schedule and budget, and the project manager is concerned about their ability to deliver it. What should the project manager do?","options":{"A":"Engage the agile resources through video conferencing on a daily basis","B":"Advise the sponsor that the project will be delayed as agile training will be required","C":"Request a budget extension to get local resources experienced in agile","D":"Plan to have the agile resources temporarily relocate to the project manager's location"},"correct":["A"],"answer_display":"A","why_correct":"For remote agile resources, daily video conferencing engagement ensures continuity of agile practices and collaboration without the cost of relocation or training delays.","why_wrong":{"B":"Advising delay before trying remote engagement as a solution is premature and creates unnecessary schedule impact.","C":"Requesting budget for local replacement resources is expensive when remote collaboration can work.","D":"Relocating resources temporarily is costly and disruptive when video conferencing can address the need."},"part":"Part 3","part_range":"Q101–Q150"},{"num":111,"type":"single","stem":"An agile facilitator has gathered a team for a new project. This team and facilitator have not yet worked on a project together. How should the facilitator proceed?","options":{"A":"Set up a lessons learned session from a similar project.","B":"Hold a team charter discussion.","C":"Schedule a release planning session.","D":"Conduct a product roadmap session with the team."},"correct":["B"],"answer_display":"B","why_correct":"For a new team that hasn't worked together, the first agile activity is a team charter discussion — establishing norms, working agreements, and shared expectations before any project work begins.","why_wrong":{"A":"Lessons learned from similar projects is useful context but doesn't establish this team's working agreement.","C":"Release planning requires the team to already have a working agreement and shared understanding of the product.","D":"A product roadmap session requires product clarity and team alignment that the team charter discussion first establishes."},"part":"Part 3","part_range":"Q101–Q150"},{"num":112,"type":"single","stem":"68 A project manager has been assigned to lead a software project to generate savings at an important financial institution. Initially, the duration of the project was 13 months, but due to various issues during execution, the project was extended to 16 months. By month 11, the expected savings were exceeded but not all of the functionalities planned for that date were fulfilled. How should the project manager inform the stakeholders of the project's progress?","options":{"A":"Complete the outstanding functionalities before informing the sponsor of the project progress","B":"Communicate the benefit expectations and the action plan for the pending functionalities","C":"Send an email with the monthly project progress to all relevant stakeholders","D":"Report that the project has not fulfilled all the expected functionalities"},"correct":["B"],"answer_display":"B","why_correct":"When benefits exceed expectations but some functionality is pending, the PM should communicate both the positive outcome and the action plan for pending items — honest, balanced reporting that addresses both achievement and gaps.","why_wrong":{"A":"Completing functionality before informing the sponsor delays transparency and violates timely reporting obligations.","C":"A generic monthly progress email doesn't specifically address the benefit-versus-functionality gap stakeholders care about.","D":"Reporting only the negative (unfulfilled functionality) without the positive (exceeded savings) is incomplete and misleading."},"part":"Part 3","part_range":"Q101–Q150"},{"num":113,"type":"single","stem":"A project manager is working on the delivery of a solution that needs to be deployed to the public quickly. The project team is experienced, the stakeholders are supporting the delivery, and the customer is cooperating. What strategy should the project manager use to ensure on-time delivery of the solution?","options":{"A":"Meet with the customer to agree on the components of the solution and the priorities","B":"Ask the sponsor for support regarding the allocation of additional resources to finish on time","C":"Have a high-level plan for incremental deliveries and get the customer's feedback as early as possible","D":"Have a detailed plan of all milestones, deliverables, functionalities, and allocation of resources"},"correct":["C"],"answer_display":"C","why_correct":"When time-to-market is the priority and the team is experienced with stakeholder support, incremental delivery with early customer feedback maximizes the chance of on-time, relevant delivery.","why_wrong":{"A":"Meeting with the customer to agree on components is planning-focused; the strategy should be about delivery speed.","B":"Requesting additional resources adds overhead when the team is already experienced and supported.","D":"A detailed plan of all milestones is a predictive approach that is slower and less adaptive for fast deployment."},"part":"Part 3","part_range":"Q101–Q150"},{"num":114,"type":"single","stem":"There is frequent conflict between two project team members working on a project. This has caused a negative impact on the project. How should the project manager handle this situation?","options":{"A":"Counsel both team members and caution them with a final warning.","B":"Relocate the two project team members into different project teams.","C":"Escalate the issue to the human resources (HR) manager before a larger problem develops.","D":"Help cultivate self-awareness between the two team members through emotional intelligence (EI)."},"correct":["D"],"answer_display":"D","why_correct":"PMI emotional intelligence approach: for recurring conflict between team members, building self-awareness through EI techniques addresses the root interpersonal cause rather than applying punitive or structural remedies.","why_wrong":{"A":"Final warnings escalate before attempting resolution and may worsen the relationship dynamic.","B":"Relocating team members to different teams abandons the resolution opportunity and doesn't build their interpersonal skills.","C":"Escalating to HR before attempting EI-based resolution skips the PM's direct responsibility."},"part":"Part 3","part_range":"Q101–Q150"},{"num":115,"type":"single","stem":"A few virtual team members are located in a region that generally has good internet connectivity. However, they frequently experience connectivity issues joining team calls during the day. What should the project manager do?","options":{"A":"Determine what the problem is and develop an action plan","B":"Ask the team members to use chat tools as an alternative to calls","C":"Procure tools that consume less bandwidth for internet calls","D":"Record the meeting to share with the team members who were unable to join"},"correct":["A"],"answer_display":"A","why_correct":"When virtual team members experience recurring connectivity issues, the PM must first determine the root cause before implementing any solution — the problem could be ISP, hardware, software, or time-of-day congestion.","why_wrong":{"B":"Switching to chat tools is a workaround that bypasses finding and fixing the actual problem.","C":"Procuring lower-bandwidth tools assumes bandwidth is the issue before diagnosis is done.","D":"Recording meetings for those who couldn't join leaves them out of real-time collaboration without solving the connectivity issue."},"part":"Part 3","part_range":"Q101–Q150"},{"num":116,"type":"single","stem":"A company's CEO complains about the frequency of project communications. The CEO receives five project reports each week by email but does not have enough time to review them. In addition, the information that the CEO receives is not relevant in that it does not explain the project status. What should the project manager do first?","options":{"A":"Meet with the team and decide the type and frequency of the reports to send to the CEO","B":"Send the CEO one executive summary per week instead of five reports per week","C":"Review the communications management plan","D":"Review the stakeholder engagement plan."},"correct":["C"],"answer_display":"C","why_correct":"When there's a communication problem, the PM should first review the communications management plan to understand what was agreed and identify where the gap exists before making changes.","why_wrong":{"A":"Deciding report type and frequency with only the team excludes the CEO's actual preferences.","B":"Sending one executive summary is a solution — but without reviewing the communications plan first, the PM doesn't know if this aligns with what was agreed.","D":"Reviewing the stakeholder engagement plan addresses engagement level, not report content or frequency."},"part":"Part 3","part_range":"Q101–Q150"},{"num":117,"type":"single","stem":"A project manager finds it challenging to comply with standardized processes for knowledge transfer. The project teams and stakeholders are scattered around field sites, the office, and remote locations. In addition, some team members have limited access to the electronically shared files. How should the project manager manage this challenge?","options":{"A":"Study the environment and the available resources to determine which approach to use.","B":"Send the intended information through email since it is the primary communication tool.","C":"Communicate a strong message to the team explaining the importance of knowledge transfer.","D":"Request changes in the processes since it is not suitable for the company environment."},"correct":["A"],"answer_display":"A","why_correct":"When standard knowledge transfer processes don't work for a distributed team with limited access, the PM should study the actual environment and available resources to determine an appropriate, context-specific approach.","why_wrong":{"B":"Defaulting to email ignores the diversity of access and communication preferences across field sites.","C":"Communicating the importance of knowledge transfer doesn't solve the structural access problem.","D":"Requesting process changes without first understanding the environment may produce equally unworkable alternatives."},"part":"Part 3","part_range":"Q101–Q150"},{"num":118,"type":"single","stem":"During iteration planning, team A identifies that an important deliverable is dependent upon a deliverable from team B. What should the project manager do?","options":{"A":"","B":"What should the project manager do? A. Ask team B to focus on their backlog and deliver based on their priority B. Inform team B of the dependency and ensure that the deliverable is planned","C":"Make team A a part of team B and ensure that the deliverable is ready","D":"Request team B to immediately start this activity and deliver to team A"},"correct":["B"],"answer_display":"B","why_correct":"When a cross-team dependency is identified during iteration planning, the PM should immediately inform the dependent team and ensure the deliverable is formally included in their plan — proactive dependency management.","why_wrong":{"A":"Asking team B to focus only on their backlog priority ignores the confirmed cross-team dependency.","C":"Merging teams creates structural disruption when a simple communication and planning coordination is needed.","D":"Demanding immediate start from team B without proper planning may disrupt their current commitments."},"part":"Part 3","part_range":"Q101–Q150"},{"num":119,"type":"single","stem":"A large construction project is progressing well as per the project objectives. The project manager would like to report the project's value to the project sponsor and seek the next phase of funding closure. What should the project manager do?","options":{"A":"Ensure a measurement system is in place like earned value analysis (EVA) to track project value for the project sponsor","B":"Create a detailed project report on successes and challenges for the project sponsor","C":"Submit a detailed report on the cost budget vs. the cost actuals as the project sponsor will want to know more about finances","D":"Arrange a site visit to show the project sponsor the construction progress in person"},"correct":["A"],"answer_display":"A","why_correct":"To report project value and seek next-phase funding, the PM needs a formal measurement system like EVA in place that quantifies delivered value objectively — this is what sponsors and funders need to see.","why_wrong":{"B":"A narrative report on successes and challenges is useful but doesn't quantify value in funding terms.","C":"A cost budget vs. actuals report shows financial performance but not business value delivered.","D":"A site visit shows physical progress but doesn't provide the quantified value metrics needed for funding closure."},"part":"Part 3","part_range":"Q101–Q150"},{"num":120,"type":"single","stem":"A project manager is planning a project with multiple work packages. Each work package has its own defined scope, but funding will be at the project level. How should the project manager determine if the allocated resource budget is sufficient to cover the resource costs of the project?","options":{"A":"Estimate the costs at the work package level and add those costs to calculate the total cost of the project and compare it to the allocated budget.","B":"Create a budget burndown and a scope burnup and then verify that the project scope is completed before the allocated budget is depleted.","C":"Divide the allocated budget by the number of work packages and verify that each work package can be completed within the allocated budget.","D":"Fund each work package in the order of its importance and shift any remaining scope from nonfunded work packages to funded work packages."},"correct":["A"],"answer_display":"A","why_correct":"Bottom-up cost estimation — estimating at work package level and rolling up — is the PMI-standard method for determining if allocated budget is sufficient. It provides the most accurate comparison to the allocated budget.","why_wrong":{"B":"Budget burndown and scope burnup are tracking tools used during execution, not for initial budget sufficiency determination.","C":"Dividing budget equally across work packages ignores that different work packages have different resource requirements.","D":"Prioritizing funding and dropping scope is a last resort, not the initial budget sufficiency analysis method."},"part":"Part 3","part_range":"Q101–Q150"},{"num":121,"type":"single","stem":"A project manager is managing a project that is halfway through its execution phase, and the quality standards of the deliverables were formally accepted. However, a government agency has recently introduced new standards that may significantly impact the project. The deliverables must be changed to align with the new quality standards. What should the project manager do?","options":{"A":"Schedule training for the project team on the new regulations introduced by the government agency","B":"Set up a structured, independent processes to determine if project activities followed the standards","C":"Update the lessons learned register and inform senior management of the new standards","D":"Evaluate the impact the new regulations will have on the project and submit a change request"},"correct":["D"],"answer_display":"D","why_correct":"When new government standards are introduced mid-project, the PM must evaluate the full impact on the project and submit a change request — both to formalize the required change and to get approval for any resulting scope, schedule, or cost adjustments.","why_wrong":{"A":"Training the team is a downstream action; impact assessment and change control must come first.","B":"Setting up an audit process addresses compliance checking, not the required deliverable changes.","C":"Updating lessons learned and informing senior management doesn't address the actual deliverable change requirement."},"part":"Part 3","part_range":"Q101–Q150"},{"num":122,"type":"single","stem":"A project team's performance is being impacted by impeding internal procedures that are affecting the progress of activities and team autonomy. What should the project manager do first to address this situation?","options":{"A":"Discuss the issue in the next sprint review meeting","B":"Train the team members on the organization's procedures","C":"Ask the organization to improve the internal procedures","D":"Try to remove the barriers and empower team members"},"correct":["D"],"answer_display":"D","why_correct":"PMI servant leadership: when internal procedures are blocking team performance and autonomy, the PM's first action is to remove those barriers — this directly addresses both the performance impact and the autonomy concern.","why_wrong":{"A":"Discussing at the next sprint review delays action on an immediate performance-impacting impediment.","B":"Training on procedures that are the impediment reinforces the problem rather than solving it.","C":"Asking the organization to improve procedures is the right eventual outcome but takes longer; the PM should first remove the immediate barriers."},"part":"Part 3","part_range":"Q101–Q150"},{"num":123,"type":"single","stem":"A self-organizing team for a critical project is consistently delivering value according to their commitments. During a retrospective, the project manager observed that most of the team members were stressed due to over commitments. What should the project manager do?","options":{"A":"Support the team during the planning phase to only commit to what they are able to deliver","B":"Request additional resources to continue delivering value while reducing team stress","C":"Ask individual team members to plan staggered leave to avoid becoming stressed","D":"Help the team members by organizing regular stress-relieving and team- building sessions"},"correct":["A"],"answer_display":"A","why_correct":"When a self-organizing team is over-committing and becoming stressed, the PM should support them during planning to make sustainable commitments — this addresses the root cause proactively in future sprints.","why_wrong":{"B":"Adding resources increases team complexity and may not reduce stress if over-commitment culture persists.","C":"Staggered leave manages symptoms but doesn't address the over-commitment planning problem.","D":"Stress-relieving sessions treat the symptom; sustainable sprint planning treats the cause."},"part":"Part 3","part_range":"Q101–Q150"},{"num":124,"type":"single","stem":"75 A project manager received the project charter for a new product. The project is expected to have two main deliveries: the hardware part that has detailed specifications already defined, including a sample machine, and the user interface software that has only a basic specification and a requirement for a user experience design approach. Which project management approach should the project manager use?","options":{"A":"The software development has a high uncertainty level, so an agile approach is recommended for the project.","B":"A hybrid approach will work, using agile for software development and a predictive approach for the hardware deliveries.","C":"The deliverables are significantly different, so the project should be split into two projects that are driven by a program.","D":"The scope is well defined; therefore, a predictive approach is straightforward and the hardware and software can by synchronized on the gates."},"correct":["B"],"answer_display":"B","why_correct":"A hybrid approach is ideal here: predictive for the hardware (detailed specs, physical sample already exists = low uncertainty) and agile for the software (basic spec only, UX design approach = high uncertainty). Each component gets the methodology that fits its nature.","why_wrong":{"A":"Pure agile for the whole project ignores the hardware component's well-defined predictive requirements.","C":"Splitting into two separate projects adds governance overhead when a hybrid approach on one project handles both components.","D":"Pure predictive ignores the explicitly stated need for a UX design approach on the software, which requires iterative feedback."},"part":"Part 3","part_range":"Q101–Q150"},{"num":125,"type":"single","stem":"An agile team member received certification on a new tool; however, this team member is complaining that the rest of the team is not using the tool due to lack of knowledge. How should the servant leader apply emotional intelligence to leverage this situation to benefit the project?","options":{"A":"Request budget to reward the team member so others will be motivated to obtain the same certification.","B":"Promote the team member to product owner to leverage the new knowledge with the clients.","C":"Ask the team member to use their recently acquired knowledge to develop and provide training to the team.","D":"Provide an incentive to team members who begin using the new tool on this project."},"correct":["C"],"answer_display":"C","why_correct":"Servant leadership + emotional intelligence = recognizing the certified team member's knowledge as an asset and channeling it productively by having them train the team. This benefits both the team member (recognition, growth) and the team (knowledge transfer).","why_wrong":{"A":"Budget rewards for certification may motivate others but doesn't address the immediate knowledge gap in the team.","B":"Promoting to product owner based on one tool certification is an inappropriate and disproportionate response.","D":"Incentives for using the tool don't transfer the knowledge needed to use it effectively."},"part":"Part 3","part_range":"Q101–Q150"},{"num":126,"type":"single","stem":"A project manager has been assigned to a project after the charter has been approved. While reviewing the charter with the team, the project manager finds that some major budget items, necessary for achieving the project outcome, have been missed. What should the project manager do next?","options":{"A":"Immediately discuss this with the project sponsor and request to revisit the budget to ensure its accuracy","B":"Add the missing budget items to the risk log and present them in the next project steering committee","C":"Start the project and deal with these budget issues as they arise throughout the project life cycle","D":"Reduce the quality and cost of other deliverables to allow additional budget for the items that were missed"},"correct":["A"],"answer_display":"A","why_correct":"Missing major budget items discovered during charter review is a critical finding that must be immediately escalated to the project sponsor — the charter cannot be executed accurately without budget accuracy.","why_wrong":{"B":"Adding to the risk log understates the severity; a budget gap is a known, confirmed problem, not just a risk.","C":"Starting the project knowing the budget is incomplete creates predictable and avoidable failure.","D":"Reducing quality of other deliverables to cover the gap is scope reduction without change control approval."},"part":"Part 3","part_range":"Q101–Q150"},{"num":127,"type":"single","stem":"A project schedule risk has turned into an issue. The project manager foresees delays in project execution. What should the project manager do to resolve the issue?","options":{"A":"Escalate the issue to senior leadership for resolution","B":"Work with relevant stakeholders to determine possible solutions","C":"Update the schedule baseline to the new project time line","D":"Update the risk management plan and send it to the project team"},"correct":["B"],"answer_display":"B","why_correct":"When a schedule risk becomes an issue, the PM should work with relevant stakeholders to collaboratively determine possible solutions — this is the correct issue resolution process in PMI.","why_wrong":{"A":"Escalating to senior leadership before attempting team-level solution is premature escalation.","C":"Updating the schedule baseline without approved changes violates change control process.","D":"Updating the risk management plan is documentation, not a solution to the active issue."},"part":"Part 3","part_range":"Q101–Q150"},{"num":128,"type":"single","stem":"A project manager is assigned to a project where a vendor has been engaged to build a new system. One week before user acceptance testing (UAT) is scheduled, the vendor informs the project manager that they can only deliver half of the promised functions by the UAT start date. What should the project manager do next?","options":{"A":"Communicate with the vendor and project team and explore possibilities for resolving the issue","B":"Wait until the vendor cannot deliver and then invoke liquidated damages based on the contract","C":"Escalate to management and prepare for project closure by canceling the contract with this vendor","D":"Adjust the project schedule to accommodate the current development progress of the vendor"},"correct":["A"],"answer_display":"A","why_correct":"When a vendor fails to deliver as promised, the PM's first action is to communicate with the vendor and project team to explore all possible resolution options — collaboration before escalation or legal action.","why_wrong":{"B":"Waiting passively until the vendor completely fails before invoking penalties is reactive and causes unnecessary delay.","C":"Immediately preparing for project closure and contract cancellation is a disproportionate first response.","D":"Unilaterally adjusting the schedule without first exploring resolution options accepts the failure prematurely."},"part":"Part 3","part_range":"Q101–Q150"},{"num":129,"type":"single","stem":"In a time-critical construction project, a misunderstanding occurred between the supervisor and the technician. The misunderstanding turned into a major conflict and the technician has complained to the project manager that they cannot continue to work under the supervisor any longer. The supervisor cites the technician's poor performance as the reason for the conflict. How should the project manager resolve the problem?","options":{"A":"Use a direct, collaborative approach with the technician and supervisor","B":"Provide a just-in-time training to the technician to improve their skill set","C":"Replace the technician with a high performing resource as time is critical","D":"Talk to the supervisor to tone down their approach and attitude"},"correct":["A"],"answer_display":"A","why_correct":"Conflict between supervisor and technician that has escalated requires a direct, collaborative approach — bringing both parties together with the PM facilitating to understand the misunderstanding and reach resolution.","why_wrong":{"B":"Training the technician assumes their performance is the issue before the PM has investigated both sides.","C":"Replacing the technician is extreme and assumes they are at fault before the conflict is fully understood.","D":"Only speaking to the supervisor about their approach addresses one side without resolving the actual conflict."},"part":"Part 3","part_range":"Q101–Q150"},{"num":130,"type":"single","stem":"A project is comprised of team members who are not engaged and committed to project success. What should the project manager do to address this situation?","options":{"A":"Contact the project sponsor to request approval to release the current team and hire replacement personnel","B":"Call each team member to gain their perspective on the problem, then bring the whole team together to discuss a solution","C":"Send each team member a direct email indicating that disciplinary action is likely if they do not change their attitude","D":"Accept the situation knowing there is schedule slack available to release on an incremental basis when necessary"},"correct":["B"],"answer_display":"B","why_correct":"When a team lacks engagement, the PM should first understand why by speaking to individuals, then facilitate a team discussion to surface and address the root causes — this is servant leadership in practice.","why_wrong":{"A":"Requesting to release and replace the team is a drastic escalation that bypasses the PM's responsibility to engage first.","C":"Threatening disciplinary action for attitude issues without first understanding why creates resentment and further disengagement.","D":"Accepting disengagement and waiting is abdicating the PM's responsibility to the team."},"part":"Part 3","part_range":"Q101–Q150"},{"num":131,"type":"single","stem":"A project manager has been assigned a project to build a new solar farm that will provide clean energy to a new housing complex. The government has decided to reduce the tax on renewable energy products starting 1 January. The supplier has reached out and stated that the order placed for solar panels to be delivered on 20 December might be delayed until early January. On the other hand, the project will face similar constraints due to the December holidays. What should the project manager do about this risk?","options":{"A":"Review the supplier's contract to understand the terms of sale","B":"Insist that the supplier deliver the goods on the agreed date","C":"Update the risk register and take advantage of the opportunity","D":"Accept the risk and update the risk register"},"correct":["C"],"answer_display":"C","why_correct":"The delayed delivery until January aligns with the tax reduction opportunity that starts January 1st — this is an identified opportunity. The PM should update the risk register to reflect this positive risk and actively take advantage of it.","why_wrong":{"A":"Reviewing the supplier's contract is relevant but doesn't address the opportunity dimension of the situation.","B":"Insisting on the original December date misses the January tax opportunity that both the project and supplier might benefit from.","D":"Simply accepting the risk without exploiting the opportunity misses a chance to improve project economics."},"part":"Part 3","part_range":"Q101–Q150"},{"num":132,"type":"single","stem":"A project manager is assigned to manage a project for a previous client of the company. The project manager was warned that this client will likely try to add extra scope to the project without considering the impact of change on time, cost, quality, and risks. Which action should the project manager take to help plan and manage the budget and resources?","options":{"A":"Refuse to allow the client to change the scope and examine the lessons learned register.","B":"Decompose the deliverables into work packages and review the project charter.","C":"Create tight scope statements and review the historical information.","D":"Include a scope change process and review the project charter."},"correct":["D"],"answer_display":"D","why_correct":"To manage a client prone to scope creep, the PM should include a formal scope change process and review the project charter — this establishes the process boundary and the agreed baseline that scope changes must go through.","why_wrong":{"A":"Refusing all scope changes is inflexible; change should be managed through process, not refused outright.","B":"WBS decomposition and charter review help plan but don't create the mechanism to manage change requests.","C":"Tight scope statements are useful but without a change process, the client can still submit changes without consequence."},"part":"Part 3","part_range":"Q101–Q150"},{"num":133,"type":"single","stem":"A project manager is managing a project with a hybrid approach and has requested a senior team member to perform a quantitative risk analysis. The team member responds that they do not have the knowledge to perform such an analysis. What should the project manager do?","options":{"A":"Help the team member to perform the quantitative risk analysis through coaching, mentoring, and training","B":"Escalate the issue to the functional manager","C":"Perform the quantitative risk analysis for the team member","D":"Contact the project management office (PMO) and request them to assign another team member who has the knowledge to perform this task to the team"},"correct":["A"],"answer_display":"A","why_correct":"PMI servant leadership: when a team member lacks a skill needed for their assigned role, the PM should help them develop it through coaching, mentoring, and training — building team capability rather than bypassing it.","why_wrong":{"B":"Escalating to the functional manager is premature when the PM can directly support skill development.","C":"Performing the analysis for the team member prevents their growth and creates dependency.","D":"Requesting a replacement from the PMO before attempting to develop the existing team member's skills is premature."},"part":"Part 3","part_range":"Q101–Q150"},{"num":134,"type":"single","stem":"A senior developer working on a large artificial intelligence (AI) project has worked hard and shown excellent results. The project manager is very happy with the developer's contribution and thinks that the developer deserves a reward. What should the project manager do?","options":{"A":"Create an opportunity for the project team to recognize this developer","B":"Print a recognition certificate and present it to the developer during a meeting","C":"Send a recognition email to the team and copy management","D":"Reward the developer according to their motivations and interests"},"correct":["D"],"answer_display":"D","why_correct":"PMI motivational theory: rewards are most effective when tailored to individual motivations. The PM should find out what actually motivates this developer and reward accordingly, not apply a generic recognition approach.","why_wrong":{"A":"Team recognition is valuable but may not be what personally motivates this individual.","B":"A printed certificate is a generic gesture that may not match the developer's actual motivational preferences.","C":"An email to the team recognizes the person publicly but may embarrass introverts or feel hollow to others."},"part":"Part 3","part_range":"Q101–Q150"},{"num":135,"type":"single","stem":"A global program is being kicked off, and various distributed teams are involved in delivering the initiative. Besides planning and executing the scope for the initiative, team interactions must be considered. How should the project teams interact in their meetings?","options":{"A":"Videoconferencing","B":"Encrypted emails","C":"Phone conversations","D":"Chat conversations"},"correct":["A"],"answer_display":"A","why_correct":"For global distributed teams where team interactions are critical, videoconferencing is the richest communication medium available — it captures non-verbal cues, builds rapport, and facilitates real-time collaboration most effectively.","why_wrong":{"B":"Encrypted emails are secure but asynchronous and miss the interactive, relationship-building dimension.","C":"Phone conversations lack visual cues that are important for distributed team cohesion.","D":"Chat is useful for quick updates but lacks the rich interaction needed for team meetings."},"part":"Part 3","part_range":"Q101–Q150"},{"num":136,"type":"single","stem":"A project manager is part of a global project team and is in charge of managing the scope defined by their country. There is a clear division regarding which pieces of the scope should be treated by global and local teams. During the last sprints, the project manager has been receiving requests that the global team should handle. What should the project manager do in this situation?","options":{"A":"Assess the team's capacity to absorb the workload","B":"Evaluate and understand the cause of the conflict","C":"Escalate the situation to the project sponsor","D":"Reject the workload back to the global team"},"correct":["B"],"answer_display":"B","why_correct":"Before taking action on work that should belong to the global team, the PM should first evaluate and understand the cause of the conflict — why these requests are coming to the local PM clarifies the right solution.","why_wrong":{"A":"Assessing capacity to absorb work assumes the work should be accepted before understanding the root cause.","C":"Escalating to the project sponsor before understanding the conflict is premature.","D":"Rejecting the workload without understanding why it's arriving may perpetuate the underlying problem."},"part":"Part 3","part_range":"Q101–Q150"},{"num":137,"type":"single","stem":"A company is transitioning projects from a predictive to an agile approach. The CFO is concerned that one of the agile projects has an important feature for the financial department that is being delayed for a later iteration. What should the project manager do to clarify the situation?","options":{"A":"Request support from the CEO on how to deal with the situation","B":"Increase the size of the team in order to match any prior expectations of the CFO","C":"Create an executive board to review the product backlog and replan the next iterations","D":"Clarify with the CFO that the prioritization process is based on business value"},"correct":["D"],"answer_display":"D","why_correct":"When a CFO questions why their priority feature is delayed, the PM should clarify the agile prioritization process — that items are sequenced by business value as assessed by the product owner, not by executive preference.","why_wrong":{"A":"CEO support is not needed for a product backlog prioritization explanation — the PM can clarify this directly.","B":"Increasing team size changes capacity but doesn't address the CFO's misunderstanding of agile prioritization.","C":"Creating an executive board to review the backlog adds inappropriate governance overhead to the agile process."},"part":"Part 3","part_range":"Q101–Q150"},{"num":138,"type":"single","stem":"A project manager for a technologically complex engagement reviews the key project indicators with the main stakeholders on a regular basis. During one of the meetings, the project sponsor explains that they are using the project manager's risk register as a way to communicate about the project at the executive level. How should the project manager ensure that project risks are reported accurately in the risk register?","options":{"A":"Update the risks in the risk management plan","B":"Review the risks throughout project execution","C":"List the project risks identified in the kick-off meeting","D":"Plan to update the risks at project closure"},"correct":["B"],"answer_display":"B","why_correct":"Since the risk register is being used at executive level, the PM must review and update risks continuously throughout execution — not just at kick-off or closure — to ensure accuracy when it matters most.","why_wrong":{"A":"Updating the risk management plan is a process document; the register itself needs continuous updating.","C":"Listing only kick-off meeting risks produces a static, rapidly stale register — risk identification is continuous.","D":"Planning to update at project closure means the register is outdated throughout the entire execution phase."},"part":"Part 3","part_range":"Q101–Q150"},{"num":139,"type":"single","stem":"A project manager recently finished a project and started managing a new project with a different supervisor. As part of the early project activities, the supervisor from the original project is assigned to the team as a nonsupervisory resource and immediately begins challenging all decisions made by the current supervisor. What should the project manager do to resolve this conflict?","options":{"A":"Ensure the new supervisor takes the lead when being challenged","B":"Give the project team time to work through the issues with the new supervisor","C":"Immediately remove the resource from the project team","D":"Communicate with the resource on the roles and responsibilities of this project"},"correct":["D"],"answer_display":"D","why_correct":"When a former supervisor is challenging the current supervisor in their new non-supervisory role, the PM should clearly communicate the resource's current role and responsibilities — setting clear expectations resolves role confusion.","why_wrong":{"A":"Ensuring the new supervisor takes the lead doesn't address the former supervisor's inappropriate behavior.","B":"Giving time for the team to work it out is passive when the disruption is ongoing and affecting the project.","C":"Immediately removing the resource is an extreme action before attempting role clarification."},"part":"Part 3","part_range":"Q101–Q150"},{"num":140,"type":"single","stem":"A project manager sent the first communication about the project management plan to the team. The next day, two field engineers were asking about their roles and the project schedule. What should the project manager have done?","options":{"A":"Sent the roles and responsibilities matrix along with the project management plan","B":"Confirmed that the communication was understood and solicited feedback from the team","C":"Briefed each team member on their roles before sending the project management plan","D":"Discussed the roles with the managers to help explain them to their team members"},"correct":["B"],"answer_display":"B","why_correct":"After sending a communication, the PM must confirm it was understood and invite feedback — sending information is not the same as ensuring communication was received and understood.","why_wrong":{"A":"Including the RACI with the plan would have helped but doesn't address whether the communication itself was understood.","C":"Briefing each member before sending the plan is thorough but the key missing action was confirming understanding after sending.","D":"Having managers explain roles is an indirect approach; direct communication confirmation is more effective."},"part":"Part 3","part_range":"Q101–Q150"},{"num":141,"type":"single","stem":"A solution designer in an agile team often passes the design information to team members without any documentation. This has resulted in misunderstandings within the team. What should the agile leader do?","options":{"A":"Move the solution designer to another team","B":"Review the process that resulted in this situation","C":"Ask the team to document the design","D":"Stop work until the design document is completed"},"correct":["B"],"answer_display":"B","why_correct":"When undocumented verbal information sharing is causing misunderstandings, the agile leader should review the process that allows this to happen — addressing the systemic cause, not just enforcing documentation.","why_wrong":{"A":"Moving the designer to another team doesn't fix the process gap and loses their expertise.","C":"Asking the team to document isn't enough without understanding why documentation isn't happening.","D":"Stopping all work until documentation is complete is an extreme response that halts value delivery."},"part":"Part 3","part_range":"Q101–Q150"},{"num":142,"type":"single","stem":"A software system is being built for a company. Once the system is in production, the team would like to collect usage data to evaluate the delivered value. Which evaluation practice should the project lead use to obtain accurate usage data?","options":{"A":"Embed a feedback form into the system for users to respond","B":"Build the functionality in the software to collect the operational usage data","C":"Send out a questionnaire to all users regarding the most useful features","D":"Interview a sampling of users to obtain the usage data"},"correct":["B"],"answer_display":"B","why_correct":"Building usage tracking functionality directly into the software provides the most accurate, continuous, and unbiased operational usage data — it captures actual behavior rather than self-reported behavior.","why_wrong":{"A":"Embedded feedback forms capture voluntary responses, which are biased toward users with strong opinions.","C":"Questionnaires are self-reported and subject to recall bias; they don't capture actual usage patterns.","D":"Interviews provide qualitative insight but are small-sample and don't represent all 200+ users' actual behavior."},"part":"Part 3","part_range":"Q101–Q150"},{"num":143,"type":"single","stem":"A software project using an agile approach is facing quality issues with every release, generating many production problems. What should the project manager do to fix the problem and improve the quality?","options":{"A":"Use the retrospective meeting to better understand the root cause of the quality problems and put together a plan with the team to address the problems","B":"Hire an external company to add an additional layer of testing, making sure that the final product is well inspected before releasing","C":"Create a reward system granting incentives to the team members who are able to catch more defects","D":"Seek extra funding approval with the sponsor to replace junior team members for more experienced ones"},"correct":["A"],"answer_display":"A","why_correct":"Quality problems in agile are a team process issue. The retrospective is the purpose-built mechanism for the team to collectively analyze root causes and create improvement plans — it empowers the team rather than imposing external solutions.","why_wrong":{"B":"External testing adds cost and delays feedback without building internal quality capability.","C":"Bug-finding incentives create perverse incentives (introduce bugs to find them) and don't prevent the quality issues.","D":"Replacing junior team members with senior ones is expensive and assumes the problem is skill-based without root cause analysis."},"part":"Part 3","part_range":"Q101–Q150"},{"num":144,"type":"single","stem":"A project manager is managing a national rollout for an innovative product in a regulated environment that is expected to change. The project management office (PMO) needs visibility of the regulatory constraints while maintaining a degree of flexibility. Which tool can the project manager use?","options":{"A":"Use a burndown chart to provide transparency","B":"Use a burnup chart to provide transparency","C":"Use a kanban board to increase accountability","D":"Use a product backlog to manage changes"},"correct":["B"],"answer_display":"B","why_correct":"A burnup chart shows both completed work and total scope, providing transparency on progress while also making scope changes visible — ideal for PMO visibility of regulatory constraints in a flexible environment.","why_wrong":{"A":"A burndown chart shows remaining work but doesn't visually show scope changes or regulatory constraint additions.","C":"A kanban board increases accountability for work items but doesn't provide the PMO the regulatory constraint visibility needed.","D":"A product backlog manages the changes but doesn't provide the visual transparency the PMO needs for reporting."},"part":"Part 3","part_range":"Q101–Q150"},{"num":145,"type":"single","stem":"A project manager is managing a very important business transformation project. The goal of the project is to extend a desktop application with a mobile application module. The marketing department believes that a main competitor is working on a similar product. Which delivery approach should the project manager use for this project?","options":{"A":"Extreme Programming (XP) delivery, to mitigate the high risk related to a new product","B":"Traditional delivery, to ensure high quality and that the product meets market demands","C":"Incremental delivery, to ensure that mobile capability is released fast to the users","D":"Iterative delivery, to ensure that user feedback is incorporated into the second iteration"},"correct":["C"],"answer_display":"C","why_correct":"When a competitor is racing to market with a similar product, incremental delivery ensures the mobile capability reaches users as quickly as possible — protecting market position through speed to market.","why_wrong":{"A":"XP is a development practice set, not a delivery strategy for responding to competitive threats.","B":"Traditional delivery is slower and less able to respond to competitive timing requirements.","D":"Iterative delivery incorporates feedback but doesn't guarantee speed to market; incremental releases the working product sooner."},"part":"Part 3","part_range":"Q101–Q150"},{"num":146,"type":"single","stem":"During the implementation phase of a construction project, a key supplier went bankrupt and cannot supply the contracted material. This issue could affect the project schedule. What should the project manager do first?","options":{"A":"Escalate to the management team for delay approval","B":"Add the risk and the delay to the risk register","C":"Update the schedule to include the delay","D":"Update the issue log and act to minimize the impact"},"correct":["D"],"answer_display":"D","why_correct":"A supplier going bankrupt is an issue (not just a risk) that needs immediate action. The PM should update the issue log and immediately take action to minimize schedule impact — finding an alternative supplier or workaround.","why_wrong":{"A":"Escalating to management for delay approval accepts the delay before exploring alternatives.","B":"Adding to the risk register is incorrect — it has already materialized as an issue, not a risk.","C":"Updating the schedule to include the delay accepts it without first trying to minimize it."},"part":"Part 3","part_range":"Q101–Q150"},{"num":147,"type":"single","stem":"A project manager for a factory construction project in a small town is evaluating the necessary actions to engage stakeholders. The local community is speculating the impact of the facility. There are rumors of job opportunities and environmental impacts, which are listed on the project risk matrix. What should the project manager do with regard to community engagement in this situation?","options":{"A":"Build channels to extend communication efforts to the local community.","B":"Focus on the sideward stakeholders only and let the organization manage the community.","C":"Use the city administration to address communication with the community.","D":"Include the local union representative in the high-power, high-impact stakeholder group."},"correct":["A"],"answer_display":"A","why_correct":"When the community is speculating and rumors exist on the risk matrix, the PM should proactively build communication channels to the local community — engaging them directly to address concerns and provide accurate information.","why_wrong":{"B":"Focusing only on sideward stakeholders ignores a community whose speculation is already on the risk matrix.","C":"Delegating community communication to city administration reduces PM control over project narrative.","D":"Including the union representative in high-impact stakeholder groups may not represent the full community concern."},"part":"Part 3","part_range":"Q101–Q150"},{"num":148,"type":"single","stem":"A project manager was replaced in the early phases of a new project. The new project manager discovers that the business team is not supporting the project. After discussing these concerns with the team, it is determined that the project does not have the full support of senior management. What should the new project manager do next?","options":{"A":"Request the business team to clearly define their issues with the project work completed to date.","B":"Send out a status report describing the situation to the stakeholders and request general assistance.","C":"Study the stakeholder analysis to understand which stakeholder holds the most influence and seek their assistance.","D":"Ask senior management to be more involved with the project and to provide their full support."},"correct":["C"],"answer_display":"C","why_correct":"When the project lacks senior management support, the PM should use the stakeholder analysis to identify the most influential stakeholder and leverage their support to re-engage senior management — political mapping before action.","why_wrong":{"A":"Asking the business team to define their issues is useful but doesn't address the senior management support gap.","B":"Sending a status report asking for general assistance is passive and unlikely to secure targeted support.","D":"Directly asking senior management to be more involved without engaging the most influential stakeholder first may be ineffective."},"part":"Part 3","part_range":"Q101–Q150"},{"num":149,"type":"single","stem":"A company has rolled out the latest retail management system, and the project has been handed over to operations. The operations team finds that many of the day-to-day requirements are not covered in the system, and support for the project has limited hours. The project team has dissolved and the contract resources are no longer working on the project. As a result, the operations team has been facing numerous customer issues. What should the project lead have done initially to avoid this situation?","options":{"A":"Involved operations stakeholders during planning","B":"Reviewed the project management plan","C":"Increased support hours for the hours of operation","D":"Created a detailed operations manual"},"correct":["A"],"answer_display":"A","why_correct":"Operations teams discovering gaps post-handover is a classic planning failure — operations stakeholders should have been involved during planning to ensure day-to-day operational requirements were captured in the system scope.","why_wrong":{"B":"Reviewing the PM plan is reactive; the issue is that operations input wasn't in the plan.","C":"Increasing support hours treats the symptom, not the root cause of missing operational requirements.","D":"A detailed operations manual helps knowledge transfer but doesn't address the missing functional requirements."},"part":"Part 3","part_range":"Q101–Q150"},{"num":150,"type":"single","stem":"A project team is transitioning from a predictive to an agile approach. The project manager is trying to minimize the support issues that the product has had in production. One particular pain point is the transition to operations, where the issues usually arise. What should the project manager do to improve this scenario?","options":{"A":"Engage the operation teams in the retrospectives and demo sessions and incorporate their feedback on project activities","B":"Increase the focus on backlog items that cover support requirements, as well as product manuals and operation guides","C":"Foster stakeholder participation by engaging them early on the backlog discussions","D":"Ask the support/operation team to participate in the daily standup meetings to contribute to the project's progress"},"correct":["A"],"answer_display":"A","why_correct":"To smooth the transition to operations, the PM should engage the operations team in retrospectives and demos — incorporating their operational perspective into the project's activities so the handover is a natural continuation, not a handoff.","why_wrong":{"B":"Increasing backlog focus on support items addresses content but doesn't build the operations team's familiarity with the product.","C":"Early backlog discussions help prioritization but don't give operations the process knowledge needed for transition.","D":"Daily standup participation for operations is over-engagement; retrospectives and demos are the right-sized touchpoints."},"part":"Part 3","part_range":"Q101–Q150"},{"num":151,"type":"single","stem":"After signing an agreement with a vendor, the project manager notices that the vendor is continuously asking for changes on the procurement statement of work (SOW). These changes would improve the project outcome. What should the project manager do next?","options":{"A":"Consult the list of selected vendors for the bid and evaluate a possible change of vendor.","B":"Revise the procurement control process to avoid undesired changes that might affect the schedule.","C":"Assess the situation as an opportunity for improvement and perform a risk analysis.","D":"Conduct an audit on the procurement process and inform the vendor about the audit's observations."},"correct":["C"],"answer_display":"C","why_correct":"A vendor continuously requesting SOW changes post-signing could represent a legitimate improvement opportunity. The PM should assess it as a potential improvement and perform risk analysis before accepting or rejecting.","why_wrong":{"A":"Switching vendors because they're suggesting improvements is an overreaction to potentially valuable input.","B":"Revising the control process to block changes ignores that these changes could improve the project outcome.","D":"Conducting a procurement audit is adversarial and premature when the changes haven't been evaluated yet."},"part":"Part 4","part_range":"Q151–Q200"},{"num":152,"type":"single","stem":"A project manager is performing earned value management (EVM) for a cross-country pipeline project. The project manager has determined the ratio of earned value (EV) to actual cost (AC) for the project and has found the calculated result to be 0.9024. What does this value mean for the project?","options":{"A":"The project is earning less value than was planned","B":"The project has started exceeding the planned cost","C":"The project has earned more value than planned","D":"The project is close to exceeding the planned cost"},"correct":["B"],"answer_display":"B","why_correct":"CPI = EV/AC = 0.9024, which is less than 1.0. This means the project is spending more than the value it is earning — it is exceeding planned cost. The project has started to exceed the planned cost.","why_wrong":{"A":"SPI (EV/PV) measures schedule variance; CPI measures cost. This value indicates cost overrun, not schedule.","C":"A CPI above 1.0 would mean more value than planned was earned. 0.9024 is below 1.0, indicating cost overrun.","D":"Close to exceeding is not the correct interpretation; it has already exceeded — it is earning less value than what it is spending."},"part":"Part 4","part_range":"Q151–Q200"},{"num":153,"type":"single","stem":"A customer complains that the user stories released so far contain too much jargon and do not reflect the expectations of the product. What should the project manager do next?","options":{"A":"Rewrite the stories to include the technical vision of the product","B":"Ask the senior developer to rewrite all the stories","C":"Engage with the customer and rewrite all the stories","D":"Request approval from the company director to conduct training for the team"},"correct":["C"],"answer_display":"C","why_correct":"When user stories contain too much jargon and don't reflect customer expectations, the PM should engage with the customer directly and rewrite the stories collaboratively — the customer's voice is essential to accurate user stories.","why_wrong":{"A":"Rewriting stories with only technical vision ignores the customer's stated concern about reflection of their expectations.","B":"Having only the senior developer rewrite excludes the customer whose expectations are the problem.","D":"Training approval is a bureaucratic step that delays addressing the immediate quality gap in the stories."},"part":"Part 4","part_range":"Q151–Q200"},{"num":154,"type":"single","stem":"An unforeseen event has shut down public works projects for 4 weeks. Activities on the critical path will fall behind based on the project schedule. What should the project manager do?","options":{"A":"Add 4 additional weeks to the schedule and request additional resources.","B":"Ask the sponsor to obtain a special work permit to continue work.","C":"Crash the resource management plan to keep the schedule on track.","D":"Review the project management plan to see the impact of the possible delay."},"correct":["D"],"answer_display":"D","why_correct":"When an unforeseen event threatens the schedule, the PM must first review the project management plan to understand the full impact, float available, and response options before taking any corrective action.","why_wrong":{"A":"Adding weeks and resources before assessing impact may over-respond to a situation where float or schedule compression exists.","B":"Obtaining a work permit is a possible action after reviewing the plan's options and impact.","C":"Crashing resources without first reviewing the project management plan skips the impact assessment step."},"part":"Part 4","part_range":"Q151–Q200"},{"num":155,"type":"single","stem":"During a regular project progress meeting, the CEO informed the project manager that a major stakeholder has been unaware of recent developments on the project. The project manager is sure that the stakeholder was duly identified and classified in the stakeholder register. Which project document should the project manager review in order to determine the reason for this issue?","options":{"A":"Requirements traceability matrix","B":"Issue log","C":"Stakeholder register","D":"Stakeholder engagement assessment matrix"},"correct":["D"],"answer_display":"D","why_correct":"The stakeholder engagement assessment matrix documents the current versus desired engagement level. If a stakeholder was identified but is unaware of developments, the engagement plan or assessment matrix has a gap — this is the document to review.","why_wrong":{"A":"The requirements traceability matrix tracks requirements to deliverables, not stakeholder communication effectiveness.","B":"The issue log records active issues; the root cause is a communication planning gap, not an issue.","C":"The stakeholder register identifies stakeholders but doesn't define communication frequency or method."},"part":"Part 4","part_range":"Q151–Q200"},{"num":156,"type":"single","stem":"A healthcare organization hired a new compliance specialist to ensure that the healthcare compliance needs are met. The feedback about the new compliance specialist from the team was average. What should the project manager do to help the new compliance specialist improve?","options":{"A":"Coordinate a one-to-one meeting with the specialist to assess the situation","B":"Escalate this situation to the manager of the area for a possible solution","C":"Provide time for the specialist to adjust to the pace of the project","D":"Contact the human resources (HR) manager about the team's feedback"},"correct":["A"],"answer_display":"A","why_correct":"When a new resource receives average feedback, the PM should first meet with them one-on-one to understand the situation directly before taking any other action — servant leadership through direct engagement.","why_wrong":{"B":"Escalating to the area manager before speaking to the specialist is premature escalation.","C":"Providing adjustment time without feedback leaves the specialist without the guidance they need to improve.","D":"Contacting HR based on team feedback without speaking to the individual first is bypassing direct communication."},"part":"Part 4","part_range":"Q151–Q200"},{"num":157,"type":"single","stem":"A company has selected a cross-functional team to develop an innovative digital product to drive the digital transformation project for the business. What should the project manager do to ensure business value is delivered early?","options":{"A":"Create robust incentives to the team members to encourage speedy delivery","B":"Create a detailed project plan and escalate delays to the functional managers","C":"Break down the deliverables into sprints and deliver value incrementally","D":"Fast track the project and monitor tasks closely to ensure timely delivery"},"correct":["C"],"answer_display":"C","why_correct":"For cross-functional agile teams delivering digital transformation, breaking down deliverables into sprints and delivering incrementally ensures early and continuous business value delivery — the explicit goal.","why_wrong":{"A":"Incentives for speed may create quality shortcuts; they don't structurally ensure early value delivery.","B":"A detailed plan with escalated delays is a predictive approach that doesn't enable incremental early delivery.","D":"Fast-tracking compresses the schedule but doesn't ensure iterative value delivery across sprints."},"part":"Part 4","part_range":"Q151–Q200"},{"num":158,"type":"single","stem":"A company that uses a predictive approach and operates in a highly regulated market is losing profitability because its product life cycle is taking longer than those of its competitors. A new project manager has been hired to change this scenario. What approach should the project manager propose?","options":{"A":"Migrate to an agile model, focusing primarily on an iterative approach, leaving the incremental life cycle as a next step","B":"Change to an agile model, focusing primarily on the incremental life cycle, leaving the iterative approach as a next step","C":"Maintain a predictive approach, but increase the focus on better planning and tracking to anticipate problems and avoid delays","D":"Propose a hybrid approach, leveraging the benefits of an agile approach while respecting some aspects of the company's industry"},"correct":["D"],"answer_display":"D","why_correct":"A regulated company losing market share due to long product cycles should adopt hybrid — leveraging agile's speed and adaptability while respecting the regulatory compliance requirements that are non-negotiable in their industry.","why_wrong":{"A":"Pure agile may not satisfy the regulatory requirements of a highly regulated market.","B":"Similarly, a pure incremental agile life cycle may conflict with regulatory compliance obligations.","C":"Better planning in predictive doesn't address the fundamental cycle time problem; it optimizes within the slow framework."},"part":"Part 4","part_range":"Q151–Q200"},{"num":159,"type":"single","stem":"A company is using an agile approach to launch a new product. In the second sprint, the team encounters a technical problem they have never faced before. What should the project manager do?","options":{"A":"Organize an early retrospective with the team to analyze the problem","B":"Ask the product owner to write the specifications for the related user story","C":"Facilitate a problem-solving session with the team to analyze the problem","D":"Inform the project sponsor about the problem faced by the team"},"correct":["C"],"answer_display":"C","why_correct":"When a team encounters an unknown technical problem in a sprint, the PM should facilitate a problem-solving session with the team — this is the appropriate mechanism for cross-functional technical issue resolution in agile.","why_wrong":{"A":"A retrospective is for process improvement at sprint end, not for solving current technical problems.","B":"Asking the product owner to write specifications doesn't help solve the technical problem the team is facing.","D":"Informing the sponsor before attempting team-level resolution is premature escalation."},"part":"Part 4","part_range":"Q151–Q200"},{"num":160,"type":"single","stem":"A project manager assigned team members to work in pairs on a large amount of technical reports. At times, the project manager noticed that important information was not shared properly among the team. This has caused delivery delays and, ultimately, the failure to complete the project. What is the root cause of this issue?","options":{"A":"Incorrect communication techniques applied during implementation","B":"Lack of team member training on documentation planning","C":"Improper assignment of tasks to team member pairings","D":"Team cohesiveness was lost because team members worked in pairs"},"correct":["A"],"answer_display":"A","why_correct":"When team member pairs fail to share important information leading to delivery failures, the root cause is incorrect communication techniques — the pairing approach created information silos with inadequate cross-pair communication.","why_wrong":{"B":"Training on documentation planning addresses one symptom; the root cause is communication method failure.","C":"Improper task assignment may be a factor but the scenario specifically describes the information sharing failure as the cause.","D":"Team cohesion loss is a potential effect, not the root cause; working in pairs doesn't inherently damage cohesion."},"part":"Part 4","part_range":"Q151–Q200"},{"num":161,"type":"single","stem":"A key stakeholder has recently started in a company and has been assigned to a hybrid project. Although very experienced in their domain, the stakeholder has only been exposed to predictive project approaches. What should the project manager do?","options":{"A":"Inform the project management office (PMO) that the team will use a predictive approach for this project","B":"Inform the stakeholder that they must level their knowledge with other stakeholders","C":"Allocate time to mentor the stakeholder in the selected project approach","D":"Update the risk register with the potential impact and apprise the steering committee"},"correct":["C"],"answer_display":"C","why_correct":"When a new stakeholder is unfamiliar with the project approach, the PM's servant leadership responsibility is to allocate time to mentor them — ensuring they can participate effectively in a hybrid environment.","why_wrong":{"A":"Switching to predictive to accommodate one stakeholder abandons the hybrid approach that was chosen for valid project reasons.","B":"Telling the stakeholder to level up without providing support is not servant leadership.","D":"Adding to the risk register and informing the steering committee is premature escalation when direct mentoring can resolve it."},"part":"Part 4","part_range":"Q151–Q200"},{"num":162,"type":"single","stem":"A senior manager attends one of the project review meetings and expresses concern that the project will not meet the quality standards. What should the project manager do?","options":{"A":"Ask the senior manager to approve the user acceptance testing (UAT) plan","B":"Inform the senior manager that there are approved quality standards","C":"Review the quality management plan with the senior manager","D":"Estimate the backlog items to forecast quality"},"correct":["C"],"answer_display":"C","why_correct":"When a senior manager expresses concern about quality, the PM should review the quality management plan with them — this is transparent, educates the manager on the quality controls in place, and invites collaborative discussion.","why_wrong":{"A":"Asking the senior manager to approve the UAT plan involves them in execution decisions that are the PM's responsibility.","B":"Informing them that approved standards exist is dismissive and doesn't address their concern.","D":"Estimating backlog items to forecast quality is not a response to an expressed concern about current standards."},"part":"Part 4","part_range":"Q151–Q200"},{"num":163,"type":"single","stem":"Two team members were recently released from a project because the customer reduced the budget. However, the agile team is still receiving the same, if not more, work requirements as before. How should the agile project leader resolve this situation?","options":{"A":"Update the project budget with the released team members.","B":"Update the restriction log with the new team capacity.","C":"Explain the new project requirements to the team.","D":"Explain the new team velocity to the customer."},"correct":["D"],"answer_display":"D","why_correct":"When two team members are released but workload stays the same, the PM must explain the new team velocity to the customer — the customer needs to understand that the same output cannot be sustained with fewer resources.","why_wrong":{"A":"Updating the project budget with released team members is an internal action; the customer impact is the priority.","B":"Updating the restriction log is internal documentation that doesn't address the customer's expectations.","C":"Explaining requirements to the team doesn't address the customer's ongoing workload expectations."},"part":"Part 4","part_range":"Q151–Q200"},{"num":164,"type":"single","stem":"An IT project manager for a project that is 50% complete learns that a critical team member plans to relocate to another country soon. The team member is needed for the remainder of the project. How should the project manager improve team dynamics?","options":{"A":"Require that all team members be physically present for the weekly project review","B":"Offer the team member an incentive to stay until the end of the project","C":"Replace the team member with someone who has similar qualifications and is located closer","D":"Set up a weekly video conference to monitor the progress of the team member's work"},"correct":["D"],"answer_display":"D","why_correct":"When a critical team member plans to relocate mid-project, the PM should set up regular video conferencing to maintain their contribution remotely — keeping them on the project without requiring relocation.","why_wrong":{"A":"Requiring all team members to be physically present is inflexible and may force an unnecessary decision.","B":"Incentives to stay may work but don't address the structural need to accommodate their relocation.","C":"Replacing the team member loses their expertise and disrupts team continuity for a situation that remote work can solve."},"part":"Part 4","part_range":"Q151–Q200"},{"num":165,"type":"single","stem":"A product development team has team members located in four different countries. A senior manager is assigned the task of recruiting a project manager to manage this project and the virtual team. Which skill is required for a project manager to successfully manage this team?","options":{"A":"Possesses strong interpersonal skills to drive high-performing virtual teams","B":"Plans and controls every aspect of the team’s deliverables to avoid surprises","C":"Speaks several languages and has lived in different countries","D":"Implements the organization’s standards and processes for the project"},"correct":["A"],"answer_display":"A","why_correct":"Managing virtual, diverse global teams requires strong interpersonal skills — the ability to build relationships, communicate across cultures, motivate remotely, and drive high performance without physical presence.","why_wrong":{"B":"Planning and controlling every aspect is micromanagement, which is counterproductive for high-performing virtual teams.","C":"Speaking multiple languages is helpful but not the core skill; interpersonal skills transcend language barriers.","D":"Implementing standards and processes is a PM competency but not the primary skill for managing virtual team dynamics."},"part":"Part 4","part_range":"Q151–Q200"},{"num":166,"type":"single","stem":"A senior project manager is working for a company that is not yet making
