ized."},"correct":["D"],"answer_display":"D","why_correct":"When the team constantly asks what to prioritize, the root cause is an unprioritized backlog. The PM should work with the product owner to ensure the backlog is properly prioritized so the team always knows what to work on next.","why_wrong":{"A":"Reviewing the backlog during standups takes standup time away from impediment discussion and is the wrong forum.","B":"Encouraging the team to prioritize the backlog is the product owner's responsibility, not the team's.","C":"Working according to the project plan assumes a predictive approach; the standup prioritization problem is a backlog management issue."},"part":"Part 5","part_range":"Q201–Q250"},{"num":225,"type":"single","stem":"A project manager is leading an automation project. The project team is colocated and includes people from both the technical and business units. The project manager discovers that personal differences and work styles are affecting the project negatively. How should the project manager address this?","options":{"A":"Develop a schedule that ensures people with personal differences work separately.","B":"Invite the functional managers of the different units to address their personal differences.","C":"Use an approach to the project that does not involve colocation.","D":"Meet with the team and agree on expectations from team members."},"correct":["D"],"answer_display":"D","why_correct":"When personal differences and work style conflicts affect a colocated cross-functional team, the PM should facilitate a team meeting to agree on behavioral expectations and working norms — addressing the root cause directly and collaboratively.","why_wrong":{"A":"Separating people with differences delays the inevitable collaboration and doesn't build team cohesion.","B":"Inviting functional managers into team interpersonal issues escalates before attempting team-level resolution.","C":"Removing colocation was the team's strength; changing the approach to avoid the conflict misses the opportunity to build a high-performing team."},"part":"Part 5","part_range":"Q201–Q250"},{"num":226,"type":"single","stem":"136 A facility extension project is in the execution stage. There is a project activity to connect the power of all new equipment to an existing facility, Point A, which requires a significant cable length. The construction team found that the power could be connected to Point B and save money. What should the project manager do next?","options":{"A":"Perform a cost-benefit analysis to evaluate using the Point B option.","B":"Add the issue to the change log and request additional budget through the change control board (CCB).","C":"Seek a decision from the construction team after explaining the project budget and schedule constraint.","D":"Use the Point B option because it will save the project cost and time."},"correct":["A"],"answer_display":"A","why_correct":"Before acting on a potential design change (Point A to Point B), the PM must perform a cost-benefit analysis to objectively evaluate whether the savings justify the change and whether it meets all technical requirements.","why_wrong":{"B":"Adding to the change log and requesting budget before the analysis doesn't support making the change decision.","C":"Seeking the construction team's decision without analysis gives them a decision they're not equipped to make.","D":"Implementing the change without formal analysis and change control violates scope management process."},"part":"Part 5","part_range":"Q201–Q250"},{"num":227,"type":"single","stem":"A project manager is working on multiple building construction projects using a predictive project management approach. Senior leadership within the organization is promoting the inclusion of more agile practices into the current project methodologies. The project sponsor now wants the projects to use more agile methodologies. Before mandating any agile methods to be used in a project, what should the project manager do first?","options":{"A":"Provide agile training to those who will be part of the project team.","B":"Shift all existing projects to agile methodologies with a strict timeline.","C":"Pause the current projects to align them to the new agile cadence.","D":"Assess the organizational culture and readiness for the transformation."},"correct":["D"],"answer_display":"D","why_correct":"Before mandating agile methods, the PM must assess organizational culture and readiness — understanding current state is essential to designing an effective agile adoption strategy for predictive-culture organizations.","why_wrong":{"A":"Training teams before assessing organizational readiness may be wasted if cultural barriers prevent adoption.","B":"Shifting all existing projects immediately to agile without assessment is reckless and likely to fail.","C":"Pausing current projects to realign them disrupts ongoing work before the organization is ready."},"part":"Part 5","part_range":"Q201–Q250"},{"num":228,"type":"single","stem":"A local company is developing a new product and, for the first time, using a remote team for the programming tasks of features. The design for the product comes from the local team. During the third sprint review, the product owner has concerns about the project's outcomes. The remote development team is complaining that they do not clearly understand the requirements conveyed in the daily standup meetings. How should the project manager address this situation?","options":{"A":"Determine the communication needs, environment, and tools to get the message across.","B":"Document the risk in the risk management plan and use contingency reserves to hire a local vendor.","C":"Evaluate and reassign the developing tasks to a local vendor who has worked on previous projects.","D":"Review lessons learned from previous projects and organizational process assets (OPAs)."},"correct":["A"],"answer_display":"A","why_correct":"When a remote team misunderstands requirements despite daily standups, the PM should assess the communication needs, environment, and tools to find the right approach for bridging the local-remote design-to-development gap.","why_wrong":{"B":"Documenting the risk and hiring a local vendor adds cost without first trying to solve the communication problem.","C":"Reassigning to a local vendor is premature before investigating whether the communication problem can be solved.","D":"Reviewing lessons learned and OPAs is useful context but doesn't directly address the current communication gap."},"part":"Part 5","part_range":"Q201–Q250"},{"num":229,"type":"single","stem":"A project team created user stories after understanding the customer requirements. As the project progresses, the project manager observes that there are too many change requests. The team feels that the outcomes they are working on are not aligned with the customer requirements. What should the project manager do?","options":{"A":"Refer to the configuration management knowledge base for similar projects delivered in the past.","B":"Arrange for a workshop with the customer to understand the business values expected from the outcomes.","C":"Include a representative from the customer to work collaboratively with the team.","D":"Acknowledge that the current team needs improvement and hire more qualified team members."},"correct":["B"],"answer_display":"B","why_correct":"When too many change requests signal misalignment between team output and customer expectations, the PM should arrange a workshop with the customer to understand the business values expected — reconnecting the team's work to actual customer needs.","why_wrong":{"A":"The configuration management knowledge base tracks changes; it doesn't reveal why the team's direction diverged from customer needs.","C":"Including a customer representative is valuable but the workshop first needs to establish shared understanding of business values.","D":"Blaming the team and hiring new people assumes a capability problem when the issue is requirements alignment."},"part":"Part 5","part_range":"Q201–Q250"},{"num":230,"type":"single","stem":"A project manager is managing a project with team members who are working all over the globe. The project manager notices that each team member's deliverables do not meet the requirements. What should the project manager do first?","options":{"A":"Assemble the project team via conference call to tell them that disciplinary action will be taken if any more noncompliant deliverables are submitted.","B":"Discuss the process used to create the noncompliant deliverables with the project team to see if there was a potential misunderstanding.","C":"Schedule time with the project sponsor to inform them that the project schedule is slipping due to the time it will take to rework the deliverables.","D":"Meet with the project team to explain that noncompliant deliverables must be reworked and submitted immediately to avoid project delays."},"correct":["B"],"answer_display":"B","why_correct":"When all team members across the globe produce non-compliant deliverables, the root cause is likely a process misunderstanding. The PM should discuss the creation process with the team to find where the misunderstanding occurred.","why_wrong":{"A":"Threatening disciplinary action before understanding the cause is punitive and creates fear without solving the problem.","C":"Informing the sponsor before investigating the root cause escalates prematurely.","D":"Directing rework immediately doesn't address why the deliverables were non-compliant in the first place."},"part":"Part 5","part_range":"Q201–Q250"},{"num":231,"type":"single","stem":"A project manager is leading a project to develop accounting software for a trading firm. As the outcomes are being delivered, a new risk is identified regarding an indirect tax regulation that is being changed by the government in the next 6 months. This risk will have a significant impact on the project outcomes. What should the project manager do next?","options":{"A":"Determine the impact of the risk and prioritize outcomes that do not affect the tax module.","B":"Delay developing the indirect tax module until the tax regulation comes into effect.","C":"Assess the impact of the risk with an expert and prioritize further outcomes with the client.","D":"Analyze the impact of the risk and discuss with the team to determine how to separate the tax module."},"correct":["C"],"answer_display":"C","why_correct":"When a new risk has significant impact on project outcomes, the PM should assess the risk impact with an expert and then prioritize further outcomes with the client — combining technical expertise with customer decision-making.","why_wrong":{"A":"Prioritizing outcomes that don't affect the tax module unilaterally changes project direction without client involvement.","B":"Delaying the tax module indefinitely may not be feasible given the 6-month regulatory timeline.","D":"Separating the tax module unilaterally changes the architecture without client input on the desired approach."},"part":"Part 5","part_range":"Q201–Q250"},{"num":232,"type":"single","stem":"An oil and gas project started without having acquired full funding for the project. The remaining funds were to be acquired during project execution. The acquisition of the remaining funds was delayed several months, resulting in a suspension of work by all contractors. What should the project manager have done to prevent this from happening?","options":{"A":"Ensured the stakeholder anticipated obstacles to achieving financial closure on the remaining funds.","B":"Ensured the risk was adequately assessed and mitigated by the appropriate stakeholders.","C":"Ensured the stakeholder who was providing additional funds remained interested in the project.","D":"Ensured the project team monitored and reviewed the project risk register periodically."},"correct":["B"],"answer_display":"B","why_correct":"The root cause is that the funding acquisition risk was inadequately assessed and mitigated. A proper risk assessment would have identified the dependency on external funding as a high-impact risk requiring contingency planning.","why_wrong":{"A":"Anticipating financial closure obstacles is a symptom of inadequate risk assessment, not the root preventive action.","C":"Keeping funders interested is a stakeholder engagement action, not the root cause of inadequate risk mitigation.","D":"Periodic risk register reviews are maintenance activities; the failure was the inadequate initial risk assessment and mitigation plan."},"part":"Part 5","part_range":"Q201–Q250"},{"num":233,"type":"single","stem":"A project manager entered into a contract with a vendor to build a new system. During the acceptance test stage, the project manager noticed that the system quality was not satisfactory. How should the project manager support their claim to the vendor?","options":{"A":"Provide the failed test results along with the agreed-upon acceptance criteria.","B":"Share unsuccessful results from previous projects with a similar scope.","C":"Document in the risk log that the issues in the system were already identified.","D":"Show that the acceptance criteria were changed by the vendor without approval."},"correct":["A"],"answer_display":"A","why_correct":"To support a quality claim against a vendor during acceptance testing, the PM must provide the failed test results along with the agreed acceptance criteria — this is the objective, contractual basis for the quality dispute.","why_wrong":{"B":"Previous project results are irrelevant to the current contract's acceptance criteria.","C":"Documenting in the risk log that issues were pre-identified doesn't prove the vendor failed to meet the current contract.","D":"Showing acceptance criteria were changed by the vendor would prove contract violation but the question asks how to support the quality claim."},"part":"Part 5","part_range":"Q201–Q250"},{"num":234,"type":"single","stem":"A project manager agreed to a team member's request to have an alternative working schedule whereby they begin working at 12:00 p.m. each day. This arrangement has worked well for the project, but has recently been scrutinized by members from other project teams because the company's core working hours begin at 9:00 a.m. What should the project manager have done to prevent this situation?","options":{"A":"Broken down the situation to identify the root cause","B":"Determined communication methods and channels","C":"Analyzed the boundaries of the negotiations for agreement","D":"Managed and rectified the ground rule violations"},"correct":["C"],"answer_display":"C","why_correct":"The PM should have analyzed the boundaries of the negotiation agreement before allowing the alternative schedule — understanding what organizational policies and boundaries applied would have prevented the later scrutiny.","why_wrong":{"A":"Root cause analysis is retrospective; the preventive action was pre-agreement analysis of constraints.","B":"Communication methods and channels are relevant to informing others but not to preventing the scrutiny of the agreement itself.","D":"Managing ground rule violations is reactive; the preventive action was analyzing negotiation boundaries before the agreement."},"part":"Part 5","part_range":"Q201–Q250"},{"num":235,"type":"single","stem":"The project sponsor reports that a key stakeholder is complaining about performance differences in the metrics reported by the project manager, which gives the impression that the project is out of control. The project manager has been providing the project's status according to the agreedupon communications management plan. This key stakeholder, however, seldom attends the status report meetings. What should the project manager do first to address this situation?","options":{"A":"Evaluate the communication needs to discover the gaps and adjust the original plan if needed.","B":"Use the contingency reserves to implement fast tracking and improve the schedule key performance indicators (KPIs).","C":"Review the resource breakdown structure (RBS) to request the main stakeholder's manager to replace the stakeholder.","D":"Provide evidence to the project sponsor that the project is on track and the communications have been sent."},"correct":["A"],"answer_display":"A","why_correct":"When a stakeholder who seldom attends meetings complains about performance metrics, the PM should evaluate the communication approach to find the gaps — perhaps the stakeholder needs a different format, frequency, or channel that fits their engagement style.","why_wrong":{"B":"Fast-tracking to improve KPIs addresses the metrics, not the communication gap that's causing the perception problem.","C":"Requesting the stakeholder's replacement is an extreme action for a communication issue.","D":"Providing evidence to the sponsor that the project is on track doesn't resolve the communication gap with the stakeholder."},"part":"Part 5","part_range":"Q201–Q250"},{"num":236,"type":"single","stem":"A team has had issues with behavior on an ongoing project, which is causing conflicts. As a result, the team is losing momentum and falling behind in its sprints. How should the project manager handle this situation?","options":{"A":"Engage a counselor to reconcile the situation between the team members affected.","B":"Control backlog assignments and reduce direct communications between team members.","C":"Revisit the ground rules and team communication protocols, and discuss what is happening.","D":"Require team members experiencing the conflicts to take a day off from work."},"correct":["C"],"answer_display":"C","why_correct":"Behavioral issues causing team conflicts should be addressed by revisiting the ground rules — refreshing the team's shared agreements about how they work together, and openly discussing what's not working.","why_wrong":{"A":"External counseling escalates before attempting team-level ground rule reinforcement.","B":"Controlling backlog assignments and limiting communication reduces collaboration without addressing the behavior root cause.","D":"Requiring time off is a punitive response that doesn't address the behavioral root cause."},"part":"Part 5","part_range":"Q201–Q250"},{"num":237,"type":"single","stem":"The change control board (CCB) has approved a change request to add a new component within a product. The operations manager discovers the change after its approval and complains that the implementation of the change will cause significant disruption to the production line. What should the project manager do first?","options":{"A":"Formally acknowledge the operation manager's concerns and raise a new risk that the project may deliver late and over budget due to manufacturing difficulties.","B":"Escalate the issue to the project sponsor, as the decision to add the component brings many benefits even though it will be disruptive to the production line.","C":"Lead a root cause analysis workshop with the design team to identify the failures that led to the decision to add a component that was not compatible with the production line.","D":"Meet with the operations manager to explain the background for the change and understand the operation manager's concerns about the change."},"correct":["D"],"answer_display":"D","why_correct":"When a stakeholder complains about an approved change after the fact, the PM should first meet with them to explain the background and listen to their concerns — understanding their perspective before determining any further action.","why_wrong":{"A":"Acknowledging concerns and raising a new risk is premature before even understanding the operations manager's specific objection.","B":"Escalating to the sponsor for a decision that has already been made by the CCB is inappropriate.","C":"An RCA workshop is a longer-term improvement activity; the immediate need is direct conversation with the operations manager."},"part":"Part 5","part_range":"Q201–Q250"},{"num":238,"type":"single","stem":"A project manager is leading a fast-moving project with strict deadlines and minimal time to deliver each milestone. The project manager discovers that one of the remote team members, who puts a lot of effort into delivering the project, has confided in an on-site team member. The remote team member feels they are not being adequately rewarded and recognized for their job. What should the project manager do?","options":{"A":"Make arrangements with the resource's functional manager to relocate the team member to another existing project.","B":"Send a copy of the engagement contract to the remote team member and indicate that the team member is entitled to what is included in the contract.","C":"Inform the human resource (HR) manager of this situation and ensure this news does not spread.","D":"Engage the remote team member, empathize with them, and let them know their contribution is appreciated regardless of their remote work status."},"correct":["D"],"answer_display":"D","why_correct":"Servant leadership and emotional intelligence: when a remote team member feels unrecognized, the PM should engage directly, empathize, and explicitly acknowledge their contribution — addressing the emotional need directly.","why_wrong":{"A":"Moving the resource to another project is an extreme response to a recognition concern that a direct conversation can resolve.","B":"Sending the contract is legalistic and dismissive of the emotional recognition need.","C":"Informing HR and trying to contain the information misses the opportunity for direct servant leadership."},"part":"Part 5","part_range":"Q201–Q250"},{"num":239,"type":"single","stem":"In a financial company, a strategic project has been planned to use a predictive approach. During project planning, the product leader requests that milestones be submitted for review. There is a defined scope and an established deadline to conclude the project. What should the project manager do first to meet the product leader's expectations?","options":{"A":"Change the project charter to indicate that the approach will be different.","B":"Inform the product leader that they must wait until the end of the project.","C":"Meet with the software team to review the possibility of monthly milestone reviews.","D":"Modify the project management plan to use an agile framework to incorporate milestones."},"correct":["C"],"answer_display":"C","why_correct":"When a product leader requests milestone reviews in a predictive project with defined scope and deadline, the PM should meet with the software team to review the possibility of monthly milestones — exploring what's feasible within the existing plan.","why_wrong":{"A":"Changing the project charter for milestone reviews is a disproportionate governance change for a monitoring request.","B":"Telling the product leader to wait until the end is dismissive of a legitimate stakeholder information need.","D":"Modifying the PM plan to agile to incorporate milestones changes the entire methodology for what is essentially a reporting adjustment."},"part":"Part 5","part_range":"Q201–Q250"},{"num":240,"type":"single","stem":"A project team is preparing a report for the stakeholders. The team gathers and collates a large amount of data to be included in the status report. What should the project manager do next?","options":{"A":"Ensure the team follows standard operating procedures (SOP) for creating a stakeholder report.","B":"Instruct the team to make only a graphical representation of all the data for the report.","C":"Instruct the team to conduct a meeting with the stakeholders before finalizing the report.","D":"Instruct the team to analyze and interpret the data before including it in the report."},"correct":["D"],"answer_display":"D","why_correct":"Before including large amounts of data in a status report, the team must analyze and interpret the data — stakeholders need insights and conclusions, not raw data dumps that require them to do the analysis.","why_wrong":{"A":"Following SOPs for report creation ensures consistency but doesn't address the need for data analysis before inclusion.","B":"Graphical representation of unanalyzed data is still uninterpreted data; the meaning must be drawn out first.","C":"A stakeholder meeting before finalizing is useful but shouldn't replace the fundamental analysis step."},"part":"Part 5","part_range":"Q201–Q250"},{"num":241,"type":"single","stem":"A project manager received a request to add features and functions to the project after the scope had already been established. What should the project manager do?","options":{"A":"Follow the requirements management process.","B":"Follow the stakeholder engagement process.","C":"Follow the risk management process.","D":"Follow the change management process."},"correct":["D"],"answer_display":"D","why_correct":"When post-baseline change requests arrive, the PM must follow the change management process — all changes require formal assessment, CCB review, and approval before implementation.","why_wrong":{"A":"Requirements management captures and documents requirements; change management governs post-baseline changes.","B":"Stakeholder engagement process manages relationships; change management governs scope changes.","C":"Risk management identifies and mitigates risks; change management governs formal changes to the project baseline."},"part":"Part 5","part_range":"Q201–Q250"},{"num":242,"type":"single","stem":"A project manager has expertise in the technical domain. The project manager frequently demonstrates unacceptable behavior toward other team members; however, when confronted, the project manager denies this behavior. What is the reason for the project manager's behavior?","options":{"A":"The project manager lacks necessary empathy.","B":"The project manager lacks emotional intelligence (EI).","C":"The project manager was not properly trained.","D":"The project manager is in the wrong project role."},"correct":["B"],"answer_display":"B","why_correct":"A project manager who demonstrates unacceptable behavior but denies it when confronted lacks emotional intelligence — specifically self-awareness, which is the ability to recognize one's own emotions and behaviors and their impact on others.","why_wrong":{"A":"Empathy is a component of EI; the specific gap described (denial of one's own behavior) is self-awareness, a different EI component.","C":"Improper training may have contributed but the behavioral denial pattern points specifically to an EI deficit.","D":"Wrong project role doesn't explain the behavioral denial; this is an EI self-awareness issue regardless of role."},"part":"Part 5","part_range":"Q201–Q250"},{"num":243,"type":"single","stem":"A project team member, who is inexperienced in system development work is not performing well. Currently, there are no other staff members available who are qualified to complete the work. What should the project manager do?","options":{"A":"Assess the team member's development requirements and arrange for the team member to receive training.","B":"Seek approval from the project sponsor to use some of the project budget reserve to hire a new resource.","C":"Work with the functional manager to determine an incentive for the team member to complete the project.","D":"Request a substitute for the team member with a new resource who is more skilled in system development work."},"correct":["A"],"answer_display":"A","why_correct":"When a team member underperforms due to skill gaps and no replacements are available, the PM should assess their development needs and arrange training — building their capability to meet the project's requirements.","why_wrong":{"B":"Using project budget reserve to hire externally is premature when the existing team member can be developed.","C":"Incentivizing the team member financially doesn't address the skill gap causing the performance issue.","D":"Requesting a replacement is the last resort, not the first response to a skill gap issue."},"part":"Part 5","part_range":"Q201–Q250"},{"num":244,"type":"single","stem":"A newly commissioned project has had trouble recruiting team members because the turnover rate is high. The human resource (HR) manager has conducted several exit interviews. Many team members have expressed that the project manager has inadequate relationship management competencies. The project manager explains that the exiting team members were lazy. What should the project manager do to prevent this high turnover rate from continuing?","options":{"A":"Avoid micromanaging the team, enforce stricter rules, and monitor employees.","B":"Explain to the recruiting manager that a project is temporary in nature, making it different than an operational environment.","C":"Develop relationship skills as a leader and also develop the teams' emotional intelligence skills.","D":"Be more involved in the team member recruitment process to ensure qualified team members are chosen."},"correct":["C"],"answer_display":"C","why_correct":"High turnover caused by poor relationship management competencies requires the PM to develop both their own relationship leadership skills and the team's emotional intelligence — addressing the root cause directly.","why_wrong":{"A":"Stricter rules without addressing relationship skills will accelerate turnover, not reduce it.","B":"Explaining that projects are temporary deflects rather than addressing the legitimate relationship management concern.","D":"Being more involved in recruitment doesn't address the PM's relationship management deficit that is causing the turnover."},"part":"Part 5","part_range":"Q201–Q250"},{"num":245,"type":"single","stem":"An enthusiastic, newly hired vice-president has been assigned as the product owner for a digital transformation project. The project manager advises the product owner that some of the functional requirements are not aligned with the chief information technology officer's (CTO) strategy. The product owner tells the project manager that the CTO is not part of the project and should not be engaged at this moment. What should the project manager do?","options":{"A":"Advise the CTO about the possible impacts caused by the project.","B":"Influence the product owner to review the engagement needed from other stakeholders.","C":"Continue building the backlog since they are functional requirements.","D":"Review the organizational process assets (OPAs) for historical information from similar projects."},"correct":["B"],"answer_display":"B","why_correct":"When the product owner is excluding a stakeholder (CTO) whose strategy is directly impacted, the PM should influence the product owner to recognize the need for broader stakeholder engagement — the CTO's alignment is critical to project success.","why_wrong":{"A":"Advising the CTO directly behind the product owner's back creates a stakeholder management conflict.","C":"Continuing to build the backlog without resolving the CTO misalignment risks late-stage rejection of the entire architecture.","D":"Reviewing OPAs provides historical context but doesn't resolve the immediate stakeholder engagement gap."},"part":"Part 5","part_range":"Q201–Q250"},{"num":246,"type":"single","stem":"A startup company has just appointed a CEO that has no prior project experience. The CEO wants to execute projects with their own resources and has appointed a project manager. What should the project manager recommend that the CEO do first?","options":{"A":"Create a framework to justify project execution.","B":"Utilize an agile approach for all upcoming projects.","C":"Create a framework to support project success.","D":"Utilize a predictive approach for all upcoming projects."},"correct":["C"],"answer_display":"C","why_correct":"For a CEO with no project experience launching their first projects, the PM should recommend creating a framework to support project success — establishing the governance, processes, and standards that make projects succeed.","why_wrong":{"A":"Justifying project execution is a business case activity; the CEO needs a success-enabling framework, not justification.","B":"Recommending agile for all projects regardless of their nature is prescriptive without context.","D":"Recommending predictive for all projects is similarly prescriptive and may not suit all project types."},"part":"Part 5","part_range":"Q201–Q250"},{"num":247,"type":"multi","stem":"A business transformation project has a four-phase delivery plan. The project team has successfully delivered one phase of the project. To further enhance team performance and empower team members, which two actions should the project manager take? (Choose two.)","options":{"A":"Encourage team members to cross-check decisions with the project manager.","B":"Vet all of the decisions before execution.","C":"Allow team members to make limited decisions.","D":"Organize and assign team members to tasks where they have strengths.","E":"Support team members to make decisions in their areas of strength. ,E"},"correct":["D","E"],"answer_display":"D,E","why_correct":"Empowering team members means assigning them to areas of strength (D) and supporting them to make decisions in their areas of expertise (E) — both directly build autonomy and capability.","why_wrong":{"A":"Encouraging cross-checking with the PM reduces autonomy and creates dependency.","B":"Vetting all decisions before execution is micromanagement that contradicts empowerment.","C":"Allowing only limited decisions is better than none but less empowering than supporting full decision-making in areas of strength."},"part":"Part 5","part_range":"Q201–Q250"},{"num":248,"type":"single","stem":"A project team was hired to perform on-site duties, but there were unexpected circumstances that required the entire team to work remotely. Some team members returned to their hometowns, and they are now requesting reimbursement for operational expenditures. What should the project manager do?","options":{"A":"Review the budget and allocate funds for the reimbursements.","B":"Update the project management plan with the incurred costs.","C":"Ask the team members to draft a justification before processing the reimbursements.","D":"Follow the Perform Integrated Change Control process and submit a change request."},"correct":["D"],"answer_display":"D","why_correct":"Unexpected remote work expenses are unplanned costs that require a formal change request through Perform Integrated Change Control — they affect the project cost baseline and require formal approval.","why_wrong":{"A":"Reviewing the budget and allocating funds unilaterally bypasses the formal change control process.","B":"Updating the PM plan with incurred costs without approval records an unauthorized change.","C":"Asking for justification before processing is appropriate but the PM still needs to follow integrated change control."},"part":"Part 5","part_range":"Q201–Q250"},{"num":249,"type":"single","stem":"150 An organization is adopting an agile mindset. On the first agile project, the project manager faced an issue because the team was unable to make decisions on time. What should the project manager do to address the problem?","options":{"A":"Assess the situation to understand how the organization's culture impacts the decision-making process, and coach the team toward a new model.","B":"Adopt an autocratic leadership style and dictate all decisions in order to speed up the team's velocity.","C":"Invite senior leadership to a team-building workshop and restate the importance of accountability and leadership under the new company direction.","D":"Define clear guidelines on how decisions should be made under the new organizational policy and reinforce them with the team on every occasion."},"correct":["A"],"answer_display":"A","why_correct":"When teams struggle with decisions under a new agile mindset, the PM should first assess how the organizational culture is impacting decision-making — then coach the team toward a model that works within that culture.","why_wrong":{"B":"Autocratic decisions contradict agile empowerment principles and don't build team capability.","C":"Senior leadership workshops are useful but don't directly address the team's day-to-day decision inability.","D":"Defining guidelines reinforces rules but without cultural assessment, guidelines may not address the real obstacle."},"part":"Part 5","part_range":"Q201–Q250"},{"num":250,"type":"single","stem":"A project manager is working on a financial system implementation project for a government company. One of the key stakeholders, who uses predictive approaches, does not like virtual tools such as chats, task trackers, and so forth. They prefer email, telephone calls, and face-to-face meetings. How should the project manager approach this situation?","options":{"A":"Use regular screen-sharing sessions to show the progress to the stakeholder.","B":"Align and agree with the stakeholder on the communication approach.","C":"Ask the manager to use virtual communication tools and online dashboards.","D":"Create a digital dashboard to meet the manager's information needs."},"correct":["B"],"answer_display":"B","why_correct":"When a stakeholder has specific communication preferences, the PM should align with them on their preferred communication approach — PMI principle of tailoring communication to stakeholder needs and preferences.","why_wrong":{"A":"Screen-sharing sessions are a compromise but don't fully meet the stakeholder's stated preference for email and face-to-face.","C":"Telling the manager to use virtual tools ignores their stated preference and may create disengagement.","D":"Creating a digital dashboard assumes their information need; the PM should align on the approach first."},"part":"Part 5","part_range":"Q201–Q250"},{"num":251,"type":"single","stem":"A team member has experienced personal conflicts on past projects, making them nervous about working on the current project. The project manager knows this team member could add value to the project. What should the project manager do to get the most value from this team member?","options":{"A":"Advise the team member not to share personal information from past projects with the entire team.","B":"Consult with the project sponsor to find out if it is allowed to share personal information with the entire team.","C":"Advise the team member to focus on the current project and consider the past conflicts as lessons learned.","D":"Consult with human resources (HR) and check company policies on what is allowed to advise the team member."},"correct":["C"],"answer_display":"C","why_correct":"The PM should advise the team member to focus on the current project and treat past conflicts as lessons learned — this forward-looking framing lets them contribute their value without letting past experiences limit their engagement.","why_wrong":{"A":"Advising the team member not to share personal information is paternalistic and doesn't help them engage positively.","B":"Consulting the sponsor about personal information sharing is an inappropriate escalation of a private matter.","D":"Consulting HR about what can be advised is overly bureaucratic for what is essentially a motivational coaching situation."},"part":"Part 6","part_range":"Q251–Q300"},{"num":252,"type":"single","stem":"During project initiation meetings, the project manager of a 9-month project states that a specific task would be out of schedule. At the project kick-off meeting, a key project stakeholder strongly objects, stating that this task is the key value of the project and should be completed on time. What should the project manager do to reduce the chances of having a strong rejection from stakeholders during the project initiation stage?","options":{"A":"Develop a stakeholder-by-stakeholder engagement assessment matrix.","B":"Send a letter to the stakeholders to inform them about the project scope and start date.","C":"Schedule meetings with key stakeholders in advance to gather feedback on the project scope.","D":"Identify stakeholder rejection as a risk in the project risk register."},"correct":["C"],"answer_display":"C","why_correct":"To reduce stakeholder rejection during initiation, the PM should meet with key stakeholders in advance — gathering their feedback on scope and approach before the kick-off enables early alignment and prevents surprise objections.","why_wrong":{"A":"A stakeholder engagement assessment matrix is a tracking tool, not a proactive engagement technique.","B":"A formal letter informing stakeholders about scope is one-way communication that doesn't invite feedback.","D":"Adding rejection to the risk register acknowledges the risk but doesn't prevent it; proactive engagement does."},"part":"Part 6","part_range":"Q251–Q300"},{"num":253,"type":"single","stem":"On a project with multiple international locations, a trend for delays has been flagged. When looking into the issue, the project manager realized that some of the key activities were scheduled over the holiday periods in the overseas offices. What should the project manager do next?","options":{"A":"Update the schedule to reflect the holidays and notify the project sponsor of the delayed completion.","B":"Hire additional personnel on a temporary basis to cover the extra workload during the holiday seasons.","C":"Request that the offices in overseas locations work overtime to mitigate schedule slippages.","D":"Update the schedule to reflect the holidays and share the workload among offices to mitigate schedule slippage."},"correct":["D"],"answer_display":"D","why_correct":"When key activities are scheduled over overseas office holidays, the PM should update the schedule to reflect holidays and redistribute workload across offices to minimize the schedule impact — both accuracy and risk mitigation together.","why_wrong":{"A":"Updating the schedule and notifying the sponsor of delay accepts the delay without first trying to mitigate it.","B":"Temporary personnel for holiday periods adds cost before trying workload redistribution.","C":"Requesting overseas offices to work overtime disrespects local holidays and creates employee relations issues."},"part":"Part 6","part_range":"Q251–Q300"},{"num":254,"type":"single","stem":"A new team member on a self-organizing team is finding it difficult to deliver due to the new technology being used in the project. What should the project manager do in this situation?","options":{"A":"Delegate other team members to complete this team member's tasks.","B":"Mentor the team member and provide the necessary training.","C":"Request the team member to move to another team.","D":"Include the team member in an improvement program through a human resources (HR) request."},"correct":["B"],"answer_display":"B","why_correct":"When a new team member struggles with technology, the PM's servant leadership response is to mentor them and provide necessary training — building their capability to contribute effectively.","why_wrong":{"A":"Delegating the member's tasks to others doesn't help them develop the skills they need.","C":"Moving them to another team abandons the investment in onboarding and wastes the resource.","D":"An HR improvement program is a formal escalation that is premature before attempting direct mentoring."},"part":"Part 6","part_range":"Q251–Q300"},{"num":255,"type":"single","stem":"A project manager is managing a project that requires specialized architecture services. This project was identified as a high risk for the organization. The project manager works with an external architect who is highly specialized. However, the architect will soon resign because they accepted an offer from another firm. What should the project manager do next?","options":{"A":"Discuss this with the project team, assess the impact, and decide on the appropriate actions to follow.","B":"Ask the architect for the contact details for their new employer and call their account manager.","C":"Call the account manager and ask them to retain the expert by offering them an incentive.","D":"Escalate the issue to the procurement department and ask them to discuss this with the vendor firm."},"correct":["A"],"answer_display":"A","why_correct":"When a key external architect is leaving, the PM should discuss the situation with the project team, assess the full impact, and decide on appropriate actions collectively — including knowledge transfer options and replacement strategies.","why_wrong":{"B":"Contacting the architect's new employer for contact details is an unusual action that may violate professional boundaries.","C":"Calling the account manager to retain the expert through incentives is a procurement action, not the PM's responsibility.","D":"Escalating to procurement before assessing the impact and options is premature."},"part":"Part 6","part_range":"Q251–Q300"},{"num":256,"type":"single","stem":"A project manager is working on a multinational project that has more than 100 stakeholders. The project manager is concerned about the appropriate stakeholder participation and involvement level required for successful project delivery. What should the project manager do?","options":{"A":"Communicate with the stakeholders to find a solution.","B":"Review the issue log with the project stakeholders.","C":"Evaluate the stakeholder engagement assessment matrix.","D":"Perform a stakeholder assumption and constraint analysis."},"correct":["C"],"answer_display":"C","why_correct":"When concerned about appropriate participation levels across 100+ stakeholders, the PM should evaluate the stakeholder engagement assessment matrix — which shows current vs. desired engagement levels and highlights where gaps exist.","why_wrong":{"A":"Communicating with all stakeholders to find a solution is vague and doesn't systematically identify engagement gaps.","B":"Reviewing the issue log addresses active problems, not stakeholder participation levels.","D":"Assumption and constraint analysis is a scope planning tool, not a stakeholder engagement assessment tool."},"part":"Part 6","part_range":"Q251–Q300"},{"num":257,"type":"single","stem":"A new engineer was assigned to a project. Although the engineer has adequate skills for the job, they always wait for authorization from the project manager before acting. What should the project manager do?","options":{"A":"Obtain related training for the new team member.","B":"Determine the appropriate level of decision-making authority and empower the engineer.","C":"Make all of the decisions for the engineer in order to keep the workflow on track.","D":"Replace the resource with an experienced engineer."},"correct":["B"],"answer_display":"B","why_correct":"When a competent engineer constantly waits for authorization before acting, the issue is insufficient empowerment. The PM should determine the appropriate level of decision-making authority and explicitly empower the engineer within that scope.","why_wrong":{"A":"Training is appropriate for skill gaps; this is an authority and empowerment gap, not a skill gap.","C":"Making all decisions for the engineer creates dependency and prevents their professional growth.","D":"Replacing a competent engineer who is over-dependent on authorization is disproportionate; empowerment can fix this."},"part":"Part 6","part_range":"Q251–Q300"},{"num":258,"type":"single","stem":"A senior project manager has included a junior project manager as part of the project team. During a coaching session, the junior project manager asks the senior project manager how to be efficient and reduce rework. How should the senior project manager respond?","options":{"A":"Use a work breakdown structure (WBS) to create a project schedule based on the project and resource requirements.","B":"Monitor resource allocation to ensure that team members work 8 hours per day.","C":"Assign project tasks to the team regardless of their skills to accomplish the project schedule.","D":"Schedule daily meetings with key stakeholders to assess the effectiveness of the project management plan."},"correct":["A"],"answer_display":"A","why_correct":"The most effective way to reduce rework is to use a WBS to create a project schedule based on project and resource requirements — proper planning through decomposition and scheduling prevents scope gaps and resource conflicts that cause rework.","why_wrong":{"B":"Monitoring 8-hour workdays focuses on time utilization, not on the planning quality that prevents rework.","C":"Assigning tasks regardless of skills guarantees poor quality and more rework.","D":"Daily meetings with key stakeholders adds overhead without addressing the root cause of rework."},"part":"Part 6","part_range":"Q251–Q300"},{"num":259,"type":"single","stem":"156 An agile team is working on a 2-week sprint to deliver business value. About 1 week after the sprint starts, the team members do not feel confident about the product increment they are building. They do not want to wait until the end of the sprint and want to validate the product increment with the product owner now. What should the project manager do to mitigate this risk?","options":{"A":"Extend the sprint end date in anticipation of feedback from the product owner that will require extra work.","B":"Schedule an additional interim demo with the product owner.","C":"Address the issue as part of the retrospective.","D":"Ask the team to work overtime toward the end of the sprint to meet the original sprint end date."},"correct":["B"],"answer_display":"B","why_correct":"When the team is uncertain about the product increment mid-sprint and wants validation, the PM should schedule an interim demo with the product owner — getting early feedback to course-correct before the end of the sprint.","why_wrong":{"A":"Extending the sprint end date in anticipation of feedback is premature; the PM should first validate whether changes are actually needed.","C":"Addressing in the retrospective is too late — the sprint is active and the team needs validation now.","D":"Working overtime to meet the original date ignores the team's valid concern about product quality."},"part":"Part 6","part_range":"Q251–Q300"},{"num":260,"type":"single","stem":"An agile team has completed five sprints. The final product is expected to be delivered in another three sprints. The project manager receives a call from the technical resource manager that one of the developers must take leave for the next 4 weeks, with no temporary replacement available. This is going to significantly impact the deliverable. What should the project manager do?","options":{"A":"Request additional funding from the sponsor to obtain a new resource to fill in the gap.","B":"Inform the customer of the impact immediately and prepare for escalation.","C":"Ask the product owner to stretch the delivery team further to complete the final product in the original timeline.","D":"Perform an impact analysis, readjust the schedule as needed, and communicate the changes to the customer."},"correct":["D"],"answer_display":"D","why_correct":"When a resource is unavailable and the schedule is affected, the PM must perform an impact analysis, readjust the schedule as needed, and communicate the changes transparently to the customer — complete, honest, and proactive.","why_wrong":{"A":"Requesting more funding before analyzing impact may over-request or under-request the resources actually needed.","B":"Informing the customer and preparing for escalation is premature before impact analysis provides factual information.","C":"Asking the delivery team to stretch further with one less person to maintain the original timeline creates burnout and quality risk."},"part":"Part 6","part_range":"Q251–Q300"},{"num":261,"type":"single","stem":"A project lead is working on an agile project to build the team's vision, including the decisionmaking process. It was decided that the team will vote on items, and if 90% of the team agrees on a decision, then it will be carried forward. At the very first technical design meeting, the team makes a decision that the project lead strongly disagrees with. How should the project lead proceed?","options":{"A":"Refuse to let the team proceed with the work based on their decision.","B":"Take the technical team lead aside and try to persuade them to change their vote.","C":"Note the reasons for the disagreement and let the team proceed.","D":"Set up a meeting with the project champion and ask them to intervene."},"correct":["C"],"answer_display":"C","why_correct":"When the agreed voting process produces a decision the project lead disagrees with, servant leadership means noting the reasons for disagreement and letting the team proceed — the team's self-organization must be respected.","why_wrong":{"A":"Refusing to let the team proceed overrides their democratically-made decision and undermines self-organization.","B":"Privately persuading the technical lead to change their vote is manipulative and circumvents the agreed voting process.","D":"Escalating to the project champion violates the agreed team decision-making process."},"part":"Part 6","part_range":"Q251–Q300"},{"num":262,"type":"single","stem":"A project manager is newly appointed to lead a project team that will be working remotely. The project manager decided to use a set of tools that worked well for previous projects. However, a few team members are not happy with this plan. What should the project manager have done to avoid this?","options":{"A":"Delegated the responsibility of selecting the collaboration tools to the project's technical lead.","B":"Met with the project team to determine their collaboration needs and identified tools that will work best.","C":"Allowed the project team members to use the tools that will work best for them for this project.","D":"Asked the project sponsor for approval to purchase the newest collaboration tool on the market."},"correct":["B"],"answer_display":"B","why_correct":"Before selecting collaboration tools for a new remote team, the PM should have met with the team to understand their specific collaboration needs — tool selection should be based on team requirements, not the PM's past experience.","why_wrong":{"A":"Delegating tool selection to the technical lead still excludes the full team's input.","C":"Allowing each member to use whatever tool they want creates fragmentation and incompatible workflows.","D":"Asking for sponsor approval to buy the newest tool ignores the team's actual needs and may waste budget."},"part":"Part 6","part_range":"Q251–Q300"},{"num":263,"type":"single","stem":"In the daily check-in meeting, a team member informs the project team that the licenses for one of the components that will be used will expire in a couple of months. The licensing cost is significant. What should the project manager do next?","options":{"A":"Evaluate the impact of nonrenewal of the license.","B":"Escalate the licensing issue to the product owner.","C":"Add a spike to the backlog for an alternative design.","D":"Raise a change request to secure the renewal."},"correct":["A"],"answer_display":"A","why_correct":"When a license expiry with significant cost is flagged, the PM should first evaluate the impact of non-renewal — understanding the consequences informs whether to renew, find an alternative, or redesign to avoid the dependency.","why_wrong":{"B":"Escalating to the product owner before impact assessment sends them an issue without the information needed to make a decision.","C":"Adding a spike for alternative design is a possible action after the impact is assessed.","D":"Raising a change request for renewal is premature before determining whether renewal is the right response."},"part":"Part 6","part_range":"Q251–Q300"},{"num":264,"type":"single","stem":"159 A project manager leads a development project for a mobile chatting application. One of the experienced developers constantly creates conflicts with the other team members. As a result, the other team members are refusing to work with the developer. Since the developer is a high performer, the project goals may be negatively impacted if they leave the team. What should the project manager do in this situation?","options":{"A":"Meet with the developer and ask them to be respectful with the other team members and work together as a team.","B":"Meet with the team members and developer individually to understand the situation and build an action plan accordingly.","C":"Collect the team's feedback and send it to human resources (HR) to resolve the conflict.","D":"Arrange a team-building training session and require all of the team members to attend."},"correct":["B"],"answer_display":"B","why_correct":"When conflicts involve both sides (developer vs. team), the PM must meet with each party individually to understand the full picture and then build an action plan that addresses all perspectives — fair, thorough, and collaborative.","why_wrong":{"A":"Meeting only with the developer and asking them to be respectful addresses only one side.","C":"Sending feedback to HR before attempting direct resolution escalates prematurely.","D":"Team-building training may help long-term but doesn't address the specific active conflict between the developer and team."},"part":"Part 6","part_range":"Q251–Q300"},{"num":265,"type":"single","stem":"A project manager is leading a strategic and competitive advantage project for a healthcare organization that is in its testing phase. The team has been working on this project for 6 months, and the morale of the team is low due to the schedule. What can the project manager do to motivate the team?","options":{"A":"Continue to perform the last phase of the project with the project team as this will benefit the organization and provide a competitive edge.","B":"Talk to the business team about the project phase and the team's commitment, and request a monetary reward for the team.","C":"Speak with the project management office (PMO) and request a 2-week extension of the schedule so the team can have rotational time off.","D":"Meet with the horizontal team managers to recognize the team members and give rewards and promotions upon completion of the project."},"correct":["A"],"answer_display":"A","why_correct":"The best motivator when a team has low morale in the final phase is to help them see through to completion — the project's strategic and competitive value provides purpose that can re-energize the team to finish strong.","why_wrong":{"B":"Requesting a monetary reward without prior indication such rewards were planned may not materialize and creates false expectations.","C":"Requesting a schedule extension for rotational time off may not be approved and delays the competitive advantage.","D":"Asking horizontal managers to recognize the team is valuable but the PM should first help the team reconnect with the project's purpose."},"part":"Part 6","part_range":"Q251–Q300"},{"num":266,"type":"single","stem":"A project manager starts to receive emails from different stakeholders requesting information about the project status. What should the project manager do to avoid this in the future?","options":{"A":"Schedule weekly project status meetings with all stakeholders including the customer and internal resources.","B":"Include the project stakeholders’ needs while planning the project communications strategy.","C":"Designate a team member to respond to the emails from these stakeholders.","D":"Include the stakeholders’ emails in all of the project status communications."},"correct":["B"],"answer_display":"B","why_correct":"Reactive stakeholder communication requests indicate a communications planning gap. The PM should include stakeholder communication needs while planning the communications strategy — proactive, planned communication prevents ad-hoc requests.","why_wrong":{"A":"Weekly meetings with all stakeholders may be excessive and doesn't address all communication preferences.","C":"Designating a team member to respond to emails doesn't fix the underlying communications planning gap.","D":"Adding all stakeholder emails to all communications is information overload; tailored communication is more effective."},"part":"Part 6","part_range":"Q251–Q300"},{"num":267,"type":"single","stem":"A project manager is working as a servant leader for a pilot project to adopt agile practices. After three sprints, the team demos the product to the main stakeholders, but receives negative feedback about the product's features. The team feels that all the features met the acceptance criteria defined by the product owner and does not understand what went wrong. How should the project manager mitigate the product rejection?","options":{"A":"Share the product backlog for the main stakeholders to review in advance.","B":"Engage the main stakeholders in the upcoming sprint review sessions.","C":"Create dedicated sprints to implement feature fixes for the rejected ones.","D":"Ask the project sponsor to evaluate the assignment of a new product owner."},"correct":["B"],"answer_display":"B","why_correct":"When main stakeholders reject features that met acceptance criteria defined by the product owner, the root cause is that the main stakeholders were not involved in defining or reviewing the work. Engaging them in sprint reviews resolves this.","why_wrong":{"A":"Sharing the backlog in advance for stakeholder review is a step but doesn't replace their participation in sprint reviews where they can see working product.","C":"Dedicated fix sprints add cost and time without addressing the root cause of stakeholder exclusion.","D":"Replacing the product owner is a drastic action when the real issue is insufficient main stakeholder engagement in the review process."},"part":"Part 6","part_range":"Q251–Q300"},{"num":268,"type":"single","stem":"A project team has installed software for the client, passed the knowledge to operations, sent the final report, and celebrated. Then 1 week later, the client sends a list of requirements that have not been met. The client is requesting to fix the issues quickly and within the initial budget. What should the project manager have done to prevent this from happening?","options":{"A":"Reviewed the acceptance criteria and obtained client approval.","B":"Allocated a risk budget for any post-release improvements.","C":"Conducted a pilot to understand the client's performance parameters.","D":"Established meetings with the client throughout the project phases."},"correct":["A"],"answer_display":"A","why_correct":"When a customer submits a list of unmet requirements after handover and celebration, the PM should have reviewed acceptance criteria with the customer and obtained formal acceptance before closing — formal acceptance prevents post-closure disputes.","why_wrong":{"B":"A risk budget for post-release improvements accepts the deficiency rather than preventing it through proper acceptance.","C":"A pilot test helps understand performance but doesn't replace formal acceptance criteria review with the customer.","D":"Meetings throughout project phases provide communication but not the formal acceptance that prevents post-closure claims."},"part":"Part 6","part_range":"Q251–Q300"},{"num":269,"type":"single","stem":"162 A project that is using an incremental approach has colocated team members and is using a kanban board to visualize the work in progress (WIP). A key external stakeholder requests that all project activities be placed on hold until a status report is distributed. What should the project manager have done to avoid this situation?","options":{"A":"Stored project documentation in a shared folder.","B":"Organized monthly meetings with the external stakeholders.","C":"Invited all of the stakeholders to daily standup meetings.","D":"Sent weekly status update reports to all of the stakeholders."},"correct":["D"],"answer_display":"D","why_correct":"When an external stakeholder halts the project because they lack status visibility, the PM should have been sending regular weekly status updates — providing the information access that prevents such disruptions.","why_wrong":{"A":"Shared documentation folders provide access to documents but don't proactively push status updates to external stakeholders.","B":"Monthly meetings are too infrequent for a stakeholder who needs regular project visibility.","C":"Daily standups are too frequent and too operational for external stakeholders."},"part":"Part 6","part_range":"Q251–Q300"},{"num":270,"type":"single","stem":"A high-performing team is involved in a project with a new domain. The team is unable to deliver as expected. What should the project manager do?","options":{"A":"Support the team in identifying the area of development and address the gap.","B":"Dissolve the team and include the team members in other existing teams.","C":"Identify the struggling team members and move them out of the team.","D":"Set up a clear expectation that the team is to deliver as in their previous projects."},"correct":["A"],"answer_display":"A","why_correct":"When a high-performing team struggles in a new domain, it's a knowledge/skill gap, not a performance failure. The PM should support them in identifying where the gap is and address it — building their capability for the new domain.","why_wrong":{"B":"Dissolving a high-performing team over a domain knowledge gap wastes proven team cohesion and performance.","C":"Removing struggling members assumes the issue is individual failure rather than a team learning challenge.","D":"Expecting the same output in a new domain without support ignores the legitimate learning curve."},"part":"Part 6","part_range":"Q251–Q300"},{"num":271,"type":"single","stem":"During a project meeting, the project manager expressed the importance of delivering reports on time. These individual reports will be consolidated into a single report. One of the team member's reports was not delivered on time and therefore the report could not be integrated with the other reports. This demonstrates a lack of teamwork and impacts project success. What should the project manager do to resolve this issue?","options":{"A":"Assign the task to someone else on the team.","B":"Discuss it with the team member in confidence.","C":"Discuss this matter during the project meeting.","D":"Include this item in the risk register."},"correct":["B"],"answer_display":"B","why_correct":"When one team member's late report delays integration, the PM should discuss it privately with that team member — direct, respectful, and confidential feedback is more appropriate than public shaming or passive documentation.","why_wrong":{"A":"Reassigning the task doesn't address the team member's accountability or prevent recurrence.","C":"Discussing in the project meeting publicly shames the team member, which damages trust and morale.","D":"Adding to the risk register treats a people management situation as a risk, which is the wrong process."},"part":"Part 6","part_range":"Q251–Q300"},{"num":272,"type":"single","stem":"A project is starting its second iteration out of six. During the daily meeting, a team member asks for help. In order to finish a deliverable, an approval from the design department will be needed. What should the project manager do?","options":{"A":"Meet with the design manager to ask for the necessary approval.","B":"Invite a design team member to the next daily meeting.","C":"Update the issue log and escalate it to the project sponsor.","D":"Replace this iteration deliverable for one without any blockers."},"correct":["A"],"answer_display":"A","why_correct":"When a cross-team approval is blocking a deliverable, the PM should directly meet with the design manager to request the needed approval — removing the impediment at its source rather than documenting or escalating.","why_wrong":{"B":"Inviting a design team member to the daily meeting is useful for communication but doesn't obtain the needed approval.","C":"Adding to the issue log and escalating to the sponsor is premature when a direct conversation with the design manager can resolve it.","D":"Replacing the deliverable with one that has no blockers avoids the problem rather than solving it."},"part":"Part 6","part_range":"Q251–Q300"},{"num":273,"type":"single","stem":"A project manager has been assigned to lead an IT project to store information on sold lottery tickets. During the project execution, a failure in the system caused 10 numbers to be sold two times. This happened during the month of greatest demand because the prize was the highest of the year. The project team is concerned that one of those tickets could be the winner. What should the project manager do first?","options":{"A":"Reassure the sponsor by explaining the probability of this risk materializing is extremely low.","B":"Carry out tests to verify that the system does not fail again due to the high occurrence of events.","C":"Review the list of risks to verify that this issue was considered and execute the detailed action plan.","D":"Inform the sponsor about the issue and make a request for sufficient funds to be made available."},"correct":["C"],"answer_display":"C","why_correct":"When a system failure occurs, the PM should review the risk register to check if this issue was anticipated and whether there is a planned response — following the risk management process before improvising a response.","why_wrong":{"A":"Reassuring the sponsor about low probability before investigating the response plan is premature and potentially incorrect.","B":"Carrying out tests is a valid action but should be informed by whether a planned response already exists in the risk register.","D":"Requesting funds from the sponsor before checking the risk register may request resources unnecessarily."},"part":"Part 6","part_range":"Q251–Q300"},{"num":274,"type":"single","stem":"A project manager is working on an agile project in a changing business environment. The project sponsor is worried about benefits realization and asks the project manager to pay attention to changes that can affect the project. Which action should the project manager take to identify changes that may affect the product?","options":{"A":"Implement face-to-face communication between the team and product owner to change the iteration objectives as needed.","B":"Stop the iteration as soon as possible in case an external change that makes the product invaluable is identified.","C":"Take action to reprioritize the backlog after every iteration to evaluate if user stories are still valuable to the business.","D":"Apply a pair programming technique to react to changes immediately, even in the middle of the interaction."},"correct":["C"],"answer_display":"C","why_correct":"In an agile project under business change pressure, the PM should reprioritize the backlog after every iteration — systematically evaluating whether each user story still delivers business value given the evolving environment.","why_wrong":{"A":"Face-to-face communication is a technique for collaboration, not a backlog reprioritization strategy.","B":"Stopping the iteration as soon as an external change is identified is disruptive and doesn't allow for analysis.","D":"Pair programming is a development technique, not a change management strategy."},"part":"Part 6","part_range":"Q251–Q300"},{"num":275,"type":"single","stem":"A project manager is working on a major construction project. Part of the agreed-upon plan was to use a cloud-based system with a server that runs on high-speed internet service since most of the team members work virtually. The company needs to reduce operating costs as much as possible and management insists that the project will now use a system running on a conventional dial-up service. What should the project manager do next?","options":{"A":"Agree with management and continue working the project management plan.","B":"Evaluate the impact of this decision and communicate with management.","C":"Replace some of the team members that work virtually to help the company save money.","D":"Meet with management about their decision and ask them to get another project manager."},"correct":["B"],"answer_display":"B","why_correct":"When management imposes a decision that will impact project performance (dial-up vs. high-speed internet), the PM should evaluate the full impact and communicate the consequences to management — enabling an informed decision.","why_wrong":{"A":"Agreeing without evaluation ignores the PM's responsibility to inform management of impacts.","C":"Replacing virtual team members is a drastic response to a technical infrastructure decision.","D":"Asking management to find another PM is unprofessional and abandons the PM's responsibility."},"part":"Part 6","part_range":"Q251–Q300"},{"num":276,"type":"single","stem":"In a geographically distributed team, a developer continues to delay a coding activity. This activity is on the critical path. The project manager found out that the delay is due to the developer's lack of understanding of the customer requirements shared by the off-site team. What should the project manager do?","options":{"A":"Replace the developer with a skilled resource.","B":"Perform a root cause analysis (RCA) with the team members.","C":"Facilitate communication to ensure clarification of the requirements.","D":"Conduct frequent performance reviews."},"correct":["C"],"answer_display":"C","why_correct":"When a delay is caused by unclear requirements from the off-site team, the PM should facilitate communication to clarify the requirements — this directly removes the blockage causing the critical path delay.","why_wrong":{"A":"Replacing the developer assumes the issue is capability when it's actually a requirements clarity problem.","B":"Root cause analysis is useful but longer-term; immediate facilitation of requirements clarification addresses the active delay.","D":"Frequent performance reviews address the developer's output but not the root cause of unclear requirements."},"part":"Part 6","part_range":"Q251–Q300"},{"num":277,"type":"single","stem":"A project scope statement has been approved, and the project manager and core team have been assigned to the project. Suddenly, the project manager takes a temporary leave of absence due to a medical emergency. While the project manager is on leave, the team develops the project schedule. When the project manager returns, a detailed schedule is almost complete. What should the project manager do?","options":{"A":"Ensure that the schedule is aligned with the vision and objectives.","B":"Escalate the compliance issue to the project management office (PMO).","C":"Congratulate the team and move on to the execution phase.","D":"Develop a new detailed schedule with the team and project sponsor."},"correct":["A"],"answer_display":"A","why_correct":"When the team develops a schedule during the PM's absence, the returning PM's first action is to ensure the schedule aligns with the project vision and objectives — not to redo it or escalate, but to verify alignment.","why_wrong":{"B":"Escalating to the PMO about a compliance issue is premature; the PM should first assess whether the schedule aligns with the vision.","C":"Congratulating and moving on without verification is irresponsible — the PM hasn't confirmed the schedule meets the project objectives.","D":"Developing a new schedule discards potentially good work and demotivates the team."},"part":"Part 6","part_range":"Q251–Q300"},{"num":278,"type":"single","stem":"A project manager manages a bridge construction project. The project manager has received a major change request from a regulatory stakeholder to add one branch of the bridge to the engineering design. The project manager prepared a change request, which was reviewed and accepted by the change control board (CCB). What should the project manager do now?","options":{"A":"Notify the project team about the change request's approval.","B":"Include the new branch of the bridge in the design.","C":"Communicate the decision to the stakeholder who requested the change.","D":"Evaluate the adjustments to the project management plan."},"correct":["D"],"answer_display":"D","why_correct":"After a change request is approved by the CCB, the PM must evaluate all adjustments to the project management plan — updating scope, schedule, cost, and quality baselines to reflect the approved change before notifying anyone.","why_wrong":{"A":"Notifying the team before updating the project management plan sends people to work without updated baselines.","B":"Including the new branch before evaluating all plan impacts may create inconsistencies across the project plan.","C":"Communicating to the requesting stakeholder before the plan is updated shares incomplete information."},"part":"Part 6","part_range":"Q251–Q300"},{"num":279,"type":"single","stem":"A project is near completion but it is behind schedule. The contingency budget has already being used, although the remaining budget should be enough to complete the project. The only subject matter expert (SME) assigned to the project has been asked by their manager to solve a problem in the operations department. What should the project manager do?","options":{"A":"Escalate the situation to the project sponsor.","B":"Free the resource to handle the operations priority.","C":"Ask the manager to submit a change request.","D":"Design a negotiation strategy for this situation."},"correct":["D"],"answer_display":"D","why_correct":"When the only SME is being pulled to operations at a critical project phase, the PM should design a negotiation strategy — understanding the priorities of both the operations manager and the project sponsor to find a solution that serves both.","why_wrong":{"A":"Escalating to the sponsor is an option but designing the negotiation strategy first gives the PM a more effective position.","B":"Freely releasing the SME accepts the schedule impact without attempting to negotiate a balanced solution.","C":"Asking the operations manager to submit a change request is not the appropriate process for an internal resource conflict."},"part":"Part 6","part_range":"Q251–Q300"},{"num":280,"type":"single","stem":"A vendor has manufactured a complex product. During a factory acceptance test, several deficiencies were identified. Product delivery is on the critical path, and any delay would impact project completion. What should the project manager do?","options":{"A":"Initiate regular conference calls with the vendor for status updates to keep this item in focus.","B":"Hold the shipment until the rework is completed at the vendor's facility to eliminate extra work onsite.","C":"Assess the schedule impact and evaluate the most feasible solution to keep the project on track.","D":"Ship the package as is, complete carryover work on-site, and back charge the vendor for the rework."},"correct":["C"],"answer_display":"C","why_correct":"When product delivery is on the critical path and deficiencies are found, the PM must assess the schedule impact and evaluate feasibility of solutions — completing in the factory vs. shipping and fixing on-site requires a full trade-off analysis.","why_wrong":{"A":"Regular conference calls without first assessing the impact doesn't enable informed decision-making.","B":"Holding shipment until complete rework may cause unacceptable delays without analyzing that impact.","D":"Shipping as-is and back-charging the vendor is a financial approach that may still cause on-site rework delays and quality issues."},"part":"Part 6","part_range":"Q251–Q300"},{"num":281,"type":"single","stem":"A project manager assigned to an education project needs to train a workforce in application development. The customer is responsible for providing the training center, and the deadline to start the first training is in 2 wee
