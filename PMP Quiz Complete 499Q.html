<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PMP® Exam Prep — 499 Questions (All 10 Parts)</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy: #0D1B35;
  --navy2: #122040;
  --navy3: #162850;
  --gold: #C8A84B;
  --gold2: #F0C860;
  --blue: #1E3A7A;
  --green: #2E7D32;
  --green-bg: #081F10;
  --green-border: #2E7D32;
  --green-text: #81C784;
  --red: #C62828;
  --red-bg: #1F0808;
  --red-border: #C62828;
  --red-text: #EF9A9A;
  --text: #D8E4F8;
  --text-dim: #7A90B8;
  --border: #1E3060;
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--navy);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── PART SELECTOR SCREEN ── */
#partSelect {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 40px 20px;
}

.logo-row {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 8px;
}

.logo-badge {
  width: 48px; height: 48px;
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; font-weight: 800; color: var(--navy);
}

.app-title {
  font-size: 26px;
  font-weight: 800;
  color: var(--gold);
  letter-spacing: -0.5px;
}

.app-subtitle {
  font-size: 13px;
  color: var(--text-dim);
  margin-bottom: 36px;
  letter-spacing: 2px;
  text-transform: uppercase;
}

.parts-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 14px;
  width: 100%;
  max-width: 900px;
}

.part-card {
  background: var(--navy2);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 20px 22px;
  cursor: pointer;
  transition: all .2s;
  position: relative;
  overflow: hidden;
}

.part-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--gold), var(--gold2));
  opacity: 0;
  transition: opacity .2s;
}

.part-card:hover { border-color: var(--gold); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.4); }
.part-card:hover::before { opacity: 1; }

.part-card.done { border-color: #2E7D32; }
.part-card.done::before { opacity: 1; background: linear-gradient(90deg, #2E7D32, #4CAF50); }

.part-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 6px;
}

.part-range {
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 4px;
}

.part-count {
  font-size: 12px;
  color: var(--text-dim);
}

.part-progress-bar {
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin-top: 14px;
  overflow: hidden;
}

.part-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), var(--gold2));
  border-radius: 2px;
  transition: width .4s;
}

.part-score-row {
  display: flex;
  justify-content: space-between;
  margin-top: 8px;
}

.part-score-label {
  font-size: 11px;
  color: var(--text-dim);
}

.part-score-val {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  color: var(--gold);
}

/* ── QUIZ SCREEN ── */
#quizScreen { display: none; flex-direction: column; min-height: 100vh; }

/* Top bar */
.topbar {
  background: linear-gradient(135deg, var(--navy2), #0E2050);
  border-bottom: 2px solid var(--gold);
  padding: 0 20px;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}

.topbar-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.back-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 5px 10px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  transition: .2s;
}
.back-btn:hover { border-color: var(--gold); color: var(--gold); }

.topbar-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: .5px;
}

.topbar-right {
  font-size: 12px;
  color: var(--text-dim);
  font-family: 'JetBrains Mono', monospace;
}

/* Progress */
.progress-track {
  height: 3px;
  background: var(--navy3);
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), var(--gold2));
  transition: width .4s ease;
}

/* Stats bar */
.stats-bar {
  background: #090F20;
  border-bottom: 1px solid var(--border);
  display: flex;
}

.stat-cell {
  flex: 1;
  padding: 8px 6px;
  text-align: center;
  border-right: 1px solid var(--border);
}
.stat-cell:last-child { border-right: none; }

.stat-val {
  font-size: 17px;
  font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
  line-height: 1;
  margin-bottom: 2px;
}
.sv-score { color: var(--gold); }
.sv-c { color: #66BB6A; }
.sv-w { color: #EF5350; }
.sv-s { color: var(--text-dim); }
.sv-l { color: #42A5F5; }

.stat-label {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: #3A5070;
}

/* Main content */
.quiz-body {
  flex: 1;
  max-width: 860px;
  margin: 0 auto;
  width: 100%;
  padding: 18px 16px 100px;
}

/* Question meta */
.q-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}

.badge {
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .5px;
}
.badge-num { background: var(--navy3); color: var(--gold); border: 1px solid var(--gold); }
.badge-part { background: var(--navy3); color: var(--text-dim); border: 1px solid var(--border); }
.badge-type { background: var(--navy3); color: #42A5F5; border: 1px solid #1E3A60; text-transform: uppercase; font-size: 10px; }
.badge-multi { background: #1A1A50; color: #AB47BC; border: 1px solid #4A2A7A; }

/* Question card */
.q-card {
  background: var(--navy2);
  border: 1px solid var(--border);
  border-left: 4px solid var(--gold);
  border-radius: 10px;
  padding: 16px 18px;
  font-size: 14.5px;
  line-height: 1.7;
  color: var(--text);
  margin-bottom: 14px;
}

/* Multi hint */
.multi-hint {
  background: #1A1A50;
  border: 1px solid #4A2A7A;
  border-radius: 8px;
  padding: 8px 14px;
  font-size: 12px;
  color: #CE93D8;
  margin-bottom: 10px;
  display: none;
}

/* Options */
.options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }

.opt {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 11px 14px;
  border-radius: 10px;
  cursor: pointer;
  border: 1.5px solid var(--border);
  background: #0B1628;
  transition: all .18s;
  user-select: none;
}
.opt:hover:not(.disabled) { border-color: rgba(200,168,75,.5); background: #101E3A; }
.opt.selected { border-color: #4A90D9; background: #0E1E40; }
.opt.correct-ans { border-color: #4CAF50 !important; background: var(--green-bg) !important; }
.opt.wrong-ans { border-color: #EF5350 !important; background: var(--red-bg) !important; }
.opt.show-correct { border-color: #4CAF50 !important; background: var(--green-bg) !important; }
.opt.disabled { cursor: default; }

.opt-letter {
  width: 28px; height: 28px;
  border-radius: 7px;
  background: #1A2A50;
  color: var(--gold);
  font-weight: 700;
  font-size: 12px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-family: 'JetBrains Mono', monospace;
  transition: .18s;
}
.opt.selected .opt-letter { background: #1E4A80; color: white; }
.opt.correct-ans .opt-letter { background: #1E6A30; color: white; }
.opt.wrong-ans .opt-letter { background: #6A1E1E; color: white; }
.opt.show-correct .opt-letter { background: #1E6A30; color: white; }

.opt-text { font-size: 13.5px; line-height: 1.55; color: #C0D4F0; }

/* Buttons */
.btn-row { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }

.btn {
  padding: 10px 20px;
  border-radius: 8px;
  border: none;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: all .2s;
  letter-spacing: .3px;
  font-family: 'Inter', sans-serif;
}
.btn-submit {
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  color: var(--navy);
}
.btn-submit:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(200,168,75,.35); }
.btn-submit:disabled { opacity: .45; cursor: not-allowed; }
.btn-next {
  background: linear-gradient(135deg, #1A3A7A, #1E4A90);
  color: var(--gold);
  border: 1px solid var(--gold);
}
.btn-next:hover { background: #1E4A90; }
.btn-skip { background: #101828; color: var(--text-dim); border: 1px solid var(--border); }
.btn-skip:hover { border-color: var(--gold); color: var(--gold); }

/* Explanation */
.explanation {
  border-radius: 10px;
  overflow: hidden;
  border: 1px solid var(--border);
  margin-bottom: 14px;
}

.result-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: #090F20;
  border-bottom: 1px solid var(--border);
}

.result-chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 700;
}
.chip-correct { background: var(--green-bg); color: #66BB6A; border: 1px solid var(--green-border); }
.chip-wrong { background: var(--red-bg); color: #EF5350; border: 1px solid var(--red-border); }
.chip-skip { background: #0F1828; color: var(--text-dim); border: 1px solid var(--border); }

.exp-correct {
  padding: 14px 16px;
  background: var(--green-bg);
  border-left: 3px solid var(--green-border);
}
.exp-correct-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: #66BB6A;
  margin-bottom: 6px;
}
.exp-correct-text {
  font-size: 13.5px;
  line-height: 1.65;
  color: var(--green-text);
}

.exp-wrong {
  padding: 14px 16px;
  background: var(--red-bg);
  border-left: 3px solid var(--red-border);
  border-top: 1px solid #2A1010;
}
.exp-wrong-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: #EF5350;
  margin-bottom: 8px;
}
.exp-wrong-item {
  font-size: 13px;
  line-height: 1.55;
  color: var(--red-text);
  margin-bottom: 5px;
  padding-left: 4px;
}
.exp-wrong-item b { color: #F48FB1; }

/* Nav dots */
.nav-panel {
  position: sticky;
  bottom: 0;
  background: #07101F;
  border-top: 1px solid var(--border);
  padding: 10px 14px;
}

.nav-part-tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 8px;
  overflow-x: auto;
  scrollbar-width: none;
}
.nav-part-tabs::-webkit-scrollbar { display: none; }

.part-tab {
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid var(--border);
  color: var(--text-dim);
  background: var(--navy2);
  white-space: nowrap;
  transition: .2s;
  flex-shrink: 0;
}
.part-tab:hover { border-color: var(--gold); color: var(--gold); }
.part-tab.active-tab { border-color: var(--gold); background: #1A2A50; color: var(--gold); }

.dots-wrap {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  max-height: 80px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.dot {
  width: 24px; height: 24px;
  border-radius: 5px;
  font-size: 9px;
  font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  background: var(--navy2);
  color: #3A5070;
  border: 1px solid var(--border);
  transition: .15s;
  font-family: 'JetBrains Mono', monospace;
}
.dot:hover { border-color: var(--gold); color: var(--gold); }
.dot.active { background: var(--gold); color: var(--navy); border-color: var(--gold); }
.dot.ans-c { background: #0A2A14; color: #66BB6A; border-color: #2E7D32; }
.dot.ans-w { background: #2A0A0A; color: #EF5350; border-color: #C62828; }
.dot.ans-s { background: #0F1828; color: #3A5070; border-color: #1A2A40; opacity: .6; }

/* Final screen */
#finalScreen {
  display: none;
  padding: 40px 20px;
  max-width: 700px;
  margin: 0 auto;
  text-align: center;
}

.final-header {
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 8px;
}

.final-pct {
  font-size: 72px;
  font-weight: 800;
  color: var(--gold);
  line-height: 1;
  font-family: 'JetBrains Mono', monospace;
  margin-bottom: 6px;
}

.final-label {
  font-size: 14px;
  color: var(--text-dim);
  margin-bottom: 28px;
}

.final-stats {
  display: flex;
  justify-content: center;
  gap: 28px;
  margin-bottom: 32px;
  flex-wrap: wrap;
}

.fs-cell { text-align: center; }
.fs-val {
  font-size: 32px;
  font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
}
.fs-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-dim);
}

.final-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

.btn-final-restart {
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  color: var(--navy);
  padding: 12px 28px;
  border-radius: 10px;
  border: none;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
}

.btn-final-back {
  background: var(--navy2);
  color: var(--gold);
  padding: 12px 28px;
  border-radius: 10px;
  border: 1px solid var(--gold);
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
}

/* Missed questions section */
.missed-section {
  margin-top: 28px;
  text-align: left;
}
.missed-title {
  font-size: 13px;
  font-weight: 700;
  color: #EF5350;
  margin-bottom: 12px;
  letter-spacing: .5px;
}
.missed-item {
  background: var(--red-bg);
  border: 1px solid var(--red-border);
  border-radius: 8px;
  padding: 12px 14px;
  margin-bottom: 8px;
  font-size: 12.5px;
  color: var(--red-text);
  line-height: 1.5;
}
.missed-item-num { font-weight: 700; color: #F48FB1; margin-bottom: 4px; font-family: 'JetBrains Mono', monospace; }
.missed-item-ans { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

/* Responsive */
@media (max-width: 480px) {
  .app-title { font-size: 20px; }
  .parts-grid { grid-template-columns: 1fr; }
  .q-card { font-size: 13.5px; }
  .opt-text { font-size: 12.5px; }
}
</style>
</head>
<body>

<!-- ===== PART SELECTOR ===== -->
<div id="partSelect">
  <div class="logo-row">
    <div class="logo-badge">P</div>
    <div class="app-title">PMP® Exam Prep</div>
  </div>
  <div class="app-subtitle">499 Questions &bull; 10 Parts &bull; PMI Mindset</div>

  <div class="parts-grid" id="partsGrid"></div>
</div>

<!-- ===== QUIZ SCREEN ===== -->
<div id="quizScreen" style="display:none; flex-direction:column; min-height:100vh;">
  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-left">
      <button class="back-btn" onclick="goHome()">&#8592; Parts</button>
      <span class="topbar-title" id="topbarTitle">Part 1 — Q1&ndash;Q50</span>
    </div>
    <span class="topbar-right" id="topbarRight">1 / 50</span>
  </div>

  <!-- Progress -->
  <div class="progress-track">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat-cell"><div class="stat-val sv-score" id="sScore">0/0</div><div class="stat-label">Score</div></div>
    <div class="stat-cell"><div class="stat-val sv-c" id="sCorrect">0</div><div class="stat-label">Correct</div></div>
    <div class="stat-cell"><div class="stat-val sv-w" id="sWrong">0</div><div class="stat-label">Wrong</div></div>
    <div class="stat-cell"><div class="stat-val sv-s" id="sSkip">0</div><div class="stat-label">Skipped</div></div>
    <div class="stat-cell"><div class="stat-val sv-l" id="sLeft">50</div><div class="stat-label">Left</div></div>
  </div>

  <!-- Question body -->
  <div class="quiz-body" id="quizBody">
    <div class="q-meta">
      <span class="badge badge-num" id="qBadgeNum">Q1</span>
      <span class="badge badge-part" id="qBadgePart">Part 1</span>
      <span class="badge badge-type" id="qBadgeType">Single</span>
    </div>
    <div class="q-card" id="qStem">Loading...</div>
    <div class="multi-hint" id="multiHint">&#9432; Multi-select — choose all correct answers, then click Submit</div>
    <div class="options" id="optionsDiv"></div>
    <div class="btn-row">
      <button class="btn btn-submit" id="btnSubmit" onclick="submitAnswer()">Submit Answer</button>
      <button class="btn btn-next" id="btnNext" onclick="nextQuestion()" style="display:none">Next &rarr;</button>
      <button class="btn btn-skip" id="btnSkip" onclick="skipQuestion()">Skip</button>
    </div>
    <div id="explanationDiv" style="display:none"></div>
  </div>

  <!-- Final screen (inside quiz screen) -->
  <div id="finalScreen">
    <div class="final-header">Part Complete</div>
    <div class="final-pct" id="fPct">—%</div>
    <div class="final-label" id="fLabel">Quiz Complete</div>
    <div class="final-stats">
      <div class="fs-cell"><div class="fs-val" style="color:#66BB6A" id="fC">0</div><div class="fs-label">Correct</div></div>
      <div class="fs-cell"><div class="fs-val" style="color:#EF5350" id="fW">0</div><div class="fs-label">Wrong</div></div>
      <div class="fs-cell"><div class="fs-val" style="color:var(--text-dim)" id="fS">0</div><div class="fs-label">Skipped</div></div>
      <div class="fs-cell"><div class="fs-val" style="color:var(--gold)" id="fAcc">—</div><div class="fs-label">Accuracy</div></div>
    </div>
    <div class="final-btns">
      <button class="btn-final-restart" onclick="restartPart()">Restart Part</button>
      <button class="btn-final-back" onclick="goHome()">&#8592; All Parts</button>
    </div>
    <div class="missed-section" id="missedSection"></div>
  </div>

  <!-- Nav panel -->
  <div class="nav-panel" id="navPanel">
    <div class="nav-part-tabs" id="partTabs"></div>
    <div class="dots-wrap" id="dotsWrap"></div>
  </div>
</div>

<script>
// ── DATA ──
const ALL_QUESTIONS = [{"num":1,"type":"single","stem":"A project manager leads a software development project in a hybrid environment. During project planning, the project manager identified a risk where a technical resource for a critical path item may not be available when needed. One week before the resource is needed, the technical engineer had a personal emergency and had to take a leave. What should the project manager do next?","options":{"A":"Consult the risk register for an appropriate planned risk response and implement.","B":"Revise the project management plan and move the task to a time when the technical resource will be available.","C":"Review the business requirement with stakeholders and exclude the task assigned to the technical resource.","D":"Update the lessons learned report and the risk log to reflect that this risk has materialized."},"correct":["A"],"answer_display":"A","why_correct":"The risk was pre-identified and a planned response exists in the risk register. PMI mindset is always proactive — when a known risk materializes, execute the planned response immediately rather than improvising.","why_wrong":{"B":"Changing the schedule requires formal change control, not unilateral action by the PM.","C":"Excluding scope without stakeholder approval and a change request violates scope management principles.","D":"Updating lessons learned is a closing activity; it does nothing to resolve the active situation."},"part":"Part 1","part_range":"Q1–Q50"},{"num":2,"type":"single","stem":"A team has just adopted an agile approach. During daily standup meetings, the team expressed concerns about task delays. The project leader worked with the product owner to get clarity on the features. The project leader asked the team to fast-track all product features to ensure delivery. Sprints are being completed but with either fewer features or low quality. What should the project leader have done to ensure success?","options":{"A":"Asked the team to create an impediment log and keep it updated for use in the next sprint planning","B":"Directed teams to possible solutions that help in removing the impediments and contribute to a timely delivery","C":"Suggested to the team to add impediments as work items in the product backlog to be fixed in the next sprints","D":"Empowered the team to improve their processes, tools, and interactions to be more effective in delivery and removing impediments"},"correct":["D"],"answer_display":"D","why_correct":"PMI servant leadership means empowering teams to improve their own processes. The leader should create conditions for the team to self-organize and remove impediments, not dictate solutions or fast-track without team buy-in.","why_wrong":{"A":"An impediment log without action is passive documentation that does not resolve delays.","B":"Directing teams to solutions undermines their autonomy and self-organization.","C":"Adding impediments to the product backlog delays resolution indefinitely."},"part":"Part 1","part_range":"Q1–Q50"},{"num":3,"type":"single","stem":"A team is delivering features to a customer at every iteration. After completing each iteration, the customer is invited for a review. However, the customer is frequently not available and the review is often delayed, which results in increased rework for the team. What should the project manager do?","options":{"A":"Include the customer in daily project activities to gain the required guidance","B":"Plan ahead and define the best way to review the deliverables with the customer","C":"Request the customer to clarify all requirements at the start of each iteration","D":"Ask the customer to review the deliverables in each iteration based on their availability"},"correct":["B"],"answer_display":"B","why_correct":"PMI emphasizes proactive planning for stakeholder engagement. The PM should plan ahead and define a review process that works within the customer's constraints rather than repeatedly reacting to the same problem.","why_wrong":{"A":"Including the customer in daily activities is over-engagement and impractical.","C":"Requesting all requirements upfront contradicts iterative delivery principles.","D":"Passively asking the customer to review when available does not resolve the recurring delay."},"part":"Part 1","part_range":"Q1–Q50"},{"num":4,"type":"single","stem":"A project manager is part of a team that is launching a series of features to comply with a new regulation. The team has only 6 weeks to release the features to the legacy applications. During the standup meeting, a software engineer indicated that the development of an important feature is on hold until the assigned designer completes a specific task. This delay is a serious road block to meeting the release date. What should the project manager do?","options":{"A":"Meet with the design team manager to inform them of the current status and request an additional designer","B":"Ask the software engineer to move forward without completing the important feature","C":"Contact the design team manager and ask to reconsider the priority list based on the latest situation","D":"Meet with the designer to share the current status and develop a solution to complete the task"},"correct":["D"],"answer_display":"D","why_correct":"PMI's collaboration principle requires resolving issues at the lowest level first. The PM should meet directly with the designer to understand the blocking constraint and co-develop a solution before escalating.","why_wrong":{"A":"Going to the manager first skips direct collaboration and escalates prematurely.","B":"Moving forward without the feature risks delivering incomplete and potentially non-compliant functionality.","C":"Contacting the manager to reprioritize is escalation without first attempting direct resolution."},"part":"Part 1","part_range":"Q1–Q50"},{"num":5,"type":"single","stem":"A project manager is working with a customer's team on a new project. Some product definitions and requirements are still not clear, but the customer wants to start activities as soon as possible. The organization is also expecting product delivery for a specific date due to a regulatory requirement. Due to the nature of the project, the project manager has decided to use a hybrid approach. Why did the project manager choose a hybrid approach?","options":{"A":"A hybrid approach will enable project activities to start immediately and allow for a plan for the requirements definitions","B":"A hybrid approach will allow the project manager to revise the product specifications","C":"A hybrid approach will allow for management of the requirement uncertainties as well as the date restriction","D":"A hybrid approach will ensure the delivery date is accomplished and will eliminate product uncertainties"},"correct":["C"],"answer_display":"C","why_correct":"Hybrid is chosen when a project has both fixed constraints (regulatory deadline requires predictive planning) and requirement uncertainty (needs iterative/agile flexibility). It addresses both simultaneously.","why_wrong":{"A":"Starting quickly is a benefit, not the strategic reason for choosing hybrid over other approaches.","B":"Revising specifications is possible in any approach; this does not justify hybrid.","D":"Hybrid does not eliminate uncertainty; it manages it iteratively while respecting the deadline."},"part":"Part 1","part_range":"Q1–Q50"},{"num":6,"type":"single","stem":"A project team has expressed concern that certain remote team members are not able to collaborate with the larger project team due to their work schedule. The project manager is confused since the entire team is located in the same time zone and believes there are other factors at play. What should the project manager do next?","options":{"A":"Implement new options","B":"Examine the team's virtual needs","C":"Rectify ground rule violations","D":"Review performance formally"},"correct":["B"],"answer_display":"B","why_correct":"Before taking action, the PM must diagnose the problem. Examining virtual needs means investigating what specific collaboration barriers exist for remote team members before implementing any solution.","why_wrong":{"A":"Implementing solutions before understanding the root cause is reactive and may miss the real issue.","C":"There is no evidence of ground rule violations; assuming this skips proper diagnosis.","D":"Formal performance review addresses individuals, not the team collaboration structure."},"part":"Part 1","part_range":"Q1–Q50"},{"num":7,"type":"single","stem":"A company is implementing a project with team members located in different countries and time zones. Individual performance is satisfactory, but the team’s performance as a whole is low, especially in terms of group activities. What should the project manager do?","options":{"A":"Review and reassign team assignments","B":"Facilitate communication and team building","C":"Negotiate for new team members","D":"Review and update the communications management plan"},"correct":["B"],"answer_display":"B","why_correct":"When individual performance is good but group performance suffers, the issue is collaboration and team cohesion, not capability. The PM should facilitate communication and team-building to address the root cause.","why_wrong":{"A":"Reassigning tasks does not address why the team cannot collaborate effectively together.","C":"The problem is cohesion, not capability; new members would have the same issue.","D":"Updating a plan document does not build team cohesion or improve collaboration."},"part":"Part 1","part_range":"Q1–Q50"},{"num":8,"type":"single","stem":"During the third iteration of a project, the product owner requests another mandatory feature. This also happened in the previous two sprints, which resulted in failure and caused frustration within the team. What should the project manager do next?","options":{"A":"Request the scrum team to prioritize the product backlog","B":"Ask the product owner to prioritize the backlog with the project team","C":"Call for an internal meeting to discuss the changes and their value","D":"Incorporate the changes in the last sprint before the first release"},"correct":["B"],"answer_display":"B","why_correct":"In agile, the product owner owns backlog priority decisions. When mid-sprint additions repeatedly cause failure, the PM should facilitate the product owner working with the team to make conscious trade-off decisions on what to include.","why_wrong":{"A":"The scrum team handles technical sequencing; product value priority belongs to the product owner.","C":"An internal meeting without the product owner misses the key decision-maker.","D":"Cramming all changes into the last sprint repeats the overload pattern that has already caused failures."},"part":"Part 1","part_range":"Q1–Q50"},{"num":9,"type":"single","stem":"6 Five agile teams working together on a product recently performed release planning. Midway through the project, each team showed that their progress was on track. When all of the teams integrated at the product level, many integration issues were observed. The overall product release progress declined with predictions showing the committed content will not be able to be accomplished. What should the project manager have done differently?","options":{"A":"Performed a Scrum of Scrums on a regular basis to help the teams remove impediments","B":"Formed a separate quality assurance team to test all items coming from each team at the end of each sprint","C":"Arranged an online session on the integration concept and suggested tools to the teams","D":"Ensured frequent and continuous integration of work to obtain early feedback and continuous learning"},"correct":["D"],"answer_display":"D","why_correct":"PMI agile principle: integrate continuously and obtain early feedback. Waiting until end-of-sprint to integrate across five teams hid conflicts that should have been caught continuously throughout the work.","why_wrong":{"A":"Scrum of Scrums helps coordination but does not replace the need for continuous code integration.","B":"A separate QA team is a waterfall-era concept that adds handoff delays rather than preventing integration defects.","C":"An awareness session on integration concepts is training, not a structural process fix."},"part":"Part 1","part_range":"Q1–Q50"},{"num":10,"type":"single","stem":"A project team member is having difficulty delivering assigned tasks for a project that is at risk of being delayed. The main issue is that the team member does not understand a new system that was recently implemented. What should the project manager do?","options":{"A":"Ask the team member to learn the new system as on-the-job training.","B":"Issue a change request to extend the project schedule.","C":"Escalate the team member's performance to the project sponsor.","D":"Assign an experienced resource to support the team member."},"correct":["D"],"answer_display":"D","why_correct":"The PM's role is to remove impediments and support team members. Pairing the struggling member with an experienced resource provides immediate, targeted support without punishment or escalation.","why_wrong":{"A":"Self-learning without support is insufficient when the schedule is already at risk.","B":"Issuing a change request to extend the schedule is premature before exhausting internal solutions.","C":"Escalating performance to the sponsor is disproportionate for a resolvable skill gap."},"part":"Part 1","part_range":"Q1–Q50"},{"num":11,"type":"single","stem":"A project team consisting of four team members will be rolling out a company-wide application to both staff and contractors in a country. To deliver within strict the time lines, a local company skilled in application deployment and change management will need to be contracted. What should the project manager do to empower the local company?","options":{"A":"Manage expectations and agree on the requirements that the contractor will deliver under the supervision of the project manager","B":"Begin to roll out the application by micromanaging the contractor","C":"Set expectations and agree on the requirements that the contractor will deliver with periodic progress reports","D":"Deploy the contractor's staff under the supervision of the project manager"},"correct":["C"],"answer_display":"C","why_correct":"Empowering a contractor means setting clear expectations, agreeing on deliverables, and monitoring through periodic reports — not supervising daily activities. This respects their expertise while maintaining accountability.","why_wrong":{"A":"Placing the contractor under PM supervision undermines the empowerment and expert autonomy.","B":"Micromanaging is explicitly the opposite of empowerment.","D":"Deploying contractor staff under PM supervision is micromanagement in practice."},"part":"Part 1","part_range":"Q1–Q50"},{"num":12,"type":"single","stem":"A project manager is managing a construction project that is facing challenges. There is schedule overrun, cost overrun, and the client is unhappy with the specific scope progress. What should the project manager do first?","options":{"A":"Review the scope and project objectives.","B":"Enforce the penalty clause on the supplier.","C":"Take action to reduce the cost overrun.","D":"Work with the client on the scope completion."},"correct":["A"],"answer_display":"A","why_correct":"When facing triple constraint failures, the PM must first understand the root cause and current state by reviewing scope and project objectives before taking corrective action.","why_wrong":{"B":"Enforcing penalty clauses does not fix the schedule, cost, or scope problems.","C":"Targeting only cost overrun ignores scope and schedule issues.","D":"Working with the client on scope without first reviewing the baseline addresses symptoms not root cause."},"part":"Part 1","part_range":"Q1–Q50"},{"num":13,"type":"single","stem":"In a geographically distributed project team, the project team members continue to email status reports and update schedules after their weekly meeting discussions. However, the team is having difficulty tracking the changes and progress made. What should the project manager do?","options":{"A":"Facilitate training on version control and project artifacts.","B":"Maintain separate document control via regions to avoid discrepancies.","C":"Maintain a central repository of artifacts with a version control system.","D":"Develop a document management software for version control."},"correct":["C"],"answer_display":"C","why_correct":"A central repository with version control is the PMI-endorsed solution for distributed teams struggling with artifact tracking — it ensures a single source of truth accessible to all.","why_wrong":{"A":"Training on version control without providing the system to use is incomplete.","B":"Regional separation creates silos and increases discrepancy rather than eliminating it.","D":"Developing new software is an overengineered solution when central repository tools already exist."},"part":"Part 1","part_range":"Q1–Q50"},{"num":14,"type":"single","stem":"A project manager has been assigned to a project where collaboration with the business is a critical key factor. The project manager is not sure about which approach to use. A senior project manager has been assigned to help the project manager. What advice should the senior project manager provide?","options":{"A":"Work with the project manager to develop a new approach that will bring benefits to the project","B":"Suggest using an agile approach since customer and team collaboration is critical for project success","C":"Establish a project management methodology that requires the customer to provide daily updates to the team","D":"Provide a project management template for the project manager to follow as a guide"},"correct":["B"],"answer_display":"B","why_correct":"The scenario explicitly states collaboration with the business is a critical key factor. PMI and agile both recognize that when customer/stakeholder collaboration is central to success, an agile approach is most appropriate.","why_wrong":{"A":"Developing a new approach from scratch when proven ones exist is inefficient and risky.","C":"Requiring daily updates from the customer is over-engagement and burdens the business.","D":"A template alone provides no guidance on the appropriate methodology for this specific situation."},"part":"Part 1","part_range":"Q1–Q50"},{"num":15,"type":"single","stem":"A project manager is managing a large project. A stakeholder has just discovered a new risk that has not been identified in earlier stages. What should the project manager do?","options":{"A":"Confirm to the stakeholder that the risk register has been completed and validated by all stakeholders","B":"Perform a risk analysis directly with the stakeholder who raised the risk and update the risk register","C":"Communicate the risk to the steering committee and request a mitigation plan from senior management","D":"Add the risk to the risk register and reevaluate the register with help from the project team and stakeholders"},"correct":["D"],"answer_display":"D","why_correct":"PMI risk management is a continuous, team-wide activity. New risks should be added to the risk register and then assessed collaboratively with the project team and stakeholders — not handled bilaterally or escalated without analysis.","why_wrong":{"A":"Claiming the register is complete contradicts PMI's principle that risk identification is continuous.","B":"Performing analysis only with the one stakeholder who raised it misses broader team perspective.","C":"Escalating to steering committee before analyzing the risk skips the PM's own assessment responsibility."},"part":"Part 1","part_range":"Q1–Q50"},{"num":16,"type":"single","stem":"A Scrum team is analyzing the burndown chart on day four of a 15-day sprint. The burndown chart is shown below. What should the team do next?","options":{"A":"Ask the product owner if some low-priority stories could be cut from the sprint","B":"Continue with the sprint as the progress shows buffers for potential interruptions","C":"Ask the project team to select any additional stories as they have additional capacity than planned","D":"Continue with the sprint work as planned and keep monitoring"},"correct":["C"],"answer_display":"C","why_correct":"The burndown chart shows the team is ahead of schedule — they have remaining capacity. The PMI agile mindset is to use available capacity productively by pulling in additional stories rather than coasting.","why_wrong":{"A":"Cutting stories is appropriate when behind, not when ahead with buffer capacity.","B":"Merely monitoring when capacity is available misses the opportunity to deliver additional value.","D":"Continuing as planned when extra capacity exists wastes the opportunity to accelerate value delivery."},"part":"Part 1","part_range":"Q1–Q50"},{"num":17,"type":"single","stem":"A project manager is closing a project and preparing to hand it over to the operations team. During handover, a delayed invoice was submitted with a higher-than-planned cost against the project work. Consequently, project handover was delayed and the project's reported completion costs were increased. What should the project manager have done to avoid this situation?","options":{"A":"Notified all vendors about the invoicing and nonpayment deadlines","B":"Reviewed the total committed cost against the cost invoiced at project closing","C":"Involved the finance team and discussed the issue with the vendor","D":"Captured and reviewed all of the project work and related costs regularly"},"correct":["D"],"answer_display":"D","why_correct":"PMI's cost control principle is continuous monitoring of committed and actual costs throughout the project lifecycle. Regular cost reviews would have caught the delayed invoice discrepancy before project closing.","why_wrong":{"A":"Notifying vendors about deadlines helps but doesn't ensure the PM actively tracks all committed costs.","B":"Reviewing only at closing is too late — the issue had already occurred.","C":"Involving finance after the fact is reactive; continuous monitoring would have prevented the situation."},"part":"Part 1","part_range":"Q1–Q50"},{"num":18,"type":"single","stem":"A project manager is assigned to a critical software development project. The team is using a hybrid approach and has divided development into four sprints. At the end of sprint three, the project manager discovers that the earned value (EV) is US$500,000 and the planned value (PV) is US$550,000. What should the project manager do?","options":{"A":"Fast track the project","B":"Adjust the budget","C":"Introduce a float","D":"Adjust the project time line"},"correct":["D"],"answer_display":"D","why_correct":"SPI = EV/PV = 500k/550k = 0.91, meaning the project is behind schedule. The appropriate response is to adjust the project timeline through the formal change control process.","why_wrong":{"A":"Fast-tracking increases risk and should only be considered after impact analysis and change control.","B":"EV vs PV is a schedule metric, not a cost issue; the budget does not need adjustment based on this data alone.","C":"Introducing float does not address the root cause of the schedule slippage."},"part":"Part 1","part_range":"Q1–Q50"},{"num":19,"type":"single","stem":"A project manager is working with a co-located agile project team that has worked together long enough to be in the performing phase of team development. An unforeseen event has caused the team to be dispersed and they are now unable to co-locate. What should the project manager do to keep the team performing as effectively as possible?","options":{"A":"Ask the project sponsor and executive stakeholders to encourage the team to maintain their performance","B":"Provide the team with virtual collaboration software and training on the software to minimize disruption","C":"Transition the team from an agile approach to a predictive approach for better performance control","D":"Evaluate project performance and step in if performance decreases to an unacceptable level"},"correct":["B"],"answer_display":"B","why_correct":"When a high-performing collocated team must suddenly go virtual, the PM's priority is to minimize disruption by providing virtual collaboration tools and training — preserving what already made the team effective.","why_wrong":{"A":"Asking executives to motivate the team doesn't address the practical collaboration barrier.","C":"Switching methodology disrupts a high-performing team's established rhythm unnecessarily.","D":"A wait-and-see approach is reactive; proactive tool provision prevents the performance drop."},"part":"Part 1","part_range":"Q1–Q50"},{"num":20,"type":"single","stem":"13 A project manager is reviewing the requirements of a large program. Which requirements should the project team prioritize to avoid getting fines?","options":{"A":"Certifying sustainable products","B":"Establishing company processes","C":"Complying with new regulations","D":"Developing new product lines"},"correct":["C"],"answer_display":"C","why_correct":"PMI's compliance principle places regulatory requirements at the top of the priority hierarchy. Non-compliance results in fines and legal consequences, making regulatory compliance the highest priority.","why_wrong":{"A":"Certification for sustainable products is valuable but not a legal obligation with fine risk.","B":"Internal process establishment is operational, not a regulatory compliance requirement.","D":"New product development is growth-oriented and does not carry legal penalty risk."},"part":"Part 1","part_range":"Q1–Q50"},{"num":21,"type":"single","stem":"During the lessons learned workshop, one stakeholder mentioned that the project was unsuccessful as it did not deliver the expected business value. What should the project manager do to address this concern?","options":{"A":"Review the project management plan tasks with the stakeholders.","B":"Review the business benefits realization plan with the stakeholders.","C":"Review the project management plan budget with the stakeholders.","D":"Review the communications management plan with the stakeholders."},"correct":["B"],"answer_display":"B","why_correct":"When a stakeholder says the project failed to deliver expected business value, the root cause is misalignment with business benefits. The PM should review the benefits realization plan to identify the gap between planned and actual value delivery.","why_wrong":{"A":"Reviewing project management plan tasks addresses process compliance, not business value outcomes.","C":"Reviewing budget focuses on financial performance, not the value gap raised by the stakeholder.","D":"The communications plan tracks how information was shared, not whether business value was delivered."},"part":"Part 1","part_range":"Q1–Q50"},{"num":22,"type":"single","stem":"There is a conflict on an agile project about following organizational processes, many of which do not add any value to the project. To resolve this, which one of the following should be regarded with the highest priority?","options":{"A":"Needs of the organization","B":"Needs of the customer","C":"Needs of the agile lead","D":"Needs of the project manage"},"correct":["B"],"answer_display":"B","why_correct":"Agile Manifesto core value: customer collaboration over contract negotiation, and responding to change over following a plan. The customer's needs take priority over internal organizational processes that add no value.","why_wrong":{"A":"Organizational processes rank below customer needs in the agile value hierarchy.","C":"The agile lead's preferences do not override the customer's actual needs.","D":"The project manager's needs are subordinate to customer value delivery."},"part":"Part 1","part_range":"Q1–Q50"},{"num":23,"type":"single","stem":"A project team is using one of the visual management tools to identify dependencies. It was identified that domain knowledge from one team needs to be shared with another team to ensure the continuity of deliverables. What should the project manager do?","options":{"A":"Remove the dependency to eliminate the need for knowledge sharing.","B":"Redistribute the team members so knowledge is available in both teams.","C":"Merge both teams into one team so the knowledge is commonly available.","D":"Request the respective teams to plan for knowledge-sharing sessions."},"correct":["D"],"answer_display":"D","why_correct":"When a dependency involves knowledge sharing between teams, the right action is to plan formal knowledge-sharing sessions — maintaining team structure while ensuring the dependency is addressed proactively.","why_wrong":{"A":"Removing the dependency may not be feasible and ignores the actual knowledge gap.","B":"Redistributing team members disrupts both teams and may not efficiently address the knowledge need.","C":"Merging teams creates management complexity and may dilute both teams' effectiveness."},"part":"Part 1","part_range":"Q1–Q50"},{"num":24,"type":"single","stem":"A team member who is working on a critical project deliverable reported that their computer is not working. The IT department says that due to a high workload, they will not be able to provide assistance for 1 week. How should the project manager address this situation?","options":{"A":"Use project reserves to buy new equipment to avoid an impact to the critical path of the project","B":"Schedule a meeting with the project sponsor to request a budget to buy or rent a new computer","C":"Explore options with the IT department to expedite the necessary repairs based on criticality of the project","D":"Ask the team member to find an innovative solution or workaround to overcome the issue and avoid project delays"},"correct":["C"],"answer_display":"C","why_correct":"The PM should first explore internal solutions by working with IT to expedite repairs based on project criticality. This addresses the root cause without spending reserves or burdening the team member.","why_wrong":{"A":"Using project reserves to buy equipment is premature before exhausting the IT resolution path.","B":"Escalating to the sponsor is unnecessary when the PM can negotiate with IT directly.","D":"Asking the team member to find a workaround puts an unfair burden on them and avoids the PM's responsibility to remove impediments."},"part":"Part 1","part_range":"Q1–Q50"},{"num":25,"type":"single","stem":"A project manager is leading a team of diverse individuals of all ages. The working hours for the project were set at the beginning of the project, and all team members agreed to the hours. However, later in the project, one of the team members informed the project manager that the previously agreed upon hours no longer work due to the team member’s personal commitments. What should the project manager do?","options":{"A":"Changed the duration of iterations to deliver more value","B":"Validated the iteration goals with the customer","C":"Invited the customer to the daily meetings","D":"Helped the team redefine the MVP"},"correct":["D"],"answer_display":"D","why_correct":"This question is about changing team hours mid-project due to personal commitments. The PM should reassess hours collaboratively with the whole team to find a solution that works without blocking any member's contribution.","why_wrong":{"A":"Changing iteration duration is unrelated to resolving a team member's scheduling conflict.","B":"Validating iteration goals with the customer does not address the internal scheduling issue.","C":"Inviting the customer to daily meetings is unrelated to the team hour conflict."},"part":"Part 1","part_range":"Q1–Q50"},{"num":26,"type":"single","stem":"A project manager works in a hierarchical organization. The project team members are used to being told what to do, and the performance reviews include the percentage of completion of the allocated tasks. After a conversation with the sponsor, the project manager realizes that they need to reassign a couple of tasks to meet the next milestone. This change can be perceived as poor performance by the current assignees. What should the project manager do?","options":{"A":"Organize a team meeting and inform the team members that, as the person accountable for delivery, they decided to change the task allocation","B":"Ask the more experienced team member privately to take the task and inform the other team members that work has been reassigned","C":"Ask the less experienced team member privately to stop working on the task and inform another team member that the work has been reassigned","D":"Organize a team meeting to inform team members about a change in direction and work with them to change the task allocation"},"correct":["D"],"answer_display":"D","why_correct":"PMI emphasizes transparency and respect. In a hierarchical culture where reassignment may be perceived as performance failure, the PM should address the team collectively, explain the strategic rationale, and involve them in the change to maintain trust.","why_wrong":{"A":"Unilaterally announcing the decision without involving the team misses an opportunity for buy-in.","B":"Privately burdening the senior member without team transparency creates resentment.","C":"Privately pulling work away from the junior member without explanation undermines their confidence and trust."},"part":"Part 1","part_range":"Q1–Q50"},{"num":27,"type":"single","stem":"A project manager has just been hired to lead a project team in a hybrid environment. The team is working on a group of critical projects. What should the project manager do to ensure the right environment and authority are in place to effectively deliver the projects?","options":{"A":"Create a project steering committee aligned with existing organizational structures.","B":"Develop a detailed project management plan to share with project resources.","C":"Develop a detailed risk log and share it with all of the project stakeholders.","D":"Appoint a self-organizing project team that is not influenced by organizational factors."},"correct":["A"],"answer_display":"A","why_correct":"To ensure authority and governance for multiple critical projects, the PM needs a steering committee aligned with organizational structures — this provides the authority, escalation path, and decision-making power needed.","why_wrong":{"B":"A project management plan is a planning tool, not an authority-granting mechanism.","C":"A risk log is a tracking tool, not a governance structure.","D":"A self-organizing team isolated from organizational factors lacks the authority structure needed for critical projects."},"part":"Part 1","part_range":"Q1–Q50"},{"num":28,"type":"single","stem":"A building management system (BMS) project is in its commissioning phase and handover to the operations team will commence soon. However, the project manager noted that both the project and operation teams are not able to properly operate the BMS. As a result, there is an increased risk of the project schedule being delayed. What should the project manager have done to avoid this situation?","options":{"A":"Brought both teams together in a joint meeting to resolve the issue","B":"Made some adjustments to BMS to be more suitable for the teams","C":"Allocated a dedicated handover team at early stages of the project","D":"Allocated proper resources for training on BMS in the project plan"},"correct":["D"],"answer_display":"D","why_correct":"The failure to train both teams on the BMS was a planning omission. Proper resource allocation for training during planning would have ensured both teams were competent before commissioning.","why_wrong":{"A":"A joint meeting at commissioning is reactive; the issue is the absence of training in the plan.","B":"Adjusting the BMS is a workaround that does not address the fundamental skills gap.","C":"A handover team without training would still not be able to operate the BMS competently."},"part":"Part 1","part_range":"Q1–Q50"},{"num":29,"type":"single","stem":"A team working on a close deployment waits to receive critical information from the customer. The customer keeps postponing sending the information which is delaying the deployment. What should the project manager have done to prevent the delay?","options":{"A":"Obtained all critical information ahead of time","B":"Involved the customer in the deployment process","C":"Used the sample data already in place","D":"Involved upper management in the process"},"correct":["A"],"answer_display":"A","why_correct":"PMI proactive principle: identify and secure critical dependencies ahead of time. The PM should have obtained the critical information from the customer during planning rather than waiting until deployment.","why_wrong":{"B":"Involving the customer in deployment is good but doesn't solve the information availability problem.","C":"Using sample data may not be appropriate for the production deployment context.","D":"Escalating to upper management should be a last resort, not the first solution to a dependency issue."},"part":"Part 1","part_range":"Q1–Q50"},{"num":30,"type":"single","stem":"A project manager is assigned to a new project that will launch the digital version of a current product. Even though the product is well known, the vision for its digital version is not clear to the stakeholders. What should the project manager do to increase value delivery?","options":{"A":"Gather the team to create a comprehensive product roadmap but only commit to requirements for the next quarter","B":"Create a visual task board with all of the relevant stakeholders to support backlog prioritization","C":"Work with the team on the definition of a minimum viable product (MVP) and present it to the stakeholders","D":"Use spikes to dig deeper into the technical challenges of the new product, thus reducing the technical risk"},"correct":["C"],"answer_display":"C","why_correct":"When stakeholders lack a clear vision for a new product, the PM should work with the team to define an MVP — a concrete, minimal version that delivers value and aligns stakeholder understanding around a tangible starting point.","why_wrong":{"A":"A comprehensive roadmap with quarterly commitments adds planning overhead before the vision is clear.","B":"A visual task board helps manage work but does not clarify the product vision for stakeholders.","D":"Technical spikes reduce technical risk but do not address the stakeholder vision alignment problem."},"part":"Part 1","part_range":"Q1–Q50"},{"num":31,"type":"single","stem":"A project manager is managing an internal project that was poorly defined. Recently, the project manager received several change requests raised by the organization's upper management. What should the project manager do first?","options":{"A":"Assess the time overrun, and start implementation to avoid additional delays","B":"Motivate the team to avoid the frustration of working on a prolonged project","C":"Request a provisional budget increase to avoid any budget overruns","D":"Review the benefits of the proposed changes in relation to the business case"},"correct":["D"],"answer_display":"D","why_correct":"Before acting on change requests from upper management, the PM must assess whether the proposed changes are justified by the business case. PMI always requires changes to be evaluated against business value before implementation.","why_wrong":{"A":"Implementing changes without evaluation creates uncontrolled scope creep.","B":"Team motivation is secondary; the PM must first evaluate the merits of the change requests.","C":"Requesting budget before assessing the business value of changes is premature."},"part":"Part 1","part_range":"Q1–Q50"},{"num":32,"type":"single","stem":"20 A project's customer is furious. When the customer arrived at the project site, they discovered that one of their requirements was not met. What should the project manager do?","options":{"A":"Discuss and agree with the customer to implement the missing requirement","B":"Refer to the requirements traceability matrix and analyze the requirement","C":"Consult the scope management plan with the customer to understand the gap","D":"Analyze the benefits management plan and implement the needed change"},"correct":["B"],"answer_display":"B","why_correct":"When a customer claims a requirement was not met, the PM must first refer to the requirements traceability matrix to objectively determine what was agreed upon, what was delivered, and where the gap actually lies.","why_wrong":{"A":"Agreeing to implement the missing requirement without analysis may commit to something outside the agreed scope.","C":"The scope management plan describes the process; the traceability matrix has the actual requirement records.","D":"The benefits management plan addresses business value, not the specific requirements delivery gap."},"part":"Part 1","part_range":"Q1–Q50"},{"num":33,"type":"single","stem":"A project manager is evaluating a project and realizes that its earned value (EV) shows the cost spent is higher than the value delivered. The project manager then discovers that the team has been adding small features that are not part of the requirements. What should the project manager do?","options":{"A":"Request additional budget because additional features are being added","B":"Ask the product owner to add the additional features to the requirements","C":"Encourage the team to continue, as this will eventually help the customer","D":"Ask the team to focus on and deliver only the agreed-upon features"},"correct":["D"],"answer_display":"D","why_correct":"Adding features not in requirements is gold-plating — a scope violation that wastes budget and schedule. PMI requires the team to deliver exactly what was agreed upon through proper scope and change management.","why_wrong":{"A":"Requesting more budget rewards out-of-scope work and validates the behavior.","B":"Adding features to requirements after they are built backwards the change control process.","C":"Encouraging the behavior perpetuates gold-plating and misuses project resources."},"part":"Part 1","part_range":"Q1–Q50"},{"num":34,"type":"single","stem":"A new law was published about zoning permits for telecom towers. This may cause cost and schedule overruns for the new network rollout. What should the project manager do?","options":{"A":"Meet the sponsor to ask for additional time and budget increase","B":"Minimize the scope to catch the cost and schedule baseline","C":"Update the project plan because the law is an obligation for the project","D":"Assess and prioritize the impact of the new law on the project plan"},"correct":["D"],"answer_display":"D","why_correct":"When a new law potentially impacts the project, the first step is to assess and prioritize the impact on the project plan. A proper impact assessment informs what changes are needed before any action is taken.","why_wrong":{"A":"Requesting time and budget from the sponsor before assessing the actual impact is premature.","B":"Minimizing scope is a drastic response before understanding the full impact of the new law.","C":"Updating the project plan without first assessing impact may produce an incorrect plan."},"part":"Part 1","part_range":"Q1–Q50"},{"num":35,"type":"single","stem":"A controller proposed a budget reduction for projects because the majority of implemented solutions resulted in little returns on investment (ROI) or operational improvements. The project manager objected and presented project assets showing all solutions having been demonstrated, accepted, and delivered within the relevant framework constraints. The project manager suggested that the issues may stem from the project evaluation and selection processes. What was the project manager demonstrating?","options":{"A":"Multiple stages of development that members may go through toward working formations","B":"Cause-and-effect identification in root cause analysis toward achieving project value","C":"Strategic negotiation techniques in determining budget priorities in future sessions","D":"Risk management in addressing impediments, obstacles, and blockers to project success"},"correct":["B"],"answer_display":"B","why_correct":"The project manager demonstrated root cause analysis — identifying that poor ROI is not caused by poor delivery (projects met their constraints) but by flawed project selection and evaluation processes upstream.","why_wrong":{"A":"Team development stages (Tuckman) are not relevant to this budget and strategic discussion.","C":"This is analytical reasoning identifying a systemic problem, not a budget negotiation tactic.","D":"Risk management is about addressing project-level risks, not systemic organizational process failures."},"part":"Part 1","part_range":"Q1–Q50"},{"num":36,"type":"single","stem":"Eight highly qualified experts have been assembled to work for a 6-month period on a specific aspect of an organization's product development process. How should the project manager support this team to succeed?","options":{"A":"Define roles and targets for all team members and regularly follow up with one-to-one meetings to review progress.","B":"Hand over control of specific aspects of their roles as experts and let them agree on their own timelines and targets.","C":"Work with the team members to define the overall objective and support them to engage around the goal.","D":"Bring in a senior colleague who is also an expert to ensure the team is on track to achieve the goals and objectives."},"correct":["C"],"answer_display":"C","why_correct":"For a team of experts, servant leadership means clarifying the overall objective and supporting engagement around that goal — not directing, controlling, or supervising. High expertise requires autonomy with alignment.","why_wrong":{"A":"Defining roles and one-to-one follow-ups is micromanagement inappropriate for highly qualified experts.","B":"Handing over full control without any shared objective creates fragmented, uncoordinated work.","D":"Bringing in another senior expert to supervise experts is redundant and undermines their autonomy."},"part":"Part 1","part_range":"Q1–Q50"},{"num":37,"type":"single","stem":"A project manager wants to assign a junior engineer to a new project. In past projects, the engineer showed initiative to take on complex tasks and solve problems in innovative ways without any need for encouragement. However, the engineer declines the project manager's invitation to join the new project. What is the most likely reason for the engineer’s refusal to work on the project?","options":{"A":"The project manager did not follow the normal hiring process with the engineer's functional manager","B":"The engineer has \"project burnout\" from working long hours and solving difficult problems","C":"The engineer did not feel welcome or enjoy working with the other project team members","D":"The project manager did not sufficiently support and recognize the engineer's professional growth"},"correct":["D"],"answer_display":"D","why_correct":"A self-motivated engineer who previously took initiative but now declines opportunities most likely feels their professional growth and contributions were not recognized or supported by the PM.","why_wrong":{"A":"The hiring process is an administrative concern, not typically the reason an engaged engineer declines work.","B":"Burnout is possible but the question emphasizes the PM's role — the most controllable cause is lack of recognition.","C":"Team dynamics could be a factor but the scenario focuses on the PM-engineer relationship."},"part":"Part 1","part_range":"Q1–Q50"},{"num":38,"type":"single","stem":"During the execution of a project, a company decides that everybody will need to take vacation time before the end of the year. This may cause a change in the project time line. How should the project manager address the situation?","options":{"A":"Agree with functional management and team members on a vacation schedule that would minimally impact the project schedule","B":"Submit a formal request to senior management asking them not to proceed with this decision based on the impact it will have on the project","C":"Push out the project timeline according to the vacation plan in place based on the recent company policy","D":"Discuss the vacation plan and include scheduling changes in the change log database"},"correct":["A"],"answer_display":"A","why_correct":"The PM should collaborate with functional management and team members to agree on a vacation schedule that minimizes project impact — balancing organizational policy with project needs through negotiation.","why_wrong":{"B":"Requesting management to reverse company policy is unlikely to succeed and damages relationships.","C":"Simply pushing out the timeline without negotiating a minimally impactful schedule is passive.","D":"Adding to the change log without first negotiating the schedule is premature documentation."},"part":"Part 1","part_range":"Q1–Q50"},{"num":39,"type":"single","stem":"A project manager identifies an issue between two team members that is affecting the development of one of the deliverables during the second iteration of a project. How should the project manager address this issue to avoid any impact to the project?","options":{"A":"Send a warning to both team members indicating that if the issue continues, both will be removed from the project","B":"Escalate both team members to their respective functional managers and let them take the appropriate actions","C":"Contact the functional managers to request substitutes for the conflicting team members","D":"Schedule a meeting with both team members to understand the issue and facilitate a solution that satisfies both parties"},"correct":["D"],"answer_display":"D","why_correct":"PMI conflict resolution principle: address conflict directly and collaboratively at the lowest level first. The PM should facilitate a meeting with both parties to understand the issue and reach a mutual solution.","why_wrong":{"A":"Issuing warnings escalates before attempting resolution and may worsen the conflict.","B":"Escalating to functional managers skips the PM's responsibility to facilitate conflict resolution first.","C":"Replacing team members is a drastic last resort for an interpersonal conflict that can be resolved."},"part":"Part 1","part_range":"Q1–Q50"},{"num":40,"type":"single","stem":"A project team is implementing a hosted system for a third party. Just before going live, the customer asks the project team to include additional functionality. The project team identified risks to the delivery date and informed the project manager that some of the requested functions are in conflict with the agreed scope. What should the project manager do?","options":{"A":"Discuss with the customer the risks identified and team's concerns","B":"Discuss with the team, estimate the effort, and raise a change request","C":"Ask the customer to go live and add the new functionality in the backlog","D":"Ask the team to deliver the functionality on the agreed go-live date"},"correct":["A"],"answer_display":"A","why_correct":"When new requirements conflict with agreed scope and pose delivery risks, the PM must first communicate transparently with the customer about the identified risks before any commitment or decision is made.","why_wrong":{"B":"Estimating effort and raising a change request is the next step after the customer understands the risks.","C":"Going live and adding functionality to the backlog does not address the scope conflict and delivery risk.","D":"Forcing delivery of conflicting functionality on the agreed date risks quality and team morale."},"part":"Part 1","part_range":"Q1–Q50"},{"num":41,"type":"single","stem":"A state-of-the-art product was delivered at the end of a project life cycle. However, the customer claims the product was not designed to specifications. What should the project manager have done to avoid this issue?","options":{"A":"The customer's requirements should have been captured and modified to meet the supplier's standards.","B":"The iteration review planning meeting should have been planned accordingly.","C":"The customer's requirements should have been captured in order to meet the customer's standards.","D":"The sprint retrospective meeting should have included necessary stakeholders."},"correct":["C"],"answer_display":"C","why_correct":"The root cause is that customer requirements were not properly captured to meet the customer's standards. PMI requires requirements to accurately represent what the customer actually needs, not what the supplier prefers.","why_wrong":{"A":"Modifying customer requirements to meet supplier standards inverts the requirement capture process.","B":"Iteration review planning is a process improvement that doesn't address the requirements capture failure.","D":"Sprint retrospectives focus on process improvement, not the initial failure to capture customer requirements."},"part":"Part 1","part_range":"Q1–Q50"},{"num":42,"type":"single","stem":"26 A project manager has been asked for performance feedback regarding one of the team members. The project manager would like to gather additional input from the project team because there are no metrics in place for evaluating employee performance. What should the project manager do next?","options":{"A":"Identify levels of decision-making authority","B":"Evaluate demonstrated task accountability","C":"Determine the appropriate approach","D":"Analyze team member influence"},"correct":["C"],"answer_display":"C","why_correct":"Before gathering input or providing feedback, the PM needs to determine the appropriate approach for performance evaluation given that no metrics exist. Determining the approach first ensures the feedback is fair and consistent.","why_wrong":{"A":"Decision-making authority levels are irrelevant to establishing a performance evaluation approach.","B":"Task accountability is one input, but evaluating it without a defined approach produces inconsistent results.","D":"Analyzing influence is a stakeholder management activity, not a performance evaluation method."},"part":"Part 1","part_range":"Q1–Q50"},{"num":43,"type":"single","stem":"A new major road project is starting, and the contractor has contractually committed to submitting regular status reports and participating in integration meetings. Halfway through the project life cycle, the contractor stops participating in meetings and submitting reports, stating these items consume too much time. What should the project manager do first?","options":{"A":"Assess the risk of the contractor not attending meetings and submitting reports for the rest of the project and escalate it to the project sponsor","B":"Remind the contractor that they committed to attending meetings and submitting reports per the contract","C":"Submit a claim for not fulfilling the contract terms and handle the claim in accordance with the alternative dispute resolution","D":"Speak with the company's lawyer and request that they demand the contractor fulfill their contractual commitments"},"correct":["B"],"answer_display":"B","why_correct":"The contractor has a contractual obligation to attend meetings and submit reports. The first step is to formally remind the contractor of their commitments — giving them the opportunity to comply before any escalation.","why_wrong":{"A":"Assessing risk and escalating to the sponsor skips the direct contractual reminder step.","C":"Filing a claim is appropriate only after the contractor has been reminded and continues non-compliance.","D":"Involving legal counsel is a last resort, not the first response to a contractual non-compliance."},"part":"Part 1","part_range":"Q1–Q50"},{"num":44,"type":"single","stem":"While finalizing project management plans, a customer provides the project manager with a new set of quality standards to which the final product must adhere. What should the project manager do to ensure a smooth delivery of the product?","options":{"A":"Involve the client in risk identification","B":"Agree with the client on a new project charter","C":"Involve the client in a performance gap analysis","D":"Agree with the client on acceptance criteria"},"correct":["D"],"answer_display":"D","why_correct":"When quality standards change, the PM must agree with the client on updated acceptance criteria — this formally defines what done looks like under the new standards and prevents disputes during delivery.","why_wrong":{"A":"Involving the client in risk identification is valuable but does not define the quality acceptance standard.","B":"A new project charter is unnecessary for quality standard changes; change control is the appropriate process.","C":"A performance gap analysis is retrospective; the issue requires forward-looking acceptance definition."},"part":"Part 1","part_range":"Q1–Q50"},{"num":45,"type":"single","stem":"A project manager has been given a critical, 5-day window and is allocated a maximum of US$100,000 as a contingency reserve. Subsequently, the project manager drafted a course of action based upon the best available information. Overall, five actions were required to be completed at a cost of US$20,000 and a duration of 1 day each. After 3 days of work, the project manager completed two actions and spent US$80,000. What should the project manager do next?","options":{"A":"Complete all actions and then inform the client of the additional cost and schedule overrun needed to complete the project","B":"Stop the work and raise a project change request to the change control board (CCB) for additional funds and a project schedule extension","C":"As the CPI and SPI are greater than 1.0, reevaluate and prioritize the remaining actions","D":"As the cost performance index (CPI) and schedule performance index (SPI) are less than 1.0, reevaluate and prioritize the remaining actions"},"correct":["D"],"answer_display":"D","why_correct":"EV = $40k (2 actions × $20k), PV = $60k (3 days × $20k/day), AC = $80k. CPI = 40/80 = 0.5, SPI = 40/60 = 0.67. Both are below 1.0. The PM must reevaluate and reprioritize remaining actions to maximize value within constraints.","why_wrong":{"A":"Completing all actions regardless of overrun violates fiduciary responsibility; the PM must stop and reassess.","B":"Stopping work and raising a change request to the CCB is appropriate for scope changes, not for re-prioritizing within existing contingency.","C":"The CPI and SPI are both less than 1.0, not greater — this option contains a factual error."},"part":"Part 1","part_range":"Q1–Q50"},{"num":46,"type":"single","stem":"A project manager wants to make sure that similar projects in the future use the project's performance data as a reference. However, the project manager is not sure how to accomplish this. What should the project manager do?","options":{"A":"Keep project artifacts up-to-date and accessible to all stakeholders","B":"Share project documentation in a repository with exclusive access","C":"Schedule weekly knowledge-sharing sessions with key stakeholders","D":"Send periodic emails to senior management with the latest project updates"},"correct":["A"],"answer_display":"A","why_correct":"PMI knowledge management principle: project artifacts should be kept current and accessible as part of organizational process assets (OPAs), so future projects can reference actual performance data.","why_wrong":{"B":"Exclusive access limits the knowledge transfer benefit and defeats the purpose of sharing.","C":"Weekly sessions are time-consuming and not scalable; a repository provides persistent, self-service access.","D":"Periodic emails to senior management is one-way communication that does not preserve knowledge for future project teams."},"part":"Part 1","part_range":"Q1–Q50"},{"num":47,"type":"single","stem":"During a system demo, a proj
