ks. The customer calls to say that the center will not be available in 2 weeks due to some unforeseen problems. What should the project manager do next?","options":{"A":"Apply the terms and conditions of the contract with penalties.","B":"Issue a change request to reflect the anticipated date for training.","C":"Help the customer find an alternative location to start the training.","D":"Update the project schedule with the new date for training."},"correct":["C"],"answer_display":"C","why_correct":"When the customer can't provide the agreed training center, the PM should proactively help find an alternative location — removing the impediment through collaborative problem-solving rather than immediately invoking penalties.","why_wrong":{"A":"Applying contract penalties as a first response is adversarial and may not solve the immediate need for a training location.","B":"Issuing a change request for a new anticipated date accepts the delay before exploring alternatives.","D":"Simply updating the schedule accepts the delay; the PM should first try to find an alternative location."},"part":"Part 6","part_range":"Q251–Q300"},{"num":282,"type":"single","stem":"Knowledge sharing has been a key priority for a complex technological project with a large number of team members. During the project execution phase, the project manager receives numerous complaints from all team members that they are overloaded with knowledge-sharing emails, which contain useful information but are unmanageable due to the high volume. What should the project manager do to solve this problem?","options":{"A":"Establish an unofficial communications method for the team to share knowledge and lessons learned.","B":"Establish a pull communications method to access knowledge repositories and lessons learned.","C":"Establish an interactive communications method between stakeholders to share knowledge and lessons learned.","D":"Establish a push communications method for the team to share knowledge and lessons learned."},"correct":["B"],"answer_display":"B","why_correct":"When team members are overwhelmed by knowledge-sharing emails (push overload), the solution is to switch to pull communication — a repository where team members can access knowledge on-demand rather than receiving unsolicited information.","why_wrong":{"A":"An unofficial communications method lacks the structure and accessibility of a formal knowledge repository.","C":"Interactive communication (meetings, discussions) is appropriate for collaborative work but doesn't solve the email overload problem.","D":"Push communications are exactly the problem being described — adding more structured push doesn't solve the volume issue."},"part":"Part 6","part_range":"Q251–Q300"},{"num":283,"type":"single","stem":"A project manager is assigned to a technical research project. The project team has already been assigned, and the main subject matter expert (SME) sends the project manager a list of the technical skills required for the execution of this project. What should the project manager do next?","options":{"A":"Discuss the list with the project sponsor to confirm that the resources have the required skills.","B":"Ask the functional manager to review the resource pool and recommend the right individuals to join the team.","C":"Meet with the project team to understand their skills and identify potential gaps and training requirements.","D":"Send the list to the project team and ask them to get training on the required skills."},"correct":["C"],"answer_display":"C","why_correct":"When a skills list is received for a technical project, the PM should meet with the existing project team to assess their actual skills against the requirements and identify gaps and training needs — before requesting new resources.","why_wrong":{"A":"Asking the sponsor to confirm resource skills bypasses the PM's own responsibility to assess team capability.","B":"Asking the functional manager to recommend individuals is appropriate later, after assessing current team gaps.","D":"Sending the list to the team and asking them to train on all required skills is passive and doesn't identify which gaps actually exist."},"part":"Part 6","part_range":"Q251–Q300"},{"num":284,"type":"single","stem":"A client wants to create an innovative software for the travel industry using an agile approach. A project manager from the company was assigned to work on the details and estimates as requested by the client. What should the project manager do before sending the information to the client?","options":{"A":"Put the tasks with estimates in the backlog and clarify that the project will not need any reserves.","B":"Sequence the tasks with estimates and add standard risk reserves to use for software development.","C":"Analyze the tasks, provide estimates, include a prototype demo, and send to the client directly.","D":"Work with the team to understand their views and add the appropriate dependencies and risks."},"correct":["D"],"answer_display":"D","why_correct":"Before sending estimates to the client, the PM should work with the team to understand their views, add appropriate dependencies and risks — ensuring the estimate reflects the team's collective knowledge and is realistic.","why_wrong":{"A":"Putting tasks in the backlog without reserves is incomplete for client-facing estimation that requires risk allowances.","B":"Adding standard reserves without team input on specific project risks produces a generic, potentially inaccurate estimate.","C":"Sending to the client without team collaboration skips the team's expertise which is essential for accurate estimates."},"part":"Part 6","part_range":"Q251–Q300"},{"num":285,"type":"single","stem":"According to this burnup chart for the last 7-day sprint, what should the project lead address with the product owner and team?","options":{"A":"The product owner should not ask the team to change their sprint commitments.","B":"The team is accepting too much work in the sprint after it has started.","C":"The team is not meeting the expectations of the product owner.","D":"The team should have stopped on day 4 and started a new sprint."},"correct":["B"],"answer_display":"B","why_correct":"A burnup chart showing scope increasing after the sprint starts indicates the team is accepting new work during the sprint — violating the sprint commitment principle and the product owner's role in managing scope changes.","why_wrong":{"A":"If scope were stable and velocity was low, the product owner would need to adjust expectations — but the visible scope increase indicates mid-sprint additions.","C":"The team may be meeting original expectations; the problem is scope being added mid-sprint.","D":"Stopping on day 4 and starting a new sprint is not the appropriate response to mid-sprint scope addition."},"part":"Part 6","part_range":"Q251–Q300"},{"num":286,"type":"single","stem":"After the merger of two large companies, a project manager is assigned to a project. The company hires a consultant to ensure best practices are being used in information security. During an iteration, the consultant requests changes to a software component, claiming that it is not meeting market requirements. What should the project manager do?","options":{"A":"Continue the iteration and add the requested changes.","B":"Continue the iteration and review the change with the customer.","C":"Cancel the iteration and meet with the product owner.","D":"Cancel the iteration and add the requested changes."},"correct":["B"],"answer_display":"B","why_correct":"When a consultant mid-iteration requests changes claiming non-compliance with market requirements, the PM should continue the iteration (maintain sprint integrity) and review the requested change with the customer — who is the final authority on requirements.","why_wrong":{"A":"Continuing and adding all requested changes mid-iteration violates sprint commitment and the change control process.","C":"Cancelling the iteration and meeting with the product owner is disruptive without first understanding the legitimacy of the consultant's claim.","D":"Cancelling and adding changes treats an unverified consultant suggestion as a mandate."},"part":"Part 6","part_range":"Q251–Q300"},{"num":287,"type":"single","stem":"A project manager is managing the scope of the project and creating a work breakdown structure (WBS) with the team members. How should the project manager organize the WBS?","options":{"A":"Customer oriented","B":"Team oriented","C":"Cost oriented","D":"Deliverable oriented"},"correct":["D"],"answer_display":"D","why_correct":"PMI standard: a WBS is organized around project deliverables — the tangible outputs the project must produce. This structure ensures all deliverables are covered and clearly owned.","why_wrong":{"A":"Customer orientation may inform requirements but is not how the WBS is structured.","B":"Team orientation would create a responsibility structure, not a deliverable decomposition.","C":"Cost orientation is a financial view; the WBS is organized by deliverables, with costs estimated for each element."},"part":"Part 6","part_range":"Q251–Q300"},{"num":288,"type":"single","stem":"174 Two members of a new project team disagree on the best approach to solve a problem. The conflict has been going on for 1 week. The two members are tense around each other and are taking everything personally. What should the project manager do?","options":{"A":"Help the team members to resolve the conflict in a way that results in the best team performance.","B":"Offer a compromise that is acceptable to both team members, even if it may not be the best solution.","C":"Understand each team member's argument and select the one that results in less risk to the project.","D":"Send both team members to the human resources (HR) department for an acceptable resolution."},"correct":["A"],"answer_display":"A","why_correct":"When team members are in unresolved, personalized conflict, the PM should help them resolve it in a way that achieves the best team performance — the outcome focus (team performance) guides the resolution approach.","why_wrong":{"B":"A compromise that isn't the best solution prioritizes peace over performance quality.","C":"Selecting one team member's argument over another creates a winner/loser dynamic that doesn't resolve the relationship conflict.","D":"Sending to HR removes the PM's direct conflict resolution responsibility and may escalate unnecessarily."},"part":"Part 6","part_range":"Q251–Q300"},{"num":289,"type":"single","stem":"A project to construct an electricity generation plant is on site near a nature reserve. An environmental activist group is questioning the need for the project. The customer has informed the project manager to disregard the group as they are not in support of the project. What should the project manager do next?","options":{"A":"Ask the customer to contact the activist group and let them know the project status and completion date.","B":"Add the activist group to the list of stakeholders and analyze the impact they may have on project delivery.","C":"Obey the directive from the customer since they are funding the project and are the most important stakeholder.","D":"Request the project team disregard all communication from the activist group and continue with their project work."},"correct":["B"],"answer_display":"B","why_correct":"An environmental activist group that could threaten legal action is a legitimate stakeholder — their influence can affect project delivery. The PM must add them to the stakeholder list and analyze their impact, regardless of customer direction.","why_wrong":{"A":"Asking the customer to contact them delegates an important stakeholder management responsibility.","C":"Following only the customer's directive on a group with legal standing violates the PM's independent stakeholder management responsibility.","D":"Disregarding communications from a group with potential legal power is a significant project risk."},"part":"Part 6","part_range":"Q251–Q300"},{"num":290,"type":"single","stem":"A project manager is leading a project that is in the execution phase. Due to a company reorganization, some key project team members are likely to leave the project. What should the project manager do next?","options":{"A":"Discuss this issue with the affected team members and support them during the transition.","B":"Start looking for replacements as soon as possible to help prevent any schedule slippage.","C":"Engage with the project sponsor to ensure that this change does not affect the project execution.","D":"Determine the impact to the project and implement mitigations per the project management plan."},"correct":["D"],"answer_display":"D","why_correct":"When team members may leave due to reorganization, the PM should first determine the project impact and implement mitigations per the project management plan — assessing and responding per process before taking other actions.","why_wrong":{"A":"Supporting affected team members is the right human approach but the PM must also assess project impact.","B":"Looking for replacements before assessing impact may be premature if mitigations exist within current team structure.","C":"Engaging the sponsor before assessing impact provides them with incomplete information."},"part":"Part 6","part_range":"Q251–Q300"},{"num":291,"type":"single","stem":"In the past year, a company paid US$60,000 to an external subcontractor for an ongoing project. The project manager has been asked to evaluate if the project can be delivered more cost effectively this year by using internal labor. The project manager used an optimistic term of 4 months, a pessimistic term of 6 months, and a most expected term of 5 months, and has concluded that the service can be delivered with the following resources: Two engineers (monthly salary of US$700 each) One project manager (monthly salary of US$1,600) Additional estimated monthly expenses of US$2,000 The project manager used the program evaluation and review technique (PERT) to calculate the savings if the project is delivered with in-house resources. How much money will the project manager estimate the company can save?","options":{"A":"US$35,000","B":"US$20,000","C":"US$40,000","D":"US$30,000"},"correct":["A"],"answer_display":"A","why_correct":"PERT = (O + 4M + P) / 6 = (4 + 4×5 + 6) / 6 = 30/6 = 5 months. Monthly cost = 2×700 + 1600 + 2000 = $5,000. Total = 5×5,000 = $25,000. Savings = $60,000 - $25,000 = $35,000.","why_wrong":{"B":"$20,000 corresponds to 8-month calculation — incorrect PERT application.","C":"$40,000 corresponds to 4-month calculation — uses only the optimistic estimate.","D":"$30,000 corresponds to approximately 6-month calculation — uses the pessimistic estimate."},"part":"Part 6","part_range":"Q251–Q300"},{"num":292,"type":"single","stem":"A project is ready to deliver the first batch of the product when a quality control check rejects the product as unfit for delivery. The root cause analysis (RCA) shows that a component added as part of the latest change request was not tested throughout the development cycle. What should the project manager do next?","options":{"A":"Review the change control process to ensure quality management artifacts are updated as part of the change.","B":"Review the quality management process and perform a process audit as part of ongoing quality assurance.","C":"Review the communications management plan to ensure change requests are communicated to the affected team members.","D":"Review the quality management process with the project management office (PMO) to ensure compliance with best practices."},"correct":["A"],"answer_display":"A","why_correct":"When a change request component wasn't tested, the root cause is a process gap: quality management artifacts (test plans) weren't updated when the change was approved. The change control process must require quality plan updates.","why_wrong":{"B":"A process audit addresses compliance checking but doesn't fix the gap in the change control process.","C":"Better communication of change requests addresses notification but not the quality testing integration.","D":"Reviewing with the PMO is an escalation that doesn't directly fix the change control + quality process gap."},"part":"Part 6","part_range":"Q251–Q300"},{"num":293,"type":"single","stem":"A project manager has been assigned with initiating a large project to deliver complex equipment. Part of the project will be the result of a long research process, but once this is completed, the other part of the project must be incrementally delivered to the customer. Which approach should the project manager choose for this project?","options":{"A":"Adaptive","B":"Hybrid","C":"Predictive","D":"Agile"},"correct":["B"],"answer_display":"B","why_correct":"A project with a long research phase (high uncertainty = agile/iterative) followed by incremental delivery to the customer (iterative delivery) is best served by a hybrid approach combining predictive structure for the research phase and incremental for delivery.","why_wrong":{"A":"Fully adaptive without any predictive structure may not handle the research phase's need for structured investigation.","C":"Fully predictive doesn't accommodate the customer's need for incremental deliveries.","D":"Agile is similar to adaptive; the hybrid nature of research + incremental delivery is better captured by hybrid."},"part":"Part 6","part_range":"Q251–Q300"},{"num":294,"type":"single","stem":"A project team strongly encourages the project manager to purchase an application that will significantly reduce work time. Without the application, the deadline might be missed. However, the purchase will impact the project cost. The sponsor would like to explore a less expensive application that will save the team's time. What should the project manager do?","options":{"A":"Raise a change request.","B":"Create a decision tree.","C":"Purchase the application.","D":"Analyze assumptions and constraints."},"correct":["A"],"answer_display":"A","why_correct":"When a team recommends a purchase that affects cost and the sponsor wants to explore alternatives, a change request is the formal mechanism to evaluate the cost impact and document the decision — ensuring proper review before any purchase.","why_wrong":{"B":"A decision tree is an analysis tool, not an action; the PM needs to formally raise the issue through change control.","C":"Purchasing the application unilaterally without change control approval violates the cost baseline.","D":"Analyzing assumptions and constraints is preliminary analysis that feeds into the change request, not the action itself."},"part":"Part 6","part_range":"Q251–Q300"},{"num":295,"type":"single","stem":"A project manager is leading an engineering project. The project manager must obtain some certifications before mass production, which is scheduled in 3 months. The certification process will require at least 6 months. What should the project manager do next?","options":{"A":"Discuss extending the mass production timeline by 3 months with the project sponsor.","B":"Assess and evaluate the certification process and understand the best and worst case scenarios.","C":"Engage a consultant to shorten the certification process to meet the schedule requirement.","D":"Meet with senior management to discuss the possibility of an extension to the project timeline."},"correct":["B"],"answer_display":"B","why_correct":"Before requesting a schedule extension or engaging a consultant, the PM must assess the certification process to understand best and worst case scenarios — this analysis informs all subsequent decisions about timeline, cost, and alternatives.","why_wrong":{"A":"Discussing a 3-month extension with the sponsor before assessing whether the timeline can be compressed is premature.","C":"Engaging a consultant to shorten the process is a potential solution, but the assessment must come first to know whether this is feasible.","D":"Meeting with senior management before the PM has assessed the situation provides incomplete information for their decision."},"part":"Part 6","part_range":"Q251–Q300"},{"num":296,"type":"single","stem":"In the middle of the execution phase for a big project, a new stakeholder who was unfamiliar with the project joined the board of directors and is influencing the decisions made in the project. This change is impacting the project's progress. What should the project manager do first?","options":{"A":"Inform the client about the change.","B":"Update the risk register with a new risk.","C":"Present the project to the stakeholder.","D":"Revise the project schedule."},"correct":["C"],"answer_display":"C","why_correct":"When a new influential board member joins mid-project and starts affecting decisions, the PM should first present the project to them — getting them informed so their influence is based on accurate project understanding.","why_wrong":{"A":"Informing the client of the internal organizational change is premature before the PM has engaged the new board member.","B":"Adding a risk before attempting to brief the new board member is passive documentation without proactive engagement.","D":"Revising the project schedule before understanding what changes the board member actually wants is premature."},"part":"Part 6","part_range":"Q251–Q300"},{"num":297,"type":"single","stem":"During an iteration review session, some product features are at risk of being canceled due to high operational costs when the product is launched into a production environment. What type of analysis should the project lead have conducted to avoid this situation?","options":{"A":"Benefits analysis","B":"Risk analysis","C":"Capacity analysis","D":"Gap analysis"},"correct":["A"],"answer_display":"A","why_correct":"When product features face cancellation due to high operational costs at launch, the PM should have conducted a benefits analysis earlier — evaluating the complete value proposition including operational costs, not just development costs.","why_wrong":{"B":"Risk analysis would identify the possibility of operational costs but not quantify their business impact.","C":"Capacity analysis evaluates resource capacity, not the financial viability of features in production.","D":"Gap analysis identifies gaps between current and desired state but doesn't specifically address operational cost viability."},"part":"Part 6","part_range":"Q251–Q300"},{"num":298,"type":"single","stem":"A project to build a new energy plant was just completed. However, a few days before operation of the plant, the local community protested and closed access to the plant. They argue that an important natural reserve was impacted and prior consultation was not done by the project team. What should the project manager verify first?","options":{"A":"Stakeholder engagement plan","B":"Cost-benefit analysis","C":"Business case","D":"Risk management plan"},"correct":["A"],"answer_display":"A","why_correct":"When a community protests because prior consultation wasn't done, the PM should first verify the stakeholder engagement plan — determining whether community engagement was planned, executed, and documented or whether it was a gap.","why_wrong":{"B":"Cost-benefit analysis evaluates financial trade-offs, not the stakeholder engagement that failed.","C":"The business case documents project justification, not the stakeholder engagement process.","D":"The risk management plan would have identified community engagement as a risk; the engagement plan documents how it was to be managed."},"part":"Part 6","part_range":"Q251–Q300"},{"num":299,"type":"single","stem":"A project manager is using a subcontractor for mobile application development. When the project team tests the application, they realize it does not comply with the new company user-interface standards. Even though these new standards were not included in the statement of work (SOW), the subcontractor agrees to the additional scope as long as payment for this additional work is paid immediately. What should the project manager do?","options":{"A":"Negotiate new pricing based on the revised estimations from the subcontractor that reflect the new work.","B":"Initiate a change request and review the contract to evaluate the payment options before responding.","C":"Deny the subcontractor's payment request, because the product does not comply with the project needs and close the project.","D":"Initiate a change to incorporate an immediate payment milestone in the contract as per the subcontractor's request."},"correct":["B"],"answer_display":"B","why_correct":"When new standards not in the SOW are required and the subcontractor wants immediate payment, the PM should initiate a change request and review the contract before responding — formal process protects both parties.","why_wrong":{"A":"Negotiating new pricing before reviewing the contract and submitting a change request skips formal process.","C":"Denying payment entirely and closing the project is an extreme response that ignores the legitimate additional work required.","D":"Adding an immediate payment milestone without change request review bypasses formal change control."},"part":"Part 6","part_range":"Q251–Q300"},{"num":300,"type":"single","stem":"A project manager is leading a large public project that will have a high impact on the town's citizens. How should the project manager define the different requirements?","options":{"A":"Analyze the interests and influence of stakeholders and evaluate their requirements.","B":"Include only the key requirements and keep the stakeholders informed about scope decisions.","C":"Add only the opinions of the team, because they know the objectives of the project.","D":"Include only the common requirements of each stakeholder group in the project goals."},"correct":["A"],"answer_display":"A","why_correct":"For a large public project affecting many citizens, the PM should analyze stakeholder interests and influence levels to evaluate their requirements — this structured approach ensures all voices are appropriately weighted.","why_wrong":{"B":"Including only key requirements excludes important stakeholder groups whose interests may be significant.","C":"Including only the team's opinions completely excludes citizen and stakeholder input in a public project.","D":"Including only common requirements shared by all groups excludes legitimate unique needs of specific stakeholder groups."},"part":"Part 6","part_range":"Q251–Q300"},{"num":301,"type":"single","stem":"182 A project manager is assigned to a regulatory project for their country. The deadline for delivering results in compliance with the new laws is very tight, and the project team members have not yet been assigned. One of the project manager's peers informs the project manager that a project with the same scope for a different country was completed 1 year ago. What should the project manager do first?","options":{"A":"Register a new risk in the risk management plan.","B":"Review organizational process assets (OPAs) and perform analogous estimating.","C":"Ask for additional resources and review the project estimate.","D":"Complete a bottom-up estimation for the project activities."},"correct":["B"],"answer_display":"B","why_correct":"When a similar project was completed for another country, the PM should first review organizational process assets (OPAs) and use analogous estimating based on that project's actuals — the fastest and most grounded approach for a tight regulatory deadline.","why_wrong":{"A":"Registering a new risk is appropriate but not the first step; estimation using historical data comes first.","C":"Asking for additional resources and reviewing estimates is premature before leveraging existing analogous data.","D":"Bottom-up estimation is more accurate but more time-consuming; analogous estimating from the similar project is faster and sufficient."},"part":"Part 7","part_range":"Q301–Q350"},{"num":302,"type":"single","stem":"The team lead on a project has left the organization and management wants to promote engineer A to this position. The project manager is confident that selecting engineer A will add problems to the project and believes that engineer B would better fit this role. The project manager discussed all of the arguments with management but their decision remains unchanged. What should the project manager do?","options":{"A":"Promote engineer B instead since the project manager has the authority to make this decision.","B":"Help engineer A to become familiar with this new role and ensure engineer B stays motivated.","C":"Coach engineer B to be prepared to perform this role if and when engineer A fails.","D":"Request management approval that engineer B will be promoted if engineer A fails in this role."},"correct":["B"],"answer_display":"B","why_correct":"When management's decision stands despite the PM's disagreement, the PM must commit to making it work — helping engineer A succeed in the new role while keeping engineer B motivated and ready to contribute.","why_wrong":{"A":"Promoting engineer B instead of A directly defies management's decision, which is beyond the PM's authority.","C":"Coaching engineer B to be ready when A fails sets engineer A up for failure rather than supporting their success.","D":"Requesting pre-approval for B's promotion if A fails is conditional planning that undermines A before they start."},"part":"Part 7","part_range":"Q301–Q350"},{"num":303,"type":"single","stem":"A project manager has been assigned to a new project that will be delivered using an agile framework. The sponsor is asking for a cost estimation to build the business case. What should the project manager do?","options":{"A":"Ensure the client representative is involved in the estimation.","B":"Ensure that a 20% contingency is included in the estimation.","C":"Review the completion costs of similar projects.","D":"Review the lessons learned from similar projects."},"correct":["A"],"answer_display":"A","why_correct":"For agile project cost estimation for a business case, the PM should ensure the client representative is involved — their priorities and value understanding directly shape the backlog and thus the effort required.","why_wrong":{"B":"A fixed 20% contingency is an arbitrary number that doesn't reflect the specific project's risk profile.","C":"Reviewing completion costs of similar projects is useful context but not sufficient without the client's involvement in defining scope.","D":"Lessons learned provide process insights but the client must be involved in the estimation for accuracy."},"part":"Part 7","part_range":"Q301–Q350"},{"num":304,"type":"single","stem":"A company is interested in reducing production costs in one of its production lines. When the project charter was about to be approved, one of the key stakeholders questioned the project's value and caused a delay in the approval. What should the project manager have done to avoid this setback?","options":{"A":"Developed benchmarking","B":"Assessed feasibility and impacts","C":"Detailed the project charter","D":"Analyzed stakeholders"},"correct":["D"],"answer_display":"D","why_correct":"A key stakeholder questioning the project's value during charter approval indicates they were not properly analyzed and engaged before approval. A stakeholder analysis would have identified their concerns and addressed them proactively.","why_wrong":{"A":"Benchmarking compares performance against standards; it doesn't prevent stakeholder value objections.","B":"Feasibility assessment validates the project concept; it doesn't address stakeholder value perception.","C":"Detailing the project charter improves content but doesn't address the stakeholder relationship that caused the delay."},"part":"Part 7","part_range":"Q301–Q350"},{"num":305,"type":"single","stem":"The project manager just started leading a project team from which the previous project manager resigned. After a quick evaluation of the project, it is apparent that team morale is low due to continuous disagreement about how to complete tasks. Tasks are taking longer than forecasted and the project is off schedule. What should the project manager do?","options":{"A":"Conduct a meeting with the project team to discuss and address the sources of disagreement.","B":"Crash the project timeline to ensure the project is back on schedule.","C":"Inform the stakeholders that the project will be delayed due to previous team management.","D":"Issue a change request to extend the project schedule based on identified delays."},"correct":["A"],"answer_display":"A","why_correct":"When a new PM takes over a team with low morale and disagreements causing delays, the first action is to conduct a meeting to discuss and address the sources of disagreement — establishing a collaborative foundation.","why_wrong":{"B":"Crashing the timeline adds pressure to an already-struggling team and may worsen morale.","C":"Informing stakeholders of the delay before attempting to address the root cause is premature.","D":"Issuing a change request to extend the schedule is premature before the PM understands and attempts to address the team issues."},"part":"Part 7","part_range":"Q301–Q350"},{"num":306,"type":"single","stem":"The deliverables of a project have been completed. However, the stakeholders did not approve the deliverables, because they did not cover the needs of the business. Which actions should the project manager have taken to avoid this situation?","options":{"A":"Defined the project management plan and ensured it met the project objectives and business needs.","B":"Ensured that the stakeholders participated in the daily meetings to confirm that the project was developing correctly.","C":"Provided and explained the sprint backlog at the beginning of the project to the stakeholders and project team.","D":"Requested that the team change the frequency of the deliverables in the development phase to obtain earlier feedback."},"correct":["D"],"answer_display":"D","why_correct":"When deliverables don't cover business needs, the project should have requested that the team change the frequency of deliverables to obtain earlier feedback — continuous feedback during development ensures business needs are met incrementally.","why_wrong":{"A":"Defining the PM plan and ensuring it meets objectives is process-level; the business need gap required earlier delivery-based feedback.","B":"Daily meetings for stakeholders is excessive engagement; structured delivery reviews with feedback would have been more effective.","C":"Providing the sprint backlog at the start gives stakeholders information but not the hands-on feedback from working deliverables."},"part":"Part 7","part_range":"Q301–Q350"},{"num":307,"type":"single","stem":"Companies A and B are codeveloping a cutting-edge technology product. Based on customer feedback, the marketing department urgently requests a new feature in 2 weeks. Company A's front end is ready, but company B requires 4 weeks to deliver the complete back end and is busy with the current release. What should the project manager do to obtain agreement from both companies and acceptance from marketing?","options":{"A":"Plan the delivery of a minimum viable feature in 2 weeks to enable early showcasing of business value.","B":"Stop the current release work for 4 weeks in order to work and deliver the new feature completely.","C":"Create a special release 4 weeks after the current release to deliver the new feature in its entirety.","D":"Add the new feature to the list for the next release and continue working on the current release."},"correct":["A"],"answer_display":"A","why_correct":"When marketing urgently wants a feature in 2 weeks but the full back end takes 4 weeks, deliver a minimum viable feature (front-end ready from Company A) — this provides early business value and showcasing while Company B completes the full back end.","why_wrong":{"B":"Stopping the current release for 4 weeks damages the current release and ignores the 2-week front-end readiness.","C":"A special release 4 weeks later misses the marketing window and doesn't leverage Company A's readiness.","D":"Adding to the next release ignores the urgent request and misses the competitive opportunity."},"part":"Part 7","part_range":"Q301–Q350"},{"num":308,"type":"single","stem":"A project manager has been assigned to deliver a challenging project on time and within budget. The project manager needs to empower the team members by removing organizational impediments and facilitating collaboration. What should the project manager do to lead the project?","options":{"A":"Use a servant leader approach.","B":"Act as the project owner.","C":"Perform the project sponsor activities.","D":"Assume the functional manager role."},"correct":["A"],"answer_display":"A","why_correct":"Empowering team members, removing organizational impediments, and facilitating collaboration are the defining characteristics of a servant leader — this is explicitly the correct PMI leadership approach for the described responsibilities.","why_wrong":{"B":"Acting as the project owner confuses roles; the PM is not the owner of the product.","C":"Performing sponsor activities oversteps the PM's role into strategic/funding responsibilities.","D":"Assuming the functional manager role confuses organizational hierarchy with project leadership."},"part":"Part 7","part_range":"Q301–Q350"},{"num":309,"type":"single","stem":"Some of the team members who are working on a new software tool are in a public space, arguing over a new feature being coded instead of completing the coding. How should the project manager handle this situation and get the team to complete the task?","options":{"A":"Contact the human resources (HR) department to tell them there is an argument in a public space and that they need to intervene immediately.","B":"Engage in the conversation in the public space by telling them the expectations of the feature and advise them to return to their workspace.","C":"Listen to the argument from a nearby location to understand the situation, then offer insight into the features when the team is calm.","D":"Bring the team members to the meeting room to discuss the new feature and to reach a common understanding of the necessary coding."},"correct":["D"],"answer_display":"D","why_correct":"When team members are arguing in a public space about a technical feature, the PM should bring them to a meeting room for focused, private discussion — this respects their dignity, reduces distraction, and creates a better environment for resolution.","why_wrong":{"A":"Calling HR immediately for a public disagreement is a disproportionate escalation.","B":"Engaging in the public argument adds the PM's authority to a disruptive situation without containing it.","C":"Listening from nearby before approaching is passive and allows the disruptive behavior to continue unnecessarily."},"part":"Part 7","part_range":"Q301–Q350"},{"num":310,"type":"single","stem":"A project manager is managing a government project that targets the development of small businesses in remote towns. The project team is having difficulty conducting entrepreneurship training in some of the targeted towns because the local municipal governments will not authorize the training. As a result of the delay, project implementation is at risk. What is a probable reason for this?","options":{"A":"The project should have constructed training centers in the remote towns.","B":"The project did not identify and engage the correct stakeholders.","C":"The project did not fully engage the project sponsor.","D":"The project should have representatives in all the remote towns."},"correct":["B"],"answer_display":"B","why_correct":"When local municipal governments block project activities, the root cause is that the correct stakeholders (local government authorities) were not identified and engaged during planning — this is a stakeholder identification and engagement failure.","why_wrong":{"A":"Training centers being in the wrong location is a scope issue that doesn't explain the authorization failure.","C":"The project sponsor's engagement is at a higher organizational level; local government engagement is a PM-level responsibility.","D":"Having representatives in all towns is an operational solution that doesn't address the root cause of inadequate stakeholder identification."},"part":"Part 7","part_range":"Q301–Q350"},{"num":311,"type":"single","stem":"A project is in progress with a team that is new to agile approaches. After the first sprint review, the team performance begins slipping, and the conclusion is that there is not an adequate flow of work for the team. What should the project manager do?","options":{"A":"Provide the product owner with training.","B":"Submit a change request to rebaseline the project.","C":"Change the project approach to hybrid.","D":"Discuss the issue with the stakeholders."},"correct":["A"],"answer_display":"A","why_correct":"When an agile team newly adopting agile practices has inadequate work flow, the root cause is often that the product owner doesn't understand backlog management well enough to create a consistent flow. Training the product owner addresses this.","why_wrong":{"B":"Rebaselining is a change control action that doesn't fix the workflow problem.","C":"Switching to hybrid doesn't address the underlying flow issue within the agile component.","D":"Discussing with stakeholders addresses communications but not the workflow problem caused by inadequate backlog management."},"part":"Part 7","part_range":"Q301–Q350"},{"num":312,"type":"single","stem":"During iteration two of a project with two teams (A and B), the project manager is concerned that there are two critical activities from team A that must be started in iteration four. Additionally, these two activities are dependent on an activity from team B that has not yet been prioritized. What should the project manager do?","options":{"A":"Cancel the current iteration and reschedule it with the dependent activity.","B":"Include the dependent activity in the current iteration for team B.","C":"Ensure team B prioritizes the dependent activity in iteration three.","D":"Assign the two critical activities to team B in iteration two."},"correct":["C"],"answer_display":"C","why_correct":"With two critical activities in iteration four depending on a team B deliverable that hasn't been prioritized, the PM must ensure team B prioritizes the dependent activity in iteration three — allowing enough time for team A's iteration four work.","why_wrong":{"A":"Canceling the current iteration is disruptive and unnecessary when the dependency is in a future iteration.","B":"Including the dependent activity in the current iteration (two) may not be feasible given team B's current capacity.","D":"Assigning team A activities to team B in iteration two conflates the teams and doesn't address the natural dependency."},"part":"Part 7","part_range":"Q301–Q350"},{"num":313,"type":"single","stem":"A project manager is assigned to a new project team that has several stakeholders who can have significant influence over the project outcomes. The project manager categorized the stakeholders into four different groups and wants to define the communication strategy. How should the project manager handle communication?","options":{"A":"Define and direct communication to influential stakeholders.","B":"Develop and define a communication strategy for stakeholders.","C":"Utilize a uniform communication structure across all groups.","D":"Describe the four groups in the project stakeholder matrix."},"correct":["B"],"answer_display":"B","why_correct":"When stakeholders are categorized into different groups, the PM should develop and define a tailored communication strategy for each group — different groups have different information needs, preferences, and influence levels.","why_wrong":{"A":"Directing communication only to influential stakeholders ignores other groups who still need appropriate communication.","C":"A uniform communication structure across all groups fails to account for their different information needs and engagement levels.","D":"Describing the four groups in the matrix is a documentation activity, not a communication strategy."},"part":"Part 7","part_range":"Q301–Q350"},{"num":314,"type":"single","stem":"An agile project started 6 months ago. Since the beginning of the project, there have been disagreements among team members regarding daily meetings since some of the team members are not available at the same time. The project manager is convinced an agile team should be self-organizing, and that meeting times should be worked out by the team. What should the project manager do?","options":{"A":"Establish a team charter.","B":"Recognize the team's contributions.","C":"Assign a team leader.","D":"Establish a project schedule."},"correct":["A"],"answer_display":"A","why_correct":"When a team has an ongoing unresolved disagreement about meeting times, the PM should establish a team charter — this gives the team the framework to resolve such issues through their own agreed-upon norms and working agreements.","why_wrong":{"B":"Recognizing team contributions is positive but doesn't solve the meeting time disagreement.","C":"Assigning a team leader is a structural change that doesn't address the self-organizing resolution needed.","D":"Establishing a project schedule addresses tasks and milestones, not the team's self-organization dispute."},"part":"Part 7","part_range":"Q301–Q350"},{"num":315,"type":"single","stem":"A team has been working for some time on a project with incremental deliveries. The project manager noticed that one of the team members is less engaged in team meetings, yet delivers promptly. While discussing the source of demotivation, the team member informed the project manager that this is due to a feeling of lack of skills in dealing with new tasks. How should the project manager address the issue?","options":{"A":"Replace the team member with a resource from another team who already has the requisite training and skills needed.","B":"Review which tasks the team member would feel more motivated to work on, then assign those tasks to the team member.","C":"Discuss growth and development needs with the team member and provide learning opportunities accordingly.","D":"Create a self-paced learning plan with the team member during working hours, with checkpoints on learning progress."},"correct":["C"],"answer_display":"C","why_correct":"When a team member is demotivated due to perceived skill gaps in new tasks, the PM should discuss their growth and development needs and provide learning opportunities — addressing both the skill gap and the motivational root cause.","why_wrong":{"A":"Replacing the team member is an extreme response to a development need that can be addressed with learning support.","B":"Assigning tasks the member feels comfortable with avoids the growth opportunity and doesn't address the skill gap.","D":"A self-paced learning plan during working hours is similar to C but may not include the needs discussion that makes it personally meaningful."},"part":"Part 7","part_range":"Q301–Q350"},{"num":316,"type":"multi","stem":"In a hybrid project, the customer has issued a contract that specifies the deliverables for each quarter. The customer wants to show their stakeholders a tangible outcome in the first quarter and wants to move the second milestone to the first quarter. The project manager explains to the customer that it is not feasible unless the requirements for the second milestone are changed. Which two actions should the project manager take? (Choose two.)","options":{"A":"Ask the customer for their priorities regarding the requirements for the second milestone.","B":"Escalate the issue to upper management to resolve the problem, and suggest a plan.","C":"Convince the customer to leave the second milestone in place and not change it.","D":"Tell the customer that moving the milestone has a very high impact on the cost of the project.","E":"Go back to the development team and discuss which second milestone requirements can be performed in the first quarter. ,C"},"correct":["A","E"],"answer_display":"A,E","why_correct":"Ask the customer to prioritize the second milestone requirements (A) to identify which are essential; then work with the development team to determine which of those requirements can feasibly be pulled into the first quarter (E).","why_wrong":{"B":"Escalating to upper management before exploring feasibility is premature.","C":"Convincing the customer to leave the milestone unchanged ignores that some second-milestone requirements may be moveable.","D":"Warning the customer about high cost before feasibility analysis is premature."},"part":"Part 7","part_range":"Q301–Q350"},{"num":317,"type":"single","stem":"A project team is conducting sprint planning. At the end of the sprint, the product increment must be deployed on a customer's site. The product owner received an email from the account manager that the customer may not be ready to install the new version of the product. What should the project manager do?","options":{"A":"Ask the sales team to inform the customer.","B":"Contact the customer's project manager.","C":"Ask the product owner to inform the customer.","D":"Contact the customer's technical lead."},"correct":["C"],"answer_display":"C","why_correct":"The product owner is the primary interface with the customer for product-related matters. The PM should ask the product owner to inform the customer about the installation readiness question — maintaining the proper agile communication channels.","why_wrong":{"A":"The sales team manages commercial relationships, not technical deployment readiness.","B":"Contacting the customer's PM directly bypasses the product owner's role as customer interface.","D":"The customer's technical lead is the right contact for technical specifics but the product owner should initiate this conversation."},"part":"Part 7","part_range":"Q301–Q350"},{"num":318,"type":"single","stem":"A project development team is located in different areas around the world. Last week, a very important release was delayed because one of the developers did not respond on time to an email that was sent to everyone. The developer seems to have missed reading the email. What should the project manager do to avoid these situations?","options":{"A":"Review the stakeholder engagement plan.","B":"Review the resource management plan.","C":"Review the risk management plan.","D":"Review the communications management plan."},"correct":["D"],"answer_display":"D","why_correct":"When a critical email was missed by a developer, the PM should review the communications management plan — the plan should specify how critical information is communicated, ensuring email alone is not sufficient for critical deliverable notifications.","why_wrong":{"A":"The stakeholder engagement plan manages relationships; the communication method failure is in the communications management plan.","B":"The resource management plan manages who does what; it doesn't address communication method failures.","C":"The risk management plan tracks risks; the root cause is a communications process gap."},"part":"Part 7","part_range":"Q301–Q350"},{"num":319,"type":"single","stem":"During a sprint, one of the team members found an issue. According to the team member and the product owner, the issue has a higher level of importance than the other features of the sprint, but is not a roadblock to completing it. What should the project lead ask the project team do?","options":{"A":"Avoid the temptation to make any changes and address the issue in the next sprint.","B":"Submit the issue to the change control board (CCB) to evaluate and formally approve a plan to address it.","C":"Address this issue only as it has a higher priority than the remaining features of the same sprint.","D":"Follow the sprint plan by delivering the features established for the sprint and prioritize the issue in the backlog."},"correct":["D"],"answer_display":"D","why_correct":"In a sprint, the team should deliver the committed features and prioritize the issue in the backlog for the next sprint — maintaining sprint integrity while ensuring the issue is formally captured and addressed.","why_wrong":{"A":"Simply avoiding changes and addressing in the next sprint correctly maintains sprint integrity but should be captured in the backlog.","B":"Submitting to the CCB is a predictive change control process not appropriate for agile sprint management.","C":"Addressing only the high-priority issue while dropping the committed features violates the sprint commitment."},"part":"Part 7","part_range":"Q301–Q350"},{"num":320,"type":"single","stem":"An external project manager is managing the construction of new corporate offices for a large company. The project management plan states that it is necessary to contract a highly trained external resource to revise and validate an important project component. The client has rejected hiring the external resource because of the high cost, even though it is within the project budget. What should the project manager do to resolve this issue?","options":{"A":"Try to accomplish the task internally by leveling resources from other projects.","B":"Ask the client for a meeting and explain that the task will not be performed.","C":"Evaluate the consequences and meet with the client to explain the possible scenarios.","D":"Hire the resource in order to achieve the project objectives."},"correct":["C"],"answer_display":"C","why_correct":"When a client rejects an in-budget resource despite its necessity, the PM should evaluate the consequences and meet with the client to present the possible scenarios — showing the client the risk of proceeding without the required validation.","why_wrong":{"A":"Attempting internally without the required expertise creates quality risk and doesn't inform the client.","B":"Simply telling the client the task won't be performed without explaining consequences is incomplete.","D":"Hiring the resource against the client's explicit rejection may violate the governance and trust relationship."},"part":"Part 7","part_range":"Q301–Q350"},{"num":321,"type":"single","stem":"The project team is experiencing schedule delays due to issues arising with suppliers. Some of the tasks are on the critical path. What should the project manager do in this situation?","options":{"A":"Discuss the critical path issues with the purchasing department.","B":"Review the critical path with the stakeholders to define next steps.","C":"Review the work breakdown structure (WBS) with the suppliers.","D":"Escalate the supplier-related issues to the sponsor for resolution."},"correct":["A"],"answer_display":"A","why_correct":"When supplier delays are causing critical path issues, the PM should discuss the critical path implications with the purchasing/procurement department — who manages the supplier relationship and has contractual levers to address the delays.","why_wrong":{"B":"Reviewing the critical path with stakeholders is a status communication, not a resolution action for the supplier issue.","C":"Reviewing the WBS with suppliers doesn't address the delay resolution.","D":"Escalating to the sponsor is premature before engaging the purchasing department who has direct supplier management responsibility."},"part":"Part 7","part_range":"Q301–Q350"},{"num":322,"type":"single","stem":"In a daily standup meeting, a project manager notices that a team member's reports include incomplete tasks with no impediments. A colleague informs the project manager that this team member is experiencing a personal issue. What should the project manager do?","options":{"A":"Ask the human resources (HR) manager to speak with this team member.","B":"Coach the team member on how to keep work and personal issues separate.","C":"Reallocate this team member's tasks to others for the immediate future.","D":"Understand the team member's personal issue and offer them support."},"correct":["D"],"answer_display":"D","why_correct":"Servant leadership and emotional intelligence: when a team member has a personal issue affecting their work, the PM should understand their situation and offer support — addressing the human need first, which enables professional recovery.","why_wrong":{"A":"Asking HR to intervene immediately escalates before attempting direct, empathetic support.","B":"Coaching the team member to keep work and personal issues separate is unsympathetic and unhelpful when they're clearly struggling.","C":"Reallocating tasks without understanding the situation abandons the team member rather than supporting them."},"part":"Part 7","part_range":"Q301–Q350"},{"num":323,"type":"single","stem":"During sprint planning, the product owner wants to prioritize items with high business value. However, the project team is concerned about technical debt and infrastructure dependencies to deliver the expected value. How should the project manager handle this issue?","options":{"A":"Support a voting exercise so all team members can express their opinion and the reason behind their vote.","B":"Support the project sponsor so the decision is made top-down and the team follows the provided direction.","C":"Support the product owner so only items with high business value are included in the next sprint.","D":"Support the project team so technical debt and infrastructure dependencies are included in the next sprint."},"correct":["A"],"answer_display":"A","why_correct":"When product owner and team disagree on sprint priorities, the PM should support a voting exercise that allows everyone to express their view with reasoning — this collaborative approach builds consensus and mutual understanding between business and technical perspectives.","why_wrong":{"B":"Top-down sponsor decision undermines team autonomy and agile principles.","C":"Supporting only the product owner ignores the team's legitimate technical debt and dependency concerns.","D":"Supporting only the team ignores the product owner's business value prioritization responsibility."},"part":"Part 7","part_range":"Q301–Q350"},{"num":324,"type":"single","stem":"In a project, one team member has been asking for directions and what actions to take on many tasks. As a result, the team member has performed slowly in project delivery. What should the project manager do to help this team member?","options":{"A":"Assign another senior team member to coach the team member.","B":"Address the team member's performance accordingly.","C":"Empower the team member to make decisions.","D":"Mentor the team member on a regular basis."},"correct":["C"],"answer_display":"C","why_correct":"When a team member constantly asks for direction and acts slowly as a result, the issue is over-dependence on the PM. The PM should empower them to make decisions within their area — building their confidence and reducing the bottleneck.","why_wrong":{"A":"Assigning a senior coach creates another layer of dependence rather than direct empowerment.","B":"Addressing performance consequences before attempting empowerment is punitive without first enabling success.","D":"Regular mentoring is valuable but the immediate action needed is explicit empowerment and authority delegation."},"part":"Part 7","part_range":"Q301–Q350"},{"num":325,"type":"single","stem":"A project manager has noticed that a critical team member is consistently arguing with a client. This has started to have a negative effect on the meetings. How should the project manager address this?","options":{"A":"Talk to the client privately to highlight the situation.","B":"Explain the impact of the scenario to the project team member.","C":"Remove the project team member from all future meetings.","D":"Recommend a performance improvement plan to the project team member."},"correct":["B"],"answer_display":"B","why_correct":"When a team member is consistently arguing with the client, the PM should directly explain the impact of this behavior on the meetings to the team member — giving them the feedback needed to adjust their approach.","why_wrong":{"A":"Talking to the client privately about the team member goes behind their back and doesn't change the behavior.","C":"Removing the team member from all meetings is an extreme response before providing direct feedback.","D":"A performance improvement plan is a formal HR process that should follow direct feedback, not replace it."},"part":"Part 7","part_range":"Q301–Q350"},{"num":326,"type":"single","stem":"A company plans to initiate a project involving a new technology. Approval for the project is required. What should the project manager do?","options":{"A":"Review the cost and schedule baselines for execution.","B":"Define change management for the new technology.","C":"Identify the risks in implementing the new technology.","D":"Analyze the cost and identify the project benefits."},"correct":["D"],"answer_display":"D","why_correct":"For a new technology project requiring approval, the PM should analyze the costs and identify the project benefits — this forms the business case and justification that the approval body needs to make an informed decision.","why_wrong":{"A":"Cost and schedule baselines are developed after approval; approval requires the business case analysis.","B":"Change management is defined later in planning; approval requires cost-benefit justification first.","C":"Risk identification is important for approval but is a component of the broader cost-benefit analysis."},"part":"Part 7","part_range":"Q301–Q350"},{"num":327,"type":"single","stem":"A project manager is performing the role of scrum master for a team of developers. There is a conflict among the developers, generated by differences in how a feature can be delivered. The project manager organized a few spikes to resolve this conflict. What should the project manager do next?","options":{"A":"Organize a multivoting event to achieve consensus of the whole team.","B":"Allow the team to decide on their own which option should be implemented.","C":"Organize more spike events until consensus of the team is reached.","D":"Ask the project sponsor to decide which option should be implemented."},"correct":["B"],"answer_display":"B","why_correct":"After spikes have clarified the technical options, the PM should allow the self-organizing development team to decide which option to implement — respecting their technical expertise and the agile principle of team empowerment.","why_wrong":{"A":"A multivoting event is appropriate when the team hasn't yet reached clarity; spikes have already provided that clarity.","C":"More spikes without a decision wastes time after the options are already clear.","D":"Asking the sponsor to choose a technical implementation decision is outside their expertise and undermines team authority."},"part":"Part 7","part_range":"Q301–Q350"},{"num":328,"type":"single","stem":"In the middle of a software development project, the lead design programmer accepted an offer from a competitor. The project manager needs to find a replacement to meet an upcoming milestone. What should the project manager do?","options":{"A":"Consult the risk response plan.","B":"Update the resource calendar.","C":"Issue a request to the change control board (CCB).","D":"Assign the tasks to another team member."},"correct":["A"],"answer_display":"A","why_correct":"When a key resource leaves mid-project threatening a milestone, the PM should consult the risk response plan — this risk (key resource departure) should have been anticipated, and the response plan guides the next steps.","why_wrong":{"B":"Updating the resource calendar is an administrative action that follows the risk response, not the first step.","C":"A CCB issue request is for scope changes; resource replacement is managed through the risk response plan.","D":"Assigning tasks to another team member may be the right action but should be guided by the risk response plan."},"part":"Part 7","part_range":"Q301–Q350"},{"num":329,"type":"single","stem":"A project manager notices a conflict in the team on both technical and interpersonal levels during the execution phase of a project. What should the project manager do?","options":{"A":"Hold a team meeting to understand and address the conflict.","B":"Schedule a monthly meeting to handle all project conflicts.","C":"Address the conflicts during the lessons learned session.","D":"Hire an external consultant to lead an organizational intervention."},"correct":["A"],"answer_display":"A","why_correct":"When both technical and interpersonal conflicts exist simultaneously, the PM should hold a team meeting to understand and address the conflicts holistically — bringing the team together to resolve what affects them collectively.","why_wrong":{"B":"Monthly conflict meetings normalize conflict as ongoing rather than resolving it promptly.","C":"Addressing conflicts only at lessons learned waits too long and allows them to compound.","D":"An external consultant is a last resort for a conflict that the PM should first attempt to resolve directly."},"part":"Part 7","part_range":"Q301–Q350"},{"num":330,"type":"single","stem":"In an agile project, the team decided to have a rotating group of facilitators for the daily scrum. Overall, most of the facilitators have grown and done well in this role; however, a few of them tend to run inefficient daily scrums. What should the project manager do next?","options":{"A":"Praise the team for self-organizing and growing, then work one-on-one with the facilitators, as needed.","B":"Return to using the scrum master as the facilitator for the daily scrums now that the trial period is over.","C":"Ask the facilitators who are doing well to continue and recommend that the others stop facilitating.","D":"Retrain all team members on daily scrum facilitation to ensure there is consistency in the approach."},"correct":["A"],"answer_display":"A","why_correct":"When most facilitators have grown well but a few struggle, the PM should praise the self-organizing growth the team has demonstrated, then coach only the struggling facilitators individually — balancing recognition with targeted support.","why_wrong":{"B":"Returning control to the scrum master reverses the team's self-organization development without giving struggling members a chance to improve.","C":"Publicly recommending that some stop facilitating creates a winner/loser dynamic that undermines morale.","D":"Retraining all members for consistency penalizes good performers and wastes everyone's time."},"part":"Part 7","part_range":"Q301–Q350"},{"num":331,"type":"single","stem":"A project manager discovers that the project team is spending a large amount of time delivering several reporting formats for the same project updates to multiple stakeholders. What should the project manager do to reduce the time spent on these activities?","options":{"A":"Update the communications management plan to remove less influential stakeholders.","B":"Delegate all of the stakeholder communications activities to a project team member.","C":"Segment the types of communications to be delivered to different stakeholders.","D":"Hold biweekly status meetings to deliver information to all stakeholders at once."},"correct":["C"],"answer_display":"C","why_correct":"When too much time is spent creating multiple formats for the same information, the PM should segment communications by stakeholder type — different groups get the format and level of detail appropriate to their needs.","why_wrong":{"A":"Removing stakeholders from the communications plan based on influence is a stakeholder engagement decision, not a communication efficiency fix.","B":"Delegating all communications to a team member removes the PM from stakeholder relationship management.","D":"Biweekly meetings for all stakeholders may not suit all needs and doesn't address the format efficiency problem."},"part":"Part 7","part_range":"Q301–Q350"},{"num":332,"type":"single","stem":"A project manager has been transferred to another country to work on a key project. The project manager successfully completed the planning phase and has started the execution phase, reporting good progress. During the last meeting with the project sponsor, the project manager was told that some stakeholders have complained that the project manager's emails are very harsh. What should the project manager do to solve this situation?","options":{"A":"Determine the level of influence of the stakeholders who are complaining.","B":"Change the communication mode from emails to meetings to reduce stakeholders complaints.","C":"Adjust the communications management plan to gain stakeholder trust.","D":"Explain to the sponsor that the communication model being used is from company headquarters."},"correct":["C"],"answer_display":"C","why_correct":"When emails are perceived as harsh in a different cultural context, the PM should adjust the communications management plan to build stakeholder trust — this includes adapting tone, style, and possibly channel for cross-cultural communication.","why_wrong":{"A":"Determining the influence level of complaining stakeholders doesn't fix the communication tone problem.","B":"Switching to meetings entirely may not be feasible for all communications and doesn't address the root cause.","D":"Explaining that the communication model is from headquarters dismisses the cultural concern without adapting."},"part":"Part 7","part_range":"Q301–Q350"},{"num":333,"type":"single","stem":"When trying to track project benefits, a project manager realizes that some key performance indicators (KPIs) are not yet defined. What should the project manager do?","options":{"A":"Forward the issue to the benefit owner and ask them to collect the missing data and build the KPIs.","B":"Coordinate with the benefit owner to track and collect the missing data and build the KPIs.","C":"Work with the business analysts to track and collect the missing data and build the KPIs.","D":"Ask the program manager to track and collect the missing data and work to build the KPIs."},"correct":["B"],"answer_display":"B","why_correct":"KPI tracking for benefits requires collaboration between the PM and the benefits owner — the PM coordinates the effort to build the missing metrics while the benefits owner provides the domain knowledge and business definitions.","why_wrong":{"A":"Forwarding the problem to the benefits owner alone removes the PM from their responsibility to coordinate benefits tracking.","C":"Working only with business analysts excludes the benefits owner who is responsible for the benefit definitions.","D":"Asking the program manager takes the issue above the PM-level when the PM has the authority and responsibility to coordinate this."},"part":"Part 7","part_range":"Q301–Q350"},{"num":334,"type":"single","stem":"A project manager is assigned to work on a complex and innovative project. The technology being used and developed is new and complicated, and most of the stakeholders are unfamiliar with it. Which approach should the project manager use as a servant leader?","options":{"A":"Escalate the issue with upper management to find a novel solution for this situation.","B":"Contact the project sponsor to get those stakeholders removed from the project.","C":"Allocate resources to provide training about the new technology to the stakeholders.","D":"Ask stakeholders to find and self-fund education about this new technology."},"correct":["C"],"answer_display":"C","why_correct":"When stakeholders are unfamiliar with new complex technology being used in the project, the servant leader PM should allocate resources to provide training to stakeholders — enabling their effective participation and informed decision-making.","why_wrong":{"A":"Escalating to upper management is premature when the PM can directly address the knowledge gap through training.","B":"Removing unfamiliar stakeholders from the project discards potentially valuable perspectives and creates governance gaps.","D":"Asking stakeholders to self-fund education is an unreasonable request that may disengage them."},"part":"Part 7","part_range":"Q301–Q350"},{"num":335,"type":"single","stem":"202 A project is in the start-up phase of the project life cycle. The project team consists of 20 people from five different countries. The project team is scheduled to have quarterly face-to-face meetings. However, due to unforeseen circumstances, no face-to-face meetings can occur. The project manager is concerned that the team may not be able to fulfill their individual roles without face-to-face meetings. What should the project manager do in this situation?","options":{"A":"Utilize virtual teams for meetings and deliverables.","B":"Use the contingency reserve and subcontract the work.","C":"Review the risk register for this unforeseen circumstance.","D":"Ask for an extension of time on the project deliverables."},"correct":["A"],"answer_display":"A","why_correct":"When face-to-face meetings are impossible for a global team, the PM should utilize virtual teams for meetings and deliverables — this is the direct, practical solution that keeps the project moving.","why_wrong":{"B":"Using contingency reserves to subcontract is a last resort; virtual teaming should be tried first.","C":"Reviewing the risk register for this circumstance is documentation, not a solution.","D":"Requesting a time extension before attempting virtual alternatives is premature."},"part":"Part 7","part_range":"Q301–Q350"},{"num":336,"type":"single","stem":"A key project stakeholder does not attend any of the project meetings and is providing false information that the project team is not delivering on time. What should the project manager do to address this situation?","options":{"A":"Email the latest status report to the key stakeholder.","B":"Discuss communication needs with the key stakeholder.","C":"Create a new communication artifact for the key stakeholder.","D":"Share the meeting recordings with the key stakeholder."},"correct":["B"],"answer_display":"B","why_correct":"When a stakeholder provides false information, the root cause is likely inadequate communication. The PM should discuss communication needs with the stakeholder to understand what information and format they actually need to stay accurately informed.","why_wrong":{"A":"Emailing the latest status report is a reactive push that doesn't address why the stakeholder has false information.","C":"Creating a new artifact before understanding the stakeholder's needs may produce something equally ineffective.","D":"Sharing meeting recordings assumes the stakeholder prefers video; their actual needs should be discussed first."},"part":"Part 7","part_range":"Q301–Q350"},{"num":337,"type":"single","stem":"A customer reviewed the plan for a project with high uncertainty. The customer expressed concerned about the work requiring so many iterations with a risk of not reaching the mandatory delivery date. Which approach should the project manager use in this situation?","options":{"A":"Predictive approach","B":"Kanban approach","C":"Hybrid approach","D":"Agile approach"},"correct":["C"],"answer_display":"C","why_correct":"When high uncertainty exists but there's also a mandatory delivery date, hybrid is the right approach — managing uncertainty iteratively (agile) while meeting the fixed deadline (predictive milestone structure).","why_wrong":{"A":"A predictive approach can't efficiently handle the high uncertainty; it requires upfront definition that doesn't exist.","B":"Kanban is a flow management tool, not a lifecycle approach for managing both uncertainty and fixed deadlines.","D":"Pure agile prioritizes adaptability over fixed delivery commitments, which doesn't address the customer's mandatory date concern."},"part":"Part 7","part_range":"Q301–Q350"},{"num":338,"type":"single","stem":"A project manager encounters a governance issue during the project execution phase. One of the team members complains about receiving assignments from multiple people and states they are not able to work effectively. What should the project manager establish first in the project governance structure?","options":{"A":"Clear project work breakdown structure (WBS) and timeline","B":"Resource management and conflict resolution plan","C":"Risk management and issues resolution plan","D":"Clear responsible, accountable, consult, and inform (RACI) matrix"},"correct":["D"],"answer_display":"D","why_correct":"When team members receive conflicting assignments from multiple people, the PM must first establish a clear RACI matrix — defining who is responsible, accountable, consulted, and informed for each activity eliminates ambiguity about assignment authority.","why_wrong":{"A":"A WBS and timeline define scope and schedule but not assignment authority.","B":"Resource management and conflict resolution plans are important but don't directly address the root cause of unclear authority.","C":"Risk and issues management plans are reactive; the RACI matrix prevents the governance issue proactively."},"part":"Part 7","part_range":"Q301–Q350"},{"num":339,"type":"single","stem":"A project manager has been asked to participate in the procurement process for a software application that allows customers to buy online e-learning courses. The project manager will take over the project once the supplier has been sourced. What should the project manager do before the project starts?","options":{"A":"Ask the project sponsor to involve the legal department in the negotiation for the project agreement.","B":"Notify the project sponsor that the project manager cannot be involved in the agreement negotiation process.","C":"Inform the project sponsor that once the agreement has been signed, there cannot be any changes to the scope of the project.","D":"Ensure that the requirements for the project are understood and that the objectives are verified before approval of an agreement."},"correct":["D"],"answer_display":"D","why_correct":"Before a project agreement is finalized, the PM should ensure that requirements are fully understood and objectives are verified — joining before the project starts to ensure the agreement actually enables successful delivery.","why_wrong":{"A":"Legal department involvement is important for contract terms but the PM's unique contribution is requirements and objective verification.","B":"Stating the PM can't be involved in agreement negotiation misses the PM's valuable requirements perspective.","C":"Claiming no post-agreement scope changes is possible gives false assurance; formal change management processes exist for this reason."},"part":"Part 7","part_range":"Q301–Q350"},{"num":340,"type":"single","stem":"A company is about to start a complex research project. Due to the level of uncertainty, the project manager recommends the use of a hybrid approach; however, the organization only has experience with predictive projects. How can the project manager strategize the use of a hybrid approach to the organization?","options":{"A":"Submit a notification to the project team confirming they will be using a hybrid approach on the project.","B":"Send a letter to the project management office (PMO) requesting to use a hybrid approach.","C":"Create a project change request to execute the project using a hybrid approach.","D":"Present the benefits of a hybrid approach to key stakeholders to get their support."},"correct":["D"],"answer_display":"D","why_correct":"When introducing a new approach to an organization that only knows predictive, the PM must present the benefits of hybrid to key stakeholder
