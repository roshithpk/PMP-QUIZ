<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PMP Practice Quiz — Questions 1–100</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #13161e;
    --card: #1a1e2a;
    --border: #252a38;
    --accent: #4f8ef7;
    --accent2: #7c5cfc;
    --correct: #22c55e;
    --wrong: #ef4444;
    --mindset: #f59e0b;
    --text: #e8eaf0;
    --muted: #6b7280;
    --tag: #1e2535;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Sora', sans-serif;
    min-height: 100vh;
    padding: 0;
  }

  /* ── HEADER ── */
  header {
    background: linear-gradient(135deg, #0d0f14 0%, #131828 100%);
    border-bottom: 1px solid var(--border);
    padding: 28px 32px 24px;
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 12px;
  }
  .logo {
    display: flex; align-items: center; gap: 12px;
  }
  .logo-icon {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .logo-text { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.02em; }
  .logo-sub { font-size: 0.7rem; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 2px; }

  .header-stats {
    display: flex; gap: 20px; align-items: center;
  }
  .stat-pill {
    background: var(--tag);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 0.78rem;
    font-family: 'JetBrains Mono', monospace;
    display: flex; align-items: center; gap: 7px;
  }
  .stat-pill span { color: var(--accent); font-weight: 600; }

  /* ── PROGRESS BAR ── */
  .progress-track {
    height: 3px;
    background: var(--border);
    width: 100%;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
    width: 0%;
  }

  /* ── LAYOUT ── */
  .layout {
    display: grid;
    grid-template-columns: 260px 1fr;
    max-width: 1300px;
    margin: 0 auto;
    padding: 32px 24px;
    gap: 28px;
    min-height: calc(100vh - 90px);
  }

  /* ── SIDEBAR NAV ── */
  .sidebar {
    position: sticky;
    top: 90px;
    align-self: start;
    height: calc(100vh - 120px);
    overflow-y: auto;
    padding-right: 6px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .sidebar-title {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin-bottom: 12px;
    padding-left: 4px;
  }
  .q-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
  }
  .q-btn {
    aspect-ratio: 1;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: var(--tag);
    color: var(--muted);
    font-size: 0.65rem;
    font-family: 'JetBrains Mono', monospace;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
  }
  .q-btn:hover { border-color: var(--accent); color: var(--accent); }
  .q-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 700; }
  .q-btn.answered-correct { background: rgba(34,197,94,0.18); border-color: var(--correct); color: var(--correct); }
  .q-btn.answered-wrong { background: rgba(239,68,68,0.18); border-color: var(--wrong); color: var(--wrong); }
  .q-btn.answered-correct.active,
  .q-btn.answered-wrong.active { opacity: 1; }

  /* ── MAIN CONTENT ── */
  .main { min-width: 0; }

  .q-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 36px 40px;
    animation: fadeSlide 0.3s ease;
  }
  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .q-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 24px;
  }
  .q-number {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: var(--accent);
    background: rgba(79,142,247,0.1);
    border: 1px solid rgba(79,142,247,0.25);
    border-radius: 8px;
    padding: 5px 12px;
    letter-spacing: 0.06em;
  }
  .q-type-badge {
    font-size: 0.68rem;
    color: var(--muted);
    background: var(--tag);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 10px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
  }

  .q-text {
    font-size: 1.0rem;
    line-height: 1.75;
    color: var(--text);
    margin-bottom: 28px;
    font-weight: 300;
  }
  .q-ask {
    font-size: 0.95rem;
    font-weight: 600;
    color: #c9d3f0;
    margin-top: 14px;
  }

  /* ── OPTIONS ── */
  .options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }

  .option {
    display: flex; align-items: flex-start; gap: 14px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 11px;
    padding: 14px 18px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .option::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.02));
    opacity: 0; transition: opacity 0.2s;
  }
  .option:hover:not(.disabled) {
    border-color: var(--accent);
    background: rgba(79,142,247,0.06);
    transform: translateX(3px);
  }
  .option:hover:not(.disabled)::before { opacity: 1; }
  .option.disabled { cursor: default; }

  .option.selected {
    border-color: var(--accent);
    background: rgba(79,142,247,0.1);
  }
  .option.correct {
    border-color: var(--correct) !important;
    background: rgba(34,197,94,0.1) !important;
  }
  .option.wrong {
    border-color: var(--wrong) !important;
    background: rgba(239,68,68,0.08) !important;
  }

  .opt-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--muted);
    min-width: 22px;
    padding-top: 1px;
    transition: color 0.2s;
  }
  .option.correct .opt-label { color: var(--correct); }
  .option.wrong .opt-label { color: var(--wrong); }
  .option.selected .opt-label { color: var(--accent); }

  .opt-text {
    font-size: 0.9rem;
    line-height: 1.55;
    color: #c0c8e0;
    transition: color 0.2s;
  }
  .option.correct .opt-text { color: #d1fae5; }
  .option.wrong .opt-text { color: #fee2e2; }

  .opt-icon {
    margin-left: auto;
    font-size: 1rem;
    padding-top: 1px;
    display: none;
  }
  .option.correct .opt-icon,
  .option.wrong .opt-icon { display: block; }

  /* ── RESULT PANEL ── */
  .result-panel {
    display: none;
    margin-top: 4px;
    border-radius: 12px;
    overflow: hidden;
    animation: fadeSlide 0.3s ease;
  }
  .result-panel.show { display: block; }

  .result-header {
    padding: 14px 20px;
    display: flex; align-items: center; gap: 10px;
    font-size: 0.88rem;
    font-weight: 600;
  }
  .result-header.correct-bg { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); border-bottom: none; }
  .result-header.wrong-bg   { background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.25); border-bottom: none; }
  .result-header .icon { font-size: 1.2rem; }

  .mindset-box {
    background: rgba(245,158,11,0.08);
    border: 1px solid rgba(245,158,11,0.3);
    border-top: none;
    border-radius: 0 0 12px 12px;
    padding: 16px 20px;
  }
  .mindset-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--mindset);
    font-weight: 700;
    margin-bottom: 6px;
    display: flex; align-items: center; gap: 6px;
  }
  .mindset-text {
    font-size: 0.88rem;
    line-height: 1.65;
    color: #fde68a;
    font-style: italic;
  }

  /* ── FOOTER BUTTONS ── */
  .q-footer {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 28px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
  }
  .btn {
    padding: 11px 24px;
    border-radius: 10px;
    font-family: 'Sora', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
  }
  .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.35; cursor: default; transform: none; }
  .btn-ghost {
    background: var(--tag);
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .btn-ghost:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .btn-ghost:disabled { opacity: 0.3; cursor: default; }

  .q-counter {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    color: var(--muted);
  }
  .q-counter b { color: var(--text); }

  /* ── SCORE SUMMARY ── */
  .score-screen {
    display: none;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 60px 40px;
    text-align: center;
    animation: fadeSlide 0.4s ease;
  }
  .score-screen.show { display: block; }
  .score-big {
    font-size: 5rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    margin-bottom: 8px;
  }
  .score-label { font-size: 1rem; color: var(--muted); margin-bottom: 36px; }
  .score-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    max-width: 500px;
    margin: 0 auto 40px;
  }
  .score-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 12px;
  }
  .score-box .val { font-size: 2rem; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
  .score-box .lbl { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 4px; }
  .score-box.green .val { color: var(--correct); }
  .score-box.red .val { color: var(--wrong); }
  .score-box.blue .val { color: var(--accent); }

  /* ── RESPONSIVE ── */
  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { position: static; height: auto; }
    .q-card { padding: 24px 20px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">📋</div>
    <div>
      <div class="logo-text">PMP Practice Quiz</div>
      <div class="logo-sub">Questions 1 – 100 · Andreu Series</div>
    </div>
  </div>
  <div class="header-stats">
    <div class="stat-pill">Answered: <span id="statAnswered">0</span> / 100</div>
    <div class="stat-pill">Score: <span id="statScore">0</span>%</div>
  </div>
</header>
<div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>

<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-title">Question Navigator</div>
    <div class="q-grid" id="qGrid"></div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div id="quizArea"></div>
    <div class="score-screen" id="scoreScreen">
      <div class="score-big" id="scoreBig">--</div>
      <div class="score-label">Final Score</div>
      <div class="score-grid">
        <div class="score-box green"><div class="val" id="sCorrect">0</div><div class="lbl">Correct</div></div>
        <div class="score-box red"><div class="val" id="sWrong">0</div><div class="lbl">Wrong</div></div>
        <div class="score-box blue"><div class="val" id="sSkipped">0</div><div class="lbl">Unanswered</div></div>
      </div>
      <button class="btn btn-primary" onclick="restartQuiz()">🔄 Restart Quiz</button>
    </div>
  </main>
</div>

// Sort by question number
questions.sort((a, b) => a.n - b.n);

let currentIndex = 0;
let userAnswers = new Array(questions.length).fill(null); // null = unanswered
let submitted = new Array(questions.length).fill(false);

function isMulti(q) { return Array.isArray(q.answer); }

function buildGrid() {
  const grid = document.getElementById('qGrid');
  grid.innerHTML = '';
  questions.forEach((q, i) => {
    const btn = document.createElement('button');
    btn.className = 'q-btn';
    btn.id = `qbtn-${i}`;
    btn.textContent = q.n;
    btn.onclick = () => goTo(i);
    grid.appendChild(btn);
  });
}

function updateGrid() {
  questions.forEach((q, i) => {
    const btn = document.getElementById(`qbtn-${i}`);
    if (!btn) return;
    btn.className = 'q-btn';
    if (i === currentIndex) btn.classList.add('active');
    if (submitted[i]) {
      const correct = checkCorrect(i);
      btn.classList.add(correct ? 'answered-correct' : 'answered-wrong');
    }
  });
}

function checkCorrect(i) {
  const q = questions[i];
  const ua = userAnswers[i];
  if (ua === null) return false;
  if (isMulti(q)) {
    if (!Array.isArray(ua)) return false;
    const correct = [...q.answer].sort().join(',');
    const user = [...ua].sort().join(',');
    return correct === user;
  }
  return ua === q.answer;
}

function updateStats() {
  const answered = submitted.filter(Boolean).length;
  const correct = submitted.reduce((acc, s, i) => acc + (s && checkCorrect(i) ? 1 : 0), 0);
  const pct = answered > 0 ? Math.round((correct / answered) * 100) : 0;
  document.getElementById('statAnswered').textContent = answered;
  document.getElementById('statScore').textContent = pct;
  document.getElementById('progressFill').style.width = (answered / questions.length * 100) + '%';
}

function renderQuestion(i) {
  const q = questions[i];
  const ua = userAnswers[i];
  const isSubmitted = submitted[i];
  const multi = isMulti(q);

  let optHTML = '';
  q.opts.forEach((opt, oi) => {
    const label = String.fromCharCode(65 + oi);
    let cls = 'option';
    let icon = '';
    if (isSubmitted) {
      cls += ' disabled';
      const correctAnswers = multi ? q.answer : [q.answer];
      const isCorrectOpt = correctAnswers.includes(oi);
      const isSelected = multi ? (Array.isArray(ua) && ua.includes(oi)) : ua === oi;
      if (isCorrectOpt) { cls += ' correct'; icon = '✓'; }
      else if (isSelected && !isCorrectOpt) { cls += ' wrong'; icon = '✗'; }
    } else {
      const isSelected = multi ? (Array.isArray(ua) && ua.includes(oi)) : ua === oi;
      if (isSelected) cls += ' selected';
    }
    optHTML += `<div class="${cls}" onclick="selectOption(${i}, ${oi})">
      <span class="opt-label">${label}</span>
      <span class="opt-text">${opt}</span>
      <span class="opt-icon">${icon}</span>
    </div>`;
  });

  // result panel
  let resultHTML = '';
  if (isSubmitted) {
    const correct = checkCorrect(i);
    const correctAnswers = multi ? q.answer : [q.answer];
    const correctLabels = correctAnswers.map(a => String.fromCharCode(65 + a)).join(' & ');
    const headerCls = correct ? 'correct-bg' : 'wrong-bg';
    const icon = correct ? '🎉' : '❌';
    const msg = correct ? `Correct! Answer: ${correctLabels}` : `Incorrect. Correct answer: ${correctLabels}`;
    const mindsetHTML = q.mindset
      ? `<div class="mindset-box">
           <div class="mindset-label">🧠 PMP Mindset Note</div>
           <div class="mindset-text">${q.mindset}</div>
         </div>`
      : '';
    resultHTML = `<div class="result-panel show">
      <div class="result-header ${headerCls}"><span class="icon">${icon}</span> ${msg}</div>
      ${mindsetHTML}
    </div>`;
  }

  const typeBadge = multi ? 'Choose Two' : 'Single Answer';

  document.getElementById('quizArea').innerHTML = `
    <div class="q-card">
      <div class="q-header">
        <div class="q-number">Q${q.n} of 100</div>
        <div class="q-type-badge">${typeBadge}</div>
      </div>
      <div class="q-text">${q.stem}<div class="q-ask">${q.ask}</div></div>
      <div class="options" id="optContainer">${optHTML}</div>
      ${resultHTML}
      <div class="q-footer">
        <button class="btn btn-ghost" id="prevBtn" onclick="goTo(${i - 1})" ${i === 0 ? 'disabled' : ''}>← Prev</button>
        <span class="q-counter"><b>${i + 1}</b> / ${questions.length}</span>
        ${!isSubmitted
          ? `<button class="btn btn-primary" onclick="submitAnswer(${i})" id="submitBtn">Submit Answer</button>`
          : i < questions.length - 1
            ? `<button class="btn btn-primary" onclick="goTo(${i + 1})">Next →</button>`
            : `<button class="btn btn-primary" onclick="showScore()">View Score 🏁</button>`
        }
      </div>
    </div>`;
  updateGrid();
}

function selectOption(i, oi) {
  if (submitted[i]) return;
  const q = questions[i];
  if (isMulti(q)) {
    if (!Array.isArray(userAnswers[i])) userAnswers[i] = [];
    const idx = userAnswers[i].indexOf(oi);
    if (idx === -1) userAnswers[i].push(oi);
    else userAnswers[i].splice(idx, 1);
  } else {
    userAnswers[i] = oi;
  }
  renderQuestion(i);
}

function submitAnswer(i) {
  const ua = userAnswers[i];
  if (ua === null || (Array.isArray(ua) && ua.length === 0)) {
    alert('Please select an answer before submitting.');
    return;
  }
  submitted[i] = true;
  updateStats();
  renderQuestion(i);
}

function goTo(i) {
  if (i < 0 || i >= questions.length) return;
  currentIndex = i;
  document.getElementById('scoreScreen').classList.remove('show');
  document.getElementById('quizArea').style.display = 'block';
  renderQuestion(i);
}

function showScore() {
  const correct = submitted.reduce((acc, s, i) => acc + (s && checkCorrect(i) ? 1 : 0), 0);
  const wrong = submitted.reduce((acc, s, i) => acc + (s && !checkCorrect(i) ? 1 : 0), 0);
  const skipped = questions.length - submitted.filter(Boolean).length;
  const pct = Math.round((correct / questions.length) * 100);

  document.getElementById('quizArea').style.display = 'none';
  document.getElementById('scoreScreen').classList.add('show');
  document.getElementById('scoreBig').textContent = pct + '%';
  document.getElementById('sCorrect').textContent = correct;
  document.getElementById('sWrong').textContent = wrong;
  document.getElementById('sSkipped').textContent = skipped;
  updateGrid();
}

function restartQuiz() {
  userAnswers = new Array(questions.length).fill(null);
  submitted = new Array(questions.length).fill(false);
  currentIndex = 0;
  document.getElementById('scoreScreen').classList.remove('show');
  document.getElementById('quizArea').style.display = 'block';
  updateStats();
  goTo(0);
}

// Init
buildGrid();
goTo(0);
updateStats();
</script>
