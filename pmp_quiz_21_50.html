<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PMP® Practice Quiz · Questions 21–50</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0f1a;
    --surface: #131826;
    --surface2: #1a2030;
    --border: #252d40;
    --accent: #5b8cff;
    --accent2: #ff7043;
    --green: #4ade80;
    --red: #f87171;
    --text: #dce4f5;
    --muted: #627090;
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 16px 80px;
    background-image: radial-gradient(ellipse at 20% 0%, rgba(91,140,255,0.07) 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 100%, rgba(255,112,67,0.06) 0%, transparent 60%);
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
  }

  .header {
    width: 100%;
    max-width: 760px;
    padding: 40px 0 28px;
  }

  .header-eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .header-eyebrow::before {
    content: '';
    width: 20px;
    height: 1px;
    background: var(--accent);
    display: inline-block;
  }

  .header-title {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(26px, 5vw, 40px);
    color: var(--text);
    line-height: 1.1;
    margin-bottom: 6px;
  }

  .header-sub {
    font-size: 14px;
    color: var(--muted);
  }

  /* Progress */
  .progress-bar-wrap {
    width: 100%;
    max-width: 760px;
    margin-bottom: 20px;
  }

  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
    font-family: 'DM Mono', monospace;
  }

  .progress-track {
    height: 3px;
    background: var(--border);
    border-radius: 100px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #a78bfa);
    border-radius: 100px;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
  }

  /* Score strip */
  .score-strip {
    width: 100%;
    max-width: 760px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 24px;
  }

  .score-chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .score-chip-label {
    font-size: 10px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .score-chip-val {
    font-family: 'DM Serif Display', serif;
    font-size: 24px;
    line-height: 1;
  }

  .score-chip-val.correct { color: var(--green); }
  .score-chip-val.wrong { color: var(--red); }
  .score-chip-val.neutral { color: var(--accent); }

  /* Card */
  .question-card {
    width: 100%;
    max-width: 760px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    animation: cardIn 0.35s cubic-bezier(0.4,0,0.2,1);
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-top {
    padding: 24px 28px 20px;
    border-bottom: 1px solid var(--border);
  }

  .card-top-badges {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }

  .q-number {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--accent);
    background: rgba(91,140,255,0.1);
    border: 1px solid rgba(91,140,255,0.25);
    border-radius: 6px;
    padding: 4px 10px;
  }

  .q-type-badge {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--accent2);
    background: rgba(255,112,67,0.1);
    border: 1px solid rgba(255,112,67,0.25);
    border-radius: 6px;
    padding: 4px 10px;
  }

  .q-domain-badge {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.06em;
    color: #a78bfa;
    background: rgba(167,139,250,0.08);
    border: 1px solid rgba(167,139,250,0.2);
    border-radius: 6px;
    padding: 4px 10px;
  }

  .q-text {
    font-size: 15.5px;
    line-height: 1.7;
    color: var(--text);
    font-weight: 400;
    white-space: pre-line;
  }

  /* Multi note */
  .multi-note {
    font-size: 12px;
    color: var(--accent2);
    font-family: 'DM Mono', monospace;
    padding: 10px 28px 0;
    display: none;
  }

  /* Options */
  .options-list {
    padding: 18px 28px 22px;
    display: flex;
    flex-direction: column;
    gap: 9px;
  }

  .option-btn {
    display: flex;
    align-items: flex-start;
    gap: 13px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 13px 15px;
    cursor: pointer;
    text-align: left;
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14.5px;
    line-height: 1.55;
    width: 100%;
  }

  .option-btn:hover:not(:disabled) {
    border-color: rgba(91,140,255,0.45);
    background: rgba(91,140,255,0.05);
    transform: translateX(3px);
  }

  .option-btn:disabled { cursor: default; transform: none; }

  .option-btn.selected {
    border-color: var(--accent);
    background: rgba(91,140,255,0.08);
  }

  .option-btn.correct {
    border-color: var(--green);
    background: rgba(74,222,128,0.07);
  }

  .option-btn.wrong {
    border-color: var(--red);
    background: rgba(248,113,113,0.07);
  }

  .option-letter {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    min-width: 24px;
    height: 24px;
    border-radius: 6px;
    background: var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    transition: background 0.15s, color 0.15s;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .option-btn.selected .option-letter { background: var(--accent); color: #fff; }
  .option-btn.correct .option-letter { background: var(--green); color: #0b0f1a; }
  .option-btn.wrong .option-letter { background: var(--red); color: #0b0f1a; }

  /* Result indicator */
  .result-indicator {
    padding: 0 28px 10px;
    font-size: 13px;
    font-weight: 600;
    display: none;
  }
  .result-indicator.correct-msg { color: var(--green); }
  .result-indicator.wrong-msg { color: var(--red); }

  /* Explanation */
  .explanation-box {
    margin: 0 28px 22px;
    border-radius: 10px;
    border-left: 3px solid var(--accent);
    background: rgba(91,140,255,0.05);
    padding: 14px 16px;
    font-size: 14px;
    line-height: 1.65;
    color: #9aafd4;
    display: none;
  }

  .explanation-box.show { display: block; animation: fadeIn 0.3s ease; }

  .expl-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 7px;
  }

  .expl-domain {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: rgba(91,140,255,0.4);
    margin-top: 9px;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Actions */
  .card-actions {
    padding: 0 28px 28px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .btn-submit {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 12px 24px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.12s;
    letter-spacing: 0.02em;
  }

  .btn-submit:hover:not(:disabled) { opacity: 0.85; transform: translateY(-1px); }
  .btn-submit:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

  .btn-next {
    background: transparent;
    color: var(--text);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 12px 24px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 14px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    display: none;
  }

  .btn-next.show { display: block; }
  .btn-next:hover { border-color: var(--accent); background: rgba(91,140,255,0.06); }

  /* Result screen */
  .result-screen {
    width: 100%;
    max-width: 760px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 52px 40px;
    text-align: center;
    display: none;
    animation: cardIn 0.4s ease;
  }

  .result-screen.show { display: block; }

  .result-emoji { font-size: 60px; margin-bottom: 18px; }

  .result-title {
    font-family: 'DM Serif Display', serif;
    font-size: 34px;
    margin-bottom: 10px;
  }

  .result-sub {
    color: var(--muted);
    font-size: 15px;
    margin-bottom: 36px;
    max-width: 480px;
    margin-left: auto;
    margin-right: auto;
    line-height: 1.65;
  }

  .result-score-big {
    font-family: 'DM Serif Display', serif;
    font-size: 80px;
    line-height: 1;
    margin-bottom: 6px;
  }

  .result-score-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 32px;
  }

  .perf-bar {
    width: 220px;
    margin: 0 auto 32px;
    height: 5px;
    background: var(--border);
    border-radius: 100px;
    overflow: hidden;
  }

  .perf-bar-fill {
    height: 100%;
    border-radius: 100px;
    width: 0;
    transition: width 1.2s cubic-bezier(0.4,0,0.2,1) 0.3s;
  }

  .result-breakdown {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin-bottom: 40px;
  }

  .rb-item { display: flex; flex-direction: column; gap: 4px; align-items: center; }
  .rb-val { font-family: 'DM Serif Display', serif; font-size: 30px; }
  .rb-lbl { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; letter-spacing: 0.08em; }

  .btn-restart {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 14px 36px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .btn-restart:hover { opacity: 0.85; }

  @media (max-width: 520px) {
    .card-top, .options-list, .card-actions { padding-left: 16px; padding-right: 16px; }
    .explanation-box { margin-left: 16px; margin-right: 16px; }
    .score-strip { grid-template-columns: repeat(2, 1fr); }
  }

  /* ── Back / Skip nav buttons ── */
  .btn-nav {
    background: transparent;
    color: var(--muted);
    border: 1.5px solid var(--bd);
    border-radius: 7px;
    padding: 11px 16px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: border-color .15s, color .15s;
  }
  .btn-nav:hover { border-color: var(--a, var(--accent, #aaa)); color: var(--txt); }
  .btn-nav:disabled { opacity: 0.25; cursor: not-allowed; }
</style>
</head>
<body>

<div class="header">
  <div class="header-eyebrow">PMP® Examination Prep · Batch 2</div>
  <h1 class="header-title">Practice Questions 21–50</h1>
  <p class="header-sub">Domain I: People · Answer is hidden until you submit</p>
</div>

<div class="progress-bar-wrap">
  <div class="progress-meta">
    <span id="progressLabel">Question 21 of 50</span>
    <span id="progressPct">0%</span>
  </div>
  <div class="progress-track">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>
</div>

<div class="score-strip">
  <div class="score-chip">
    <span class="score-chip-label">Score</span>
    <span class="score-chip-val neutral" id="scoreDisplay">0/0</span>
  </div>
  <div class="score-chip">
    <span class="score-chip-label">Correct</span>
    <span class="score-chip-val correct" id="correctCount">0</span>
  </div>
  <div class="score-chip">
    <span class="score-chip-label">Wrong</span>
    <span class="score-chip-val wrong" id="wrongCount">0</span>
  </div>
  <div class="score-chip">
    <span class="score-chip-label">Accuracy</span>
    <span class="score-chip-val neutral" id="accuracyDisplay">—</span>
  </div>
</div>

<div class="question-card" id="questionCard">
  <div class="card-top">
    <div class="card-top-badges">
      <span class="q-number" id="qNumBadge">Q21</span>
      <span class="q-type-badge" id="qTypeBadge">Single</span>
      <span class="q-domain-badge" id="qDomainBadge">Domain I</span>
    </div>
    <p class="q-text" id="questionText"></p>
  </div>
  <p class="multi-note" id="multiNote"></p>
  <div class="options-list" id="optionsList"></div>
  <div class="result-indicator" id="resultIndicator"></div>
  <div class="explanation-box" id="explanationBox">
    <div class="expl-label">Explanation</div>
    <div id="explanationText"></div>
    <div class="expl-domain" id="domainText"></div>
  </div>
  <div class="card-actions">
    <button class="btn-nav" id="btnBack" onclick="goBack()">← Back</button>
    <button class="btn-nav" id="btnSkip" onclick="goSkip()">Skip →</button>
    <button class="btn-submit" id="btnSubmit" disabled onclick="submitAnswer()">Submit Answer</button>
    <button class="btn-next" id="btnNext" onclick="nextQuestion()">Next Question →</button>
  </div>
</div>

<div class="result-screen" id="resultScreen">
  <div class="result-emoji" id="resultEmoji">🏆</div>
  <h2 class="result-title" id="resultTitle">Quiz Complete!</h2>
  <p class="result-sub" id="resultSub"></p>
  <div class="result-score-big" id="resultScoreBig">—</div>
  <div class="result-score-label">Final Score (Questions 21–50)</div>
  <div class="perf-bar"><div class="perf-bar-fill" id="perfBarFill"></div></div>
  <div class="result-breakdown">
    <div class="rb-item"><span class="rb-val" style="color:var(--green)" id="rbCorrect">0</span><span class="rb-lbl">Correct</span></div>
    <div class="rb-item"><span class="rb-val" style="color:var(--red)" id="rbWrong">0</span><span class="rb-lbl">Wrong</span></div>
    <div class="rb-item"><span class="rb-val" style="color:var(--accent)" id="rbTotal">30</span><span class="rb-lbl">Total</span></div>
  </div>
  <button class="btn-restart" onclick="restartQuiz()">↺ Restart Quiz</button>
</div>

<script>
const LETTERS = ['A','B','C','D','E'];

const questions = [
  {
    num: 21,
    text: "Leaders of high-performing project teams __________ team members' skills and knowledge and keep team members __________ throughout the project.\n\nFill in the blanks with the correct set of responses.",
    options: ["nurture, motivated", "reward, scheduled", "identify, aware", "leverage, rewarded"],
    correct: ["A"],
    multi: false,
    explanation: "The primary goal of a project manager in relation to supporting a high-performing project team is to ensure that the team has the right skills and knowledge to complete the work and to keep them motivated to do their best work. These actions potentially optimize project outcomes.",
    domain: "ECO Domain Task: I.12"
  },
  {
    num: 22,
    text: "A project manager is having difficulty obtaining consistent input from stakeholders and needs their input to identify assumptions and constraints.\n\nHow can the project manager improve stakeholder engagement?",
    options: [
      "Use political awareness techniques.",
      "Institute checklist policies.",
      "Research effective meeting management techniques.",
      "Make use of effective facilitation techniques."
    ],
    correct: ["D"],
    multi: false,
    explanation: "Facilitation is the ability to effectively guide a group event to a successful decision, solution, or conclusion. A facilitator ensures effective participation, mutual understanding, that all contributions are considered, and that conclusions have full buy-in.",
    domain: "ECO Domain Task: I.12"
  },
  {
    num: 23,
    text: "The agile team is composed of highly skilled product design engineers. Their reputation for quality and speed has earned them new duties in concept development for new products, but team output in this new role has fallen steeply compared to their design work.\n\nWhich two measures are most effective to improve team productivity in this case? (Choose TWO.)",
    options: [
      "Plan a creativity spike in the next iteration.",
      "Seek creative thinkers to mentor the team.",
      "Prolong the iterations to adjust to new tasks.",
      "Hire more T-shaped profiles into the team.",
      "Boost motivation with a team building event."
    ],
    correct: ["B", "D"],
    multi: true,
    explanation: "The key problem is that specialists are outside of their comfort zone. Mentoring and diversifying the team so that it is more cross-functional is the most efficient measure. Relying on the team's existing skill set (creativity spike, motivation boost) or prolonging iterations will NOT address the root problem of specialization.",
    domain: "ECO Domain Task: I.12"
  },
  {
    num: 24,
    text: "The agile team excels at solving technical problems, but when the product owner requests creative or business-related ideas, the team falls silent.\n\nIs this a problem?",
    options: [
      "Yes, specialist teams are prone to higher error rates.",
      "No, specialist teams are more effective than generalists.",
      "Yes, lack of diversity will limit the team's adaptability.",
      "No, the team performs better without useless distractions."
    ],
    correct: ["C"],
    multi: false,
    explanation: "T-shaped skills are desirable in agile team members. Having a broad set of skills enables people to work more independently and with greater ability to adapt to changing needs. A team without diverse skills lacks adaptability.",
    domain: "ECO Domain Task: I.12"
  },
  {
    num: 25,
    text: "A project manager experienced in predictive methods is taking on an agile project for the first time. To help in making a successful transition, the project manager makes a list of situations that may arise from inadequate action as a servant leader.\n\nWhich three situations would be on this list? (Choose THREE.)",
    options: [
      "Team members avoid taking on challenging tasks.",
      "Team members avoid direct communication with other departments.",
      "Team members raise impediments they are unable to eliminate.",
      "High performers in the team move to more senior positions.",
      "Project stakeholders express skepticism of agile methods."
    ],
    correct: ["A", "B", "E"],
    multi: true,
    explanation: "Servant leaders must promote professional development through challenges and help team members build bridges with external groups. They also educate stakeholders on the business value of agile methodology. Options A, B, and E represent failures of servant leadership.",
    domain: "ECO Domain Task: I.12"
  },
  {
    num: 26,
    text: "An agile team needs to decide who should represent them in the Scrum of Scrums.\n\nWhich criteria should a project manager use to select the best-suited team member?",
    options: [
      "How well the member knows the work in the other teams.",
      "How well the member applies their depth of expertise.",
      "How convincing the member is as a public speaker.",
      "How long they have been working with Agile methods."
    ],
    correct: ["A"],
    multi: false,
    explanation: "The most important factor to effectively collaborate between teams in a Scrum of Scrums is to understand the work across all teams. This knowledge promotes effective coordination to identify and resolve dependencies and impediments.",
    domain: "ECO Domain Task: I.12"
  },
  {
    num: 27,
    text: "While monitoring progress of the agile team, the project manager notices that an expert member's output is much lower compared with that of junior team members. This is a surprise, as the expert works diligently on the most complex tasks and always produces defect-free results.\n\nWhich is the most likely explanation for the developer's low output?",
    options: [
      "The expert works faster and reports fewer hours than the junior members.",
      "Younger team members are normally more productive.",
      "The story point estimates on the expert's work are consistently too low.",
      "The expert runs more tests and therefore completes fewer stories."
    ],
    correct: ["C"],
    multi: false,
    explanation: "Story point estimates are used to measure progress in an agile project, and actual hours worked would NOT be apparent unless readjusted. If the expert's complex work is under-estimated in story points, their output will appear low despite high actual effort.",
    domain: "ECO Domain Task: I.10"
  },
  {
    num: 28,
    text: "The Project Management Office wants to offer constant reporting across dozens of agile projects running concurrently. They want to use information radiators to share progress status and key lessons learned.\n\nHow can this best be achieved?",
    options: [
      "Place monitors displaying combined feature burn-up charts and a digest of retrospectives.",
      "Use fishbowl windows to show all project teams' Kanban boards and charts in real time.",
      "Place webcams to broadcast all Kanban boards and cycle the images sequentially on the radiator.",
      "Set up an internal Wiki page which all agile teams update in real time and users consult on demand."
    ],
    correct: ["A"],
    multi: false,
    explanation: "The feature burn-up chart can be used as a common measure of progress, and lessons learned are recorded in retrospectives. Information radiators are physical displays used to share up-to-date information. They are NOT live cams (fishbowl/webcam), and the information should be visible at a glance, not on-demand (Wiki).",
    domain: "ECO Domain Task: I.10"
  },
  {
    num: 29,
    text: "The last three agile iterations showed a trend of increasingly prolonged test work.\n\nWhich activity should the project manager plan to address the root cause?",
    options: [
      "Adopt test automation tools.",
      "Plan an iteration of testing only.",
      "Practice a paired testing policy.",
      "Plan more backlog refinement."
    ],

let current = 0;
let correct = 0;
let wrong = 0;
let answered = 0;
let selectedOptions = [];
let submitted = false;

function render() {
  const q = questions[current];
  const total = questions.length;
  const globalQ = q.num;

  // Progress
  const pct = Math.round((answered / total) * 100);
  document.getElementById('progressLabel').textContent = `Question ${globalQ} of 50`;
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';

  // Score
  updateScoreDisplay();

  // Badges
  document.getElementById('qNumBadge').textContent = `Q${globalQ}`;
  document.getElementById('qTypeBadge').textContent = q.multi ? `Multi (${q.correct.length})` : 'Single';
  document.getElementById('qDomainBadge').textContent = q.domain.split(':')[1]?.trim() || 'Domain I';
  document.getElementById('questionText').textContent = q.text;

  // Multi note
  const multiNote = document.getElementById('multiNote');
  if (q.multi) {
    multiNote.textContent = `★ Select ${q.correct.length} answers`;
    multiNote.style.display = 'block';
  } else {
    multiNote.style.display = 'none';
  }

  // Options
  const list = document.getElementById('optionsList');
  list.innerHTML = '';
  q.options.forEach((opt, i) => {
    const letter = LETTERS[i];
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-letter">${letter}</span><span>${opt}</span>`;
    btn.onclick = () => toggleOption(letter, btn);
    btn.dataset.letter = letter;
    list.appendChild(btn);
  });

  // Reset
  selectedOptions = [];
  submitted = false;
  document.getElementById('btnSubmit').disabled = true;
  document.getElementById('btnNext').classList.remove('show');
  document.getElementById('explanationBox').classList.remove('show');
  const ri = document.getElementById('resultIndicator');
  ri.style.display = 'none';
  ri.className = 'result-indicator';
}

function toggleOption(letter, btn) {
  if (submitted) return;
  const q = questions[current];

  if (!q.multi) {
    document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
    selectedOptions = [letter];
    btn.classList.add('selected');
  } else {
    if (selectedOptions.includes(letter)) {
      selectedOptions = selectedOptions.filter(l => l !== letter);
      btn.classList.remove('selected');
    } else {
      selectedOptions.push(letter);
      btn.classList.add('selected');
    }
  }

  document.getElementById('btnSubmit').disabled = selectedOptions.length < (q.multi ? q.correct.length : 1);
}

function submitAnswer() {
  if (submitted) return;
  submitted = true;
  const q = questions[current];

  const correctSet = new Set(q.correct);
  const selectedSet = new Set(selectedOptions);
  const isCorrect = correctSet.size === selectedSet.size && [...correctSet].every(l => selectedSet.has(l));

  answered++;
  if (isCorrect) correct++; else wrong++;

  // Highlight
  document.querySelectorAll('.option-btn').forEach(btn => {
    btn.disabled = true;
    const letter = btn.dataset.letter;
    if (q.correct.includes(letter)) {
      btn.classList.remove('selected');
      btn.classList.add('correct');
    } else if (selectedOptions.includes(letter)) {
      btn.classList.remove('selected');
      btn.classList.add('wrong');
    }
  });

  // Result indicator
  const ri = document.getElementById('resultIndicator');
  ri.style.display = 'block';
  if (isCorrect) {
    ri.className = 'result-indicator correct-msg';
    ri.textContent = '✓ Correct!';
  } else {
    ri.className = 'result-indicator wrong-msg';
    ri.textContent = `✗ Incorrect — Correct answer: ${q.correct.join(', ')}`;
  }

  // Explanation
  document.getElementById('explanationText').textContent = q.explanation;
  document.getElementById('domainText').textContent = q.domain;
  document.getElementById('explanationBox').classList.add('show');

  // Buttons
  document.getElementById('btnSubmit').disabled = true;
  const btnNext = document.getElementById('btnNext');
  btnNext.textContent = current < questions.length - 1 ? 'Next Question →' : 'See Results →';
  btnNext.classList.add('show');

  updateScoreDisplay();

  // Progress
  const pct = Math.round((answered / questions.length) * 100);
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';
}

function updateScoreDisplay() {
  document.getElementById('scoreDisplay').textContent = `${correct}/${answered}`;
  document.getElementById('correctCount').textContent = correct;
  document.getElementById('wrongCount').textContent = wrong;
  document.getElementById('accuracyDisplay').textContent = answered > 0 ? Math.round((correct / answered) * 100) + '%' : '—';
}

function nextQuestion() {
  current++;
  if (current >= questions.length) {
    showResult();
  } else {
    render();
    document.getElementById('questionCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

function showResult() {
  document.getElementById('questionCard').style.display = 'none';
  document.querySelector('.progress-bar-wrap').style.display = 'none';

  const total = questions.length;
  const pct = Math.round((correct / total) * 100);

  let emoji, title, sub;
  if (pct >= 90) { emoji = '🏆'; title = 'Exceptional!'; sub = "Above 90% — you're in exam-ready territory. Keep this momentum!"; }
  else if (pct >= 75) { emoji = '💪'; title = 'Great Work!'; sub = "Solid performance. Review the ones you missed and push for 90%+."; }
  else if (pct >= 50) { emoji = '📚'; title = 'Good Effort!'; sub = "Review the explanations carefully, especially on agile team dynamics and resource management."; }
  else { emoji = '🔄'; title = 'Keep Going!'; sub = "Focus on servant leadership, T-shaped skills, and agile ceremonies. You'll get there!"; }

  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultSub').textContent = sub;
  document.getElementById('resultScoreBig').textContent = pct + '%';

  const scoreEl = document.getElementById('resultScoreBig');
  scoreEl.style.color = pct >= 90 ? 'var(--green)' : pct >= 75 ? 'var(--accent)' : 'var(--red)';

  document.getElementById('rbCorrect').textContent = correct;
  document.getElementById('rbWrong').textContent = wrong;
  document.getElementById('rbTotal').textContent = total;

  const fill = document.getElementById('perfBarFill');
  fill.style.background = pct >= 90 ? 'var(--green)' : pct >= 75 ? 'var(--accent)' : 'var(--red)';
  setTimeout(() => { fill.style.width = pct + '%'; }, 100);

  document.getElementById('resultScreen').classList.add('show');
}

function restartQuiz() {
  current = 0; correct = 0; wrong = 0; answered = 0;
  selectedOptions = []; submitted = false;
  document.getElementById('resultScreen').classList.remove('show');
  document.getElementById('questionCard').style.display = '';
  document.querySelector('.progress-bar-wrap').style.display = '';
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

render();

function goBack() {
  if (current > 0) { current--; render(); }
  document.getElementById('questionCard').scrollIntoView({behavior:'smooth',block:'start'});
}
function goSkip() {
  if (current < questions.length - 1) { current++; render(); }
  document.getElementById('questionCard').scrollIntoView({behavior:'smooth',block:'start'});
}
</script>
